// Tek bir HTML bölümünü iframe'de render et — canvas döndür
async function _renderSectionToCanvas(sectionHtml,css,renderW){
  const iframe=document.createElement("iframe");
  iframe.style.cssText=`position:fixed;left:-9999px;top:0;width:${renderW}px;height:1px;border:none;visibility:hidden;`;
  document.body.appendChild(iframe);
  const hasOwnStyle=sectionHtml.includes("<style");
  const antiBreakCSS=`body{margin:0!important;padding:10px!important;background:#fff!important;width:${renderW}px!important;max-width:${renderW}px!important;box-sizing:border-box!important;}
    tr,td,th{page-break-inside:avoid!important;break-inside:avoid!important;}
    h1,h2,h3,h4{page-break-after:avoid!important;break-after:avoid!important;page-break-inside:avoid!important;break-inside:avoid!important;}
    .stat-grid,.stat-box,.two-col,.box,.zorluk-box,.aciklama,.header,.cls-block,.class-block,.col-block,.col-row{page-break-inside:avoid!important;break-inside:avoid!important;}
    .cls-title{page-break-after:avoid!important;break-after:avoid!important;}
    table{width:100%!important;}td,th{word-break:break-word;overflow-wrap:break-word;}
    img,svg{max-width:100%!important;}`;
  const fullHtml=hasOwnStyle
    ?`<!DOCTYPE html><html><head><meta charset="utf-8"><style>${antiBreakCSS}</style></head><body>${sectionHtml}</body></html>`
    :`<!DOCTYPE html><html><head><meta charset="utf-8"><style>${css}${antiBreakCSS}</style></head><body>${sectionHtml}</body></html>`;
  iframe.contentDocument.open();
  iframe.contentDocument.write(fullHtml);
  iframe.contentDocument.close();
  await new Promise(r=>setTimeout(r,600));
  const iBody=iframe.contentDocument.body;
  const totalH=iBody.scrollHeight;
  iframe.style.height=totalH+"px";
  await new Promise(r=>setTimeout(r,200));

  // Her satır/blok elemanının Y pozisyonunu ölç — akıllı kesim için
  const blockEls=[...iBody.querySelectorAll("tr,h1,h2,h3,.stat-box,.box,.zorluk-box,.aciklama,.cls-title,.cls-block,.class-block,.header")];
  const blockBoundaries=blockEls.map(el=>{
    const r=el.getBoundingClientRect();
    const scrollTop=iframe.contentDocument.documentElement.scrollTop||0;
    return Math.round(r.top+scrollTop);
  }).filter((v,i,a)=>v>0&&a.indexOf(v)===i).sort((a,b)=>a-b);

  const canvas=await window.html2canvas(iBody,{
    scale:2,useCORS:true,allowTaint:true,backgroundColor:"#ffffff",
    width:renderW,height:totalH,windowWidth:renderW,scrollX:0,scrollY:0,
  });
  document.body.removeChild(iframe);
  // blockBoundaries canvas scale:2 ile çarp
  const scaledBoundaries=blockBoundaries.map(y=>y*2);
  return{canvas,scaledBoundaries};
}

// jsPDF + html2canvas ile gerçek PDF üret
// <!--NEWPAGE--> → her bölüm ayrı A4 başlangıcı
// Akıllı sayfa kesimi: blok sınırlarına göre keser, satır ortasını bölmez
async function generateAndDownloadPDF(htmlContent,filename,opts={}){
  const {orientation="portrait",accentColor="#1D4ED8",ecoMode=false,margin=6,cols=1,rowSpacing=2,fontScale=1}=opts;
  const css=buildPdfCSS(accentColor,ecoMode,rowSpacing);
  const fs=Number(fontScale)||1;
  const fontScaleCSS=fs!==1?`body,p,li,td,th,span,div{font-size:${Math.round(fs*100)}%!important;}h1{font-size:${Math.round(fs*160)}%!important;}h2{font-size:${Math.round(fs*120)}%!important;}`:"";
  const fullCss=css+fontScaleCSS;

  const PAGE_MARKER="<!--NEWPAGE-->";
  const COL_MARKER="<!--NEWCOL-->";

  // İçerik NEWCOL içeriyorsa → sayfa sütunu (A4 ikiye/üçe/dörde bölme) modunda
  const hasColMarker=htmlContent.includes(COL_MARKER);

  const rawSections=htmlContent.includes(PAGE_MARKER)
    ?htmlContent.split(PAGE_MARKER).map(p=>p.trim()).filter(p=>p)
    :[htmlContent];

  // Eski cols>1 mantığı (NEWPAGE bazlı, sütun işaretçisi olmayan içerikler için korundu)
  let sections=rawSections;
  if(cols>1 && !hasColMarker){
    const groups=[];
    for(let i=0;i<rawSections.length;i+=cols){
      const grp=rawSections.slice(i,i+cols);
      const colW=Math.floor(100/cols);
      groups.push(`<div style="display:flex;gap:8px;align-items:flex-start;">${grp.map(p=>`<div style="width:${colW}%;box-sizing:border-box;flex-shrink:0;">${p}</div>`).join("")}</div>`);
    }
    sections=groups;
  }

  const safe=stampedFilename(filename);
  await loadScript("https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js");
  await loadScript("https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js");

  const isLandscape=orientation==="landscape";
  const A4w_mm=isLandscape?297:210;
  const A4h_mm=isLandscape?210:297;
  const renderW=isLandscape?1122:794;
  const pxPerMm=renderW/A4w_mm;
  const marginMm=margin;
  const marginPx=Math.round(marginMm*pxPerMm);
  const printW_mm=A4w_mm-marginMm*2;
  const printH_mm=A4h_mm-marginMm*2;
  const printH_px=Math.round(printH_mm*pxPerMm)*2; // scale:2

  const {jsPDF}=window.jspdf;
  const pdf=new jsPDF({orientation:isLandscape?"landscape":"portrait",unit:"mm",format:"a4"});
  let pdfPageIndex=0;

  // ── NEWCOL MOD: A4 sayfasını dikey olarak N sütuna böl ──
  // Header/önsöz: <!--NEWCOL-->'dan önce gelen içerik tam genişlikte render edilir
  // Sütun blokları: <!--NEWCOL--> ile ayrılmış parçalar yan yana yerleştirilir
  if(hasColMarker){
    for(let si=0;si<rawSections.length;si++){
      const sectionHtml=rawSections[si];
      const colParts=sectionHtml.split(COL_MARKER).map(p=>p.trim()).filter(p=>p);
      const numPageCols=colParts.length>1?colParts.length:cols;
      const sepMm=4;
      const colW_mm=(printW_mm-(sepMm*(numPageCols-1)))/numPageCols;
      const colRenderW=Math.round(colW_mm*pxPerMm);
      const fullRenderW=Math.round(printW_mm*pxPerMm);

      // ── Önsöz: NEWCOL işaretçisinden önce gelen tam genişlik içerik ──
      // Örn: <style>...</style><div class="hdr">...</div><div class="cls-title">...</div>
      // ilk colPart'ın içinde <table> öncesinde ne varsa önsöz sayılır
      let preambleCanvas=null;
      const firstPart=colParts[0]||"";
      const tableIdx=firstPart.indexOf("<table");
      if(tableIdx>0){
        // <table>'dan önceki kısım önsöz: tam genişlikte render et
        const preambleHtml=firstPart.substring(0,tableIdx);
        const restHtml=firstPart.substring(tableIdx);
        // İlk col parçasını önsözsüz hale getir
        colParts[0]=restHtml;
        const{canvas:pc}=await _renderSectionToCanvas(preambleHtml,fullCss,fullRenderW);
        preambleCanvas=pc;
      }

      // Her sütun parçasını ayrı canvas olarak render et
      const colCanvases=[];
      for(let ci=0;ci<colParts.length;ci++){
        const{canvas}=await _renderSectionToCanvas(colParts[ci],fullCss,colRenderW);
        colCanvases.push(canvas);
      }

      // Toplam yükseklik: önsöz + max sütun yüksekliği
      const preambleH=preambleCanvas?preambleCanvas.height:0;
      const colMaxH=Math.max(...colCanvases.map(c=>c.height));
      const totalContentH=preambleH+colMaxH;
      const pageW_px=Math.round(printW_mm*pxPerMm)*2;

      let curY=0;
      let firstPage=true;
      while(curY<totalContentH){
        if(!firstPage)pdf.addPage();
        if(pdfPageIndex>0&&firstPage)pdf.addPage();
        pdfPageIndex++;
        firstPage=false;
        const sliceH=Math.min(printH_px,totalContentH-curY);
        if(sliceH<=0)break;

        const pageCanvas=document.createElement("canvas");
        pageCanvas.width=pageW_px;
        pageCanvas.height=sliceH;
        const ctx=pageCanvas.getContext("2d");
        ctx.fillStyle="#ffffff";
        ctx.fillRect(0,0,pageCanvas.width,sliceH);

        // Önsöz dilimi: tam genişlikte çiz
        if(preambleCanvas&&curY<preambleH){
          const availH=Math.min(sliceH,preambleH-curY);
          ctx.drawImage(preambleCanvas,0,curY,preambleCanvas.width,availH,0,0,pageW_px,availH);
        }

        // Sütun dilimleri: önsözden sonra başlar
        const colStartY=curY-preambleH; // sütunlarda kaç px geçildi
        if(colStartY<colMaxH){
          const colSliceOffsetInPage=Math.max(0,preambleH-curY); // sayfada nereye yazılacak
          const colSliceH=sliceH-colSliceOffsetInPage;
          const colSrcY=Math.max(0,colStartY);
          if(colSliceH>0){
            for(let ci=0;ci<colCanvases.length;ci++){
              const cc=colCanvases[ci];
              const xOffset=Math.round((colW_mm+sepMm)*ci*pxPerMm)*2;
              if(ci>0){
                const sepX=xOffset-Math.round(sepMm*pxPerMm);
                ctx.fillStyle="#e0e0e0";
                ctx.fillRect(sepX,colSliceOffsetInPage,2,colSliceH);
                ctx.fillStyle="#ffffff";
              }
              if(colSrcY<cc.height){
                const drawH=Math.min(colSliceH,cc.height-colSrcY);
                ctx.drawImage(cc,0,colSrcY,cc.width,drawH,xOffset,colSliceOffsetInPage,colRenderW*2,drawH);
              }
            }
          }
        }

        const imgData=pageCanvas.toDataURL("image/jpeg",0.94);
        const imgH_mm=(sliceH/pageCanvas.width)*printW_mm*(A4w_mm/printW_mm);
        pdf.addImage(imgData,"JPEG",marginMm,marginMm,printW_mm,Math.min(imgH_mm,printH_mm));
        curY+=sliceH;
      }
    }
    const pdfBlob=pdf.output("blob");
    _openPDFOverlay(pdfBlob,safe);
    return;
  }
  // ── Normal mod (tek sütun veya eski NEWPAGE bazlı çok sütun) ──
  for(let si=0;si<sections.length;si++){
    const {canvas,scaledBoundaries}=await _renderSectionToCanvas(sections[si],fullCss,renderW-marginPx*2);
    const totalH=canvas.height; // scale:2 px
    let curY=0; // şimdiye kadar işlenen piksel (scale:2)

    while(curY<totalH){
      if(pdfPageIndex>0)pdf.addPage();
      pdfPageIndex++;

      // Bu sayfanın ideal bitiş noktası
      const idealEnd=curY+printH_px;

      // En yakın blok sınırını bul — idealEnd'e en yakın ama geçmeyeni
      let cutY=idealEnd;
      if(idealEnd<totalH){
        // Blok sınırlarından idealEnd'e ≤ printH_px*0.15 uzaklıkta olanı bul
        const candidates=scaledBoundaries.filter(b=>b>curY+printH_px*0.5&&b<=idealEnd);
        if(candidates.length>0){
          cutY=candidates[candidates.length-1];
        } else {
          cutY=idealEnd;
        }
      } else {
        cutY=totalH;
      }

      const sliceH=Math.min(cutY-curY,totalH-curY);
      if(sliceH<=0)break;

      const sliceCanvas=document.createElement("canvas");
      sliceCanvas.width=canvas.width;
      sliceCanvas.height=sliceH;
      const ctx=sliceCanvas.getContext("2d");
      ctx.fillStyle="#ffffff";
      ctx.fillRect(0,0,sliceCanvas.width,sliceH);
      ctx.drawImage(canvas,0,-curY);

      const imgData=sliceCanvas.toDataURL("image/jpeg",0.94);
      const imgH_mm=(sliceH/canvas.width)*printW_mm*(A4w_mm/printW_mm);
      pdf.addImage(imgData,"JPEG",marginMm,marginMm,printW_mm,Math.min(imgH_mm,printH_mm));

      curY=cutY;
    }
  }

  const pdfBlob=pdf.output("blob");
  _openPDFOverlay(pdfBlob,safe);
}

function buildStudentRows(students,classes){
  return students.map(s=>{
    const cls=classes.find(c=>c.id===s.classId);
    return{"Okul No":s.schoolNo||"","Ad Soyad":s.name,"Sınıf":cls?`${cls.grade}/${cls.branch}`:"?"};
  }).sort((a,b)=>a["Sınıf"].localeCompare(b["Sınıf"])||a["Ad Soyad"].localeCompare(b["Ad Soyad"]));
}
function buildClassRows(classes,students){
  return classes.sort((a,b)=>a.grade-b.grade||a.branch.localeCompare(b.branch)).map(c=>({
    "Sınıf":`${c.grade}/${c.branch}`,
    "Öğrenci Sayısı":students.filter(s=>s.classId===c.id).length,
  }));
}
function buildExamRows(exams,classes,lessons,students,examScores){
  const rows=[];
  exams.forEach(ex=>{
    const cls=classes.find(c=>c.id===ex.classId);
    const les=lessons.find(l=>l.id===ex.lessonId);
    const clsStudents=sortStudents(students.filter(s=>s.classId===ex.classId),"schoolNo");
    const tmax=ex.questions.reduce((s,q)=>s+Number(q.maxScore),0);
    const scores=examScores[String(ex.id)]||{};
    clsStudents.forEach(st=>{
      const bep_=!!(scores[st.id]?.__bep);const kopya_=!!(scores[st.id]?.__kopya);
      const tot=bep_?(scores[st.id]?.__bepScore!=null&&scores[st.id]?.__bepScore!==""?Number(scores[st.id].__bepScore):0):ex.questions.reduce((s,q)=>{const v=scores[st.id]?.[q.id];return s+(v!==""&&v!==undefined?Number(v):0);},0);
      const hasAny=bep_?(scores[st.id]?.__bepScore!==""&&scores[st.id]?.__bepScore!=null):kopya_?true:ex.questions.some(q=>scores[st.id]?.[q.id]!==""&&scores[st.id]?.[q.id]!==undefined);
      const pct=tmax>0?Math.round((tot/tmax)*100):0;
      const notStr=pct>=85?"Pekiyi":pct>=70?"İyi":pct>=60?"Orta":pct>=50?"Geçer":"Geçemez";
      const row={"Sınav":ex.name||"İsimsiz","Ders":les?.name||"?","Sınıf":cls?`${cls.grade}/${cls.branch}`:"?","Dönem":ex.term,"No":ex.examNo,"Tarih":ex.date,"Okul No":st.schoolNo||"","Ad Soyad":st.name,"BEP":bep_?"Evet":"","Kopya":kopya_?"Evet":"","Toplam":hasAny?tot:"—","Max":tmax,"Başarı %":hasAny&&!bep_&&!kopya_?pct:"—","Not":hasAny?(bep_?"BEP":kopya_?"Kopya":notStr):"Girilmedi"};
      ex.questions.forEach(q=>{const v=scores[st.id]?.[q.id];row[`S${q.label}(${q.maxScore})`]=v!==""&&v!==undefined?Number(v):"—";});
      rows.push(row);
    });
  });
  return rows;
}
function buildPDFHtml(scope,school,classes,lessons,students,exams,examScores){
  let html=`<h1>📖 S-Öğretmen v5.22 — Dışa Aktarım</h1>
  <p style="color:#666;font-size:11px">Okul: <b>${school.name}</b> | Öğretim Yılı: <b>${school.academicYear}</b> | Tarih: <b>${new Date().toLocaleDateString("tr-TR")}</b></p>`;
  if(scope==="all"||scope==="school"){
    html+=`<h2>🏫 Okul Bilgileri</h2><table><tr><th>Alan</th><th>Değer</th></tr>
    ${[["Okul Adı",school.name],["Adres",school.address],["Telefon",school.phone],["E-posta",school.email],["Müdür",school.principal],["Öğretim Yılı",school.academicYear]].map(([k,v])=>`<tr><td>${k}</td><td>${v||"—"}</td></tr>`).join("")}</table>`;
  }
  if(scope==="all"||scope==="classes"){
    html+=`<h2>🏷 Sınıflar</h2><table><tr><th>Sınıf</th><th>Öğrenci Sayısı</th></tr>
    ${classes.sort((a,b)=>a.grade-b.grade||a.branch.localeCompare(b.branch)).map(c=>`<tr><td>${c.grade}/${c.branch}</td><td>${students.filter(s=>s.classId===c.id).length}</td></tr>`).join("")}</table>`;
  }
  if(scope==="all"||scope==="students"){
    const byClass={};
    students.forEach(s=>{(byClass[s.classId]=byClass[s.classId]||[]).push(s);});
    html+=`<style>.cls-pdf-block+.cls-pdf-block{page-break-before:always;}.cls-pdf-block{page-break-inside:avoid;}</style>`;
    let firstClsPdf=true;
    classes.sort((a,b)=>a.grade-b.grade||a.branch.localeCompare(b.branch)).forEach(c=>{
      const sts=sortStudents(byClass[c.id]||[],"schoolNo");
      if(!sts.length)return;
      if(!firstClsPdf)html+="<!--NEWPAGE-->";firstClsPdf=false;
      html+=`<div class="cls-pdf-block">`;
      html+=`<h2>👤 ${c.grade}/${c.branch} Sınıfı — ${sts.length} Öğrenci</h2>
      <table><tr><th>#</th><th>Okul No</th><th>Ad Soyad</th></tr>
      ${sts.map(s=>`<tr><td>${s.no}</td><td>${s.schoolNo||"—"}</td><td>${s.name}</td></tr>`).join("")}</table>`;
      html+=`</div>`;
    });
  }
  if(scope==="all"||scope==="exams"){
    html+=`<style>.exam-pdf-block+.exam-pdf-block{page-break-before:always;}.exam-pdf-block{page-break-inside:avoid;}</style>`;
    let firstExamPdf=true;
    exams.forEach(ex=>{
      const cls=classes.find(c=>c.id===ex.classId);
      const les=lessons.find(l=>l.id===ex.lessonId);
      const sts=sortStudents(students.filter(s=>s.classId===ex.classId),"schoolNo");
      const tmax=ex.questions.reduce((s,q)=>s+Number(q.maxScore),0);
      const sc=examScores[String(ex.id)]||{};
      const totals=sts.map(st=>{const t=ex.questions.reduce((s,q)=>{const v=sc[st.id]?.[q.id];return s+(v!==""&&v!==undefined?Number(v):0);},0);const h=ex.questions.some(q=>sc[st.id]?.[q.id]!==""&&sc[st.id]?.[q.id]!==undefined);return{...st,tot:t,has:h,pct:tmax>0?Math.round((t/tmax)*100):0};});
      const entered=totals.filter(s=>s.has);
      const scores=entered.map(s=>s.tot);
      const avg=scores.length?scores.reduce((a,b)=>a+b,0)/scores.length:0;
      const passing=scores.filter(s=>s>=50).length;
      if(!firstExamPdf)html+="<!--NEWPAGE-->";firstExamPdf=false;
      html+=`<div class="exam-pdf-block">`;
      html+=`<h2>📝 ${ex.name||"İsimsiz"} — ${les?.name||"?"} / ${cls?`${cls.grade}/${cls.branch}`:"?"}</h2>
      <p style="font-size:11px;color:#666">Dönem: ${ex.term} | Sınav No: ${ex.examNo} | Tarih: ${ex.date} | Toplam Puan: ${tmax}</p>
      <div class="stat-grid">
        <div class="stat-box"><div class="stat-label">Giren</div><div class="stat-val">${entered.length}/${sts.length}</div></div>
        <div class="stat-box"><div class="stat-label">Ortalama</div><div class="stat-val">${avg.toFixed(1)}</div></div>
        <div class="stat-box"><div class="stat-label">Başarı</div><div class="stat-val">%${entered.length?Math.round((passing/entered.length)*100):0}</div></div>
      </div>
      <table><tr><th>#</th><th>Okul No</th><th>Ad Soyad</th>${ex.questions.map(q=>`<th>S${q.label}<br/>(${q.maxScore})</th>`).join("")}<th>Toplam</th><th>Not</th></tr>
      ${totals.map(st=>{
        const notStr=!st.has?"Girilmedi":st.pct>=85?"Pekiyi":st.pct>=70?"İyi":st.pct>=60?"Orta":st.pct>=50?"Geçer":"Geçemez";
        return`<tr><td>${st.no}</td><td>${st.schoolNo||"—"}</td><td>${st.name}</td>${ex.questions.map(q=>{const v=sc[st.id]?.[q.id];return`<td style="text-align:center">${v!==""&&v!==undefined?Number(v):"—"}</td>`;}).join("")}<td style="font-weight:bold;text-align:center">${st.has?st.tot:"—"}</td><td><span class="badge ${!st.has?"info":st.pct>=50?"ok":"bad"}">${notStr}</span></td></tr>`;
      }).join("")}
      <tr style="background:#e8f0fe"><td colspan="3"><b>Ortalama</b></td>${ex.questions.map(q=>{const vals=entered.map(s=>Number(sc[s.id]?.[q.id]||0));const a=vals.length?vals.reduce((x,y)=>x+y,0)/vals.length:0;return`<td style="text-align:center;font-weight:bold">${a.toFixed(1)}</td>`;}).join("")}<td style="text-align:center;font-weight:bold">${avg.toFixed(1)}</td><td></td></tr>
      </table></div>`;
    });
  }
  return html;
}

function buildSchedulePDF(schedule,scheduleSettings,classes,lessons,opts={},wkndSchedule={},wkndSS=null){
  const{ecoMode=false,showWeekdays=true,showWeekend=true,showDensity=false,accentColor="#1D4ED8",rowSpacing=2}=opts;
  const ac=ecoMode?"#000":accentColor;
  const wc=ecoMode?"#000":"#B45309"; // hafta sonu rengi (amber)
  const DAYS=["Pazartesi","Salı","Çarşamba","Perşembe","Cuma","Cumartesi","Pazar"];
  const DAYS_SH=["Pzt","Sal","Çar","Per","Cum","Cmt","Paz"];
  const cname=id=>{const x=classes.find(c=>c.id===id);return x?`${x.grade}/${x.branch}`:"?";};
  const lname=id=>lessons.find(x=>String(x.id)===String(id))?.name||"?";
  const wkndSSEff=wkndSS||scheduleSettings;
  const wkP=computePeriods(scheduleSettings);   // hafta içi periodları
  const weP=computePeriods(wkndSSEff);           // hafta sonu periodları
  const rs=Math.max(1,Number(rowSpacing)||2);
  const maxRows=Math.max(showWeekdays?wkP.length:0, showWeekend?weP.length:0);

  // Toplam dolu sayılar
  const wkFill=showWeekdays?[0,1,2,3,4].reduce((a,d)=>a+wkP.filter(p=>schedule[d]?.[p.index]).length,0):0;
  const weFill=showWeekend?[5,6].reduce((a,d)=>a+weP.filter(p=>(wkndSchedule||{})[d]?.[p.index]).length,0):0;
  const totFill=wkFill+weFill;
  const totSlots=(showWeekdays?5*wkP.length:0)+(showWeekend?2*weP.length:0);

  /* ─── CSS ─────────────────────────────────────────────────────────────── */
  const CSS=ecoMode?`
    *{box-sizing:border-box;margin:0;padding:0;font-family:Arial,sans-serif;color:#000;}
    body{background:#fff;padding:10px;}
    .page-title{font-size:14px;font-weight:900;border-bottom:2px solid #000;padding-bottom:4px;margin-bottom:2px;}
    .meta{font-size:9px;color:#555;margin-bottom:8px;}
    .section-title{font-size:11px;font-weight:800;margin:10px 0 4px;border-left:3px solid #000;padding-left:6px;}
    .wrap{display:flex;gap:12px;align-items:flex-start;}
    table{border-collapse:collapse;font-size:9px;}
    th{background:#eee;border:1px solid #999;padding:3px 4px;font-size:9px;font-weight:700;text-align:center;}
    td{border:1px solid #bbb;padding:${rs+1}px 4px;text-align:center;vertical-align:middle;font-size:9px;}
    .t-saat{background:#f5f5f5;font-weight:700;text-align:right;white-space:nowrap;min-width:46px;font-size:8px;}
    .t-no{font-size:8px;font-weight:700;color:#333;}
    .t-time{font-size:7px;color:#555;line-height:1.3;}
    .cls{font-size:10px;font-weight:800;}
    .les{font-size:8px;color:#333;}
    .empty{color:#ccc;}
    .density-wrap{margin-top:10px;}
    .density-wrap h4{font-size:10px;font-weight:800;margin-bottom:4px;}
  `:`
    *{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI',Arial,sans-serif;}
    body{background:#f1f5f9;padding:12px;}
    .page-title{font-size:15px;font-weight:900;color:${ac};margin-bottom:2px;}
    .meta{font-size:10px;color:#64748b;margin-bottom:10px;padding-bottom:6px;border-bottom:2px solid ${ac}33;}
    .section-title{font-size:12px;font-weight:800;color:${ac};margin:10px 0 5px;display:flex;align-items:center;gap:6px;}
    .section-title.we{color:${wc};}
    .wrap{display:flex;gap:14px;align-items:flex-start;}
    table{border-collapse:separate;border-spacing:0;font-size:10px;border-radius:8px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,0.08);}
    th{padding:${rs+2}px 6px;font-size:10px;font-weight:700;text-align:center;border-bottom:2px solid ${ac}33;}
    th.wk{background:${ac}18;color:${ac};}
    th.we{background:${wc}18;color:${wc};}
    th.saat{background:#f8fafc;color:#475569;}
    td{border-top:1px solid #e2e8f0;padding:${rs+1}px 5px;text-align:center;vertical-align:middle;background:#fff;font-size:10px;}
    td.t-saat{background:#f8fafc;text-align:right;white-space:nowrap;min-width:50px;border-right:2px solid #e2e8f0;}
    td.t-saat .t-no{font-size:11px;font-weight:800;color:#334155;}
    td.t-saat .t-time{font-size:8px;color:#94a3b8;line-height:1.3;margin-top:1px;}
    .cls{font-size:11px;font-weight:800;color:${ac};}
    .cls.we{color:${wc};}
    .les{font-size:9px;color:#475569;margin-top:1px;}
    .empty{color:#d1d5db;}
    td.we-cell{background:#fffbeb;}
    .density-wrap{margin-top:12px;background:#fff;border-radius:8px;padding:10px;box-shadow:0 1px 4px rgba(0,0,0,0.06);}
    .density-wrap h4{font-size:11px;font-weight:700;color:${ac};margin-bottom:6px;}
    .density-wrap table{box-shadow:none;}
    .density-wrap th{background:${ac}15;color:${ac};padding:3px 6px;font-size:9px;}
    .density-wrap td{font-size:9px;padding:3px 6px;}
  `;

  /* ─── Tablo oluşturucu ────────────────────────────────────────────────── */
  const makeTable=(days,periods,sched,isWe)=>{
    const color=isWe?wc:ac;
    const thCls=isWe?"we":"wk";
    let t=`<table style="${ecoMode?"width:100%":"width:100%"}">`;
    // Başlık
    t+=`<tr><th class="saat ${thCls}" style="min-width:50px">Saat</th>`;
    days.forEach(d=>{
      const cnt=periods.filter(p=>sched[d]?.[p.index]).length;
      t+=`<th class="${thCls}">${DAYS_SH[d]}<br/><span style="font-size:8px;font-weight:400;opacity:0.75">${DAYS[d]}</span>`;
      if(cnt>0) t+=`<br/><span style="font-size:8px;font-weight:700">${cnt}d</span>`;
      t+=`</th>`;
    });
    t+=`</tr>`;
    // Satırlar
    periods.forEach(p=>{
      t+=`<tr><td class="t-saat"><span class="t-no">${p.index+1}</span><br/><span class="t-time">${p.start}<br/>${p.end}</span></td>`;
      days.forEach(d=>{
        const cell=sched[d]?.[p.index];
        if(cell){
          t+=`<td class="${isWe?"we-cell":""}"><div class="cls${isWe?" we":""}">${cname(cell.classId)}</div><div class="les">${lname(cell.lessonId)}</div></td>`;
        } else {
          t+=`<td class="${isWe?"we-cell":""}"><span class="empty">—</span></td>`;
        }
      });
      t+=`</tr>`;
    });
    t+=`</table>`;
    return t;
  };

  /* ─── HTML ────────────────────────────────────────────────────────────── */
  let html=`<style>${CSS}</style>
  <div class="page-title">📅 Haftalık Ders Programı</div>
  <div class="meta">${showWeekdays?`Hafta içi: ${wkP.length} ders/gün`:""}${showWeekdays&&showWeekend?" · ":""}${showWeekend?`Hafta sonu: ${weP.length} ders/gün`:""} · ${totFill}/${totSlots} ders girildi · ${new Date().toLocaleDateString("tr-TR",{day:"numeric",month:"long",year:"numeric"})}</div>`;

  // Yan yana iki tablo düzeni
  html+=`<div class="wrap">`;
  if(showWeekdays){
    html+=`<div style="flex:5;min-width:0"><div class="section-title">📅 Hafta İçi</div>${makeTable([0,1,2,3,4],wkP,schedule,false)}</div>`;
  }
  if(showWeekend){
    html+=`<div style="flex:2;min-width:0"><div class="section-title we">📆 Hafta Sonu</div>${makeTable([5,6],weP,wkndSchedule||{},true)}</div>`;
  }
  html+=`</div>`;

  // Yoğunluk tablosu
  if(showDensity){
    const allD=[...(showWeekdays?[0,1,2,3,4]:[]),...(showWeekend?[5,6]:[])];
    html+=`<div class="density-wrap"><h4>📊 Günlük Ders Yoğunluğu</h4>
    <table style="width:100%"><tr>
      ${allD.map(d=>`<th>${DAYS_SH[d]}</th>`).join("")}<th>Toplam</th></tr><tr>
      ${allD.map(d=>{
        const isWe=d>=5;
        const ps=isWe?weP:wkP;
        const sc=isWe?(wkndSchedule||{}):schedule;
        const cnt=ps.filter(p=>sc[d]?.[p.index]).length;
        const pct=ps.length>0?Math.round(cnt/ps.length*100):0;
        return`<td><b>${cnt}/${ps.length}</b><br/>%${pct}</td>`;
      }).join("")}
      <td><b>${totFill}/${totSlots}</b><br/>%${totSlots>0?Math.round(totFill/totSlots*100):0}</td>
    </tr></table></div>`;
  }
  return html;
}

function buildClassPDF(cls,students,opts={}){
  const sts=sortStudents(
    students.filter(s=>s.classId===cls.id),
    opts.sortBy||"schoolNo"
  );
  const eco=opts.ecoMode||false;
  const ac=eco?"#000":(opts.accentColor||"#1D4ED8");
  const rowSp=opts.rowSpacing||2;
  const numCols=Math.max(1,opts.cols||1);
  const fs=Math.round((opts.fontScale||1)*100);
  const total=sts.length;

  const hdrBg = eco?"#fff":ac;
  const hdrClr= eco?"#000":"#fff";
  const hdrBrd= eco?"border:2px solid #000;":"";
  const thBg  = eco?"#000":ac;
  const sepClr= eco?"#888":"#c7d8f0";
  const evenBg= eco?"#f5f5f5":"#f0f6ff";
  const tdBord= eco?"border-bottom:1px solid #bbb;border-right:1px solid #ddd;":"border-bottom:1px solid #e2e8f0;border-right:1px solid #e8f0fd;";

  const fSize= Math.round(10*fs/100);
  const thSize= Math.round(9*fs/100);
  const sortLabel=opts.sortBy==="name"?"Ada Göre":"Okul Numarasına Göre";

  // Sütun başına CSS — dar render genişliğine uygun
  const buildCSS=()=>`
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:Arial,sans-serif;background:#fff;
         font-size:${Math.round(11*fs/100)}px;padding:10px 12px;color:#1e293b;}
    .page-hdr{${hdrBrd}background:${hdrBg};border-radius:${eco?"4px":"8px"};
      padding:8px 12px;margin-bottom:8px;
      display:flex;justify-content:space-between;align-items:center;}
    .page-hdr h1{font-size:${Math.round(14*fs/100)}px;font-weight:800;color:${hdrClr};}
    .page-hdr .sub{font-size:${Math.round(9*fs/100)}px;
      color:${eco?"#444":"rgba(255,255,255,0.85)"};margin-top:2px;}
    .page-hdr .dt{font-size:${Math.round(9*fs/100)}px;
      color:${eco?"#555":"rgba(255,255,255,0.75)"};text-align:right;}
    table{width:100%;border-collapse:collapse;table-layout:fixed;}
    th{background:${thBg}!important;color:#fff!important;
       padding:${rowSp+1}px 4px;font-size:${thSize}px;
       text-align:left;font-weight:700;}
    th.tc{text-align:center;}
    td{padding:${rowSp}px 4px;font-size:${fSize}px;
       ${tdBord}vertical-align:middle;word-break:keep-all;}
    td.tc{text-align:center;}
    tr:nth-child(even) td{background:${evenBg};}
    tr{page-break-inside:avoid!important;break-inside:avoid!important;}
    .footer{margin-top:8px;font-size:${Math.round(8*fs/100)}px;
      color:${eco?"#555":"#94a3b8"};text-align:center;
      border-top:1px solid ${eco?"#bbb":"#e2e8f0"};padding-top:4px;}
    @media print{@page{margin:8mm}body{padding:6px;}}
  `;

  // Header tam genişlikte preamble, tablo blokları sade — buildStudentListPDF ile aynı pattern
  const makeHdr=()=>`<div class="page-hdr">
    <div>
      <h1>🏷 ${cls.grade}/${cls.branch} Sınıfı Listesi</h1>
      <div class="sub">${total} öğrenci · ${sortLabel} sıralı${numCols>1?" · "+numCols+" sütun":""}</div>
    </div>
    <div class="dt">${new Date().toLocaleDateString("tr-TR",{day:"numeric",month:"long",year:"numeric"})}</div>
  </div>`;
  const tableHdr=`<tr><th class="tc" style="width:26px">Sıra</th><th class="tc" style="width:58px">Okul No</th><th>Ad Soyad</th></tr>`;
  const footerHTML=`<div class="footer">S-Öğretmen · ${new Date().toLocaleDateString("tr-TR")}</div>`;
  const styleTag=`<style>${buildCSS()}</style>`;

  // Sütun bloğu: sadece tablo satırları (header/footer yok)
  const buildColBlock=(colSts,startNo,isLast)=>{
    const rows=colSts.map((s,i)=>`<tr>
      <td class="tc" style="width:26px">${startNo+i}</td>
      <td class="tc" style="width:58px">${s.schoolNo||"—"}</td>
      <td>${s.name}</td>
    </tr>`).join("");
    return`<table>${tableHdr}${rows}</table>${isLast?footerHTML:""}`;
  };

  if(numCols<=1){
    return`${styleTag}${makeHdr()}<table>${tableHdr}${sts.map((s,i)=>`<tr>
      <td class="tc" style="width:26px">${i+1}</td>
      <td class="tc" style="width:58px">${s.schoolNo||"—"}</td>
      <td>${s.name}</td>
    </tr>`).join("")}</table>${footerHTML}`;
  }

  // Çok sütun: header+style preamble olarak önce, col blokları NEWCOL ile ayrılmış
  const perCol=Math.ceil(total/numCols);
  const colBlocks=[];
  for(let c=0;c<numCols;c++){
    const start=c*perCol;
    const end=Math.min(start+perCol,total);
    if(start>=total) break;
    colBlocks.push(buildColBlock(sts.slice(start,end),start+1,c===numCols-1||end>=total));
  }
  return`${styleTag}${makeHdr()}${colBlocks.join("<!--NEWCOL-->")}`;
}

    if(kopya)return{...st,tot:0,has:true,pct:0,bep,kopya};
    const tot=exam.questions.reduce((s,q)=>{const v=sc[st.id]?.[q.id];return s+(v!==""&&v!==undefined?Number(v):0);},0);
    const has=exam.questions.some(q=>sc[st.id]?.[q.id]!==""&&sc[st.id]?.[q.id]!==undefined);
    const pct=tmax>0?Math.round((tot/tmax)*100):0;
    return{...st,tot,has,pct,bep,kopya};
  });
  const forStats=allTots.filter(s=>s.has&&!s.bep&&!s.kopya);
  const avg=forStats.length?forStats.reduce((a,s)=>a+s.tot,0)/forStats.length:0;
  const passing=forStats.filter(s=>s.tot>=(tmax*0.5)).length;
  html+=`<div class="stat-row">
    <div class="stat-box"><div class="stat-label">Giren</div><div class="stat-val">${forStats.length}</div></div>
    <div class="stat-box"><div class="stat-label">Ortalama</div><div class="stat-val">${avg.toFixed(1)}</div></div>
    <div class="stat-box"><div class="stat-label">Başarılı</div><div class="stat-val" style="color:#059669">${passing}</div></div>
    <div class="stat-box"><div class="stat-label">Başarısız</div><div class="stat-val" style="color:#dc2626">${forStats.length-passing}</div></div>
    <div class="stat-box"><div class="stat-label">Başarı %</div><div class="stat-val">${forStats.length?Math.round(passing/forStats.length*100):0}%</div></div>
    ${allTots.filter(s=>s.bep).length?`<div class="stat-box"><div class="stat-label">BEP</div><div class="stat-val" style="color:#7c3aed">${allTots.filter(s=>s.bep).length}</div></div>`:""}
    ${allTots.filter(s=>s.kopya).length?`<div class="stat-box"><div class="stat-label">Kopya</div><div class="stat-val" style="color:#dc2626">${allTots.filter(s=>s.kopya).length}</div></div>`:""}
  </div>`;
  html+=`<table><tr><th>Sıra</th><th>Okul No</th><th>Ad Soyad</th><th style="text-align:center">Puan</th><th style="text-align:center">%</th><th>Not</th></tr>`;
  allTots.forEach((st,i)=>{
    if(st.bep){html+=`<tr style="background:#ede9fe"><td style="text-align:center">—</td><td>${st.schoolNo||"—"}</td><td>${st.name} <span style="font-size:8px;color:#7c3aed;font-weight:700">[BEP]</span></td><td style="text-align:center;font-weight:800;color:#7c3aed">${st.has?st.tot:"—"}</td><td style="text-align:center">—</td><td><span class="badge info">BEP</span></td></tr>`;return;}
    if(st.kopya){html+=`<tr style="background:#fee2e2"><td style="text-align:center">—</td><td>${st.schoolNo||"—"}</td><td>${st.name} <span style="font-size:8px;color:#dc2626;font-weight:700">[KOPYA]</span></td><td style="text-align:center;font-weight:800;color:#dc2626">0</td><td style="text-align:center">—</td><td><span class="badge bad">Kopya</span></td></tr>`;return;}
    if(!st.has){html+=`<tr><td style="text-align:center">—</td><td>${st.schoolNo||"—"}</td><td>${st.name}</td><td colspan="3" style="text-align:center;background:#dc2626!important;color:#fff!important;font-weight:900!important;font-size:11pt">G</td></tr>`;return;}
    const badgeCls=st.pct>=85?"ok":st.pct>=70?"ok":st.pct>=50?"mid":"bad";
    html+=`<tr><td style="text-align:center;font-weight:700">${i+1}</td><td>${st.schoolNo||"—"}</td><td>${st.name}</td><td style="text-align:center;font-weight:800">${st.tot}/${tmax}</td><td style="text-align:center">%${st.pct}</td><td><span class="badge ${badgeCls}">${notStr(st.pct)}</span></td></tr>`;
  });
  html+=`<tr style="background:#e8f0fe"><td colspan="3" style="font-weight:700;padding:5px 8px">Ortalama*</td><td style="text-align:center;font-weight:700">${avg.toFixed(1)}</td><td></td><td></td></tr>`;
  html+=`</table>`;
  return html;
}

function buildExamAnalysisPDF(exam,scores,students,classes,lessons,school,opts={}){
  const cls=classes.find(c=>c.id===exam.classId);
  const les=lessons.find(l=>l.id===exam.lessonId);
  const sts=sortStudents(students.filter(s=>s.classId===exam.classId),"schoolNo");
  const tmax=exam.questions.reduce((s,q)=>s+Number(q.maxScore),0);
  const sc=scores||{};
  const totals=sts.map(st=>{
    const bep=!!(sc[st.id]?.__bep);
    const kopya=!!(sc[st.id]?.__kopya);
    const stSc=sc[st.id]||{};
    // __soScore öncelikli (içe aktarma), yoksa soru bazlı toplam
    const soScore=stSc.__soScore!=null&&stSc.__soScore!==""?Number(stSc.__soScore):null;
    const tot=bep?(stSc.__bepScore!=null&&stSc.__bepScore!==""?Number(stSc.__bepScore):0):
              kopya?0:
              soScore!=null?soScore:
              exam.questions.reduce((s,q)=>{const v=stSc[q.id];return s+(v!==""&&v!==undefined?Number(v):0);},0);
    const has=bep?(stSc.__bepScore!==""&&stSc.__bepScore!=null):
              kopya?true:
              soScore!=null?true:
              exam.questions.some(q=>stSc[q.id]!==""&&stSc[q.id]!==undefined);
    const pct=tmax>0?Math.round((tot/tmax)*100):0;
    return{...st,tot,has,pct,bep,kopya};
  });
  const entered=totals.filter(s=>s.has&&!s.bep&&!s.kopya);
  const bepList=totals.filter(s=>s.bep);
  const kopyaList=totals.filter(s=>s.kopya);
  const girmeyen=totals.filter(s=>!s.has&&!s.bep&&!s.kopya);
  const sc_vals=entered.map(s=>s.tot);
  const N=entered.length;

  // ── İstatistikler (Excel formülleriyle aynı) ──
  const avg=N?sc_vals.reduce((a,b)=>a+b,0)/N:0;
  const sorted_sc=[...sc_vals].sort((a,b)=>a-b);
  const median=N===0?0:N%2===0?(sorted_sc[N/2-1]+sorted_sc[N/2])/2:sorted_sc[Math.floor(N/2)];
  const range_v=N?sorted_sc[N-1]-sorted_sc[0]:0;
  // Standart Sapma: örneklem (n-1 payda) — Excel STDSAPMA
  const stdDev=N>1?Math.sqrt(sc_vals.reduce((s,x)=>s+(x-avg)**2,0)/(N-1)):0;
  // Çarpıklık: Pearson = 3*(Ort-Medyan)/StdSapma
  const skewness=stdDev>0?3*(avg-median)/stdDev:0;
  const passing=sc_vals.filter(v=>v>=(tmax*0.5)).length;
  const failing=N-passing;
  const successRate=N?Math.round((passing/N)*100*100)/100:0;

  // Zorluk derecesi
  let zorluk,zorlukAciklama;
  if(skewness<-0.5){
    zorluk="SINAV KOLAY";
    zorlukAciklama=`Sınav Kolaydır. Sınav öğrenci seviyesinin altındadır ya da beklenen davranışlar çok iyi kazanılmıştır.${range_v>50?" Dizi genişliği büyük olduğundan öğrenciler arasında belirgin bir seviye farkı vardır.":""} Standart Sapma ${stdDev<20?"beklenen değerdedir ve sınavın güvenilirliği iyidir.":"yüksektir."}`;
  } else if(skewness>0.5){
    zorluk="SINAV ZOR";
    zorlukAciklama=`Sınav Zordur. Sınav öğrenci seviyesinin üzerindedir ya da beklenen davranışlar yeterince kazanılmamıştır.${range_v>50?" Dizi genişliği büyük olduğundan öğrenciler arasında belirgin bir seviye farkı vardır.":""} Konuların tekrar ele alınması önerilir.`;
  } else {
    zorluk="ORTA GÜÇLÜKTE";
    zorlukAciklama=`Sınav Orta Güçlüktedir. Sınav öğrenci seviyesine uygundur.${range_v>50?" Dizi genişliği büyük olduğundan öğrenciler arasında belirgin bir seviye farkı vardır.":""} Standart Sapma ${stdDev<20?"beklenen değerdedir.":"yüksektir."}`;
  }

  // Puan dağılımı (5 aralık — Excel ile aynı)
  const distBands=[
    ["0 - 49",  sc_vals.filter(v=>v<50).length,       "#dc2626","#fee2e2"],
    ["50 - 59", sc_vals.filter(v=>v>=50&&v<60).length, "#d97706","#fef3c7"],
    ["60 - 69", sc_vals.filter(v=>v>=60&&v<70).length, "#2563eb","#dbeafe"],
    ["70 - 84", sc_vals.filter(v=>v>=70&&v<85).length, "#7c3aed","#ede9fe"],
    ["85 - 100",sc_vals.filter(v=>v>=85).length,       "#059669","#d1fae5"],
  ];

  const notStr=pct=>pct>=85?"Pekiyi":pct>=70?"İyi":pct>=60?"Orta":pct>=50?"Geçer":"Geçemez";
  const badgeStyle=pct=>pct>=50?"background:#d1fae5;color:#059669":"background:#fee2e2;color:#dc2626";

  // Soru analizi
    // __soScore ile toplu not girilmişse soru bazlı analiz gösterme
  const hasSoScoreOnly=entered.length>0&&entered.every(s=>{const ss=sc[s.id]||{};return ss.__soScore!=null&&ss.__soScore!=="";});
  // Soru bazlı analiz sadece soru bazlı girilen öğrencileri kapsar
  const qEntered=entered.filter(s=>{const ss=sc[s.id]||{};return ss.__soScore==null||ss.__soScore==="";});
  const qStats=exam.questions.map(q=>{
    const vals=qEntered.map(s=>Number(sc[s.id]?.[q.id]||0));
    const qAvg=vals.length?vals.reduce((a,b)=>a+b,0)/vals.length:0;
    const sp=Number(q.maxScore)>0?Math.round((qAvg/Number(q.maxScore))*100):0;
    const full=vals.filter(v=>v===Number(q.maxScore)).length;
    const partial=vals.filter(v=>v>0&&v<Number(q.maxScore)).length;
    const zero=vals.filter(v=>v===0).length;
    const durum=sp>=70?"✅ ANLAŞILMIŞ":sp>=45?"⚠ GERİ BİLDİRİM VERİLMELİ":"❌ BİREYSEL ÇALIŞMA GEREKLİ";
    return{...q,qAvg:qAvg.toFixed(1),sp,full,partial,zero,durum};
  });

  // Otomatik açıklama (Excel AÇIKLAMA satırına benzer)
  const aciklamaSatirlar=[];
  const bireysel=qStats.filter(q=>q.sp<45);
  const geriBildirim=qStats.filter(q=>q.sp>=45&&q.sp<70);
  if(bireysel.length)bireysel.forEach(q=>{aciklamaSatirlar.push(`• S${q.label} sorusu için <b>bireysel çalışma</b> gerekmektedir. (Cevaplanma: %${q.sp})`)});
  if(geriBildirim.length)geriBildirim.forEach(q=>{aciklamaSatirlar.push(`• S${q.label} sorusu için <b>geri bildirim</b> verilmelidir. (Cevaplanma: %${q.sp})`)});
  if(!bireysel.length&&!geriBildirim.length)aciklamaSatirlar.push("• Tüm sorular başarıyla cevaplanmıştır. Konular genel olarak anlaşılmıştır.");

  const sorted=[ ...entered].sort((a,b)=>b.tot-a.tot);
  const zorlukColor=zorluk==="SINAV KOLAY"?"#059669":zorluk==="SINAV ZOR"?"#dc2626":"#d97706";

  const eco=opts.ecoMode||false;
  const ac=opts.accentColor||"#1e40af";
  const rowSp=opts.rowSpacing||2;
  const fitPage=opts.fitOnePage||false;
  const showPuanDagilim=opts.showPuanDagilim!==false;
  const showNotDagilim=opts.showNotDagilim!==false;
  const showKonuAnaliz=opts.showKonuAnaliz!==false;
  const showDegerlendirme=opts.showDegerlendirme!==false;
  const showDetayliPuan=opts.showDetayliPuan!==false;
  let html=`<style>
  *{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI',Arial,sans-serif;}
  body{background:#fff;padding:${fitPage?10:16}px;color:#1e293b;font-size:${fitPage?10:12}px;width:100%;max-width:100%;}
  ${eco
    ? `.header{border:2px solid #000;border-radius:6px;padding:10px 14px;margin-bottom:10px;}
  .header h1{font-size:14px;font-weight:900;color:#000;}
  .header .meta{font-size:9px;color:#333;margin-top:3px;}
  h2{font-size:11px;font-weight:800;color:#000;border-left:3px solid #000;padding-left:7px;margin:10px 0 5px;text-transform:uppercase;letter-spacing:0.05em;}
  th{background:#fff;color:#000;padding:${rowSp+2}px 8px;text-align:left;font-size:9px;font-weight:700;border-bottom:2px solid #000;border-top:1px solid #000;}
  td{padding:${rowSp}px 8px;border-bottom:1px solid #ddd;vertical-align:middle;}
  tr:nth-child(even) td{background:#fff;}`
    : `.header{background:linear-gradient(135deg,${ac}dd,${ac});color:#fff;border-radius:10px;padding:14px 18px;margin-bottom:14px;}
  .header h1{font-size:16px;font-weight:900;color:#fff;}
  .header .meta{font-size:10px;opacity:0.85;margin-top:4px;color:#fff;}
  h2{font-size:12px;font-weight:800;color:${ac};border-left:3px solid ${ac};padding-left:7px;margin:${fitPage?8:14}px 0 ${fitPage?4:7}px;text-transform:uppercase;letter-spacing:0.05em;}
  th{background:${ac};color:#fff;padding:${rowSp+2}px 8px;text-align:left;font-size:10px;font-weight:700;}
  td{padding:${rowSp}px 8px;border-bottom:1px solid #f1f5f9;vertical-align:middle;}
  tr:nth-child(even) td{background:#f8fafc;}`
  }
  .stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:${fitPage?4:6}px;margin-bottom:${fitPage?6:10}px;width:100%;}
  .stat-box{border:1px solid #e2e8f0;border-radius:7px;padding:${fitPage?5:8}px ${fitPage?6:10}px;text-align:center;min-width:0;}
  .stat-label{font-size:9px;color:#64748b;text-transform:uppercase;letter-spacing:0.04em;}
  .stat-val{font-size:${fitPage?13:16}px;font-weight:900;margin:${fitPage?1:3}px 0;color:${eco?"#000":ac};}
  .stat-sub{font-size:9px;color:#94a3b8;}
  .two-col{display:grid;grid-template-columns:1fr 1fr;gap:${fitPage?6:10}px;margin-bottom:${fitPage?6:10}px;width:100%;}
  .box{border:1px solid #e2e8f0;border-radius:8px;padding:${fitPage?7:10}px ${fitPage?9:12}px;min-width:0;overflow:hidden;}
  .box-title{font-size:10px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:${fitPage?4:7}px;}
  .stat-row{display:flex;justify-content:space-between;padding:${rowSp}px 0;border-bottom:1px solid #f1f5f9;font-size:11px;}
  .stat-row:last-child{border-bottom:none;}
  .stat-row .k{color:#64748b;}.stat-row .v{font-weight:700;color:#1e293b;}
  .dist-bar-wrap{margin-bottom:${fitPage?3:6}px;}
  .dist-label{display:flex;justify-content:space-between;font-size:10px;margin-bottom:2px;}
  .dist-track{height:8px;background:#f1f5f9;border-radius:99px;overflow:hidden;}
  .zorluk-box{border:2px solid ${zorlukColor};border-radius:8px;padding:${fitPage?6:10}px ${fitPage?10:14}px;margin-bottom:${fitPage?6:10}px;display:flex;gap:12px;align-items:flex-start;width:100%;}
  .zorluk-badge{background:${zorlukColor}22;color:${zorlukColor};font-size:${fitPage?11:14}px;font-weight:900;padding:3px 8px;border-radius:6px;white-space:nowrap;}
  table{width:100%;border-collapse:collapse;font-size:${fitPage?9:11}px;margin-bottom:${fitPage?6:10}px;table-layout:auto;}
  td,th{word-break:break-word;overflow-wrap:break-word;}
  .badge{padding:2px 7px;border-radius:4px;font-weight:700;font-size:9px;}
  .ok{background:#d1fae5;color:#059669}.bad{background:#fee2e2;color:#dc2626}.warn{background:#fef3c7;color:#d97706}.info{background:#dbeafe;color:#1d4ed8}
  .aciklama{background:${eco?"#fff":"#f0f9ff"};border:1px solid ${eco?"#999":"#bae6fd"};border-radius:8px;padding:${fitPage?6:10}px ${fitPage?10:14}px;font-size:10px;line-height:1.6;color:${eco?"#000":"#0c4a6e"};width:100%;}
  .footer{text-align:center;margin-top:${fitPage?8:14}px;font-size:9px;color:#94a3b8;border-top:1px solid #e2e8f0;padding-top:6px;}
  @media print{body{padding:8px;}@page{size:A4 portrait;margin:10mm;}}
  tr{page-break-inside:avoid!important;break-inside:avoid!important;}
  </style>`;

  // Başlık
  html+=`<div class="header">
    <h1>📝 SINAV ANALİZ RAPORU — ${exam.name||"Sınav"}</h1>
    <div class="meta">
      ${school?.name||"Okul"} &nbsp;|&nbsp;
      Ders: <b>${les?.name||"?"}</b> &nbsp;|&nbsp;
      Sınıf: <b>${cls?cls.grade+"/"+cls.branch:"?"}</b> &nbsp;|&nbsp;
      ${exam.term}. Dönem — ${exam.examNo}. Yazılı &nbsp;|&nbsp;
      Tarih: ${exam.date||"?"}
    </div>
  </div>`;

  // Ana istatistikler (Ekran görüntüsündeki tablo)
  html+=`<div class="two-col">
    <div class="box">
      <div class="box-title">Sınav Bilgileri</div>
      <div class="stat-row"><span class="k">Sınava Giren Öğrenci Sayısı</span><span class="v">${N}</span></div>
      <div class="stat-row"><span class="k">Başarılı (≥50)</span><span class="v">${passing}</span></div>
      <div class="stat-row"><span class="k">Başarısız (&lt;50)</span><span class="v">${failing}</span></div>
      <div class="stat-row"><span class="k">Başarı Oranı</span><span class="v">%${successRate.toFixed(2)}</span></div>
      <div class="stat-row"><span class="k">Girmeyen Öğrenci Sayısı</span><span class="v">${girmeyen.length}</span></div>
      <div class="stat-row"><span class="k">Kopya Sayısı</span><span class="v" style="color:#dc2626;font-weight:700">${kopyaList.length}</span></div>
      <div class="stat-row"><span class="k">BEP Öğrenci Sayısı</span><span class="v" style="color:#7c3aed;font-weight:700">${bepList.length}</span></div>
      ${bepList.length||kopyaList.length?`<div style="font-size:9px;color:#94a3b8;margin-top:4px;">* BEP ve kopya öğrencileri istatistiklere dahil edilmemiştir.</div>`:""}
    </div>
    <div class="box">
      <div class="box-title">İstatistiksel Değerler</div>
      <div class="stat-row"><span class="k">Aritmetik Ortalama</span><span class="v">${avg.toFixed(1)}</span></div>
      <div class="stat-row"><span class="k">Medyan (Ortanca)</span><span class="v">${median.toFixed(1)}</span></div>
      <div class="stat-row"><span class="k">Ranj (Dizi Genişliği)</span><span class="v">${range_v}</span></div>
      <div class="stat-row"><span class="k">Standart Sapma</span><span class="v">${stdDev.toFixed(1)}</span></div>
      <div class="stat-row"><span class="k">Çarpıklık Değeri</span><span class="v">${skewness.toFixed(2)}</span></div>
      <div class="stat-row"><span class="k">Sınavın Zorluk Derecesi</span><span class="v" style="color:${zorlukColor}">${zorluk}</span></div>
    </div>
  </div>`;

  // Zorluk derecesi açıklaması
  html+=`<div class="zorluk-box">
    <span class="zorluk-badge">${zorluk==="SINAV KOLAY"?"😊":zorluk==="SINAV ZOR"?"😰":"😐"} ${zorluk}</span>
    <div style="font-size:11px;color:#475569;line-height:1.6;">${zorlukAciklama}</div>
  </div>`;

  // Puan dağılımı + Not dağılımı
  const distMax=Math.max(...distBands.map(d=>d[1]),1);
  if(showPuanDagilim||showNotDagilim){
    const puanBox=showPuanDagilim?`<div class="box"><div class="box-title">Puan Dağılımı</div>${distBands.map(([label,cnt,color])=>{const pct2=N?Math.round(cnt/N*100):0;const barW=Math.round(cnt/distMax*100);return '<div class="dist-bar-wrap"><div class="dist-label"><span style="color:'+color+';font-weight:700">'+label+'</span><span style="font-weight:700">'+cnt+' <span style="color:#94a3b8;font-size:9px">(%'+pct2+')</span></span></div><div class="dist-track"><div style="width:'+barW+'%;background:'+color+';height:100%;border-radius:99px"></div></div></div>';}).join("")}</div>`:"";
    const notBox=showNotDagilim?`<div class="box"><div class="box-title">Not Dağılımı</div>${[["Pekiyi (85-100)",sc_vals.filter(v=>v>=85).length,"#059669"],["İyi (70-84)",sc_vals.filter(v=>v>=70&&v<85).length,"#2563eb"],["Orta (60-69)",sc_vals.filter(v=>v>=60&&v<70).length,"#7c3aed"],["Geçer (50-59)",sc_vals.filter(v=>v>=50&&v<60).length,"#d97706"],["Geçemez (0-49)",sc_vals.filter(v=>v<50).length,"#dc2626"]].map(([label,cnt2,color])=>{const pct2=N?Math.round(cnt2/N*100):0;const barW=Math.round(cnt2/distMax*100);return '<div class="dist-bar-wrap"><div class="dist-label"><span style="color:'+color+';font-weight:700">'+label+'</span><span style="font-weight:700">'+cnt2+' <span style="color:#94a3b8;font-size:9px">(%'+pct2+')</span></span></div><div class="dist-track"><div style="width:'+barW+'%;background:'+color+';height:100%;border-radius:99px"></div></div></div>';}).join("")}</div>`:"";
    html+=`<div class="two-col">${puanBox}${notBox}</div>`;
  }

  // Soru Analizi
  if(showKonuAnaliz){
    if(hasSoScoreOnly){
      html+=`<h2>🎯 Soru Bazlı Konu Analizi</h2><div style="background:#fef3c7;border:1px solid #d97706;border-radius:8px;padding:10px 14px;font-size:11px;color:#92400e;margin-bottom:10px;">ℹ️ Bu sınavdaki notlar "Sadece Sonuç" modunda girildiğinden soru bazlı analiz yapılamamaktadır.</div>`;

function buildStudentListPDF(students,classes,opts,cname){
  const{sort="schoolNo"}=opts||{};
  const eco=(opts&&opts.ecoMode)||false;
  const ac=eco?"#000":((opts&&opts.accentColor)||"#1E40AF");
  const numCols=(opts&&opts.cols)||1;
  const fs=Math.round(((opts&&opts.fontScale)||1)*100);
  const rowSp=(opts&&opts.rowSpacing)||2;
  const byClass={};
  students.forEach(s=>{(byClass[s.classId]=byClass[s.classId]||[]).push(s);});
  const sortedClasses=[...classes].sort((a,b)=>a.grade-b.grade||a.branch.localeCompare(b.branch)).filter(cls=>byClass[cls.id]?.length);
  const isGrouped=sortedClasses.length>1;
  const SORT_LABEL={schoolNo:"Okul No",name:"Ada Göre",class:"Sınıfa Göre"};

  const hdrBg  = eco?"#fff":ac;
  const hdrClr = eco?"#000":"#fff";
  const hdrSub = eco?"#333":"rgba(255,255,255,0.85)";
  const hdrDt  = eco?"#555":"rgba(255,255,255,0.75)";
  const hdrBrd = eco?"2px solid #000":"none";
  const thBg   = eco?"#000":ac;
  const tdBotBrd= eco?"1px solid #999":"1px solid #e2e8f0";
  const evenBg = eco?"#f9f9f9":"#F8FAFF";
  const titleClr= eco?"#000":ac;
  const titleBrd= eco?"#000":ac;
  const titleBg = eco?"#f5f5f5":ac+"15";
  const ftrClr  = eco?"#333":"#94a3b8";
  const ftrBrd  = eco?"#999":"#e2e8f0";

  const buildCSS=()=>`
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:Arial,sans-serif;background:#fff;padding:10px 12px;color:#1e293b;font-size:${Math.round(11*fs/100)}px;}
    .hdr{background:${hdrBg};border:${hdrBrd};border-radius:${eco?"4px":"8px"};
      padding:8px 12px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;}
    .hdr h1{font-size:${Math.round(14*fs/100)}px;font-weight:800;color:${hdrClr};}
    .hdr .sub{font-size:${Math.round(9*fs/100)}px;color:${hdrSub};margin-top:2px;}
    .hdr .dt{font-size:${Math.round(9*fs/100)}px;color:${hdrDt};text-align:right;}
    .cls-title{font-size:${Math.round(11*fs/100)}px;font-weight:800;color:${titleClr};
      border-left:3px solid ${titleBrd};padding:4px 9px;margin-bottom:6px;
      background:${titleBg};border-radius:0 5px 5px 0;}
    table{width:100%;border-collapse:collapse;}
    th{background:${thBg}!important;color:#fff!important;
       padding:${rowSp+1}px 5px;font-size:${Math.round(9*fs/100)}px;text-align:left;font-weight:700;}
    td{padding:${rowSp}px 5px;font-size:${Math.round(10*fs/100)}px;border-bottom:${tdBotBrd};vertical-align:middle;}
    tr:nth-child(even) td{background:${evenBg};}
    td:first-child{text-align:center;width:26px;}
    td:nth-child(2){text-align:center;width:58px;}
    tr{break-inside:avoid!important;page-break-inside:avoid!important;}
    .ftr{margin-top:8px;font-size:${Math.round(8*fs/100)}px;color:${ftrClr};text-align:center;
         border-top:1px solid ${ftrBrd};padding-top:4px;}
    @media print{@page{margin:8mm}body{padding:6px;}}
  `;

  const makeHdrHTML=(cnt)=>`<div class="hdr">
    <div><h1>👤 Öğrenci Listesi</h1>
    <div class="sub">${cnt} öğrenci · ${SORT_LABEL[sort]||sort} sıralı${numCols>1?" · "+numCols+" sütun":""}</div></div>
    <div class="dt">${new Date().toLocaleDateString("tr-TR",{day:"numeric",month:"long",year:"numeric"})}</div>
  </div>`;
  const footer=`<div class="ftr">S-Öğretmen · ${new Date().toLocaleDateString("tr-TR")}</div>`;

  // Öğrenci listesini sütunlara bölen yardımcı
  // buildColBlock: sadece tablo içeriği — header/clsTitle artık NEWCOL dışında tam genişlikte
  const buildColBlock=(colSts,showClass,startNo,isLast)=>{
    const rows=colSts.map((s,i)=>{
      const cn=classes.find(x=>x.id===s.classId);
      const cnStr=cn?`${cn.grade}/${cn.branch}`:"—";
      return`<tr><td>${startNo+i}</td><td>${s.schoolNo||"—"}</td>${showClass?`<td style="font-size:9px">${cnStr}</td>`:""}<td>${s.name}</td></tr>`;
    }).join("");
    return`<table>
      <tr><th>Sıra</th><th>Okul No</th>${showClass?"<th>Sınıf</th>":""}<th>Ad Soyad</th></tr>
      ${rows}
    </table>${isLast?footer:""}`;
  };

  // Öğrenci listesini NEWCOL ile böl
  // Header ve clsTitle: NEWCOL'dan önce tam genişlikte, sütun bloklarının dışında
  const splitIntoColParts=(sts,showClass,clsTitle)=>{
    const styleTag=`<style>${buildCSS()}</style>`;
    const hdrHTML=makeHdrHTML(students.length);
    const clsTitleHTML=clsTitle?`<div class="cls-title">${clsTitle}</div>`:"";
    if(numCols<=1){
      const rows=sts.map((s,i)=>{
        const cn=classes.find(x=>x.id===s.classId);
        const cnStr=cn?`${cn.grade}/${cn.branch}`:"—";
        return`<tr><td>${i+1}</td><td>${s.schoolNo||"—"}</td>${showClass?`<td style="font-size:9px">${cnStr}</td>`:""}<td>${s.name}</td></tr>`;
      }).join("");
      return`${styleTag}${hdrHTML}${clsTitleHTML}<table>
        <tr><th>Sıra</th><th>Okul No</th>${showClass?"<th>Sınıf</th>":""}<th>Ad Soyad</th></tr>
        ${rows}
      </table>${footer}`;
    }
    const total=sts.length;
    const perCol=Math.ceil(total/numCols);
    const colBlocks=[];
    for(let c=0;c<numCols;c++){
      const start=c*perCol;
      const end=Math.min(start+perCol,total);
      if(start>=total) break;
      const colSts=sts.slice(start,end);
      colBlocks.push(buildColBlock(colSts,showClass,start+1,c===numCols-1||end>=total));
    }
    // Header + clsTitle tam genişlikte önce, ardından sütun blokları NEWCOL ile ayrılmış
    return`${styleTag}${hdrHTML}${clsTitleHTML}${colBlocks.join("<!--NEWCOL-->")}`;
  };

  if(isGrouped){
    const allParts=[];
    sortedClasses.forEach((cls,idx)=>{
      const sts=sortStudents(byClass[cls.id]||[],sort,classes);
      const clsTitle=`${cls.grade}/${cls.branch} Sınıfı — ${sts.length} öğrenci`;
      const colContent=splitIntoColParts(sts,false,clsTitle);
      if(idx>0) allParts.push("<!--NEWPAGE-->");
      allParts.push(colContent);
    });
    return allParts.join("");
  } else {
    return splitIntoColParts(sortStudents(students,sort,classes),sortedClasses.length===0,null);
  }
}

function buildAllExamsPDF(exams,examScores,students,classes,lessons,opts={}){
  const cname=id=>{const c=classes.find(x=>x.id===id);return c?`${c.grade}/${c.branch}`:"?";};

    const sts=sortStudents(students.filter(s=>s.classId===exam.classId),"schoolNo");
    const sc=examScores[String(exam.id)]||{};
    const tmax=exam.questions.reduce((s,q)=>s+Number(q.maxScore),0);
    const totals=sts.map(st=>{
      const tot=exam.questions.reduce((s,q)=>{const v=sc[st.id]?.[q.id];return s+(v!==""&&v!==undefined?Number(v):0);},0);
      const has=exam.questions.some(q=>sc[st.id]?.[q.id]!==""&&sc[st.id]?.[q.id]!==undefined);
      return{...st,tot,has,pct:tmax>0?Math.round((tot/tmax)*100):0};
    });
    const entered=totals.filter(s=>s.has);
    const avg=entered.length?entered.reduce((a,s)=>a+s.tot,0)/entered.length:0;
    const passing=entered.filter(s=>s.pct>=50).length;
    if(!firstExamB)html+="<!--NEWPAGE-->";firstExamB=false;
    html+=`<div class="exam-block">`;
    html+=`<h2>${exam.name||"İsimsiz"} — ${lname(exam.lessonId)} / ${cname(exam.classId)}</h2>
    <div class="stat-grid">
      <div class="stat-box"><div class="stat-label">Giren/Mevcut</div><div class="stat-val">${entered.length}/${sts.length}</div></div>
      <div class="stat-box"><div class="stat-label">Ortalama</div><div class="stat-val">${avg.toFixed(1)}</div></div>
      <div class="stat-box"><div class="stat-label">Başarı</div><div class="stat-val">%${entered.length?Math.round(passing/entered.length*100):0}</div></div>
    </div>
    <table><tr><th>Okul No</th><th>Ad Soyad</th><th>Puan</th><th>%</th><th>Not</th></tr>
    ${[...totals].sort((a,b)=>b.tot-a.tot).map(st=>{
      const ns=!st.has?"Girilmedi":st.pct>=85?"Pekiyi":st.pct>=70?"İyi":st.pct>=60?"Orta":st.pct>=50?"Geçer":"Geçemez";
      const bg=!st.has?"#dbeafe":st.pct>=50?"#d1fae5":"#fee2e2";
      const col=!st.has?"#1d4ed8":st.pct>=50?"#059669":"#dc2626";
      return`<tr><td>${st.schoolNo||"—"}</td><td>${st.name}</td><td style="text-align:center;font-weight:bold">${st.has?`${st.tot}/${tmax}`:"—"}</td><td style="text-align:center">${st.has?`%${st.pct}`:"—"}</td><td><span style="background:${bg};color:${col};padding:2px 7px;border-radius:4px;font-size:10px;font-weight:bold">${ns}</span></td></tr>`;
    }).join("")}
    <tr style="background:#e8f0fe"><td></td><td><b>Ortalama</b></td><td style="text-align:center;font-weight:bold">${avg.toFixed(1)}</td><td></td><td></td></tr>
    </table></div>`;
  });
  return html;
}

  // ── YARDIMCI: proje/performans için puan filtresi ───────────────────────────
  const applyScoreFilter=(arr,grades)=>{
    if(scoreFilter==="girildi")   return arr.filter(s=>grades[s.id]?.score!=null);
    if(scoreFilter==="girilmedi") return arr.filter(s=>grades[s.id]?.score==null);
    if(scoreFilter==="gecti")     return arr.filter(s=>grades[s.id]?.score!=null&&Number(grades[s.id].score)>=50);
    if(scoreFilter==="kaldi")     return arr.filter(s=>grades[s.id]?.score!=null&&Number(grades[s.id].score)<50);
    return arr;
  };

  // ── YARDIMCI: sıralama (puan/durum dahil) ───────────────────────────────────
  const sortWithExtra=(arr,grades,isOdev)=>{
    if(sort==="score"&&!isOdev)
      return [...arr].sort((a,b)=>{
        const sa=grades[a.id]?.score!=null?Number(grades[a.id].score):-1;
        const sb=grades[b.id]?.score!=null?Number(grades[b.id].score):-1;
        return sb-sa;
      });
    if(sort==="status"&&isOdev)
      return [...arr].sort((a,b)=>{
        const sa=grades[a.id]?.status||"zzz";
        const sb=grades[b.id]?.status||"zzz";
        return sa.localeCompare(sb)||a.name.localeCompare(b.name,"tr");
      });
    return sortSts(arr);
  };

  const PAGE_W=opts.orientation==="landscape"?1050:740;
  const FIXED_COL_W=220;

  const css=`<style>

      // Durum/puan filtresi — tek tablo modunda birden fazla hw var,

      if(isOdev&&statusFilter!=="all"){
        allSts=allSts.filter(st=>grp.items.some(hw=>{

                  ?`<td class="c"><span style="${bg?"background:"+bg+";color:"+col+";padding:1px 6px;border-radius:4px;font-weight:bold;font-size:9px":"color:#94a3b8;font-size:9px"}">${score!=null?score:"—"}</span>${noteStr}</td>`

        if(ci<hwChunks.length-1)

      });
    });
    html+=`<div class="footer">S-Öğretmen · ${new Date().toLocaleDateString("tr-TR")}</div>`;
    return html;
  }

  // ── KLASİK MOD (ödev/proje başına ayrı tablo) ─────────────────────────────
  let firstHwB=true;
  filtered.forEach(hw=>{
    const hwClassIds=hw.classIds&&hw.classIds.length>0?hw.classIds:[hw.classId].filter(Boolean);

function PlanImportWizard({targetFields,onImport,onClose,sampleCSV}){

    let r=(s||"");

    r=r.replace(/İ/g,"i").replace(/I/g,"i").replace(/Ğ/g,"g").replace(/Ü/g,"u")

        .replace(/ı/g,"i").replace(/ğ/g,"g").replace(/ü/g,"u")
        .replace(/ş/g,"s").replace(/ö/g,"o").replace(/ç/g,"c");
    r=r.toLowerCase();
    // Boşluk, tire, nokta, parantez, slash, çift boşluk temizle

    return r;
  };
  const ALIASES={

    degerler:         ["degerler","deger","values"],
    okuryazarlik:     ["okuryazarlikbecerileri","okuryazarlik","literacy"],
    belirliGun:       ["belirligunvehaftalar","belirligunevehaftalar","belirligun","ozelgun","nationaldays"],
    farklilastirma:   ["farklilastirma","differentiation"],
    okulTemelli:      ["okultemelliplanlama","okultemellib","okultemelli","schoolbased"],
    diger1:           ["diger1","diger-1","other1","ekalan1","diğer1"],
    diger2:           ["diger2","diger-2","other2","ekalan2","diğer2"],
    diger3:           ["diger3","diger-3","other3","ekalan3","diğer3"],
    diger4:           ["diger4","diger-4","other4","ekalan4","diğer4"],

  };
  const autoMap=headers=>{
    const auto={};

    targetFields.forEach(f=>{
      const aliases=(ALIASES[f.key]||[]).slice().sort((a,b)=>b.length-a.length);
      const fn=norm(f.label); const fk=norm(f.key);
      let match=null;
      for(const a of aliases){match=headers.find(h=>!used.has(h)&&norm(h)===a);if(match)break;}
      if(!match){for(const a of aliases){if(a.length<5)continue;match=headers.find(h=>{if(used.has(h))return false;const hn=norm(h);return hn.startsWith(a)||a.startsWith(hn.substring(0,Math.min(hn.length,a.length)))&&hn.includes(a.substring(0,5));});if(match)break;}}

    if(unmappedFields.length>0 && unmappedHeaders.length>0){
      // Eğer toplam sütun sayısı PLAN_FIELDS ile yakın (<3 fark) ise pozisyon bazlı dene
      if(Math.abs(headers.length - targetFields.length) < 4){
        targetFields.forEach((f,i)=>{
          if(!auto[f.key] && i<headers.length && !used.has(headers[i])){
            auto[f.key]=headers[i];
            used.add(headers[i]);
          }
        });
      }
    }
    return auto;
  };
  /* ── CSV okuma ── */
  const readCSV=text=>{
    const lines=text.trim().split(/\r?\n/);
    if(lines.length<2)return{headers:[],rows:[]};
    const delim=(lines[0].match(/;/g)||[]).length>=(lines[0].match(/,/g)||[]).length?";":","
    const parseLine=line=>{const cols=[];let cur="";let inQ=false;for(let i=0;i<line.length;i++){const ch=line[i];if(ch==='"'){inQ=!inQ;}else if(ch===delim&&!inQ){cols.push(cur.trim());cur="";}else{cur+=ch;}}cols.push(cur.trim());return cols;};
    const headers=parseLine(lines[0]).map(h=>h.replace(/^["']|["']$/g,"").trim());
    const rows=lines.slice(1).filter(l=>l.trim()).map(l=>{const vals=parseLine(l);const obj={};headers.forEach((h,i)=>{obj[h]=(vals[i]||"").replace(/^["']|["']$/g,"").trim();});return obj;});
    return{headers,rows};
  };
  /* ── XLSX okuma (SheetJS CDN) ── */
  const readXLSX=async file=>{
    return new Promise((res,rej)=>{
      const r=new FileReader();
      r.onload=async e=>{
        try{
          if(!window.XLSX){
            await new Promise((ok,fail)=>{
              const s=document.createElement("script");
              s.src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js";
              s.onload=ok;s.onerror=fail;
              document.head.appendChild(s);
            });
          }
          const data=new Uint8Array(e.target.result);
          const wb=window.XLSX.read(data,{type:"array"});
          const ws=wb.Sheets[wb.SheetNames[0]];
          const jsonRows=window.XLSX.utils.sheet_to_json(ws,{header:1,defval:""});
          if(jsonRows.length<2){rej(new Error("Boş dosya"));return;}
          const headers=jsonRows[0].map(h=>String(h||"").trim()).filter(Boolean);
          const rows=jsonRows.slice(1).filter(r=>r.some(c=>c!=="")).map(r=>{
            const obj={};
            headers.forEach((h,i)=>{obj[h]=String(r[i]||"").trim();});
            return obj;
          });
          res({headers,rows});
        }catch(err){rej(err);}
      };
      r.readAsArrayBuffer(file);
    });
  };
  /* ── PDF okuma (PDF.js CDN — metin katmanlı PDF) ── */
  const readPDF=async file=>{
    return new Promise((res,rej)=>{
      const r=new FileReader();
      r.onload=async e=>{
        try{
          if(!window.pdfjsLib){
            await new Promise((ok,fail)=>{
              const s=document.createElement("script");
              s.src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js";
              s.onload=()=>{window.pdfjsLib.GlobalWorkerOptions.workerSrc="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";ok();};
              s.onerror=fail;
              document.head.appendChild(s);
            });
          }
          const pdf=await window.pdfjsLib.getDocument({data:new Uint8Array(e.target.result)}).promise;
          let allLines=[];
          for(let p=1;p<=pdf.numPages;p++){
            const page=await pdf.getPage(p);
            const content=await page.getTextContent();
            const items=content.items.map(it=>({x:Math.round(it.transform[4]),y:Math.round(it.transform[5]),text:it.str.trim()})).filter(it=>it.text);
            const byY={};
            items.forEach(it=>{const k=it.y;(byY[k]=byY[k]||[]).push(it);});
            const lines=Object.entries(byY).sort((a,b)=>Number(b[0])-Number(a[0])).map(([,items])=>items.sort((a,b)=>a.x-b.x).map(i=>i.text).join(" | "));
            allLines=[...allLines,...lines];
          }
          if(allLines.length<2){rej(new Error("PDF'den tablo çıkarılamadı. Lütfen metin katmanlı bir PDF kullanın veya CSV/XLSX tercih edin."));return;}
          const headers=allLines[0].split(" | ").map(h=>h.trim()).filter(Boolean);
          const rows=allLines.slice(1).map(line=>{
            const vals=line.split(" | ");
            const obj={};
            headers.forEach((h,i)=>{obj[h]=(vals[i]||"").trim();});
            return obj;
          });
          res({headers,rows});
        }catch(err){rej(err);}
      };
      r.readAsArrayBuffer(file);
    });
  };
  /* ── Dosya seçimi handler ── */
  const handleFile=async file=>{
    if(!file)return;
    setError("");setLoading(true);
    try{
      const ext=file.name.split(".").pop().toLowerCase();
      let result;
      if(ext==="csv"||ext==="txt"){
        const text=await file.text();
        result=readCSV(text);
      } else if(ext==="xlsx"||ext==="xls"||ext==="ods"){
        result=await readXLSX(file);
      } else if(ext==="pdf"){
        result=await readPDF(file);
      } else {
        throw new Error(`Desteklenmeyen format: .${ext}\nDesteklenen: .csv .xlsx .xls .pdf`);
      }
      if(!result.headers.length)throw new Error("Başlık satırı bulunamadı");
      if(!result.rows.length)throw new Error("Veri satırı bulunamadı");
      setParsed(result);
      setMapping(autoMap(result.headers));
      setStep("map");
    }catch(err){
      setError(err.message);
    }finally{setLoading(false);}
  };
  const preview=parsed?parsed.rows.slice(0,4).map(row=>{
    const obj={};targetFields.forEach(f=>{if(mapping[f.key])obj[f.key]=row[mapping[f.key]]||"";});return obj;
  }):[];
  const doImport=()=>{
    if(!mapping["hafta"]){
      setError("⚠ Hafta No sütunu eşleştirilmedi. Lütfen geri dönüp Hafta No alanını eşleştirin.");
      setStep("map");
      return;
    }
    const rows=parsed.rows.map(row=>{
      const obj={};targetFields.forEach(f=>{if(mapping[f.key])obj[f.key]=row[mapping[f.key]]||"";});return obj;
    });
    const result=onImport(rows,parsed.headers);
    setImportResult(result||{count:rows.length});
    setStep("done");
  };
  const FILE_TYPES=[
    {id:"csv", icon:"📄", label:"CSV", desc:".csv veya .txt"},
    {id:"xlsx",icon:"📊", label:"Excel", desc:".xlsx veya .xls"},
    {id:"pdf", icon:"📋", label:"PDF", desc:"Metin katmanlı"},
  ];
  const STEPS=[["pick","📂 Dosya"],["map","🔗 Eşleştir"],["preview","👁 Önizle"],["done","✅ Tamam"]];
  const sel={...inp,fontSize:13,padding:"8px 10px"};
  return <Sheet title="📥 Yıllık Plan İçe Aktarımı" onClose={onClose}>
    {/* Step göstergesi */}
    <div style={{display:"flex",gap:3,marginBottom:16}}>
      {STEPS.map(([s,l],i)=>{
        const active=step===s;
        const past=STEPS.findIndex(x=>x[0]===step)>i;
        return <div key={s} style={{flex:1,textAlign:"center",padding:"5px 2px",borderRadius:8,fontSize:10,fontWeight:600,background:active?T.accent:past?T.successDim:T.toggleBg,color:active?"#fff":past?T.success:T.textMuted}}>{l}</div>;
      })}
    </div>
    {/* ── ADIM 1: Dosya seç ── */}
    {step==="pick"&&<>
      <div style={{display:"flex",gap:8,marginBottom:14}}>
        {FILE_TYPES.map(ft=>(
          <div key={ft.id} style={{flex:1,background:T.surface,border:`2px solid ${T.border}`,borderRadius:12,padding:"12px 8px",textAlign:"center",cursor:"pointer",transition:"all 0.15s"}}
            onClick={()=>{document.getElementById(`import-${ft.id}`).click();}}>
            <div style={{fontSize:28,marginBottom:4}}>{ft.icon}</div>
            <div style={{color:T.text,fontSize:13,fontWeight:700}}>{ft.label}</div>
            <div style={{color:T.textMuted,fontSize:10,marginTop:2}}>{ft.desc}</div>
            <input id={`import-${ft.id}`} type="file"
              accept={ft.id==="csv"?".csv,.txt":ft.id==="xlsx"?".xlsx,.xls,.ods":".pdf"}
              style={{display:"none"}} onChange={e=>handleFile(e.target.files[0])}/>
          </div>
        ))}
      </div>
      {loading&&<div style={{textAlign:"center",padding:"20px 0",color:T.textSub}}>
        <div style={{fontSize:24,marginBottom:8,animation:"spin 1s linear infinite",display:"inline-block"}}>⏳</div>
        <div style={{fontSize:13}}>Dosya okunuyor...</div>
      </div>}
      {error&&<div style={{background:T.dangerDim,color:T.danger,borderRadius:10,padding:"10px 14px",fontSize:12,marginBottom:10,lineHeight:1.6}}>{error}</div>}
      <div style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:10,padding:"10px 14px"}}>
        <div style={{color:T.textSub,fontSize:11,fontWeight:600,marginBottom:6}}>💡 İpuçları</div>
        <div style={{color:T.textMuted,fontSize:11,lineHeight:1.7}}>
          • <b style={{color:T.text}}>Excel:</b> İlk satır başlık olmalı (Hafta, Ünite, Konu vb.)<br/>
          • <b style={{color:T.text}}>CSV:</b> Excel'den Farklı Kaydet → CSV<br/>
          • <b style={{color:T.text}}>PDF:</b> Metin seçilebilen PDF gerekli (taranmış değil)
        </div>
      </div>
    </>}
    {/* ── ADIM 2: Sütun eşleştirme — tablo önizlemeli ── */}
    {step==="map"&&parsed&&(()=>{
      // Eşleşen / eşleşmeyen sayısı
      const mappedCount=targetFields.filter(f=>mapping[f.key]).length;
      const unmappedRequired=targetFields.filter(f=>f.required&&!mapping[f.key]);
      return <>
        {/* Özet bar */}
        <div style={{background:T.successDim,borderRadius:8,padding:"8px 12px",marginBottom:10,display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
          <span style={{fontSize:14}}>✅</span>
          <span style={{color:T.success,fontSize:12,fontWeight:600,flex:1}}>{parsed.rows.length} satır · {parsed.headers.length} sütun okundu</span>
          <span style={{background:T.accent,color:"#fff",borderRadius:99,padding:"2px 8px",fontSize:11,fontWeight:700}}>{mappedCount}/{targetFields.length} eşleşti</span>
        </div>
        {unmappedRequired.length>0&&<div style={{background:T.dangerDim,color:T.danger,borderRadius:8,padding:"7px 12px",fontSize:11,marginBottom:10,fontWeight:600}}>
          ⚠ Zorunlu alan eşleşmedi: {unmappedRequired.map(f=>f.label).join(", ")}
        </div>}

        {/* Eşleştirme tablosu — sol: uygulama alanı, sağ: dosya sütunu + örnek değerler */}
        <div style={{overflowX:"auto",marginBottom:12,borderRadius:10,border:`1px solid ${T.border}`}}>
          <table style={{borderCollapse:"collapse",width:"100%",fontSize:11}}>
            <thead>
              <tr style={{background:T.tableAlt}}>
                <th style={{color:T.textSub,fontSize:10,padding:"7px 10px",textAlign:"left",fontWeight:700,borderBottom:`1px solid ${T.border}`,width:"30%"}}>Uygulama Alanı</th>
                <th style={{color:T.textSub,fontSize:10,padding:"7px 10px",textAlign:"left",fontWeight:700,borderBottom:`1px solid ${T.border}`,width:"28%"}}>Dosya Sütunu</th>
                <th style={{color:T.textSub,fontSize:10,padding:"7px 10px",textAlign:"left",fontWeight:700,borderBottom:`1px solid ${T.border}`}}>Örnek Veriler</th>
              </tr>
            </thead>
            <tbody>
              {targetFields.map((f,fi)=>{
                const mapped=mapping[f.key];
                const samples=mapped?parsed.rows.slice(0,3).map(r=>r[mapped]||"").filter(v=>v):[];
                const rowBg=fi%2===0?T.bg:T.card;
                return <tr key={f.key} style={{background:rowBg,borderBottom:`1px solid ${T.border}`}}>
                  <td style={{padding:"6px 10px",verticalAlign:"middle"}}>
                    <span style={{color:mapped?T.text:T.textMuted,fontWeight:f.required?700:400}}>
                      {f.label}{f.required&&<span style={{color:T.danger,marginLeft:2}}>*</span>}
                    </span>
                  </td>
                  <td style={{padding:"4px 6px",verticalAlign:"middle"}}>
                    <select
                      value={mapping[f.key]||""}
                      onChange={e=>setMapping(m=>({...m,[f.key]:e.target.value||undefined}))}
                      style={{...inp,fontSize:11,padding:"4px 6px",width:"100%",background:mapped?T.accentDim:T.surface,color:mapped?T.accent:T.textMuted,border:`1px solid ${mapped?T.accent:T.border}`,borderRadius:7}}>
                      <option value="">— yok —</option>
                      {parsed.headers.map(h=><option key={h} value={h}>{h}</option>)}
                    </select>
                  </td>
                  <td style={{padding:"6px 10px",verticalAlign:"middle"}}>
                    <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
                      {samples.length>0
                        ?samples.map((s,i)=><span key={i} style={{background:T.accentDim,color:T.accent,borderRadius:4,padding:"1px 6px",fontSize:10,maxWidth:120,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",display:"inline-block"}} title={s}>{s}</span>)
                        :<span style={{color:T.textMuted,fontSize:10,fontStyle:"italic"}}>eşleşme yok</span>}
                    </div>
                  </td>
                </tr>;
              })}
            </tbody>
          </table>
        </div>

        {/* Dosya sütunları — eşleşmeyen varsa göster */}
        {parsed.headers.filter(h=>!Object.values(mapping).includes(h)).length>0&&<div style={{background:T.surface,borderRadius:8,padding:"8px 12px",marginBottom:12}}>
          <div style={{color:T.textMuted,fontSize:10,fontWeight:600,marginBottom:4}}>📋 Dosyada eşleştirilmeyen sütunlar:</div>
          <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
            {parsed.headers.filter(h=>!Object.values(mapping).includes(h)).map(h=>(
              <span key={h} style={{background:T.warnDim,color:T.warn,borderRadius:4,padding:"1px 8px",fontSize:10}}>{h}</span>
            ))}
          </div>
        </div>}

        <div style={{display:"flex",gap:10}}>
          <button style={{...btnSm(T.toggleBg,T.textSub),padding:"8px 14px"}} onClick={()=>setStep("pick")}>← Geri</button>
          <button style={{...btn(T.accent),flex:2}} onClick={()=>setStep("preview")} disabled={unmappedRequired.length>0}>
            {unmappedRequired.length>0?`⚠ ${unmappedRequired.length} zorunlu alan eksik`:"Önizle →"}
          </button>
        </div>
      </>;
    })()}
    {/* ── ADIM 3: Önizleme ── */}
    {step==="preview"&&<>
      <div style={{color:T.textSub,fontSize:12,marginBottom:10}}>İlk 4 satır — toplam <b style={{color:T.text}}>{parsed.rows.length}</b> satır aktarılacak:</div>
      <div style={{overflowX:"auto",marginBottom:14,borderRadius:10,border:`1px solid ${T.border}`}}>
        <table style={{borderCollapse:"collapse",width:"100%"}}>
          <thead>
            <tr style={{background:T.tableAlt}}>
              {targetFields.filter(f=>mapping[f.key]).map(f=><th key={f.key} style={{color:T.accent,fontSize:10,padding:"6px 8px",textAlign:"left",fontWeight:700,borderBottom:`1px solid ${T.border}`}}>{f.label}</th>)}
            </tr>
          </thead>
          <tbody>
            {preview.map((row,i)=><tr key={i} style={{borderBottom:`1px solid ${T.border}`}}>
              {targetFields.filter(f=>mapping[f.key]).map(f=><td key={f.key} style={{color:T.text,fontSize:10,padding:"5px 8px"}}>{row[f.key]||<span style={{color:T.textMuted}}>—</span>}</td>)}
            </tr>)}
          </tbody>
        </table>
      </div>
      <div style={{display:"flex",gap:10}}>
        <BackBtn onClick={()=>setStep("map")} style={{width:30,height:30}}/>
        <button style={{...btn(T.success),flex:2}} onClick={doImport}>✓ {parsed.rows.length} Satırı Aktar</button>
      </div>
    </>}
    {/* ── ADIM 4: Tamamlandı veya Hata ── */}
    {step==="done"&&importResult&&<>
      {importResult.errors&&importResult.errors.length>0
        ?<>
          <div style={{textAlign:"center",padding:"16px 0 12px"}}>
            <div style={{fontSize:40,marginBottom:10}}>⚠️</div>
            <div style={{color:T.danger,fontSize:16,fontWeight:800,marginBottom:8}}>Aktarım Başarısız</div>
          </div>
          {importResult.errors.map((e,i)=>(
            <div key={i} style={{background:T.dangerDim,color:T.danger,borderRadius:10,padding:"10px 14px",fontSize:12,marginBottom:8,lineHeight:1.6}}>{e}</div>
          ))}
          <div style={{color:T.textMuted,fontSize:11,marginBottom:16,lineHeight:1.6}}>
            💡 Excel/CSV dosyanızda <b style={{color:T.text}}>Hafta No</b> sütununun olduğundan ve her satırda <b style={{color:T.text}}>1, 2, 3...</b> şeklinde dolu olduğundan emin olun.
          </div>
          <BackBtn onClick={()=>setStep("pick")} style={{width:30,height:30}}/>
        </>
        :<>
          <div style={{textAlign:"center",padding:"20px 0 28px"}}>
            <div style={{fontSize:48,marginBottom:12}}>🎉</div>
            <div style={{color:T.success,fontSize:18,fontWeight:800,marginBottom:6}}>Aktarım Tamamlandı</div>
            {importResult.added!==undefined&&<div style={{color:T.textSub,fontSize:13}}>✅ {importResult.added} satır aktarıldı, hafta numarasına göre sıralandı</div>}
          </div>
          <button style={btn(T.accent)} onClick={onClose}>Kapat</button>
        </>
      }
    </>}
  </Sheet>;
}
function ExportScreen({school,classes,lessons,students,exams,examScores}){

    {key:"students", icon:"👤", label:"Öğrenciler",     sub:"Tüm / sınıf bazlı"},

      }
      if(scope==="all"||scope==="classes"){
        downloadCSV(`siniflar_${ts}.csv`,buildClassRows(classes,students));
      }

        const rows=buildExamRows(exams,classes,lessons,students,examScores);

      }
    } else {
      const html=buildPDFHtml(scope,school,classes,lessons,students,exams,examScores);
      openReport({title:'Tüm Veriler Raporu',filename:`ogretmenpro_${ts}`,supportCols:false,buildHTML:()=>html});
    }

    setTimeout(()=>setFmt(null),2000);
