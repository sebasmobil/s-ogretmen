/* ── NOT İŞLEMLERİ YARDIMCI FONKSİYONLAR ── */
function buildNotIslemleriPDF(opts){
  const{exams=[],examScores={},perfScores={},projScores={},students=[],classes=[],lessons=[],school={},selectedClasses=[],selectedItems=[],accentColor="#1D4ED8",ecoMode=false,margin=8}=opts;
  const lname=id=>lessons.find(x=>String(x.id)===String(id))?.name||"?";
  const targetClasses=selectedClasses.length>0?selectedClasses.map(id=>classes.find(c=>c.id===id)).filter(Boolean):[...classes].sort((a,b)=>a.grade-b.grade||a.branch.localeCompare(b.branch));
  if(targetClasses.length===0)return "";

  const calcTermGrade=(clsId,stId,term,clsExams)=>{
    const termExams=clsExams.filter(ex=>String(ex.term)===String(term));
    const yaziliScores=termExams.map(ex=>{
      const sc=examScores[String(ex.id)]||{};const stSc=sc[stId]||{};
      if(stSc.__bepScore!=null&&stSc.__bepScore!=="")return Number(stSc.__bepScore);
      if(stSc.__kopya)return 0;
      if(stSc.__scoreOnly!=null&&stSc.__scoreOnly!=="")return Number(stSc.__scoreOnly);
      const tmax=ex.questions.reduce((s,q)=>s+Number(q.maxScore),0)||100;
      const hasAny=ex.questions.some(q=>stSc[q.id]!=null&&stSc[q.id]!=="");
      if(!hasAny)return null;
      const tot=ex.questions.reduce((s,q)=>s+(stSc[q.id]!=null&&stSc[q.id]!==""?Number(stSc[q.id]):0),0);
      return tmax>0?Math.round(tot/tmax*100):null;
    }).filter(v=>v!=null);
    const yaziliOrt=yaziliScores.length>0?yaziliScores.reduce((a,b)=>a+b,0)/yaziliScores.length:null;
    const perfCls=perfScores[clsId]||{};
    const stPerfData=(perfCls[`term${term}`]||{})[stId]||{};
    const dipScores=Object.values(stPerfData).filter(v=>v!=null&&v!==""&&!isNaN(Number(v))).map(Number);
    const dipOrt=dipScores.length>0?dipScores.reduce((a,b)=>a+b,0)/dipScores.length:null;
    const projCls=projScores[clsId]||{};
    const stProjData=(projCls[`term${term}`]||{})[stId]||{};
    const projList=Object.values(stProjData).filter(v=>v!=null&&v!==""&&!isNaN(Number(v))).map(Number);
    const projOrt=projList.length>0?projList.reduce((a,b)=>a+b,0)/projList.length:null;
    const perfProjParts=[dipOrt,projOrt].filter(v=>v!=null);
    const performansNotu=perfProjParts.length>0?perfProjParts.reduce((a,b)=>a+b,0)/perfProjParts.length:null;
    const parts=[performansNotu,yaziliOrt].filter(v=>v!=null);
    if(parts.length===0)return null;
    return Math.round(parts.reduce((a,b)=>a+b,0)/parts.length);
  };

  let html=`<style>
    *{box-sizing:border-box;margin:0;padding:0;font-family:Arial,sans-serif;}
    body{padding:${margin}mm;color:#1e293b;font-size:9pt;}
    h1{font-size:13pt;font-weight:800;color:${accentColor};margin-bottom:3px;}
    h2{font-size:10pt;font-weight:700;color:${accentColor};margin:10px 0 4px;border-bottom:2px solid ${accentColor};padding-bottom:2px;}
    .meta{font-size:8pt;color:#64748b;margin-bottom:10px;}
    table{width:100%;border-collapse:collapse;font-size:8pt;margin-bottom:10px;}
    th{background:${ecoMode?"#fff":accentColor}!important;color:${ecoMode?"#000":"#fff"}!important;padding:3px 6px;text-align:center;font-weight:700;font-size:7.5pt;border:${ecoMode?"1px solid #000":"none"};}
    th.left{text-align:left;}
    td{padding:3px 6px;border-bottom:1px solid #e2e8f0;text-align:center;}
    td.left{text-align:left;}
    tr:nth-child(even) td{background:${ecoMode?"#fff":"#f8faff"};}
    .avg-row td{background:#e8f0fe!important;font-weight:700;}
    .class-block{margin-bottom:18px;page-break-inside:avoid;}
    .class-block+.class-block{page-break-before:always;}
    .g-cell{background:#dc2626!important;color:#fff!important;font-weight:900!important;}
    .term-avg{background:#dbeafe!important;font-weight:800!important;color:#1d4ed8!important;}
    .year-end{background:#dcfce7!important;font-weight:900!important;color:#166534!important;}
    .th-term{background:#1e40af!important;}
    .th-year{background:#166534!important;}
  </style>
  <h1>&#128202; Not Çizelgesi — ${school?.name||"Okul"}</h1>
  <div class="meta">${school?.academicYear||""} · ${new Date().toLocaleDateString("tr-TR")}</div>`;

  let _clsIdx=0;
  targetClasses.forEach(cls=>{
    const clsStudents=sortStudents(students.filter(s=>s.classId===cls.id),"schoolNo");
    if(clsStudents.length===0)return;
    const clsExams=exams.filter(ex=>ex.classId===cls.id);
    const cols=[];
    for(let term=1;term<=2;term++){
      const termExams=clsExams.filter(ex=>String(ex.term)===String(term)).sort((a,b)=>Number(a.examNo)-Number(b.examNo));
      termExams.forEach(ex=>{
        const key=`exam_${ex.id}`;
        if(selectedItems.length===0||selectedItems.includes(key))
          cols.push({type:"exam",exam:ex,label:`${term}.D ${ex.examNo}.Yazılı`,key,term});
      });
      const perfCls=perfScores[cls.id]||{};
      const termPerf=perfCls[`term${term}`]||{};
      const numPerf=(Object.keys(termPerf).filter(k=>k.startsWith("count")).length)||(opts[`perfCount_term${term}`]||3);
      for(let pi=1;pi<=numPerf;pi++){
        const key=`perf_${cls.id}_${term}_${pi}`;
        if(selectedItems.length===0||selectedItems.includes(key))
          cols.push({type:"perf",term,no:pi,label:`${term}.D ${pi}.DİP`,key});
      }
      const projCls=projScores[cls.id]||{};
      const termProj=projCls[`term${term}`]||{};
      const np=(Object.keys(termProj).filter(k=>k.startsWith("count")).length)||(opts[`projCount_term${term}`]||1);
      for(let pi=1;pi<=np;pi++){
        const key=`proj_${cls.id}_${term}_${pi}`;
        if(selectedItems.length===0||selectedItems.includes(key))
          cols.push({type:"proj",term,no:pi,label:`${term}.D ${pi}.Proje`,key});
      }
      cols.push({type:"termAvg",term,label:`${term}.Dönem Notu`,key:`termAvg_${term}`});
    }
    cols.push({type:"yearEnd",label:"Yıl Sonu Notu",key:"yearEnd"});
    if(cols.filter(c=>c.type!=="termAvg"&&c.type!=="yearEnd").length===0)return;

    html+=(_clsIdx>0?"<!--NEWPAGE-->":"")+`<div class="class-block">
      <h2>${cls.grade}/${cls.branch} — ${lname(clsExams[0]?.lessonId)||""}  (${clsStudents.length} öğrenci)</h2>
      <table><tr>
        <th style="width:30px">Sıra</th>
        <th class="left" style="width:55px">Okul No</th>
        <th class="left" style="min-width:120px">Ad Soyad</th>
        ${cols.map(c=>c.type==="termAvg"?`<th class="th-term" style="width:55px">${c.label}</th>`:c.type==="yearEnd"?`<th class="th-year" style="width:55px">${c.label}</th>`:`<th style="width:50px">${c.label}</th>`).join("")}
      </tr>`;

    const colAvgs=cols.map(()=>({sum:0,cnt:0}));
    clsStudents.forEach((st,idx)=>{
      const vals=cols.map((c,ci)=>{
        if(c.type==="exam"){
          const sc=examScores[String(c.exam.id)]||{};const stSc=sc[st.id]||{};
          if(stSc.__bepScore!=null&&stSc.__bepScore!=="")return{v:Number(stSc.__bepScore),label:stSc.__bepScore,special:"bep"};
          if(stSc.__kopya)return{v:0,label:"0",special:"kopya"};
          if(stSc.__scoreOnly!=null&&stSc.__scoreOnly!=="")return{v:Number(stSc.__scoreOnly),label:stSc.__scoreOnly,special:null};
          const tmax=c.exam.questions.reduce((s,q)=>s+Number(q.maxScore),0)||100;
          const hasAny=c.exam.questions.some(q=>stSc[q.id]!=null&&stSc[q.id]!=="");
          if(!hasAny)return{v:null,label:"G",special:"absent"};
          const tot=c.exam.questions.reduce((s,q)=>s+(stSc[q.id]!=null&&stSc[q.id]!==""?Number(stSc[q.id]):0),0);
          const pct=tmax>0?Math.round(tot/tmax*100):0;
          colAvgs[ci].sum+=pct;colAvgs[ci].cnt++;
          return{v:pct,label:pct,special:null};
        }
        if(c.type==="perf"){
          const v=(perfScores[cls.id]||{})[`term${c.term}`]?.[st.id]?.[`p${c.no}`];
          if(v!=null&&v!==""){colAvgs[ci].sum+=Number(v);colAvgs[ci].cnt++;}
          return{v:v!=null&&v!==""?Number(v):null,label:v!=null&&v!==""?v:"—",special:null};
        }
        if(c.type==="proj"){
          const v=(projScores[cls.id]||{})[`term${c.term}`]?.[st.id]?.[`p${c.no}`];
          if(v!=null&&v!==""){colAvgs[ci].sum+=Number(v);colAvgs[ci].cnt++;}
          return{v:v!=null&&v!==""?Number(v):null,label:v!=null&&v!==""?v:"—",special:null};
        }
        if(c.type==="termAvg"){
          const g=calcTermGrade(cls.id,st.id,c.term,clsExams);
          if(g!=null){colAvgs[ci].sum+=g;colAvgs[ci].cnt++;}
          return{v:g,label:g!=null?g:"—",special:"termAvg"};
        }
        if(c.type==="yearEnd"){
          const g1=calcTermGrade(cls.id,st.id,1,clsExams);
          const g2=calcTermGrade(cls.id,st.id,2,clsExams);
          const parts=[g1,g2].filter(v=>v!=null);
          const yr=parts.length>0?Math.round(parts.reduce((a,b)=>a+b,0)/parts.length):null;
          if(yr!=null){colAvgs[ci].sum+=yr;colAvgs[ci].cnt++;}
          return{v:yr,label:yr!=null?yr:"—",special:"yearEnd"};
        }
        return{v:null,label:"—",special:null};
      });
      html+=`<tr>
        <td>${idx+1}</td>
        <td class="left">${st.schoolNo||"—"}</td>
        <td class="left">${st.name}</td>
        ${vals.map(({v,label,special})=>{
          if(special==="absent")return`<td class="g-cell">G</td>`;
          if(special==="termAvg")return`<td class="term-avg">${label}</td>`;
          if(special==="yearEnd")return`<td class="year-end">${label}</td>`;
          const color=special==="bep"?"color:#7c3aed;":special==="kopya"?"color:#dc2626;":v==null?"color:#94a3b8;":v>=85?"color:#059669;font-weight:700;":v>=50?"":"color:#dc2626;";
          return`<td style="${color}">${label}</td>`;
        }).join("")}
      </tr>`;
    });
    html+=`<tr class="avg-row"><td colspan="3" class="left">Sınıf Ortalaması</td>
      ${colAvgs.map(({sum,cnt},ci)=>{
        const c=cols[ci];
        if(c.type==="termAvg")return`<td class="term-avg">${cnt>0?Math.round(sum/cnt):"—"}</td>`;
        if(c.type==="yearEnd")return`<td class="year-end">${cnt>0?Math.round(sum/cnt):"—"}</td>`;
        return`<td>${cnt>0?Math.round(sum/cnt):"—"}</td>`;
      }).join("")}
    </tr></table></div>`;
    _clsIdx++;
  });
  return html;
}

// Ders İçi Performans Sekmesi
function DersIciPerfTab({classes,students,perfScores,setPerfScores,examScores,exams,lessons}){
  const T=useT();const{inp,btn,btnSm}=useStyles();
  const sortedClassesInit=[...classes].sort((a,b)=>a.grade-b.grade||a.branch.localeCompare(b.branch));
  const firstClsPerf=sortedClassesInit[0];
  const[selClass,setSelClass]=usePersist("ogretmen_perf_selclass",()=>firstClsPerf?String(firstClsPerf.id):null);
  const[openTerms,setOpenTerms]=usePersist("ogretmen_perf_open_terms",{"1":false,"2":false});
  const[openLessons,setOpenLessons]=usePersist("ogretmen_perf_open_lessons",{});
  const initPerfTermLesson=(()=>{
    const keys=Object.keys(openLessons||{}).filter(k=>openLessons[k]);
    for(const k of keys){const m=k.match(/^perf_(\d+)_(\d+)$/);if(m)return{term:m[1],lesson:m[2]};}
    return{term:"1",lesson:null};
  })();
  const[selTerm,setSelTerm]=useState(initPerfTermLesson.term);
  const[selLesson,setSelLesson]=useState(initPerfTermLesson.lesson);
  const toggleTerm=t=>setOpenTerms(s=>({...s,[t]:!s[t]}));
  const toggleLesson=key=>setOpenLessons(s=>({...s,[key]:!s[key]}));
  const[countSheet,setCountSheet]=useState(false);
  const[perfApplied,setPerfApplied]=useState(false);
  const[autoSheet,setAutoSheet]=useState(false);
  const[autoCriteria,setAutoCriteria]=usePersist("ogretmen_perf_autocriteria",[]);
  const[autoCritDraft,setAutoCritDraft]=useState(null);
  const[perfCounts,setPerfCounts]=usePersist("ogretmen_perf_counts",{});
  const[showPerfLessonPicker,setShowPerfLessonPicker]=useState(null);
  const[dipTab,setDipTab]=usePersist("ogretmen_perf_diptab","lesson");
  const[confirmDelPerf,setConfirmDelPerf]=useState(null); // {term,lesId,name}
  // Tek seferlik migration: eski p1/p2 formatını ders bazlı formata taşı
  // Sadece o dönemde TEK ders olan sınıflar için güvenli
  useEffect(()=>{
    const migrated=JSON.parse(localStorage.getItem("ogretmen_perf_migrated_v2")||"false");
    if(migrated)return;
    setPerfScores(ps=>{
      const next={...ps};
      let changed=false;
      Object.entries(next).forEach(([clsId,clsData])=>{
        [1,2].forEach(term=>{
          const tk=`term${term}`;
          const termD=clsData[tk];
          if(!termD)return;
          // Bu sınıfın bu dönemdeki dersleri
          const clsLessons=[...new Set(exams.filter(ex=>String(ex.classId)===String(clsId)&&String(ex.term)===String(term)).map(ex=>String(ex.lessonId)))];
          if(clsLessons.length!==1)return; // Birden fazla ders varsa migration yapmıyoruz
          const lesId=clsLessons[0];
          // Eski p1/p2 olan kayıtları yeni formata taşı
          const newTermD={...termD};
          let termChanged=false;
          Object.entries(termD).forEach(([stId,stData])=>{
            if(typeof stData!=="object")return;
            const hasOld=Object.keys(stData).some(k=>/^p\d+$/.test(k));
            if(!hasOld)return;
            const newStData={...stData};
            Object.entries(stData).forEach(([k,v])=>{
              const m=k.match(/^p(\d+)$/);
              if(m&&v!=null&&v!==""){
                const newKey=`${lesId}_p${m[1]}`;
                if(!newStData[newKey]){newStData[newKey]=v;termChanged=true;changed=true;}
              }
            });
            newTermD[stId]=newStData;
          });
          if(termChanged)next[clsId]={...clsData,[tk]:newTermD};
        });
      });
      if(changed)localStorage.setItem("ogretmen_perf_migrated_v2","true");
      return changed?next:ps;
    });
    localStorage.setItem("ogretmen_perf_migrated_v2","true");
  },[]);
  const sortedClasses=[...classes].sort((a,b)=>a.grade-b.grade||a.branch.localeCompare(b.branch));
  const getPerfCount=(clsId,term,lessonId)=>{const lk=lessonId?`${clsId}_${term}_${lessonId}`:null;const gk=`${clsId}_${term}`;return(lk&&perfCounts[lk]!=null?perfCounts[lk]:perfCounts[gk])||3;};
  const setPerfCount=(clsId,term,n,lessonId)=>{const k=lessonId?`${clsId}_${term}_${lessonId}`:`${clsId}_${term}`;setPerfCounts(p=>({...p,[k]:n}));};
  const cls=selClass?sortStudents(students.filter(s=>String(s.classId)===String(selClass)),"schoolNo"):[];
  const getScore=(clsId,term,stId,no)=>{
    const lesKey=selLesson?`${selLesson}_p${no}`:`p${no}`;
    return(perfScores[clsId]||{})[`term${term}`]?.[stId]?.[lesKey]??"";
  };
  const setScore=(clsId,term,stId,no,val)=>setPerfScores(ps=>{
    const lesKey=selLesson?`${selLesson}_p${no}`:`p${no}`;
    const prev=ps[clsId]||{};
    const termKey=`term${term}`;
    const termData=prev[termKey]||{};
    const stData=termData[stId]||{};
    return{...ps,[clsId]:{...prev,[termKey]:{...termData,[stId]:{...stData,[lesKey]:val}}}};
  });
  // Otomatik dağıtım kriteri hesaplama
  const applyAutoCriteria=()=>{
    if(!selClass||autoCriteria.length===0)return;
    const clsId   = String(selClass);
    const term     = String(selTerm);
    const lesId    = selLesson ? String(selLesson) : null;

    // Mevcut DİP notu var mı kontrol et
    const count = getPerfCount(clsId, term, lesId||undefined);
    const clsStudents = sortStudents(students.filter(s=>String(s.classId)===clsId),"schoolNo");
    const hasExisting = clsStudents.some(st=>{
      const td=(perfScores[clsId]||{})[`term${term}`]||{};
      const sd=td[st.id]||{};
      for(let no=1;no<=count;no++){
        const k=lesId?`${lesId}_p${no}`:`p${no}`;
        if(sd[k]!=null&&sd[k]!=="")return true;
      }
      return false;
    });

    if(hasExisting&&!window.confirm(`⚠️ Bu ders için önceden girilmiş DİP notları var!\n\nUygula butonuna basarsanız mevcut tüm DİP notları silinip yeniden doldurulacak.\n\nDevam etmek istiyor musunuz?`)){
      return;
    }

    // O ders + dönem + sınıfa ait yazılı sınavları
    const clsExams = exams.filter(ex=>
      String(ex.classId)===clsId &&
      String(ex.term)===term &&
      (lesId ? String(ex.lessonId)===lesId : true)
    );

    clsStudents.forEach(st=>{
      // Her öğrencinin o ders + dönem yazılı ortalaması
      const examScoreList = clsExams.map(ex=>{
        const sc  = examScores[String(ex.id)]||{};
        const stSc = sc[st.id]||{};
        if(stSc.__bepScore!=null&&stSc.__bepScore!=="") return Number(stSc.__bepScore);
        if(stSc.__kopya) return 0;
        if(stSc.__scoreOnly!=null&&stSc.__scoreOnly!=="") return Number(stSc.__scoreOnly);
        const tmax = ex.questions.reduce((s,q)=>s+Number(q.maxScore),0)||100;
        const tot  = ex.questions.reduce((s,q)=>s+(stSc[q.id]!=null&&stSc[q.id]!==""?Number(stSc[q.id]):0),0);
        return tmax>0 ? Math.round(tot/tmax*100) : null;
      }).filter(v=>v!=null);

      const avg = examScoreList.length>0
        ? examScoreList.reduce((a,b)=>a+b,0)/examScoreList.length
        : null;

      // Kriter eşleşmesi
      let matched=null;
      for(const c of autoCriteria){
        if(avg==null) break;
        let pass=false;
        if(c.condition==="gte"   && avg>=c.value)                      pass=true;
        else if(c.condition==="lt"  && avg<c.value)                    pass=true;
        else if(c.condition==="between" && avg>=c.value && avg<(c.value2||100)) pass=true;
        if(pass){matched=c;break;}
      }

      // Önce mevcut DİP notlarını sil, sonra yenisini yaz
      setPerfScores(ps=>{
        const prev   = ps[clsId]||{};
        const tk     = `term${term}`;
        const td     = {...(prev[tk]||{})};
        const sd     = {...(td[st.id]||{})};
        // Önce temizle
        for(let no=1;no<=count;no++){
          const k=lesId?`${lesId}_p${no}`:`p${no}`;
          delete sd[k];
        }
        // Eşleşme varsa doldur
        if(matched && avg!==0){
          for(let no=1;no<=count;no++){
            let score;
            if(matched.scoreType==="fixed"){
              score=matched.fixedScore;
            } else {
              const min=matched.minScore, max=matched.maxScore;
              score=Math.floor(Math.random()*(max-min+1))+min;
            }
            const k=lesId?`${lesId}_p${no}`:`p${no}`;
            sd[k]=String(score);
          }
        }
        return{...ps,[clsId]:{...prev,[tk]:{...td,[st.id]:sd}}};
      });
    });
    setAutoSheet(false);
  };
  const numPerf=selClass?getPerfCount(selClass,selTerm,selLesson):2;
  // Ders klasörü açıldığında: gösterilecek içerik (sınıf tablosu)
  const renderDersContent=(lesId)=>{
    if(!selClass||!selTerm)return null;
    const numPerfLocal=selClass?getPerfCount(selClass,selTerm,lesId):2;
    const getScoreLocal=(clsId,term,stId,no)=>{
      const k=lesId?`${lesId}_p${no}`:`p${no}`;
      return(perfScores[clsId]||{})[`term${term}`]?.[stId]?.[k]??"";
    };
    const setScoreLocal=(clsId,term,stId,no,val)=>setPerfScores(ps=>{
      const k=lesId?`${lesId}_p${no}`:`p${no}`;
      const prev=ps[clsId]||{};const tk=`term${term}`;const td=prev[tk]||{};const sd=td[stId]||{};
      return{...ps,[clsId]:{...prev,[tk]:{...td,[stId]:{...sd,[k]:val}}}};
    });
    return <div>
      <div style={{display:"flex",gap:6,padding:"4px 0 8px",alignItems:"center",justifyContent:"flex-end"}}>
        <button style={{...btnSm(T.warnDim,T.warn),fontSize:11}} onClick={()=>{setSelLesson(String(lesId));setAutoSheet(true);}}>⚡ Otomatik</button>
      </div>
      {cls.length>0?<div style={{overflowX:"auto"}}>
        <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
          <thead>
            <tr style={{background:T.tableAlt}}>
              <th style={{color:T.textSub,fontSize:10,padding:"6px 8px",textAlign:"left",fontWeight:700,borderBottom:`1px solid ${T.border}`,whiteSpace:"nowrap"}}>Öğrenci</th>
              {Array.from({length:numPerfLocal},(_,i)=>(
                <th key={i} style={{color:T.accent,fontSize:10,padding:"6px 8px",textAlign:"center",fontWeight:700,borderBottom:`1px solid ${T.border}`,minWidth:70}}>
                  {i+1}. DİP
                </th>
              ))}
            </tr>
          </thead>
          <tbody>
            {cls.map((st,idx)=>(
              <tr key={st.id} style={{borderBottom:`1px solid ${T.border}`,background:idx%2===0?T.tableAlt:"none"}}>
                <td style={{color:T.text,fontSize:12,padding:"4px 8px",whiteSpace:"nowrap"}}>
                  <span style={{color:T.textMuted,fontSize:10,marginRight:4}}>{st.schoolNo||"#"}</span>{st.name}
                </td>
                {Array.from({length:numPerfLocal},(_,i)=>{
                  const v=getScoreLocal(selClass,selTerm,st.id,i+1);
                  const num=v!==""?Number(v):null;
                  const color=num==null?"":num>=85?T.success:num>=50?T.accent:T.danger;
                  return <td key={i} style={{padding:"4px 6px",textAlign:"center"}}>
                    <input type="number" inputMode="numeric" pattern="[0-9]*" min={0} max={100} value={v} onFocus={e=>e.target.select()} onChange={e=>setScoreLocal(selClass,selTerm,st.id,i+1,e.target.value)}
                      style={{...inp,width:58,textAlign:"center",padding:"4px 2px",fontSize:14,fontWeight:700,color:color||T.text,borderColor:color||T.border}}
                      placeholder="—" onFocus={e=>e.target.select()}/>
                  </td>;
                })}
              </tr>
            ))}
          </tbody>
        </table>
      </div>:<div style={{textAlign:"center",color:T.textMuted,fontSize:12,padding:"12px 0"}}>Bu sınıfta öğrenci yok</div>}
    </div>;
  };
  // O dönemde herhangi bir sınıfta DİP notu girilmiş olan dersler + manuel eklenenler
  const getLessonsWithPerfForTerm=(term)=>{
    const lessonIdsWithExam=new Set(exams.filter(ex=>String(ex.term)===String(term)).map(ex=>String(ex.lessonId)));
    const lessonIdsWithScore=new Set();
    Object.entries(perfScores).forEach(([clsId,clsData])=>{
      const termData=clsData[`term${term}`]||{};
      const hasAny=Object.values(termData).some(stData=>typeof stData==="object"&&Object.values(stData).some(v=>v!=null&&v!==""));
      if(hasAny){
        exams.filter(ex=>String(ex.term)===String(term)&&String(ex.classId)===String(clsId)).forEach(ex=>lessonIdsWithScore.add(String(ex.lessonId)));
      }
    });
    // Manuel eklenen dersler (openLessons state'inden)
    const manualIds=new Set(
      Object.keys(openLessons)
        .filter(k=>k.startsWith(`perf_${term}_`))
        .map(k=>k.replace(`perf_${term}_`,""))
    );
    const allIds=new Set([...lessonIdsWithExam,...lessonIdsWithScore,...manualIds]);
    return lessons.filter(l=>allIds.has(String(l.id))).sort((a,b)=>a.name.localeCompare(b.name,"tr"));
  };
  return <div>
    {/* Dönem klasörleri */}
    <div style={{padding:"8px 12px"}}>
      {[["1","#3B82F6"],["2","#10B981"]].map(([t,col])=>{
        const termLessons=getLessonsWithPerfForTerm(t);
        return (
        <div key={t} style={{marginBottom:10}}>
          <button onClick={()=>toggleTerm(t)} style={{width:"100%",display:"flex",alignItems:"center",gap:8,background:openTerms[t]?col+"18":T.surface,border:`1px solid ${col}44`,borderRadius:openTerms[t]?"12px 12px 0 0":12,padding:"10px 14px",cursor:"pointer",fontFamily:"inherit",textAlign:"left",transition:"border-radius 0.15s"}}>
            <span style={{fontSize:16}}>{openTerms[t]?"📂":"📁"}</span>
            <span style={{color:col,fontSize:13,fontWeight:800,flex:1}}>{t}. Dönem Ders İçi Performans</span>
            <span style={{background:col+"22",color:col,borderRadius:99,padding:"2px 9px",fontSize:11,fontWeight:700}}>{termLessons.length}</span>
            <span style={{color:col,fontSize:16,fontWeight:700,display:"inline-block",transform:openTerms[t]?"rotate(90deg)":"rotate(0deg)",transition:"transform 0.2s"}}>›</span>
          </button>
          {openTerms[t]&&<div style={{border:`1px solid ${col}44`,borderTop:"none",borderRadius:"0 0 12px 12px",padding:"8px 8px 4px",background:T.card}}>
            {termLessons.length===0
              ?<div style={{textAlign:"center",color:T.textMuted,fontSize:12,padding:"16px 0 8px"}}>Bu dönem için kayıt yok<br/><span style={{fontSize:11}}>Aşağıdan ders ekleyebilirsin</span></div>
              :termLessons.map(les=>{
                const lkey=`perf_${t}_${les.id}`;
                const isOpen=openLessons[lkey];
                return <div key={les.id} style={{marginBottom:6}}>
                  <div style={{width:"100%",display:"flex",alignItems:"center",gap:8,background:isOpen?T.accentDim:T.surface,border:`1px solid ${T.border}`,borderRadius:isOpen?"10px 10px 0 0":10,overflow:"hidden"}}>
                                        <button onClick={()=>{
                      toggleLesson(lkey);
                      setSelTerm(t);setSelLesson(String(les.id));
                    }} style={{flex:1,display:"flex",alignItems:"center",gap:8,padding:"8px 12px",cursor:"pointer",fontFamily:"inherit",textAlign:"left",background:"none",border:"none"}}>
                      <span style={{fontSize:14}}>{isOpen?"📂":"📁"}</span>
                      <span style={{color:T.accent,fontSize:12,fontWeight:700,flex:1}}>{les.name}</span>
                    </button>
                    <button onClick={e=>{e.stopPropagation();setSelTerm(t);setSelLesson(String(les.id));setCountSheet(true);}}
                      style={{background:T.toggleBg,color:T.textMuted,borderRadius:6,padding:"4px 8px",fontSize:10,fontWeight:700,border:`1px solid ${T.border}`,cursor:"pointer",fontFamily:"inherit",margin:"0 4px",flexShrink:0}}>
                      ⚙ DİP
                    </button>
                    <button onClick={e=>{e.stopPropagation();setConfirmDelPerf({term:t,lesId:String(les.id),name:les.name});}}
                      style={{background:T.dangerDim,color:T.danger,borderRadius:6,padding:"4px 7px",fontSize:12,fontWeight:700,border:`1px solid ${T.danger}44`,cursor:"pointer",fontFamily:"inherit",marginRight:4,flexShrink:0}}>
                      🗑
                    </button>
                    <button onClick={()=>{
                      toggleLesson(lkey);
                      setSelTerm(t);setSelLesson(String(les.id));
                    }} style={{background:"none",border:"none",cursor:"pointer",padding:"8px 10px 8px 4px",color:T.accent,fontSize:14,fontWeight:700,display:"inline-block",transform:isOpen?"rotate(90deg)":"rotate(0deg)",transition:"transform 0.2s",flexShrink:0}}>›</button>
                  </div>
                  {isOpen&&<div style={{border:`1px solid ${T.border}`,borderTop:"none",borderRadius:"0 0 10px 10px",padding:"8px 10px",background:T.bg}}>
                    {/* Sınıf seçimi */}
                    <div style={{display:"flex",gap:5,overflowX:"auto",marginBottom:8,paddingBottom:2}}>
                      {sortedClasses.map(c=>(
                        <button key={c.id} onClick={()=>setSelClass(String(c.id))}
                          style={{...btnSm(selClass===String(c.id)?T.accent:T.surface,selClass===String(c.id)?"#fff":T.textSub),border:`1px solid ${selClass===String(c.id)?T.accent:T.border}`,flexShrink:0,fontSize:11}}>
                          {c.grade}/{c.branch}
                        </button>
                      ))}
                    </div>
                    {selClass?renderDersContent(String(les.id)):<div style={{textAlign:"center",color:T.textMuted,fontSize:12,padding:"12px 0"}}>Sınıf seçin</div>}
                  </div>}
                </div>;
              })
            }
            {/* + Ders Ekle */}
            {(()=>{
              const existingIds=new Set(termLessons.map(l=>String(l.id)));
              const availableLessons=lessons.filter(l=>!existingIds.has(String(l.id))).sort((a,b)=>a.name.localeCompare(b.name,"tr"));
              const pickerOpen=showPerfLessonPicker===t;
              return <>
                <button onClick={()=>setShowPerfLessonPicker(pickerOpen?null:t)}
                  style={{width:"100%",display:"flex",alignItems:"center",justifyContent:"center",gap:6,padding:"8px",background:pickerOpen?T.accentDim:"none",border:`1px dashed ${T.accent}66`,borderRadius:9,cursor:"pointer",fontFamily:"inherit",marginTop:4,marginBottom:4}}>
                  <span style={{color:T.accent,fontSize:13,fontWeight:700}}>+ Ders Ekle</span>
                </button>
                {pickerOpen&&<div style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:10,padding:"8px",marginBottom:6,maxHeight:200,overflowY:"auto"}}>
                  {availableLessons.length===0
                    ?<div style={{color:T.textMuted,fontSize:12,textAlign:"center",padding:"8px"}}>Tüm dersler zaten ekli</div>
                    :availableLessons.map(les=>(
                      <button key={les.id} onClick={()=>{
                        const lkey=`perf_${t}_${les.id}`;
                        const firstCls=sortedClasses[0];
                        setOpenLessons(s=>({...s,[lkey]:true}));
                        setSelTerm(t);setSelLesson(String(les.id));
                        setSelClass(firstCls?String(firstCls.id):null);
                        setShowPerfLessonPicker(null);
                      }}
                        style={{width:"100%",display:"flex",alignItems:"center",gap:8,padding:"8px 10px",background:"none",border:"none",cursor:"pointer",fontFamily:"inherit",borderRadius:7,textAlign:"left"}}>
                        <span style={{fontSize:14}}>📁</span>
                        <span style={{color:T.text,fontSize:12,fontWeight:600}}>{les.name}</span>
                      </button>
                    ))
                  }
                </div>}
              </>;
            })()}
          </div>}
        </div>
        );
      })}
    </div>
    {/* Sayı ayar sheet */}
    {confirmDelPerf&&<div style={{position:"fixed",inset:0,zIndex:500,display:"flex",alignItems:"center",justifyContent:"center",padding:"0 24px"}}>
      <div style={{position:"absolute",inset:0,background:"rgba(0,0,0,0.65)"}} onClick={()=>setConfirmDelPerf(null)}/>
      <div style={{position:"relative",background:"#0F1628",borderRadius:20,padding:"24px 20px",width:"100%",maxWidth:340,boxShadow:"0 4px 24px rgba(0,0,0,0.6)"}}>
        <div style={{fontSize:34,textAlign:"center",marginBottom:10}}>🗑</div>
        <div style={{color:"#F0F4FF",fontSize:15,textAlign:"center",lineHeight:1.5,marginBottom:6}}>
          <b style={{color:"#F45656"}}>{confirmDelPerf.name}</b>
        </div>
        <div style={{color:"#9AABCC",fontSize:13,textAlign:"center",lineHeight:1.5,marginBottom:20}}>
          {confirmDelPerf.term}. Dönem Ders İçi Performans kaydı silinecek.<br/>
          <span style={{color:"#F45656",fontWeight:700}}>Not verileri de silinir.</span>
        </div>
        <div style={{display:"flex",gap:8}}>
          <button style={{flex:1,background:"#1E2D4A",color:"#9AABCC",border:"1px solid #253354",borderRadius:10,padding:"11px 18px",cursor:"pointer",fontSize:14,fontWeight:700,fontFamily:"inherit"}} onClick={()=>setConfirmDelPerf(null)}>İptal</button>
          <button style={{flex:1,background:"#F45656",color:"#fff",border:"none",borderRadius:10,padding:"11px 18px",cursor:"pointer",fontSize:14,fontWeight:700,fontFamily:"inherit"}} onClick={()=>{
            const{term,lesId}=confirmDelPerf;
            const lkey=`perf_${term}_${lesId}`;
            setOpenLessons(s=>{const n={...s};delete n[lkey];return n;});
            setPerfScores(ps=>{
              const next={...ps};
              Object.keys(next).forEach(clsId=>{
                const tk=`term${term}`;
                if(next[clsId]&&next[clsId][tk]){
                  const td={...next[clsId][tk]};
                  Object.keys(td).forEach(stId=>{
                    if(td[stId]){
                      const sd={...td[stId]};
                      Object.keys(sd).forEach(k=>{if(k.startsWith(`${lesId}_`)||k===lesId)delete sd[k];});
                      td[stId]=sd;
                    }
                  });
                  next[clsId]={...next[clsId],[tk]:td};
                }
              });
              return next;
            });
            setConfirmDelPerf(null);
          }}>Evet, Sil</button>
        </div>
      </div>
    </div>}
    {countSheet&&(()=>{
      const NUM_OPTS=[1,2,3,4,5,6];
      const termLessonsAll=getLessonsWithPerfForTerm(selTerm);
      return <Sheet title="⚙ DİP Sayısı Ayarla" onClose={()=>setCountSheet(false)}>
        {/* Sekme */}
        <div style={{display:"flex",gap:4,marginBottom:12,background:T.toggleBg,borderRadius:10,padding:4}}>
          {[["lesson","Bu Ders"],["all","Tüm Ders & Sınıf"]].map(([v,lbl])=>(
            <button key={v} onClick={()=>setDipTab(v)}
              style={{flex:1,padding:"7px 0",borderRadius:8,border:"none",cursor:"pointer",fontFamily:"inherit",fontSize:12,fontWeight:700,background:dipTab===v?T.accent:"none",color:dipTab===v?"#fff":T.textSub}}>
              {lbl}
            </button>
          ))}
        </div>
        {dipTab==="lesson"&&<>
          {selClass&&<>
            <div style={{background:T.accentDim,borderRadius:10,padding:"8px 12px",marginBottom:12,display:"flex",alignItems:"center",gap:8}}>
              <span style={{color:T.accent,fontSize:12,fontWeight:700}}>
                {(()=>{const cl=classes.find(x=>x.id===selClass);return cl?`${cl.grade}/${cl.branch}`:"";})()}
              </span>
              <span style={{color:T.textSub,fontSize:11}}>{selTerm}. Dönem — şu an: <b style={{color:T.text}}>{numPerf} DİP</b></span>
            </div>
            <div style={{color:T.textSub,fontSize:11,fontWeight:700,marginBottom:6,textTransform:"uppercase",letterSpacing:"0.05em"}}>Bu Sınıf İçin</div>
            <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:16}}>
              {NUM_OPTS.map(n=>(
                <button key={n} onClick={()=>setPerfCount(selClass,selTerm,n,selLesson)}
                  style={{background:numPerf===n?T.accent:T.toggleBg,color:numPerf===n?"#fff":T.textSub,border:`2px solid ${numPerf===n?T.accent:T.border}`,borderRadius:9,padding:"14px 20px",cursor:"pointer",fontFamily:"inherit",fontSize:16,fontWeight:700}}>
                  {n}
                </button>
              ))}
            </div>
            <div style={{height:1,background:T.border,margin:"4px 0 14px"}}/>
          </>}
          <div style={{color:T.textSub,fontSize:11,fontWeight:700,marginBottom:6,textTransform:"uppercase",letterSpacing:"0.05em"}}>Tüm Sınıflara Uygula</div>
          <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:6}}>
            {NUM_OPTS.map(n=>(
              <button key={n} onClick={()=>{
                sortedClasses.forEach(cl=>setPerfCount(cl.id,selTerm,n,selLesson));
                setPerfApplied(true);setTimeout(()=>setPerfApplied(false),2000);
              }}
                style={{background:T.accentDim,color:T.accent,border:`2px solid ${T.accent}44`,borderRadius:9,padding:"12px 18px",cursor:"pointer",fontFamily:"inherit",fontSize:15,fontWeight:600}}>
                {n}
              </button>
            ))}
          </div>
          {perfApplied&&<div style={{background:T.successDim,color:T.success,borderRadius:8,padding:"6px 12px",fontSize:12,fontWeight:700,marginBottom:8}}>✅ Tüm sınıflara uygulandı!</div>}
          {sortedClasses.length>0&&<>
            <div style={{height:1,background:T.border,margin:"4px 0 12px"}}/>
            <div style={{color:T.textSub,fontSize:11,fontWeight:700,marginBottom:8,textTransform:"uppercase",letterSpacing:"0.05em"}}>Sınıf Bazlı Ayar</div>
            <div style={{display:"flex",flexDirection:"column",gap:6,maxHeight:240,overflowY:"auto"}}>
              {sortedClasses.map(cl=>{
                const cur=getPerfCount(cl.id,selTerm,selLesson);
                return <div key={cl.id} style={{display:"flex",alignItems:"center",gap:8,background:T.card,borderRadius:9,padding:"8px 10px",border:`1px solid ${cl.id===selClass?T.accent:T.border}`}}>
                  <span style={{color:cl.id===selClass?T.accent:T.text,fontSize:13,fontWeight:700,minWidth:40}}>{cl.grade}/{cl.branch}</span>
                  <div style={{display:"flex",gap:4,flex:1,flexWrap:"wrap"}}>
                    {NUM_OPTS.map(n=>(
                      <button key={n} onClick={()=>setPerfCount(cl.id,selTerm,n,selLesson)}
                        style={{background:cur===n?T.accent:T.surface,color:cur===n?"#fff":T.textSub,border:`1px solid ${cur===n?T.accent:T.border}`,borderRadius:6,padding:"4px 10px",cursor:"pointer",fontFamily:"inherit",fontSize:13,fontWeight:cur===n?700:400}}>
                        {n}
                      </button>
                    ))}
                  </div>
                  <span style={{color:T.textMuted,fontSize:10,minWidth:28,textAlign:"right"}}>{cur} DİP</span>
                </div>;
              })}
            </div>
          </>}
        </>}
        {dipTab==="all"&&<>
          <div style={{background:T.toggleBg,borderRadius:10,padding:"8px 12px",marginBottom:10}}>
            <div style={{color:T.textSub,fontSize:11,fontWeight:700,marginBottom:6,textTransform:"uppercase",letterSpacing:"0.05em"}}>Hepsine Uygula</div>
            <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
              {NUM_OPTS.map(n=>(
                <button key={n} onClick={()=>{
                  termLessonsAll.forEach(les=>sortedClasses.forEach(cl=>setPerfCount(cl.id,selTerm,n,les.id)));
                  setPerfApplied(true);setTimeout(()=>setPerfApplied(false),2000);
                }}
                  style={{background:T.accentDim,color:T.accent,border:`2px solid ${T.accent}44`,borderRadius:9,padding:"10px 16px",cursor:"pointer",fontFamily:"inherit",fontSize:15,fontWeight:600}}>
                  {n}
                </button>
              ))}
            </div>
            {perfApplied&&<div style={{color:T.success,fontSize:11,fontWeight:700,marginTop:6}}>✅ Tümüne uygulandı!</div>}
          </div>
          {termLessonsAll.length===0
            ?<div style={{color:T.textMuted,fontSize:12,textAlign:"center",padding:"20px"}}>Önce dönem klasörünü açıp ders ekleyin</div>
            :<div style={{display:"flex",flexDirection:"column",gap:8,maxHeight:420,overflowY:"auto"}}>
              {termLessonsAll.map(les=>(
                <div key={les.id} style={{background:T.card,borderRadius:10,border:`1px solid ${String(les.id)===String(selLesson)?T.accent:T.border}`,overflow:"hidden"}}>
                  <div style={{background:T.accentDim,padding:"6px 12px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                    <span style={{color:T.accent,fontSize:12,fontWeight:700}}>{les.name}</span>
                    <div style={{display:"flex",gap:3,alignItems:"center"}}>
                      {NUM_OPTS.map(n=>(
                        <button key={n} onClick={()=>sortedClasses.forEach(cl=>setPerfCount(cl.id,selTerm,n,les.id))}
                          style={{background:T.accent+"33",color:T.accent,border:"none",borderRadius:5,padding:"2px 7px",cursor:"pointer",fontFamily:"inherit",fontSize:11,fontWeight:700}}>
                          {n}
                        </button>
                      ))}
                      <span style={{color:T.textMuted,fontSize:9,marginLeft:2}}>tümü</span>
                    </div>
                  </div>
                  {sortedClasses.map(cl=>{
                    const cur=getPerfCount(cl.id,selTerm,les.id);
                    return <div key={cl.id} style={{display:"flex",alignItems:"center",gap:8,padding:"5px 12px",borderTop:`1px solid ${T.border}`}}>
                      <span style={{color:String(cl.id)===String(selClass)?T.accent:T.text,fontSize:12,fontWeight:700,minWidth:36}}>{cl.grade}/{cl.branch}</span>
                      <div style={{display:"flex",gap:3,flex:1}}>
                        {NUM_OPTS.map(n=>(
                          <button key={n} onClick={()=>setPerfCount(cl.id,selTerm,n,les.id)}
                            style={{background:cur===n?T.accent:T.surface,color:cur===n?"#fff":T.textSub,border:`1px solid ${cur===n?T.accent:T.border}`,borderRadius:6,padding:"4px 8px",cursor:"pointer",fontFamily:"inherit",fontSize:12,fontWeight:cur===n?700:400,minWidth:28}}>
                            {n}
                          </button>
                        ))}
                      </div>
                      <span style={{color:T.textMuted,fontSize:10,minWidth:30,textAlign:"right"}}>{cur} DİP</span>
                    </div>;
                  })}
                </div>
              ))}
            </div>
          }
        </>}
        <button style={{...btn(T.success),marginTop:12}} onClick={()=>setCountSheet(false)}>✓ Kapat</button>
      </Sheet>;
    })()}
    {/* Otomatik dağıtım sheet */}
    {autoSheet&&<Sheet title="⚡ Otomatik DİP Dağıtımı" onClose={()=>setAutoSheet(false)}>
      {(()=>{
        const lesName = selLesson ? (lessons.find(l=>String(l.id)===String(selLesson))?.name||"Seçili Ders") : "Tüm Dersler";
        const termLabel = selTerm==="1"?"1. Dönem":"2. Dönem";
        const dipCount = selClass ? getPerfCount(selClass,selTerm,selLesson||undefined) : 0;
        const lessonExams = exams.filter(ex=>String(ex.classId)===String(selClass)&&String(ex.term)===String(selTerm)&&(selLesson?String(ex.lessonId)===String(selLesson):true));
        return <>
          <div style={{background:T.accentDim,borderRadius:10,padding:"10px 14px",marginBottom:14}}>
            <div style={{color:T.accent,fontSize:12,fontWeight:700,marginBottom:4}}>📊 {lesName} — {termLabel}</div>
            <div style={{color:T.accent,fontSize:11,lineHeight:1.6}}>
              {lessonExams.length} yazılı sınav bulundu · {dipCount} DİP notu doldurulacak<br/>
              Her öğrencinin <b>{termLabel} yazılı ortalaması</b> kriter eşiğiyle karşılaştırılır, eşleşen kriterdeki puan tüm DİP notlarına atanır.
            </div>
            {lessonExams.length===0&&<div style={{color:T.warn,fontSize:11,marginTop:6,background:T.warnDim,borderRadius:6,padding:"4px 8px"}}>⚠ Bu dönem için yazılı sınav bulunamadı — ortalama hesaplanamaz, kriterler eşleşmeyebilir.</div>}
          </div>
        </>;
      })()}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
        <div style={{color:T.text,fontSize:13,fontWeight:700}}>Kriterler</div>
        <button style={btnSm(T.accentDim,T.accent)} onClick={()=>setAutoCritDraft({id:uid(),condition:"gte",value:90,scoreType:"fixed",fixedScore:100,minScore:80,maxScore:90,value2:100})}>+ Kriter Ekle</button>
      </div>
      {autoCriteria.length===0&&<div style={{color:T.textMuted,fontSize:12,textAlign:"center",padding:"16px 0"}}>Henüz kriter eklenmedi</div>}
      {autoCriteria.map((c,idx)=>(
        <div key={c.id} style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:10,padding:"10px 12px",marginBottom:6}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
            <div style={{color:T.accent,fontSize:12,fontWeight:700}}>Kriter {idx+1}</div>
            <div style={{display:"flex",gap:4}}>
              <button style={btnSm(T.toggleBg,T.textSub)} onClick={()=>setAutoCritDraft({...c})}>✎</button>
              <button style={btnSm(T.dangerDim,T.danger)} onClick={()=>setAutoCriteria(prev=>prev.filter(x=>x.id!==c.id))}>✕</button>
            </div>
          </div>
          <div style={{color:T.text,fontSize:11,lineHeight:1.6}}>
            {c.condition==="gte"?`Yazılı ort. ≥ ${c.value}`:c.condition==="lt"?`Yazılı ort. < ${c.value}`:`Yazılı ort. ${c.value}–${c.value2} arası`}
            {" → "}
            {c.scoreType==="fixed"?`Sabit ${c.fixedScore} puan`:`${c.minScore}–${c.maxScore} arası rastgele`}
          </div>
        </div>
      ))}
      {autoCritDraft&&<Sheet title="Kriter Düzenle" onClose={()=>setAutoCritDraft(null)}>
        <Field label="Koşul">
          <select style={inp} value={autoCritDraft.condition} onChange={e=>setAutoCritDraft(d=>({...d,condition:e.target.value}))}>
            <option value="gte">Yazılı ortalaması ≥</option>
            <option value="lt">Yazılı ortalaması &lt;</option>
            <option value="between">Yazılı ortalaması arasında</option>
          </select>
        </Field>
        <div style={{display:"flex",gap:8}}>
          <Field label="Eşik 1" style={{flex:1}}><input style={inp} type="number" inputMode="numeric" pattern="[0-9]*" min={0} max={100} value={autoCritDraft.value} onFocus={e=>e.target.select()} onChange={e=>setAutoCritDraft(d=>({...d,value:Number(e.target.value)}))}/></Field>
          {autoCritDraft.condition==="between"&&<Field label="Eşik 2" style={{flex:1}}><input style={inp} type="number" inputMode="numeric" pattern="[0-9]*" min={0} max={100} value={autoCritDraft.value2||100} onFocus={e=>e.target.select()} onChange={e=>setAutoCritDraft(d=>({...d,value2:Number(e.target.value)}))}/></Field>}
        </div>
        <Field label="Not Tipi">
          <div style={{display:"flex",gap:6}}>
            <button onClick={()=>setAutoCritDraft(d=>({...d,scoreType:"fixed"}))} style={{...btnSm(autoCritDraft.scoreType==="fixed"?T.accent:T.toggleBg,autoCritDraft.scoreType==="fixed"?"#fff":T.textSub),flex:1,border:`1px solid ${autoCritDraft.scoreType==="fixed"?T.accent:T.border}`}}>Sabit Puan</button>
            <button onClick={()=>setAutoCritDraft(d=>({...d,scoreType:"random"}))} style={{...btnSm(autoCritDraft.scoreType==="random"?T.accent:T.toggleBg,autoCritDraft.scoreType==="random"?"#fff":T.textSub),flex:1,border:`1px solid ${autoCritDraft.scoreType==="random"?T.accent:T.border}`}}>Rastgele Aralık</button>
          </div>
        </Field>
        {autoCritDraft.scoreType==="fixed"&&<Field label="Sabit Puan"><input style={inp} type="number" inputMode="numeric" pattern="[0-9]*" min={0} max={100} value={autoCritDraft.fixedScore} onFocus={e=>e.target.select()} onChange={e=>setAutoCritDraft(d=>({...d,fixedScore:Number(e.target.value)}))}/></Field>}
        {autoCritDraft.scoreType==="random"&&<div style={{display:"flex",gap:8}}>
          <Field label="Min" style={{flex:1}}><input style={inp} type="number" inputMode="numeric" pattern="[0-9]*" min={0} max={100} value={autoCritDraft.minScore} onFocus={e=>e.target.select()} onChange={e=>setAutoCritDraft(d=>({...d,minScore:Number(e.target.value)}))}/></Field>
          <Field label="Max" style={{flex:1}}><input style={inp} type="number" inputMode="numeric" pattern="[0-9]*" min={0} max={100} value={autoCritDraft.maxScore} onFocus={e=>e.target.select()} onChange={e=>setAutoCritDraft(d=>({...d,maxScore:Number(e.target.value)}))}/></Field>
        </div>}
        <div style={{display:"flex",gap:8}}>
          <button style={{...btn(T.toggleBg,T.textSub),flex:1}} onClick={()=>setAutoCritDraft(null)}>İptal</button>
          <button style={{...btn(T.accent),flex:2}} onClick={()=>{
            setAutoCriteria(prev=>{const exists=prev.find(x=>x.id===autoCritDraft.id);return exists?prev.map(x=>x.id===autoCritDraft.id?autoCritDraft:x):[...prev,autoCritDraft];});
            setAutoCritDraft(null);
          }}>Kaydet</button>
        </div>
      </Sheet>}
      {autoCriteria.length>0&&<button style={{...btn(T.success),marginTop:8}} onClick={applyAutoCriteria}>⚡ Uygula ({cls.length} öğrenci × {selClass?getPerfCount(selClass,selTerm,selLesson||undefined):0} DİP notu)</button>}
      <button style={{...btn(T.toggleBg,T.textSub),marginTop:8}} onClick={()=>setAutoSheet(false)}>Kapat</button>
    </Sheet>}
  </div>;
}

// Proje Notu Sekmesi
function ProjeTab({classes,students,projScores,setProjScores,homeworks,setHomeworks,academicYear,lessons,exams}){
  const T=useT();const{inp,btn,btnSm}=useStyles();
  const sortedClassesInit=[...classes].sort((a,b)=>a.grade-b.grade||a.branch.localeCompare(b.branch));
  const firstCls=sortedClassesInit[0];
  const[selClass,setSelClass]=usePersist("ogretmen_proj_selclass",()=>firstCls?String(firstCls.id):null);
  const[openTerms,setOpenTerms]=usePersist("ogretmen_proj_open_terms",{"1":false,"2":false});
  const[openLessons,setOpenLessons]=usePersist("ogretmen_proj_open_lessons",{});
  // selTerm ve selLesson: persist'teki açık klasörden türet
  const initTermLesson=(()=>{
    const keys=Object.keys(openLessons||{}).filter(k=>openLessons[k]);
    for(const k of keys){const m=k.match(/^proj_(\d+)_(\d+)$/);if(m)return{term:m[1],lesson:m[2]};}
    return{term:"1",lesson:null};
  })();
  const[selTerm,setSelTerm]=useState(initTermLesson.term);
  const[selLesson,setSelLesson]=useState(initTermLesson.lesson);
  const toggleTerm=t=>setOpenTerms(s=>({...s,[t]:!s[t]}));
  const toggleLesson=key=>setOpenLessons(s=>({...s,[key]:!s[key]}));
  const[countSheet,setCountSheet]=useState(false);
  const[projApplied,setProjApplied]=useState(false);
  const[projCounts,setProjCounts]=usePersist("ogretmen_proj_counts",{});
  const[showProjLessonPicker,setShowProjLessonPicker]=useState(null);
  const[projTab,setProjTab]=usePersist("ogretmen_proj_tab","lesson");
  const[confirmDelProj,setConfirmDelProj]=useState(null); // {term,lesId,name}
  // Tek seferlik migration: eski p1/p2 formatını ders bazlı formata taşı
  useEffect(()=>{
    const migrated=JSON.parse(localStorage.getItem("ogretmen_proj_migrated_v2")||"false");
    if(migrated)return;
    setProjScores(ps=>{
      const next={...ps};
      let changed=false;
      Object.entries(next).forEach(([clsId,clsData])=>{
        [1,2].forEach(term=>{
          const tk=`term${term}`;
          const termD=clsData[tk];
          if(!termD)return;
          const clsLessons=[...new Set(exams.filter(ex=>String(ex.classId)===String(clsId)&&String(ex.term)===String(term)).map(ex=>String(ex.lessonId)))];
          if(clsLessons.length!==1)return;
          const lesId=clsLessons[0];
          const newTermD={...termD};
          let termChanged=false;
          Object.entries(termD).forEach(([stId,stData])=>{
            if(typeof stData!=="object")return;
            const hasOld=Object.keys(stData).some(k=>/^p\d+$/.test(k));
            if(!hasOld)return;
            const newStData={...stData};
            Object.entries(stData).forEach(([k,v])=>{
              const m=k.match(/^p(\d+)$/);
              if(m&&v!=null&&v!==""){
                const newKey=`${lesId}_p${m[1]}`;
                if(!newStData[newKey]){newStData[newKey]=v;termChanged=true;changed=true;}
              }
            });
            newTermD[stId]=newStData;
          });
          if(termChanged)next[clsId]={...clsData,[tk]:newTermD};
        });
      });
      if(changed)localStorage.setItem("ogretmen_proj_migrated_v2","true");
      return changed?next:ps;
    });
    localStorage.setItem("ogretmen_proj_migrated_v2","true");
  },[]);
  const sortedClasses=[...classes].sort((a,b)=>a.grade-b.grade||a.branch.localeCompare(b.branch));
  const getProjCount=(clsId,term,lessonId)=>{const lk=lessonId?`${clsId}_${term}_${lessonId}`:null;const gk=`${clsId}_${term}`;return(lk&&projCounts[lk]!=null?projCounts[lk]:projCounts[gk])||1;};
  const setProjCount=(clsId,term,n,lessonId)=>{const k=lessonId?`${clsId}_${term}_${lessonId}`:`${clsId}_${term}`;setProjCounts(p=>({...p,[k]:n}));};
  const cls=selClass?sortStudents(students.filter(s=>String(s.classId)===String(selClass)),"schoolNo"):[];
  const numProj=selClass?getProjCount(selClass,selTerm,selLesson):1;
  // Dönem tarih aralıklarını belirle
  const sem1Start=academicYear?.sem1Start||"2025-09-01";
  const sem1End=academicYear?.sem1End||"2026-01-31";
  const sem2Start=academicYear?.sem2Start||"2026-02-01";
  const sem2End=academicYear?.sem2End||"2026-06-30";
  const getTermForDate=date=>{if(!date)return null;if(date>=sem1Start&&date<=sem1End)return"1";if(date>=sem2Start&&date<=sem2End)return"2";return null;};
  // homeworks değişince: yeni eklenen proje ödevlerine mevcut projScores notlarını aktar
  useEffect(()=>{
    homeworks.forEach(hw=>{
      if(hw.type!=="proje"||!hw.dueDate||!hw.lessonId)return;
      const term=getTermForDate(hw.dueDate);if(!term)return;
      const lesId=String(hw.lessonId);
      const hwClassIds=hw.classIds&&hw.classIds.length>0?hw.classIds:[hw.classId].filter(Boolean);
      hwClassIds.forEach(clsId=>{
        // Bu sınıf+dönem+ders için kaçıncı ödev?
        const allHws=homeworks.filter(h=>{
          if(h.type!=="proje"||!h.dueDate)return false;
          if(String(getTermForDate(h.dueDate))!==term)return false;
          const hIds=h.classIds&&h.classIds.length>0?h.classIds:[h.classId].filter(Boolean);
          if(!hIds.map(String).includes(String(clsId)))return false;
          if(h.lessonId&&String(h.lessonId)!==lesId)return false;
          return true;
        }).sort((a,b)=>(a.dueDate||"")>(b.dueDate||"")?1:-1);
        const no=allHws.findIndex(h=>h.id===hw.id)+1;
        if(no<1)return;
        const k=`${lesId}_p${no}`;
        // projScores'ta bu notun var olduğu öğrencileri bul ve ödeve yaz
        const termD=(projScores[String(clsId)]||{})[`term${term}`]||{};
        let needsUpdate=false;
        const newGrades={...hw.grades};
        Object.entries(termD).forEach(([stId,stData])=>{
          if(typeof stData!=="object")return;
          const val=stData[k];
          if(val==null||val==="")return;
          // Ödevde bu öğrencinin notu yoksa projScores'tan aktar
          if(newGrades[stId]?.score==null){
            newGrades[stId]={...(newGrades[stId]||{}),score:Number(val)};
            needsUpdate=true;
          }
        });
        if(needsUpdate){
          setHomeworks(hs=>hs.map(h=>h.id===hw.id?{...h,grades:newGrades}:h));
        }
      });
    });
  },[homeworks.length]); // Sadece ödev sayısı değişince çalış
  // Ödev takibindeki proje ödevlerinden notları getir — ders+sınıf+dönem+sıra bazında
  const getProjHwsForLesson=(clsId,term,lessonId)=>homeworks.filter(hw=>{
    if(hw.type!=="proje")return false;
    if(!hw.dueDate)return false;
    if(String(getTermForDate(hw.dueDate))!==String(term))return false;
    const hwClassIds=hw.classIds&&hw.classIds.length>0?hw.classIds:[hw.classId].filter(Boolean);
    if(!hwClassIds.map(String).includes(String(clsId)))return false;
    // Ders eşleşmesi: lessonId varsa kontrol et
    if(lessonId&&hw.lessonId&&String(hw.lessonId)!==String(lessonId))return false;
    return true;
  }).sort((a,b)=>(a.dueDate||"")>(b.dueDate||"")?1:-1);

  const getScore=(clsId,term,stId,no)=>{
    // Önce ödev takibinde bu derse ait ödev var mı?
    const projHws=getProjHwsForLesson(clsId,term,selLesson);
    if(projHws.length>=no){
      const hw=projHws[no-1];
      const g=hw?.grades?.[stId];
      if(g?.score!=null)return String(g.score);
    }
    // Manuel girilen notu kullan — ders bazlı key
    const lesKey=selLesson?`${selLesson}_p${no}`:`p${no}`;
    return(projScores[clsId]||{})[`term${term}`]?.[stId]?.[lesKey]??"";
  };
  const setScore=(clsId,term,stId,no,val)=>{
    const lesKey=selLesson?`${selLesson}_p${no}`:`p${no}`;
    setProjScores(ps=>{
      const prev=ps[clsId]||{};
      const termKey=`term${term}`;
      const termData=prev[termKey]||{};
      const stData=termData[stId]||{};
      return{...ps,[clsId]:{...prev,[termKey]:{...termData,[stId]:{...stData,[lesKey]:val}}}};
    });
    // Ödev takibine de yaz — bu derse ait ödev varsa
    const projHws=getProjHwsForLesson(clsId,term,selLesson);
    if(no<=projHws.length){
      const hw=projHws[no-1];
      const newScore=val===""?null:Number(val);
      setHomeworks(hs=>hs.map(h=>h.id===hw.id?{...h,grades:{...h.grades,[stId]:{...(h.grades?.[stId]||{}),score:newScore}}}:h));
    }
  };
  const sortedAllLessons=[...(lessons||[])].sort((a,b)=>a.name.localeCompare(b.name,"tr"));
  // O dönemde proje ödevi veya notu olan dersler
  const getLessonsWithProjForTerm=(term)=>{
    const lessonIdsWithHw=new Set();
    homeworks.filter(hw=>{
      if(hw.type!=="proje")return false;
      if(!hw.dueDate)return false;
      return String(getTermForDate(hw.dueDate))===String(term);
    }).forEach(hw=>{if(hw.lessonId)lessonIdsWithHw.add(String(hw.lessonId));});
    const lessonIdsWithScore=new Set();
    Object.entries(projScores).forEach(([clsId,clsData])=>{
      const termData=clsData[`term${term}`]||{};
      const hasAny=Object.values(termData).some(stData=>typeof stData==="object"&&Object.values(stData).some(v=>v!=null&&v!==""));
      if(hasAny){exams.filter(ex=>String(ex.term)===String(term)&&String(ex.classId)===String(clsId)).forEach(ex=>lessonIdsWithScore.add(String(ex.lessonId)));}
    });
    const lessonIdsWithExam=new Set(exams.filter(ex=>String(ex.term)===String(term)).map(ex=>String(ex.lessonId)));
    // Manuel eklenenler
    const manualIds=new Set(
      Object.keys(openLessons)
        .filter(k=>k.startsWith(`proj_${term}_`))
        .map(k=>k.replace(`proj_${term}_`,""))
    );
    const allIds=new Set([...lessonIdsWithHw,...lessonIdsWithScore,...lessonIdsWithExam,...manualIds]);
    if(allIds.size===0)return[];
    return(lessons||[]).filter(l=>allIds.has(String(l.id))).sort((a,b)=>a.name.localeCompare(b.name,"tr"));
  };
  // Proje tablosu içeriği
  const renderProjeContent=(lesId)=>{
    if(!selClass||!selTerm)return null;
    const numProjLocal=selClass?getProjCount(selClass,selTerm,lesId):1;
    const getProjHwsLocal=(clsId,term)=>getProjHwsForLesson(clsId,term,lesId);
    const getScoreLocal=(clsId,term,stId,no)=>{
      // Önce manuel kaydedilmiş projScores'a bak (anlık güncelleme için)
      const k=lesId?`${lesId}_p${no}`:`p${no}`;
      const manual=(projScores[clsId]||{})[`term${term}`]?.[stId]?.[k];
      if(manual!=null&&manual!=="")return String(manual);
      // Sonra ödev takibine bak
      const projHws=getProjHwsLocal(clsId,term);
      if(projHws.length>=no){const hw=projHws[no-1];const g=hw?.grades?.[stId];if(g?.score!=null)return String(g.score);}
      return "";
    };
    const setScoreLocal=(clsId,term,stId,no,val)=>{
      const k=lesId?`${lesId}_p${no}`:`p${no}`;
      setProjScores(ps=>{const prev=ps[clsId]||{};const tk=`term${term}`;const td=prev[tk]||{};const sd=td[stId]||{};return{...ps,[clsId]:{...prev,[tk]:{...td,[stId]:{...sd,[k]:val}}}}});
      const projHws=getProjHwsLocal(clsId,term);
      if(no<=projHws.length){const hw=projHws[no-1];const ns=val===""?null:Number(val);setHomeworks(hs=>hs.map(h=>h.id===hw.id?{...h,grades:{...h.grades,[stId]:{...(h.grades?.[stId]||{}),score:ns}}}:h));}
    };
    return <div>
      <div style={{display:"flex",gap:6,padding:"4px 0 6px",alignItems:"center",justifyContent:"flex-end"}}>
        <div style={{color:T.textMuted,fontSize:10}}>📋 Ödev takibiyle entegre</div>
      </div>
      {cls.length>0?<>
        <div style={{background:T.accentDim,borderRadius:8,padding:"7px 12px",marginBottom:8,color:T.accent,fontSize:11}}>
          💡 Ödev takibindeki proje ödevleri otomatik yansır. Elle de girilebilir.
        </div>
        <div style={{overflowX:"auto"}}>
          <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
            <thead>
              <tr style={{background:T.tableAlt}}>
                <th style={{color:T.textSub,fontSize:10,padding:"6px 8px",textAlign:"left",fontWeight:700,borderBottom:`1px solid ${T.border}`}}>Öğrenci</th>
                {Array.from({length:numProjLocal},(_,i)=>(
