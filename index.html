  return <div>
    <PH title="Dışa Aktar" sub="CSV veya PDF olarak indir"/>
    <div style={{padding:16,display:"flex",flexDirection:"column",gap:12}}>
      {/* Kapsam seçimi */}
      <div style={{color:T.textSub,fontSize:11,textTransform:"uppercase",letterSpacing:"0.07em",fontWeight:700}}>Hangi Veriler?</div>
      {scopes.map(s=><div key={s.key} onClick={()=>setScope(s.key)}
        style={{display:"flex",alignItems:"center",gap:12,padding:"12px 14px",borderRadius:12,border:`2px solid ${scope===s.key?T.accent:T.border}`,background:scope===s.key?T.accentDim:T.card,cursor:"pointer",transition:"all 0.15s"}}>
        <span style={{fontSize:22}}>{s.icon}</span>
        <div style={{flex:1}}>
          <div style={{color:T.text,fontSize:13,fontWeight:700}}>{s.label}</div>
          <div style={{color:T.textSub,fontSize:11,marginTop:2}}>{s.sub}</div>
        </div>
        <div style={{width:20,height:20,borderRadius:99,border:`2px solid ${scope===s.key?T.accent:T.border}`,background:scope===s.key?T.accent:"none",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
          {scope===s.key&&<span style={{color:"#fff",fontSize:12}}>✓</span>}
        </div>
      </div>)}
      {/* Format butonları */}
      <div style={{color:T.textSub,fontSize:11,textTransform:"uppercase",letterSpacing:"0.07em",fontWeight:700,marginTop:8}}>Format</div>
      <div style={{display:"flex",gap:10}}>
        <button style={{...btn(fmt==="csv"?T.success:T.accentDim,fmt==="csv"?"#fff":T.accent),flex:1,padding:"14px 0",fontSize:15}}
          onClick={()=>handleExport("csv")}>
          {fmt==="csv"?"✓ İndirildi":"📊 CSV İndir"}
        </button>
        <button style={{...btn(fmt==="pdf"?T.success:T.purple,fmt==="pdf"?"#fff":"#fff"),flex:1,padding:"14px 0",fontSize:15}}
          onClick={()=>handleExport("pdf")}>
          {fmt==="pdf"?"✓ Açıldı":"📥 PDF Aktar"}
        </button>
      </div>
      {/* Bilgi kutusu */}
      <div style={{background:T.bg,border:`1px solid ${T.border}`,borderRadius:10,padding:"12px 14px"}}>
        <div style={{color:T.textSub,fontSize:11,lineHeight:1.7}}>
          <div>• <b style={{color:T.text}}>CSV</b> — Excel, Google Sheets ile açılır</div>
          <div>• <b style={{color:T.text}}>PDF</b> — Yeni sekmede açılır, tarayıcıdan yazdır / PDF kaydet</div>
          <div style={{marginTop:4,color:T.textMuted}}>UTF-8 kodlamalı · Türkçe karakterler desteklenir</div>
        </div>
      </div>
    </div>
  </div>;

const AY_MAP={ocak:0,şubat:1,subat:1,mart:2,nisan:3,mayis:4,mayıs:4,haziran:5,temmuz:6,agustos:7,ağustos:7,eylul:8,eylül:8,ekim:9,kasim:10,kasım:10,aralik:11,aralık:11};
function ayToMonth(s){const n=s?.toLowerCase().replace(/[\s\.]/g,"");return AY_MAP[n]??-1;}
function weeksBetween(d1,d2){
  const ms=new Date(d2)-new Date(d1);
  return Math.floor(ms/(7*86400000));
}
function getMondayOf(date){
  const d=new Date(date);
  const day=d.getDay();
  const diff=day===0?-6:1-day;
  d.setDate(d.getDate()+diff);
  d.setHours(0,0,0,0);
  return d;
}
function parseDate(s){const[y,m,d]=(s||"").split("-").map(Number);return new Date(y,m-1,d);}
function fmtDate(d){const AY=["Oca","Şub","Mar","Nis","May","Haz","Tem","Ağu","Eyl","Eki","Kas","Ara"];return`${d.getDate()} ${AY[d.getMonth()]}`;}
function weekRange(monday){
  const fri=new Date(monday);fri.setDate(fri.getDate()+4);
  return`${fmtDate(monday)} – ${fmtDate(fri)}`;
}
function getWeekNo(date,sem1Start){
  const mon=getMondayOf(date);
  const sem1Mon=getMondayOf(parseDate(sem1Start));
  const diff=Math.round((mon-sem1Mon)/(7*86400000));
  return diff+1;
}
function getAcademicWeekNo(date,academicYear){
  const sem1Start=academicYear?.sem1Start||"2025-09-08";
  const mon=getMondayOf(date);
  const sem1Mon=getMondayOf(parseDate(sem1Start));
  const diff=Math.round((mon-sem1Mon)/(7*86400000));
  return Math.max(1,diff+1);
}
function isHoliday(monday,ay){
  const fri=new Date(monday);fri.setDate(fri.getDate()+4);
  const inRange=(s,e)=>parseDate(s)<=fri&&parseDate(e)>=monday;
  if(ay.midStart    &&inRange(ay.midStart,ay.midEnd))      return"Yarıyıl Tatili";
  if(ay.autumnStart &&inRange(ay.autumnStart,ay.autumnEnd))return"Sonbahar Tatili";
  if(ay.springStart &&inRange(ay.springStart,ay.springEnd))return"Bahar Tatili";
  return null;
}

      const homeFields=draft.homeFields||(draft.homeField&&draft.homeField!=="none"?[draft.homeField]:DEFAULT);

        const cur=d.homeFields||(d.homeField&&d.homeField!=="none"?[d.homeField]:DEFAULT);
        const on=cur.includes(k);
        return{...d,homeFields:on?cur.filter(x=>x!==k):[...cur,k]};

            const on=homeFields.includes(k);

              style={{...btnSm(on?T.accent:T.surface,on?"#fff":T.textSub),border:`1px solid ${on?T.accent:T.border}`,fontSize:10,padding:"4px 8px"}}>

          <button onClick={()=>setDraft(d=>({...d,homeFields:ALL_KEYS}))}

          <button onClick={()=>setDraft(d=>({...d,homeFields:[]}))}
            style={{...btnSm(T.toggleBg,T.textSub),fontSize:10}}>Tümünü Kaldır</button>
        </div>
        <div style={{color:T.textMuted,fontSize:10,marginTop:5}}>{homeFields.length} alan seçili — ana sayfada sırasıyla gösterilir{homeFields.length===0?" (bu plan kartda gizlenir)":""}</div>

    })()}
  </>;
}
function NewPlanSheet({lessons,grades,sortedClasses,setClasses,onClose,onSave}){

    const nav=window.__annualPlanNav;

    const end=parseDate(academicYear.sem2End);

    while(d<=end){
      const fri=new Date(d);fri.setDate(fri.getDate()+4);
      const isMid=academicYear.midStart&&parseDate(academicYear.midStart)<=fri&&parseDate(academicYear.midEnd)>=d;
      if(!isMid){weeks.push({weekNo:n,monday:new Date(d),friday:new Date(fri)});n++;}
      d.setDate(d.getDate()+7);
    }
    return weeks;
  },[academicYear]);

  const holiday=isHoliday(displayMonday,academicYear);

const DAYS7=["Pazar","Pazartesi","Salı","Çarşamba","Perşembe","Cuma","Cumartesi"];
const DAYS7S=["Paz","Pzt","Sal","Çar","Per","Cum","Cmt"];
function Dashboard({classes,students,lessons,exams,setScreen,school,schedule,scheduleSettings,wkndSchedule,wkndSS,annualPlans,setAnnualPlans,academicYear,homeworks,homeWidgets,setHomeWidgets,homeView,setHomeView,homeWidgetSizes,setHomeWidgetSizes,planWeekOffsetGlobal,setPlanWeekOffsetGlobal,dayOffsetGlobal,setDayOffsetGlobal,dashAnim,widgetOrder,setWidgetOrder,sortMode,setSortMode,dragItem,dragOver,handleDragStart,handleDragEnter,handleDragEnd}){
  const T=useT();
  const today=new Date();
  const dayOffset=dayOffsetGlobal??0;
  const setDayOffset=setDayOffsetGlobal;

  const[planDir,setPlanDir]=useState("none");
  const[schedDir,setSchedDir]=useState("none");
  const[schedView,setSchedView]=usePersist("ogretmen_sched_home_view","normal");
  const targetDate=useMemo(()=>{const d=new Date(today);d.setDate(d.getDate()+dayOffset);return d;},[dayOffset]);
  const targetDow=targetDate.getDay(); // 0=Paz,1=Pzt...6=Cmt
  const schedKey=targetDow===0?6:targetDow-1; // Pzt→0, Sal→1... Cmt→5, Paz→6
  const isWeekend=targetDow===0||targetDow===6;
  const periods=useMemo(()=>computePeriods(scheduleSettings),[scheduleSettings]);
  const wkndPeriodsDash=useMemo(()=>computePeriods(wkndSS||scheduleSettings),[wkndSS,scheduleSettings]);
  const activePeriodsDash=isWeekend?wkndPeriodsDash:periods;
  const activeSched=isWeekend?(wkndSchedule||{}):(schedule||{});
  const dayCells=useMemo(()=>{
    return activePeriodsDash.map(p=>{const cell=activeSched[schedKey]?.[p.index];return{...p,cell};}).filter(p=>p.cell);
  },[schedKey,activePeriodsDash,activeSched]);
  const cname=id=>{const c=classes.find(x=>x.id===id);return c?`${c.grade}/${c.branch}`:"?";};
  const lname=id=>lessons.find(x=>String(x.id)===String(id))?.name||"?";
  const CDK=["#1E3A80","#064E3B","#3D1B69","#4D2A0E","#1E4040","#3D1010"];
  const CLK=["#DBEAFE","#D1FAE5","#EDE9FE","#FEF3C7","#CCFBF1","#FEE2E2"];
  const CTK=["#1D4ED8","#047857","#6D28D9","#B45309","#0F766E","#B91C1C"];
  const cc=id=>T.id==="dark"?CDK[(id-1)%6]:CLK[(id-1)%6];
  const ct=id=>T.id==="dark"?"#93C5FD":CTK[(id-1)%6];
  const currentWeekNo=getAcademicWeekNo(today,academicYear);
  const weekDays=useMemo(()=>{
    const mon=getMondayOf(today);
    return Array.from({length:7},(_,i)=>{
      const d2=new Date(mon);
      if(i<5)d2.setDate(d2.getDate()+i);
      else if(i===5)d2.setDate(d2.getDate()+5);
      else d2.setDate(d2.getDate()+6);
      const dow=d2.getDay();
      const sk=dow===0?6:dow-1;
      const isWe=sk>=5;
      const pList=isWe?wkndPeriodsDash:periods;
      const sched=isWe?(wkndSchedule||{}):(schedule||{});
      const cells=pList.map(p=>{const cell=sched[sk]?.[p.index];return{...p,cell};}).filter(p=>p.cell);
      return{date:d2,dow,sk,cells,label:DAYS7S[dow],isWe};
    });
  },[schedule,wkndSchedule,periods,wkndPeriodsDash,today]);
  const fmtDay=d=>`${d.getDate()} ${["Oca","Şub","Mar","Nis","May","Haz","Tem","Ağu","Eyl","Eki","Kas","Ara"][d.getMonth()]}`;
  const isToday=d=>d.toDateString()===today.toDateString();
  const HV_MODES=[
    {id:"widget",  icon:"🔲", label:"Widget"},
    {id:"list",    icon:"📋", label:"Liste"},
    {id:"grid2",   icon:"⊟",  label:"2'li"},
    {id:"grid3",   icon:"⊞",  label:"3'lü"},
    {id:"grid4",   icon:"⠿",  label:"4'lü"},
    {id:"compact", icon:"≡",  label:"Kompakt"},
  ];
  const[editHomeTile,setEditHomeTile]=useState(null);
  const planWeekOffset=planWeekOffsetGlobal??0;
  const setPlanWeekOffset=setPlanWeekOffsetGlobal;
  const[activePlanId,setActivePlanId]=useState(null);  // seçili plan id (detay kartı)
  const[showPlanSelect,setShowPlanSelect]=useState(false); // plan seçim modu
  const[activeRowPage,setActiveRowPage]=useState(0); // aktif hafta içinde hangi kayıt
  const planTouchStart=useRef(null); // swipe için
  // ── Doğum günü hesaplama ──
  const[rehberlikData]=usePersist("ogretmen_rehberlik",{});
  const birthdayStudents=useMemo(()=>{
    const now=new Date();
    const results=[];
    students.forEach(st=>{
      const d=rehberlikData[st.id];
      const raw=d?.kisiselBilgiler?.birthDate||"";
      if(!raw)return;
      // Format: DD.MM.YYYY veya YYYY-MM-DD
      let day,month;
      const dotMatch=raw.match(/^(\d{1,2})\.(\d{1,2})\./);
      const dashMatch=raw.match(/^(\d{4})-(\d{2})-(\d{2})/);
      if(dotMatch){day=parseInt(dotMatch[1]);month=parseInt(dotMatch[2]);}
      else if(dashMatch){month=parseInt(dashMatch[2]);day=parseInt(dashMatch[3]);}
      else return;
      if(!day||!month||month<1||month>12||day<1||day>31)return;
      // Bu yıl doğum günü
      const thisYear=new Date(now.getFullYear(),month-1,day);
      // Eğer geçtiyse gelecek yıl
      const bdDate=thisYear<new Date(now.getFullYear(),now.getMonth(),now.getDate())?new Date(now.getFullYear()+1,month-1,day):thisYear;
      const diffDays=Math.round((bdDate-new Date(now.getFullYear(),now.getMonth(),now.getDate()))/(86400000));
      if(diffDays<=14){
        const cls=classes.find(c=>c.id===st.classId);
        results.push({...st,day,month,diffDays,cname:cls?`${cls.grade}/${cls.branch}`:"",age:now.getFullYear()-(dashMatch?parseInt(dashMatch[1]):now.getFullYear()-12)+(diffDays===0?1:0)});
      }

    return results.sort((a,b)=>a.diffDays-b.diffDays);
  },[students,rehberlikData,classes]);

  const calDays=(()=>{try{const v=JSON.parse(localStorage.getItem("ogretmen_cal_days")||"7");return Number(v)||7;}catch{return 7;}})();
  const dashCalEvents=(()=>{try{return JSON.parse(localStorage.getItem("ogretmen_cal_events")||"[]");}catch{return [];}})();
  const dashTodayMid=new Date(today.getFullYear(),today.getMonth(),today.getDate());
  const upcomingCalEvents=dashCalEvents.filter(ev=>{if(!ev.date)return false;const d=new Date(ev.date);const diff=Math.floor((d-dashTodayMid)/86400000);return diff>=0&&diff<=calDays;}).sort((a,b)=>a.date.localeCompare(b.date));
  return <div style={{paddingBottom:90}}>
{/* ── DOĞUM GÜNÜ WİDGETI ── */}
    {homeWidgets?.birthday&&birthdayStudents.length>0&&<div style={{margin:"10px 12px 0"}}>

                  <span style={{color:isTod?"#fff":isWe?T.warn:T.textSub,fontSize:9,fontWeight:700}}>{label}</span>
                  <span style={{color:isTod?"#fff":isWe?T.warn:T.text,fontSize:12,fontWeight:800}}>{date.getDate()}</span>
                </div>
                <span style={{color:isTod?T.accent:isWe?T.warn:T.textSub,fontSize:11,fontWeight:isTod||isWe?700:400}}>{DAYS7[dow]}{isTod?" — Bugün":""}{isWe?" 📆":""}</span>
                {cells.length>0&&<span style={{color:isWe?T.warn:T.textMuted,fontSize:10,marginLeft:"auto"}}>{cells.length} ders</span>}
              </div>
              {cells.length===0
                ?<div style={{color:T.textMuted,fontSize:11,paddingLeft:40}}>— ders yok</div>
                :<div style={{display:"flex",flexDirection:"column",gap:3,paddingLeft:40}}>
                  {cells.map(p=>(
                    <div key={p.index} style={{display:"flex",gap:6,alignItems:"center"}}>
                      <span style={{color:T.textMuted,fontSize:10,width:20,textAlign:"right",flexShrink:0}}>{p.index+1}.</span>
                      <div style={{flex:1,background:cc(p.cell.classId),border:`1px solid ${ct(p.cell.classId)}33`,borderRadius:7,padding:"4px 8px",display:"flex",gap:6}}>
                        <span style={{color:ct(p.cell.classId),fontSize:10,fontWeight:700}}>{cname(p.cell.classId)}</span>
                        <span style={{color:T.textSub,fontSize:10}}>{lname(p.cell.lessonId)}</span>
                      </div>
                    </div>
                  ))}
                </div>
              }
            </div>;
          })}
        </div>
      </div>
    </div>}
  </div>;
}
// Kart boyut tanımları: span = kaç sütun kaplar, tall = yüksek mi
// "widget" modunda her kart kendi boyutuna sahip olabilir
const TILE_SIZES={
  "1x1":  {cols:1,rows:1,label:"1×1",     icon:"▪"},
  "wide":  {cols:2,rows:1,label:"2×1 Geniş",icon:"▬"},
  "tall":  {cols:1,rows:2,label:"1×2 Uzun", icon:"▮"},
  "2x2":  {cols:2,rows:2,label:"2×2 Büyük",icon:"■"},
  "2x4":  {cols:2,rows:4,label:"2×4 Uzun", icon:"⬛"},
  "4x2":  {cols:4,rows:2,label:"4×2 Geniş",icon:"▬"},
};
const DEFAULT_TILE_SIZES={
  annualplan:"wide", schedule:"wide", calendar:"1x1", exams:"1x1",
  homework:"1x1",   students:"1x1",  classes:"1x1",  lessons:"1x1",
  school:"wide",    socialclub:"1x1",guidance:"1x1", backup:"1x1",
};
function MenuScreen({classes,students,lessons,exams,setScreen,school,homeworks,annualPlans,homeWidgets,setHomeWidgets,navItems,setNavItems,navMax,setNavMax,menuView,setMenuView,menuOrder,setMenuOrder,menuSizes,setMenuSizes}){
  const T=useT();
  const[showPanel,setShowPanel]=useState(null);
  const[editTile,setEditTile]=useState(null); // s = key being edited
  const calDaysMenu=(()=>{try{const v=JSON.parse(localStorage.getItem("ogretmen_cal_days")||"7");return Number(v)||7;}catch{return 7;}})();
  const calEventsMenu=(()=>{try{return JSON.parse(localStorage.getItem("ogretmen_cal_events")||"[]");}catch{return [];}})();
  const todayMenuMid=new Date();todayMenuMid.setHours(0,0,0,0);
  const upcomingCalMenu=calEventsMenu.filter(ev=>{if(!ev.date)return false;const d=new Date(ev.date);const diff=Math.floor((d-todayMenuMid)/86400000);return diff>=0&&diff<=calDaysMenu;}).sort((a,b)=>a.date.localeCompare(b.date));
  const upcomingExam=exams.filter(ex=>{if(!ex.date)return false;const d=new Date(ex.date);const diff=Math.floor((d-todayMenuMid)/86400000);return diff>=0&&diff<=calDaysMenu;}).length;
  const totalMenuUpcoming=upcomingCalMenu.length+upcomingExam;
  const calMenuSub=(()=>{
    if(totalMenuUpcoming===0)return"Yaklaşan yok";
    const first=upcomingCalMenu[0];
    if(first){
      const diff=Math.floor((new Date(first.date)-todayMenuMid)/86400000);
      const dayStr=diff===0?"Bugün":diff===1?"Yarın":`${diff}g sonra`;
      const title=(first.title||first.text||"Etkinlik").slice(0,20);
      return`${dayStr}: ${title}${totalMenuUpcoming>1?` +${totalMenuUpcoming-1}`:""}`;
    }
    return`${totalMenuUpcoming} etkinlik`;
  })();
  const BASE_FEATURES=[
    {icon:"📖",label:"Yıllık Plan",     sub:`${annualPlans?.length||0} plan`,     s:"annualplan", c:"#06B6D4", canWidget:true},
    {icon:"🗂",label:"Ders Programı",   sub:"Haftalık plan",                       s:"schedule",   c:"#0EA5E9", canWidget:true},
    {icon:"📆",label:"Takvim",          sub:calMenuSub,s:"calendar",c:"#F97316",canWidget:true},
    {icon:"📝",label:"Not İşlemleri",       sub:`${exams.length} sınav`,              s:"exams",      c:"#EF4444", canWidget:true},
    {icon:"📋",label:"Ödev Takibi",     sub:`${homeworks?.length||0} ödev`,       s:"homework",   c:T.purple,  canWidget:true},
    {icon:"👤",label:"Öğrenciler",      sub:`${students.length} öğrenci`,         s:"students",   c:"#F59E0B", canWidget:true},
    {icon:"🏷",label:"Sınıflar",        sub:`${classes.length} sınıf`,            s:"classes",    c:T.purple,  canWidget:true},
    {icon:"📚",label:"Dersler",         sub:`${lessons.length} ders`,             s:"lessons",    c:"#10B981", canWidget:false},
    {icon:"🏫",label:"Okul Bilgileri",  sub:school?.name||"Okul",                 s:"school",     c:T.accent,  canWidget:false},
    {icon:"🌟",label:"Sosyal Kulüp",    sub:"Etkinlik & rapor",                   s:"socialclub", c:"#10B981", canWidget:false},
    {icon:"💬",label:"Sınıf Rehberliği",sub:"Öğrenci dosyaları",                  s:"guidance",   c:"#8B5CF6", canWidget:false},
    {icon:"💾",label:"Yedekle/Sıfırla",  sub:"Tüm veriler & sıfırlama",            s:"backup",     c:"#64748B", canWidget:false},
  ];
  const ALL_FEATURES=useMemo(()=>{
    if(menuOrder&&menuOrder.length>0){
      const ordered=menuOrder.map(s=>BASE_FEATURES.find(f=>f.s===s)).filter(Boolean);
      const rest=BASE_FEATURES.filter(f=>!menuOrder.includes(f.s));
      return [...ordered,...rest];
    }
    return BASE_FEATURES;
  },[menuOrder,annualPlans,exams,homeworks,students,classes,lessons]);

  const toggle=s=>setHomeWidgets(w=>({...w,[s]:!w[s]}));
  const moveItem=(from,to)=>{
    const order=ALL_FEATURES.map(f=>f.s);
    const item=order.splice(from,1)[0];
    order.splice(to,0,item);
    setMenuOrder(order);
  };
  const getSz=(s)=>(menuSizes||{})[s]||DEFAULT_TILE_SIZES[s]||"1x1";
  const setSz=(s,v)=>setMenuSizes(m=>({...(m||{}),[s]:v}));

  // ── Widget Grid renderer ──
  const renderWidgetGrid=()=>{
    const items=ALL_FEATURES.map(f=>{
      const sz=getSz(f.s);
      const def=TILE_SIZES[sz]||TILE_SIZES["1x1"];
      const cols=def.cols;
      const rows=def.rows||1;
      const isTall=rows>1;
      const isLarge=sz==="2x2";
      const isWide=cols===2&&!isLarge;
      const iconSz=isLarge?36:isWide?26:isTall?24:20;
      const iconBox=isLarge?60:isWide?48:isTall?44:38;
      const iconR=isLarge?16:isWide?13:11;
      const lblSz=isLarge?15:isWide?13:isTall?12:11;
      const subSz=isLarge?12:11;
      const pad=isLarge?"16px 14px":isWide?"12px 14px":isTall?"14px 8px":"12px 8px";
      const flex=isLarge?"column":isWide?"row":"column";
      const minH=0; // gridAutoRows:"72px" handles height via span
      return(
        <div key={f.s} style={{gridColumn:`span ${cols}`,gridRow:`span ${rows}`}}>
          <div className="tap-bounce" onClick={()=>setScreen(f.s)}
            style={{height:"100%",background:T.card,border:`1px solid ${editTile===f.s?f.c:T.border}`,borderRadius:14,padding:pad,display:"flex",flexDirection:flex,alignItems:"center",gap:isWide&&!isLarge?10:6,cursor:"pointer",position:"relative",overflow:"hidden",boxShadow:T.id==="dark"?"0 1px 8px rgba(0,0,0,0.3)":"0 1px 6px rgba(0,0,0,0.05)"}}>
            <div style={{position:"absolute",top:0,left:0,right:0,height:3,background:`linear-gradient(90deg,${f.c},${f.c}88)`,borderRadius:"14px 14px 0 0"}}/>
            <div onClick={e=>{e.stopPropagation();setEditTile(editTile===f.s?null:f.s);}}
              style={{position:"absolute",top:6,right:6,width:18,height:18,borderRadius:5,background:editTile===f.s?f.c:T.toggleBg+"cc",border:`1px solid ${editTile===f.s?f.c:T.border}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,color:editTile===f.s?"#fff":T.textMuted,cursor:"pointer",zIndex:2}}>⚙</div>
            <div style={{width:iconBox,height:iconBox,borderRadius:iconR,background:f.c+"20",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,fontSize:iconSz}}>{(f.key||f.s)==="calendar"?<DynamicCalIcon size={iconSz+4}/>:f.icon}</div>
            <div style={{flex:1,textAlign:isWide?"left":"center",minWidth:0}}>
              <div style={{color:T.text,fontSize:lblSz,fontWeight:700,lineHeight:1.2}}>{f.label}</div>
              {(isLarge||isWide||isTall)&&<div style={{color:T.textSub,fontSize:subSz,marginTop:3,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:isWide?"nowrap":"normal",lineHeight:1.4}}>{f.sub}</div>}
            </div>
            {isWide&&<div style={{width:3,height:28,background:f.c,borderRadius:99,flexShrink:0,marginLeft:"auto"}}/>}
          </div>
        </div>
      );
    });
    return(
      <div style={{padding:"0 12px",display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gridAutoRows:"72px",gap:7}}>
        {items}
      </div>
    );
  };

  // ── Classic grid / list renderer ──
  const VIEW_MODES=[
    {id:"widget",  icon:"🔲", label:"Widget"},
    {id:"list",    icon:"📋", label:"Liste"},
    {id:"grid2",   icon:"⊟",  label:"2'li"},
    {id:"grid3",   icon:"⊞",  label:"3'lü"},
    {id:"grid4",   icon:"⠿",  label:"4'lü"},
    {id:"compact", icon:"≡",  label:"Kompakt"},
  ];
  const renderClassicTile=(f,i)=>{
    if(menuView==="list") return(
      <div key={f.s} className="tap-bounce" onClick={()=>setScreen(f.s)}
        style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:12,padding:"10px 12px",display:"flex",alignItems:"center",gap:12,cursor:"pointer",position:"relative",overflow:"hidden"}}>
        <div style={{position:"absolute",left:0,top:0,bottom:0,width:3,background:f.c,borderRadius:"12px 0 0 12px"}}/>
        <div style={{width:40,height:40,borderRadius:11,background:f.c+"20",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,fontSize:20,marginLeft:4}}>{(f.key||f.s)==="calendar"?<DynamicCalIcon size={22}/>:f.icon}</div>
        <div style={{flex:1,minWidth:0}}>
          <div style={{color:T.text,fontSize:13,fontWeight:700}}>{f.label}</div>
          <div style={{color:T.textSub,fontSize:11,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{f.sub}</div>
        </div>
        <span style={{color:T.textMuted,fontSize:16}}>›</span>
      </div>
    );
    if(menuView==="compact") return(
      <div key={f.s} className="tap-bounce" onClick={()=>setScreen(f.s)}
        style={{display:"flex",alignItems:"center",gap:10,padding:"9px 12px",borderRadius:10,background:T.card,border:`1px solid ${T.border}`,cursor:"pointer"}}>
        <div style={{width:30,height:30,borderRadius:8,background:f.c+"20",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,fontSize:15}}>{(f.key||f.s)==="calendar"?<DynamicCalIcon size={17}/>:f.icon}</div>
        <span style={{color:T.text,fontSize:13,fontWeight:600,flex:1}}>{f.label}</span>
        <span style={{color:f.c,fontSize:11,fontWeight:700}}>{f.sub}</span>
        <span style={{color:T.textMuted,fontSize:14}}>›</span>
      </div>
    );
    const iconSize={grid2:24,grid3:22,grid4:18}[menuView]||18;
    const iconBox={grid2:44,grid3:40,grid4:34}[menuView]||34;
    const iconR={grid2:13,grid3:12,grid4:10}[menuView]||10;
    const lblSize={grid2:12,grid3:11,grid4:9}[menuView]||9;
    return(
      <div key={f.s} className="tap-bounce" onClick={()=>setScreen(f.s)}
        style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:12,padding:`${menuView==="grid2"?"14px":"10px"} 6px`,display:"flex",flexDirection:"column",alignItems:"center",gap:5,cursor:"pointer",position:"relative",overflow:"hidden"}}>
        <div style={{position:"absolute",top:0,left:0,right:0,height:2,background:f.c}}/>
        <div style={{width:iconBox,height:iconBox,borderRadius:iconR,background:f.c+"20",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,fontSize:iconSize}}>{(f.key||f.s)==="calendar"?<DynamicCalIcon size={iconSize+2}/>:f.icon}</div>
        <div style={{color:T.text,fontSize:lblSize,fontWeight:700,lineHeight:1.2,textAlign:"center",wordBreak:"break-word",width:"100%",paddingBottom:2}}>{f.label}</div>
      </div>
    );
  };
  const GRID_COLS={list:"1fr",grid2:"1fr 1fr",grid3:"1fr 1fr 1fr",grid4:"1fr 1fr 1fr 1fr",compact:"1fr"};
  const GRID_GAP={list:5,grid2:7,grid3:6,grid4:5,compact:3};
  const renderClassicGrid=()=>(
    <div style={{padding:"0 12px",display:"grid",gridTemplateColumns:GRID_COLS[menuView]||"1fr 1fr 1fr 1fr",gap:GRID_GAP[menuView]||5}}>
      {ALL_FEATURES.map((f,i)=>renderClassicTile(f,i))}
    </div>
  );

  // ── Sıralama modu ──
  const renderReorderList=()=>(
    <div style={{padding:"0 12px",display:"flex",flexDirection:"column",gap:4}}>
      {ALL_FEATURES.map((f,i)=>(
        <div key={f.s} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 10px",borderRadius:11,background:T.card,border:`1px solid ${T.border}`}}>
          <div style={{width:34,height:34,borderRadius:9,background:f.c+"20",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,fontSize:18}}>{(f.key||f.s)==="calendar"?<DynamicCalIcon size={20}/>:f.icon}</div>
          <span style={{color:T.text,fontSize:13,fontWeight:600,flex:1}}>{f.label}</span>
          <div style={{display:"flex",flexDirection:"column",gap:2}}>
            <button onClick={()=>i>0&&moveItem(i,i-1)} disabled={i===0}
              style={{width:28,height:22,background:i===0?T.surface:T.toggleBg,border:`1px solid ${T.border}`,borderRadius:5,cursor:i===0?"default":"pointer",color:i===0?T.textMuted:T.text,fontSize:12,display:"flex",alignItems:"center",justifyContent:"center"}}>↑</button>
            <button onClick={()=>i<ALL_FEATURES.length-1&&moveItem(i,i+1)} disabled={i===ALL_FEATURES.length-1}
              style={{width:28,height:22,background:i===ALL_FEATURES.length-1?T.surface:T.toggleBg,border:`1px solid ${T.border}`,borderRadius:5,cursor:i===ALL_FEATURES.length-1?"default":"pointer",color:i===ALL_FEATURES.length-1?T.textMuted:T.text,fontSize:12,display:"flex",alignItems:"center",justifyContent:"center"}}>↓</button>
          </div>
        </div>
      ))}
      <button onClick={()=>{setMenuOrder(null);setMenuSizes({});}}
        style={{marginTop:4,padding:"8px",borderRadius:9,background:T.surface,border:`1px solid ${T.border}`,cursor:"pointer",color:T.textSub,fontSize:11,fontFamily:"inherit"}}>
        ↺ Sıralama ve Boyutları Sıfırla
      </button>
    </div>
  );

  const renderTiles=()=>showPanel==="reorder"?renderReorderList():menuView==="widget"?renderWidgetGrid():renderClassicGrid();

  // ── Kart boyut düzenleyici ──
  const editingFeature=editTile?ALL_FEATURES.find(f=>f.s===editTile):null;

  return <div style={{paddingBottom:90}}>
    <PH title="Menü" sub="Tüm araçlar"
      right={<div style={{display:"flex",gap:4}}>
        {/* Sıralama */}
        <button onClick={()=>setShowPanel(p=>p==="reorder"?null:"reorder")}
          style={{background:showPanel==="reorder"?T.warn:T.toggleBg,color:showPanel==="reorder"?"#fff":T.textSub,border:`1px solid ${showPanel==="reorder"?T.warn:T.border}`,borderRadius:9,padding:"4px 8px",cursor:"pointer",fontFamily:"inherit",display:"flex",flexDirection:"column",alignItems:"center",gap:1,lineHeight:1}}>
          <span style={{fontSize:13}}>↕</span>
          <span style={{fontSize:8,fontWeight:700}}>Sırala</span>
        </button>
        {/* Görünüm */}
        <button onClick={()=>setShowPanel(p=>p==="view"?null:"view")}
          style={{background:showPanel==="view"?T.accent:T.toggleBg,color:showPanel==="view"?"#fff":T.textSub,border:`1px solid ${showPanel==="view"?T.accent:T.border}`,borderRadius:9,padding:"4px 8px",cursor:"pointer",fontFamily:"inherit",display:"flex",flexDirection:"column",alignItems:"center",gap:1,lineHeight:1}}>
          <span style={{fontSize:13}}>{VIEW_MODES.find(v=>v.id===menuView)?.icon||"🔲"}</span>
          <span style={{fontSize:8,fontWeight:700}}>{VIEW_MODES.find(v=>v.id===menuView)?.label||"Görünüm"}</span>
        </button>

        {/* Alt Bar */}
        <button onClick={()=>setShowPanel(p=>p==="nav"?null:"nav")}
          style={{background:showPanel==="nav"?T.accent:T.toggleBg,color:showPanel==="nav"?"#fff":T.textSub,border:`1px solid ${showPanel==="nav"?T.accent:T.border}`,borderRadius:9,padding:"4px 8px",cursor:"pointer",fontFamily:"inherit",display:"flex",flexDirection:"column",alignItems:"center",gap:1,lineHeight:1}}>
          <span style={{fontSize:13}}>📌</span>
          <span style={{fontSize:8,fontWeight:700}}>Alt Bar</span>
        </button>
      </div>}
    />

    {/* ── GÖRÜNÜM SEÇİCİ ── */}
    {showPanel==="view"&&<div style={{margin:"0 12px 8px",background:T.card,border:`1px solid ${T.border}`,borderRadius:12,padding:"10px 12px"}}>
      <div style={{color:T.accent,fontSize:11,fontWeight:700,marginBottom:8,textTransform:"uppercase",letterSpacing:"0.06em"}}>Görünüm Modu</div>
      <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
        {VIEW_MODES.map(v=>{
          const active=menuView===v.id;
          return <button key={v.id} onClick={()=>{setMenuView(v.id);setShowPanel(null);}}
            style={{background:active?T.accent:T.toggleBg,border:`2px solid ${active?T.accent:T.border}`,borderRadius:9,padding:"7px 10px",cursor:"pointer",fontFamily:"inherit",fontSize:11,fontWeight:active?700:400,color:active?"#fff":T.textSub,display:"flex",flexDirection:"column",alignItems:"center",gap:2,minWidth:50}}>
            <span style={{fontSize:15}}>{v.icon}</span>
            <span>{v.label}</span>
          </button>;
        })}
      </div>
      {menuView==="widget"&&<div style={{marginTop:8,color:T.textSub,fontSize:11,background:T.accentDim,borderRadius:8,padding:"7px 10px"}}>
        💡 Her kartın sağ üstündeki <b>⚙</b> ile boyutunu değiştirebilirsiniz
      </div>}
    </div>}



    {/* ── ALT BAR DÜZENLEYİCİ ── */}
    {showPanel==="nav"&&<div style={{margin:"0 12px 10px",background:T.card,border:`1px solid ${T.border}`,borderRadius:14,padding:"12px 14px"}}>
      <div style={{color:T.accent,fontSize:12,fontWeight:700,marginBottom:4}}>📌 Alt Bar Ayarları</div>
      <div style={{color:T.textMuted,fontSize:10,marginBottom:12}}>Ana Sayfa ve Menü sabittir. Araya kaç simge eklensin?</div>
      {/* Sürgü: 0-5 */}
      <div style={{marginBottom:14}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
          <span style={{color:T.textSub,fontSize:11,fontWeight:600}}>Simge Sayısı</span>
          <span style={{background:T.accent,color:"#fff",borderRadius:99,padding:"2px 10px",fontSize:12,fontWeight:800}}>{navMax}</span>
        </div>
        <input type="range" min={0} max={5} step={1} value={navMax}
          onChange={e=>{const v=Number(e.target.value);setNavMax(v);if(navItems.length>v)setNavItems(n=>n.slice(0,v));}}
          style={{width:"100%",accentColor:T.accent,cursor:"pointer"}}/>
        <div style={{display:"flex",justifyContent:"space-between",marginTop:2}}>
          {[0,1,2,3,4,5].map(n=><span key={n} style={{color:n===navMax?T.accent:T.textMuted,fontSize:10,fontWeight:n===navMax?800:400}}>{n}</span>)}
        </div>
        <div style={{color:T.textMuted,fontSize:10,marginTop:6,textAlign:"center"}}>
          Toplam alt bar: 🏠 Ana Sayfa {navMax>0&&`+ ${navMax} simge `}+ ☰ Menü = <b style={{color:T.accent}}>{navMax+2} öğe</b>
        </div>
      </div>
      {/* Seçili simgeler */}
      {navMax>0&&<div style={{display:"flex",flexDirection:"column",gap:6}}>
        {navItems.length>0&&<div style={{marginBottom:6}}>
          <div style={{color:T.textSub,fontSize:10,fontWeight:600,marginBottom:6,textTransform:"uppercase",letterSpacing:"0.05em"}}>Sıra</div>
          {navItems.map((id,i)=>{
            const opt=ALL_NAV_OPTIONS.find(o=>o.id===id);
            if(!opt)return null;
            return <div key={id} style={{display:"flex",alignItems:"center",gap:8,marginBottom:4,padding:"6px 8px",borderRadius:9,background:T.accentDim,border:`1px solid ${T.accent}33`}}>
              <div style={{width:26,height:26,borderRadius:7,background:T.accent+"22",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,fontSize:14}}>{opt.icon}</div>
              <div style={{flex:1,color:T.accent,fontSize:12,fontWeight:700}}>{opt.label}</div>
              <div style={{display:"flex",flexDirection:"column",gap:2}}>
                <button onClick={()=>i>0&&setNavItems(n=>{const a=[...n];const x=a.splice(i,1)[0];a.splice(i-1,0,x);return a;})} disabled={i===0}
                  style={{width:22,height:18,background:i===0?T.surface:T.toggleBg,border:`1px solid ${T.border}`,borderRadius:4,cursor:i===0?"default":"pointer",color:i===0?T.textMuted:T.text,fontSize:10,display:"flex",alignItems:"center",justifyContent:"center"}}>↑</button>
                <button onClick={()=>i<navItems.length-1&&setNavItems(n=>{const a=[...n];const x=a.splice(i,1)[0];a.splice(i+1,0,x);return a;})} disabled={i===navItems.length-1}
                  style={{width:22,height:18,background:i===navItems.length-1?T.surface:T.toggleBg,border:`1px solid ${T.border}`,borderRadius:4,cursor:i===navItems.length-1?"default":"pointer",color:i===navItems.length-1?T.textMuted:T.text,fontSize:10,display:"flex",alignItems:"center",justifyContent:"center"}}>↓</button>
              </div>
              <button onClick={()=>setNavItems(n=>n.filter(x=>x!==id))}
                style={{width:22,height:22,background:"none",border:"none",cursor:"pointer",color:T.danger,fontSize:14,display:"flex",alignItems:"center",justifyContent:"center"}}>×</button>
            </div>;
          })}
        </div>}
        {navItems.length<navMax&&<>
          <div style={{color:T.textSub,fontSize:10,fontWeight:600,marginBottom:4,textTransform:"uppercase",letterSpacing:"0.05em"}}>Ekle ({navItems.length}/{navMax})</div>
          {ALL_NAV_OPTIONS.filter(o=>!navItems.includes(o.id)).map(opt=>(
            <div key={opt.id} style={{display:"flex",alignItems:"center",gap:10,marginBottom:4}}>
              <div style={{width:26,height:26,borderRadius:7,background:T.toggleBg,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,fontSize:14}}>{opt.icon}</div>
              <div style={{flex:1,color:T.text,fontSize:12,fontWeight:500}}>{opt.label}</div>
              <button onClick={()=>setNavItems(n=>[...n,opt.id])}
                style={{background:T.accent,color:"#fff",border:"none",borderRadius:7,padding:"4px 10px",cursor:"pointer",fontSize:11,fontWeight:700,fontFamily:"inherit"}}>+ Ekle</button>
            </div>
          ))}
        </>}
      </div>}
    </div>}

    {/* ── SIRALAMA MODU BANNER ── */}
    {showPanel==="reorder"&&<div style={{margin:"0 12px 8px",background:T.warn+"22",border:`1px solid ${T.warn}44`,borderRadius:10,padding:"8px 12px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
      <span style={{color:T.warn,fontSize:12,fontWeight:600}}>↑↓ Sırala</span>
      <button onClick={()=>setShowPanel(null)}
        style={{background:T.warn,color:"#fff",border:"none",borderRadius:7,padding:"4px 12px",cursor:"pointer",fontSize:11,fontWeight:700,fontFamily:"inherit"}}>Tamam</button>
    </div>}

    {/* ── TİLELAR ── */}
    {renderTiles()}

    {/* ── Widget boyut düzenleyici (uzun basılınca açılır) ── */}
    {/* ── Widget modunda boyut seçici overlay (sadece editTile açıkken) ── */}
    {editTile&&menuView==="widget"&&editingFeature&&<>
      {/* Arkaplan kapama alanı */}
      <div onClick={()=>setEditTile(null)} style={{position:"fixed",inset:0,zIndex:299,background:"rgba(0,0,0,0.4)"}}/>
      <div style={{position:"fixed",bottom:90,left:"50%",transform:"translateX(-50%)",width:"calc(100% - 24px)",maxWidth:400,zIndex:300,background:T.card,border:`2px solid ${editingFeature.c}66`,borderRadius:16,padding:"14px 14px 12px",boxShadow:"0 8px 32px rgba(0,0,0,0.5)"}}>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
          <span style={{fontSize:20}}>{editingFeature.icon}</span>
          <div style={{flex:1}}>
            <div style={{color:T.text,fontSize:13,fontWeight:700}}>{editingFeature.label}</div>
            <div style={{color:T.textMuted,fontSize:10}}>Kart boyutunu seçin</div>
          </div>
          <button onClick={()=>setEditTile(null)} style={{background:T.toggleBg,border:"none",borderRadius:8,width:28,height:28,cursor:"pointer",color:T.textSub,fontSize:16,display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:8}}>
          {Object.entries(TILE_SIZES).map(([k,v])=>{
            const cur=getSz(editTile)===k;
            return <button key={k} onClick={()=>{setSz(editTile,k);setEditTile(null);}}
              style={{background:cur?editingFeature.c:T.toggleBg,color:cur?"#fff":T.textSub,border:`2px solid ${cur?editingFeature.c:T.border}`,borderRadius:10,padding:"10px 4px",cursor:"pointer",fontFamily:"inherit",fontSize:11,fontWeight:cur?700:400,display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
              <span style={{fontSize:20}}>{v.icon}</span>
              <span>{v.label}</span>
            </button>;
          })}
        </div>
      </div>
    </>}
  </div>;
}

// ══════════════════════════════════════════════
// HIZLI NOT GİRİŞİ EKRANI
// ══════════════════════════════════════════════
function QuickScoreScreen({students,classes,lessons,exams,examScores,setExamScores,perfScores,setPerfScores,projScores,setProjScores}){
  const T=useT();const{inp,btn,btnSm}=useStyles();
  const[selClassId,setSelClassId]=useState(classes[0]?.id||null);
  const[searchQ,setSearchQ]=useState("");
  const[selStudentId,setSelStudentId]=useState(null);
  const listRef=useRef(null);
  const scrollPosRef=useRef(0);
  const searchRef=useRef(null);
  const[perfCounts]=usePersist("ogretmen_perf_counts",{});
  const[projCounts]=usePersist("ogretmen_proj_counts",{});

  // Scroll restore — useLayoutEffect paint'ten önce çalışır, flicker olmaz
  const{useLayoutEffect:uLE}=React;
  uLE(()=>{
    if(!selStudentId && scrollPosRef.current>0){
      const el=document.querySelector(".app-content");
      if(el) el.scrollTop=scrollPosRef.current;
    }
  },[selStudentId]);

  const getAppScroll=()=>{
    const el=document.querySelector(".app-content");
    return el?el.scrollTop:0;
  };

  // Öğrenci seçince scroll'u kaydet ve listeyi yukarı sıfırla
  const selectStudent=(id)=>{
    scrollPosRef.current=getAppScroll();
    setSelStudentId(id);
    // Detay ekranı için en üste git
    const el=document.querySelector(".app-content");
    if(el) el.scrollTop=0;
  };

  const goBackToList=()=>{
    setSelStudentId(null);
    // useLayoutEffect scroll'u restore edecek
  };

  const setSEScores=(examId,upd)=>{
    const k=String(examId);
    setExamScores(s=>({...s,[k]:typeof upd==="function"?upd(s[k]||{}):upd}));
  };
  const setPerfScore=(clsId,term,stId,key,val)=>setPerfScores&&setPerfScores(ps=>{
    const prev=ps[clsId]||{};const tk=`term${term}`;const td=prev[tk]||{};const sd=td[stId]||{};
    return{...ps,[clsId]:{...prev,[tk]:{...td,[stId]:{...sd,[key]:val}}}};
  });
  const setProjScore=(clsId,term,stId,key,val)=>setProjScores&&setProjScores(ps=>{
    const prev=ps[clsId]||{};const tk=`term${term}`;const td=prev[tk]||{};const sd=td[stId]||{};
    return{...ps,[clsId]:{...prev,[tk]:{...td,[stId]:{...sd,[key]:val}}}};
  });
  const getPerfScore=(clsId,term,stId,key)=>(perfScores?.[clsId]||{})[`term${term}`]?.[stId]?.[key]??"";
  const getProjScore=(clsId,term,stId,key)=>(projScores?.[clsId]||{})[`term${term}`]?.[stId]?.[key]??"";

  // perf/proj count helper — Not İşlemleri ile aynı mantık
  const getPerfCount=(clsId,term,lessonId)=>{
    const lk=lessonId?`${clsId}_${term}_${lessonId}`:null;
    const gk=`${clsId}_${term}`;
    return(lk&&perfCounts[lk]!=null?perfCounts[lk]:perfCounts[gk])||3;
  };
  const getProjCount=(clsId,term,lessonId)=>{
    const lk=lessonId?`${clsId}_${term}_${lessonId}`:null;
    const gk=`${clsId}_${term}`;
    return(lk&&projCounts[lk]!=null?projCounts[lk]:projCounts[gk])||1;
  };

  const buildPerfProjMap=(clsId)=>{
    const result={perf:{},proj:{}};
    // Sınıfın derslerini bul — perf/proj hangi dersler için tanımlı?
    const clsExams=exams.filter(e=>e.classId===clsId);
    const lessonIds=[...new Set(clsExams.map(e=>String(e.lessonId)))];
    [1,2].forEach(term=>{
      // Mevcut verilerden oku
      const tp=(perfScores?.[clsId]||{})[`term${term}`]||{};
      const tpj=(projScores?.[clsId]||{})[`term${term}`]||{};
      const pm={};
      Object.values(tp).forEach(sd=>{if(typeof sd!=="object"||!sd)return;Object.keys(sd).forEach(k=>{const m=k.match(/^(\d+)_p(\d+)$/);if(m){pm[m[1]]=Math.max(pm[m[1]]||0,Number(m[2]));}else{const m2=k.match(/^p(\d+)$/);if(m2)pm["__old"]=Math.max(pm["__old"]||0,Number(m2[1]));}});});
      const pjm={};
      Object.values(tpj).forEach(sd=>{if(typeof sd!=="object"||!sd)return;Object.keys(sd).forEach(k=>{const m=k.match(/^(\d+)_p(\d+)$/);if(m){pjm[m[1]]=Math.max(pjm[m[1]]||0,Number(m[2]));}else{const m2=k.match(/^p(\d+)$/);if(m2)pjm["__old"]=Math.max(pjm["__old"]||0,Number(m2[1]));}});});
      // counts'tan da ekle — Not İşlemleri'nde atanmış ama henüz not girilmemiş dersler için
      lessonIds.forEach(lid=>{
        const pc=getPerfCount(clsId,term,lid);
        if(pc>0)pm[lid]=Math.max(pm[lid]||0,pc);
        const pjc=getProjCount(clsId,term,lid);
        if(pjc>0)pjm[lid]=Math.max(pjm[lid]||0,pjc);
      });
      // Genel (ders bazlı olmayan) count
      const genPc=getPerfCount(clsId,term,null);
      if(genPc>0&&Object.keys(pm).length===0)pm["__old"]=Math.max(pm["__old"]||0,genPc);
      const genPjc=getProjCount(clsId,term,null);
      if(genPjc>0&&Object.keys(pjm).length===0)pjm["__old"]=Math.max(pjm["__old"]||0,genPjc);
      result.perf[term]=pm;result.proj[term]=pjm;
    });
    return result;
  };

  // Arama varsa tüm sınıflarda, yoksa seçili sınıfta
  const filteredStudents=useMemo(()=>{
    const q=searchQ.trim();
    const base=q?students:students.filter(s=>s.classId===selClassId);
    if(!q)return base;
    return base.filter(s=>trIncludes(s.name,q)||(s.schoolNo||"").includes(q)||String(s.no).includes(q));
  },[students,selClassId,searchQ]);

  const selStudent=students.find(s=>s.id===selStudentId)||null;

  // Seçili öğrencinin tüm sınavları — dönem gruplu
  const studentExams=useMemo(()=>{
    if(!selStudentId)return[];
    return exams.filter(e=>e.classId===selStudent?.classId).sort((a,b)=>{
      if(a.term!==b.term)return Number(a.term)-Number(b.term);
      const la=lessons.find(l=>l.id===a.lessonId)?.name||"";
      const lb=lessons.find(l=>l.id===b.lessonId)?.name||"";
      return la.localeCompare(lb,"tr")||Number(a.examNo)-Number(b.examNo);
    });
  },[selStudentId,exams,selStudent,lessons]);

  const terms=[...new Set(studentExams.map(e=>e.term))].sort();

  const lname=id=>lessons.find(l=>l.id===id)?.name||"?";
  const lessonObj=id=>lessons.find(l=>l.id===id)||null;

  // Puan helper'ları
  const sc=(examId)=>examScores[String(examId)]||{};
  const isBEP=(examId,sid)=>!!sc(examId)[sid]?.__bep;
  const isKopya=(examId,sid)=>!!sc(examId)[sid]?.__kopya;
  const isComposite=(examId)=>!!lessonObj(exams.find(e=>e.id===examId)?.lessonId)?.composite;
  const getCW=(examId)=>{
    const eid=examId;
    try{const s=window.localStorage?.getItem(`ogretmen_cw_${eid}`);if(s)return JSON.parse(s);}catch(e){}
    return lessonObj(exams.find(e=>e.id===eid)?.lessonId)?.cw||{yazili:50,dinleme:25,konusma:25};
  };

  const getComposite=(examId,sid,key)=>sc(examId)[sid]?.[`__c_${key}`]??"";
  const setComposite=(examId,sid,key,val)=>{
    setSEScores(examId,s=>({...s,[sid]:{...(s[sid]||{}),[`__c_${key}`]:val===""?"":Math.max(0,Math.min(100,Number(val)))}}));
  };
  const calcCompTotal=(examId,sid)=>{
    const cw=getCW(examId);
    const y=sc(examId)[sid]?.__c_yazili;const d=sc(examId)[sid]?.__c_dinleme;const k=sc(examId)[sid]?.__c_konusma;
    if(y===""||y===undefined||y===null)return null;
    return Math.round(((Number(y)*(cw.yazili/100))+(Number(d||0)*(cw.dinleme/100))+(Number(k||0)*(cw.konusma/100)))*100)/100;
  };
  const getSoScore=(examId,sid)=>sc(examId)[sid]?.__soScore??"";
  const setSoScore=(examId,sid,val)=>{
    setSEScores(examId,s=>({...s,[sid]:{...(s[sid]||{}),__soScore:val===""?"":Math.max(0,Math.min(100,Number(val)))}}));
  };
  const getQScore=(examId,sid,qid)=>sc(examId)[sid]?.[qid]??"";
  const setQScore=(examId,sid,qid,val,max)=>{
    const n=val===""?"":Math.max(0,Math.min(Number(val),max));
    setSEScores(examId,s=>({...s,[sid]:{...(s[sid]||{}),[qid]:n}}));
  };
  const getTmax=exam=>exam.questions.reduce((s,q)=>s+Number(q.maxScore),0);
  const getTotal=(exam,sid)=>{
    const eid=exam.id;
    if(isBEP(eid,sid)){const v=sc(eid)[sid]?.__bepScore;return v!==""&&v!==undefined?Number(v):0;}
    if(isKopya(eid,sid))return 0;
    if(isComposite(eid)){const ct=calcCompTotal(eid,sid);return ct!==null?ct:null;}
    const soS=sc(eid)[sid]?.__soScore;
    if(soS!=null&&soS!=="")return Number(soS);
    return exam.questions.reduce((s,q)=>{const v=sc(eid)[sid]?.[q.id];return s+(v!==""&&v!==undefined?Number(v):0);},0);
  };
  const hasScore=(exam,sid)=>{
    const eid=exam.id;
    if(isBEP(eid,sid))return sc(eid)[sid]?.__bepScore!==""&&sc(eid)[sid]?.__bepScore!==undefined;
    if(isKopya(eid,sid))return true;
    if(isComposite(eid))return sc(eid)[sid]?.__c_yazili!==""&&sc(eid)[sid]?.__c_yazili!==undefined&&sc(eid)[sid]?.__c_yazili!==null;
    if(sc(eid)[sid]?.__soScore!=null&&sc(eid)[sid]?.__soScore!=="")return true;
    return exam.questions.some(q=>sc(eid)[sid]?.[q.id]!==""&&sc(eid)[sid]?.[q.id]!==undefined);
  };

  const[expandedExam,setExpandedExam]=useState(null);
  const[detailTab,setDetailTab]=useState("yazili"); // "yazili" | "dersici" | "proje"
  const[expandedPerfTerm,setExpandedPerfTerm]=useState(1);

  return <div style={{paddingBottom:90}}>
    {/* Sınıf seçici */}
    <div style={{padding:"10px 14px 0",display:"flex",gap:6,flexWrap:"wrap"}}>
      {classes.sort((a,b)=>a.grade-b.grade||a.branch.localeCompare(b.branch,"tr")).map(c=>(
        <button key={c.id} onClick={()=>{setSelClassId(c.id);setSelStudentId(null);}}
          style={{background:selClassId===c.id?T.accent:T.toggleBg,color:selClassId===c.id?"#fff":T.textSub,border:`1px solid ${selClassId===c.id?T.accent:T.border}`,borderRadius:9,padding:"6px 14px",cursor:"pointer",fontFamily:"inherit",fontSize:13,fontWeight:selClassId===c.id?700:400}}>
          {c.grade}/{c.branch}
        </button>
      ))}
      {searchQ.trim()&&<span style={{fontSize:11,color:T.warn,fontWeight:600,alignSelf:"center"}}>🔍 Tüm sınıflarda aranıyor</span>}
    </div>

    {/* Arama */}
    <div style={{padding:"10px 14px 0"}}>
      <div style={{position:"relative"}}>
        <input ref={searchRef} value={searchQ} onChange={e=>setSearchQ(e.target.value)}
          onFocus={e=>e.target.select()}
          placeholder="İsim veya okul numarası... (tüm sınıflarda arar)"
          style={{background:T.inputBg,border:`1px solid ${searchQ?T.accent:T.border}`,borderRadius:10,color:T.text,padding:"9px 12px 9px 34px",fontSize:14,outline:"none",width:"100%",boxSizing:"border-box",fontFamily:"inherit"}}/>
        <span style={{position:"absolute",left:10,top:"50%",transform:"translateY(-50%)",fontSize:15,pointerEvents:"none"}}>🔍</span>
        {searchQ&&<button onClick={()=>setSearchQ("")} style={{position:"absolute",right:8,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",color:T.textMuted,cursor:"pointer",fontSize:16,lineHeight:1}}>×</button>}
      </div>
    </div>

    {/* Öğrenci listesi */}
    {!selStudentId&&<div ref={listRef} style={{padding:"10px 14px",display:"flex",flexDirection:"column",gap:6}}>
      {filteredStudents.length===0
        ?<div style={{textAlign:"center",color:T.textMuted,padding:"30px 0",fontSize:13}}>
            {searchQ.trim()?"Sonuç bulunamadı":selClassId?"Bu sınıfta öğrenci yok":"Sınıf seçin"}
          </div>
        :filteredStudents.map(st=>{
          const stClass=classes.find(c=>c.id===st.classId);
          const stExams=exams.filter(e=>e.classId===st.classId);
          const entered=stExams.filter(e=>hasScore(e,st.id)).length;
          return <button key={st.id} onClick={()=>{
            selectStudent(st.id);
          }}
            style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:12,padding:"12px 14px",cursor:"pointer",fontFamily:"inherit",textAlign:"left",display:"flex",alignItems:"center",gap:12}}>
            <div style={{width:40,height:40,borderRadius:10,background:T.accentDim,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",flexShrink:0}}>
              <span style={{color:T.accent,fontSize:11,fontWeight:800}}>#{st.no}</span>
              {st.schoolNo&&<span style={{color:T.textMuted,fontSize:8}}>{st.schoolNo}</span>}
            </div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{color:T.text,fontSize:14,fontWeight:700,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{st.name}</div>
              <div style={{color:T.textMuted,fontSize:11,marginTop:2}}>
                {searchQ.trim()&&stClass&&<span style={{color:T.accent,fontWeight:700,marginRight:6}}>{stClass.grade}/{stClass.branch}</span>}
                {entered}/{stExams.length} sınav girildi
              </div>
            </div>
            <span style={{color:T.textMuted,fontSize:18}}>›</span>
          </button>;
        })}
    </div>}

    {/* Öğrenci detay — sınav listesi */}
    {selStudent&&<div style={{padding:"10px 14px",display:"flex",flexDirection:"column",gap:10}}>
      {/* Geri + öğrenci başlığı */}
      <div style={{display:"flex",alignItems:"center",gap:12,background:T.card,borderRadius:12,padding:"12px 14px",border:`1px solid ${T.border}`}}>
        <BackBtn onClick={goBackToList}/>
        <div style={{width:40,height:40,borderRadius:10,background:T.accentDim,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",flexShrink:0}}>
          <span style={{color:T.accent,fontSize:11,fontWeight:800}}>#{selStudent.no}</span>
          {selStudent.schoolNo&&<span style={{color:T.textMuted,fontSize:8}}>{selStudent.schoolNo}</span>}
        </div>
        <div style={{flex:1,minWidth:0}}>
          <div style={{color:T.text,fontSize:15,fontWeight:800,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{selStudent.name}</div>
          <div style={{color:T.textMuted,fontSize:11}}>{(()=>{const c=classes.find(x=>x.id===selStudent.classId);return c?`${c.grade}/${c.branch}`:"";})()}</div>
        </div>
      </div>

      {/* Sekme bar: Yazılı / Ders İçi / Proje */}
      <div style={{display:"flex",background:T.toggleBg,borderRadius:10,padding:2,border:`1px solid ${T.border}`}}>
        {[["yazili","✏️ Yazılı"],["dersici","📋 Ders İçi"],["proje","🔬 Proje"]].map(([v,l])=>(
          <button key={v} onClick={()=>setDetailTab(v)}
            style={{flex:1,background:detailTab===v?T.accent:"none",color:detailTab===v?"#fff":T.textSub,border:"none",borderRadius:8,padding:"7px 4px",cursor:"pointer",fontFamily:"inherit",fontSize:12,fontWeight:detailTab===v?700:400}}>
            {l}
          </button>
        ))}
      </div>

      {/* ── YAZILI NOTLARI ── */}
      {detailTab==="yazili"&&(studentExams.length===0
        ?<div style={{textAlign:"center",color:T.textMuted,padding:"30px 0",fontSize:13}}>Bu sınıf için henüz sınav oluşturulmamış</div>
        :terms.map(term=>{
          const termExams=studentExams.filter(e=>e.term===term);
          return <div key={term}>
            <div style={{display:"flex",alignItems:"center",gap:8,margin:"4px 0 6px"}}>
              <div style={{flex:1,height:1,background:T.border}}/>
              <span style={{color:T.textMuted,fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.08em"}}>{term}. Dönem</span>
              <div style={{flex:1,height:1,background:T.border}}/>
            </div>
            {termExams.map(exam=>{
              const sid=selStudent.id;
              const eid=exam.id;
              const comp=isComposite(eid);
              const cw=getCW(eid);
              const tmax=getTmax(exam);
              const tot=getTotal(exam,sid);
              const pct=comp?Math.round(tot||0):tmax>0?Math.round(((tot||0)/tmax)*100):0;
              const badge=hasScore(exam,sid)?gradeBadge(pct,T):null;
              const open=expandedExam===eid;

function usePersist(key, init){
  const[val,setVal]=useState(()=>{
    try{const s=window.localStorage?.getItem(key);return s?JSON.parse(s):(typeof init==="function"?init():init);}
    catch{return typeof init==="function"?init():init;}
  });
  // Temizleme + güncelleme event dinle (aynı sekme içi senkronizasyon)
  useEffect(()=>{
    const clearHandler=e=>{
      const clearedKeys=e.detail?.keys||[];
      if(!clearedKeys.includes(key))return;
      try{const s=window.localStorage?.getItem(key);setVal(s?JSON.parse(s):(typeof init==="function"?init():init));}
      catch(err){setVal(typeof init==="function"?init():init);}
    };
    const updateHandler=e=>{
      if(e.detail?.key!==key)return;
      try{const s=window.localStorage?.getItem(key);setVal(s?JSON.parse(s):init);}
      catch(err){}
    };
    window.addEventListener("ogretmen-clear",clearHandler);
    window.addEventListener("ogretmen-update",updateHandler);
    return()=>{
      window.removeEventListener("ogretmen-clear",clearHandler);
      window.removeEventListener("ogretmen-update",updateHandler);
    };
  },[key]);
  const setWrapped=upd=>{
    setVal(prev=>{
      const next=typeof upd==="function"?upd(prev):upd;
      try{
        window.localStorage?.setItem(key,JSON.stringify(next));
        // Aynı key'i kullanan diğer usePersist instance'larını bildir
        window.dispatchEvent(new CustomEvent("ogretmen-update",{detail:{key}}));
      }catch(e){}
      return next;
    });
  };
  return[val,setWrapped];
}

  const cname=s=>s.sinif||"—";

        return`<tr><td>${a.date}</td><td>${a.title||"—"}</td><td>${a.location||"—"}</td>${showCounts?`<td>${total}</td><td><span class="present">${gelenSay}</span></td>`:""}</tr>`;
      }).join("")}
    </table>`}
  </div>`:""}
  ${(showActivities&&monthActs.length>0)?`
  <div class="section">
    <h2>🎯 Etkinlik Detayları</h2>
    ${monthActs.map(a=>{
      const absentIds=a.absences||[];
      const absentStudents=memberStudents.filter(s=>absentIds.includes(s.id));

}
function SocialClubScreen({classes,students,school}){
  const T=useT();const{inp,btn,btnSm}=useStyles();
  const openReport=useReport();
  const[clubs,setClubs]=usePersist("ogretmen_clubs",[]);
  const[activities,setActivities]=usePersist("ogretmen_club_activities",[]);
  const[selClubId,setSelClubId]=usePersist("ogretmen_socialclub_selclubid",null);
  const[view,setView]=usePersist("ogretmen_socialclub_view","list");
  const[sheet,setSheet]=useState(null);
  const[draft,setDraft]=useState({});
  const[actSheet,setActSheet]=useState(null);
  const[actDraft,setActDraft]=useState({});
  const[reportMonth,setReportMonth]=useState(new Date().getMonth());
  const[reportYear,setReportYear]=useState(new Date().getFullYear());
  const[absSheet,setAbsSheet]=useState(null);
  const[memberSheet,setMemberSheet]=useState(false);
  const[memberDraft,setMemberDraft]=useState({name:"",schoolNo:"",sinif:""});
  const[editMemberId,setEditMemberId]=useState(null);
  const[importSheet,setImportSheet]=useState(false);
  const[selectMode,setSelectMode]=useState(false);
  const[selectedIds,setSelectedIds]=useState(new Set());
  const[confirm,setConfirm]=useState(null);

  const selClub=clubs.find(c=>c.id===selClubId)||null;
  const clubActs=activities.filter(a=>a.clubId===selClubId).sort((a,b)=>b.date?.localeCompare(a.date));
  // Kulübün izole üye listesi — global students'tan bağımsız
  const memberStudents=selClub?.clubMembers||[];

  const saveClub=()=>{
    if(sheet==="add")setClubs(c=>[...c,{id:uid(),clubMembers:[],...draft}]);
    else setClubs(c=>c.map(x=>x.id===draft.id?{...x,...draft}:x));
    setSheet(null);
  };
  const saveAct=()=>{
    if(!actDraft.title||!actDraft.date)return;
    const a={id:uid(),clubId:selClubId,absences:[],...actDraft};
    if(actSheet==="add")setActivities(v=>[...v,a]);
    else setActivities(v=>v.map(x=>x.id===actDraft.id?{...x,...actDraft}:x));
    setActSheet(null);
  };
  const toggleAbsence=(actId,stId)=>{
    setActivities(v=>v.map(a=>{
      if(a.id!==actId)return a;
      const abs=a.absences||[];
      return{...a,absences:abs.includes(stId)?abs.filter(x=>x!==stId):[...abs,stId]};
    }));
  };
  const saveMember=()=>{
    if(!memberDraft.name.trim())return;
    setClubs(c=>c.map(cl=>{
      if(cl.id!==selClubId)return cl;
      const members=cl.clubMembers||[];
      if(editMemberId){
        return{...cl,clubMembers:members.map(m=>m.id===editMemberId?{...m,...memberDraft}:m)};
      }
      const dup=memberDraft.schoolNo
        ?members.find(m=>m.schoolNo&&m.schoolNo.trim()===memberDraft.schoolNo.trim())
        :members.find(m=>trLower(m.name)===trLower(memberDraft.name));
      if(dup)return cl;
      return{...cl,clubMembers:[...members,{id:uid(),...memberDraft}]};
    }));
    setMemberDraft({name:"",schoolNo:"",sinif:""});
    setEditMemberId(null);
  };
  const removeMember=(mid)=>{
    setClubs(c=>c.map(cl=>cl.id!==selClubId?cl:{...cl,clubMembers:(cl.clubMembers||[]).filter(m=>m.id!==mid)}));
  };
  const removeAllMembers=()=>{
    setClubs(c=>c.map(cl=>cl.id!==selClubId?cl:{...cl,clubMembers:[]}));
  };
  const removeSelectedMembers=(ids)=>{
    setClubs(c=>c.map(cl=>cl.id!==selClubId?cl:{...cl,clubMembers:(cl.clubMembers||[]).filter(m=>!ids.has(m.id))}));
    setSelectedIds(new Set());
    setSelectMode(false);
  };
  const toggleSelect=(id)=>{
    setSelectedIds(prev=>{const next=new Set(prev);next.has(id)?next.delete(id):next.add(id);return next;});
  };
  const toggleSelectAll=()=>{
    if(selectedIds.size===memberStudents.length)setSelectedIds(new Set());
    else setSelectedIds(new Set(memberStudents.map(s=>s.id)));
  };
  const handleImport=rows=>{
    let added=0,skipped=0;
    const errors=[];const warnings=[];
    setClubs(c=>c.map(cl=>{
      if(cl.id!==selClubId)return cl;
      const members=[...(cl.clubMembers||[])];
      rows.forEach((row,i)=>{
        const name=(row.name||row["Ad Soyad"]||"").trim();
        const schoolNo=(row.schoolNo||row["Okul No"]||"").trim();
        const sinif=(row.sinif||row["Sınıf"]||"").trim();
        if(!name){errors.push(`Satır ${i+2}: Ad boş`);skipped++;return;}
        // Okul numarasıyla kontrol (tüm mevcut + bu aktarımda eklenenler)
        if(schoolNo){
          const dupByNo=members.find(m=>m.schoolNo&&m.schoolNo.trim()===schoolNo);
          if(dupByNo){
            if(trLower(dupByNo.name)===trLower(name)){
              // Aynı okul no + aynı isim → kesin mükerrer, sessizce atla
              skipped++;return;
            } else {
              // Aynı okul no + farklı isim → uyar ve atla
              warnings.push(`Satır ${i+2}: Okul no "${schoolNo}" zaten kayıtlı (${dupByNo.name}) — "${name}" atlandı`);
              skipped++;return;
            }
          }
        }
        // İsimle mükerrer kontrolü
        const dupByName=members.find(m=>trLower(m.name)===trLower(name));
        if(dupByName){skipped++;return;}
        members.push({id:uid(),name,schoolNo,sinif});
        added++;
      });
      return{...cl,clubMembers:members};
    }));
    return{added,skipped,errors,warnings,memberAdded:added};
  };
  const exportMembers=(fmt)=>{
    const rows=memberStudents.map((s,i)=>({"Sıra":i+1,"Okul No":s.schoolNo||"","Ad Soyad":s.name,"Sınıf":s.sinif||""}));

              <div style={{color:T.text,fontSize:14,fontWeight:700}}>{cl.name||"İsimsiz Kulüp"}</div>

                :cl.teacherName?<div style={{color:T.textSub,fontSize:11,marginTop:1}}>{cl.teacherName}</div>:null}
              <div style={{color:T.textSub,fontSize:11,marginTop:2}}>{mCnt} üye · {cnt} etkinlik</div>

          </Card>;
        })}

      {sheet&&<Sheet title={sheet==="add"?"Yeni Kulüp":"Kulüp Düzenle"} onClose={()=>setSheet(null)}>
        <Field label="Kulüp Adı"><input style={inp} value={draft.name||""} onChange={e=>setDraft(d=>({...d,name:e.target.value}))} placeholder="örn: Doğa Kulübü"/></Field>
        <Field label={`Danışman Öğretmenler`}>
          {(draft.teacherNames||[""]).map((tn,ti)=>(
            <div key={ti} style={{display:"flex",gap:6,marginBottom:6}}>
              <input style={{...inp,flex:1}} value={tn} onChange={e=>{const arr=[...(draft.teacherNames||[""])];arr[ti]=e.target.value;setDraft(d=>({...d,teacherNames:arr}));}} placeholder={`${ti+1}. Danışman adı soyadı`}/>
              {(draft.teacherNames||[""]).length>1&&<button onClick={()=>{const arr=(draft.teacherNames||[""]).filter((_,i)=>i!==ti);setDraft(d=>({...d,teacherNames:arr}));}} style={{background:T.dangerDim,border:"none",borderRadius:8,color:T.danger,cursor:"pointer",padding:"0 10px",fontSize:16,fontFamily:"inherit"}}>×</button>}
            </div>
          ))}
          {(draft.teacherNames||[""]).length<10&&<button onClick={()=>{const arr=[...(draft.teacherNames||[""]),""];setDraft(d=>({...d,teacherNames:arr}));}} style={{background:T.accentDim,color:T.accent,border:`1px solid ${T.accent}44`,borderRadius:8,padding:"7px 14px",cursor:"pointer",fontSize:12,fontWeight:700,fontFamily:"inherit",marginTop:2}}>+ Danışman Ekle</button>}
        </Field>
        {sheet==="edit"&&<button style={{...btn(T.dangerDim,T.danger),marginBottom:8}} onClick={()=>{setClubs(c=>c.filter(x=>x.id!==draft.id));setSheet(null);}}>🗑 Kulübü Sil</button>}

      <button style={{...btn(T.accent),marginBottom:8}} onClick={()=>{setActDraft({title:"",date:new Date().toISOString().slice(0,10),location:"",description:""});setActSheet("add");}}>+ Etkinlik Ekle</button>
      {clubActs.length===0&&<div style={{textAlign:"center",color:T.textMuted,padding:32,fontSize:13}}>Henüz etkinlik yok</div>}

      {memberStudents.map((s,i)=>{

  const MAP={
    // Öğrenci
    tcNo:          kb.tcNo,
    birthDate:     kb.birthDate,
    birthPlace:    kb.birthPlace,
    address:       kb.address,
    studentPhone:  kb.phone||kb.studentPhone,
    heightWeight:  kb.heightWeight,
    martyrChild:   kb.martyrChild,
    fromAbroad:    kb.fromAbroad,
    boarding:      kb.boarding,
    scholarship:   kb.scholarship,
    shcek:         kb.shcek,
    disability:    sa.disability||kb.disability,
    // Genel / Ev
    livesWithWhom: ab.livesWithWhom||ev.livesWithWhom,
    housingOwnership:ev.housingOwnership||ev.housingType,
    hasOwnRoom:    ev.hasOwnRoom,
    heatingType:   ev.heatingType,
    transportMethod:ok.transportMethod,
    worksJob:      ev.worksJob,
    outsideFamily: ev.outsideFamily,
    monthlyIncome: ev.monthlyIncome,
    // Sağlık
    accident:      sa.accident||kb.accident,
    surgery:       sa.surgery,
    prosthesis:    sa.prosthesis,
    pastIllness:   sa.pastIllness,
    chronicDisease:sa.chronicDisease,
    medication:    sa.medication,
    // Kardeş
    siblingsCount: ab.siblingsCount,
    // Veli
    guardianRel:   ab.guardianRel||ab.livesWithWhom,
    guardianName:  ab.guardianName||ab.otherGuardianName,
    guardianTc:    ab.guardianTc,
    guardianSms:   ab.guardianSms||ab.guardianPhone||ab.otherGuardianPhone,
    // Baba
    fatherName:    ab.fatherName,
    fatherTc:      ab.fatherTc,
    fatherEducation:ab.fatherEducation||ab.fatherOccupation,
    fatherOccupation:ab.fatherOccupation,
    fatherEmail:   ab.fatherEmail,
    fatherAlive:   ab.fatherAlive,
    fatherMarital: ab.familyStatus||ab.fatherMarital,
    fatherDisease: sa.fatherDisease||ab.fatherDisease,
    fatherDisability:sa.fatherDisability||ab.fatherDisability,
    fatherHomePhone:ab.fatherHomePhone,
    fatherPhone:   ab.fatherPhone,
    // Anne
    motherName:    ab.motherName,
    motherTc:      ab.motherTc,
    motherEducation:ab.motherEducation||ab.motherOccupation,
    motherOccupation:ab.motherOccupation,
    motherEmail:   ab.motherEmail,
    motherAlive:   ab.motherAlive,
    motherMarital: ab.motherMarital,
    motherDisease: sa.motherDisease||ab.motherDisease,
    motherDisability:sa.motherDisability||ab.motherDisability,
    motherHomePhone:ab.motherHomePhone,
    motherPhone:   ab.motherPhone,
    // Okul
    academicSuccess:ok.academicSuccess,
    attendance:    ok.attendance,
    behaviorNote:  ok.behaviorNote,
    sportActivity: ok.sportActivity,
    friendship:    ok.friendship,
    teacherRelation:ok.teacherRelation,
    // Sosyal-Duygusal
    selfConfidence:sd.selfConfidence,
    socialSkills:  sd.socialSkills,
    stressManagement:sd.stressManagement,
    motivation:    sd.motivation,
    empathy:       sd.empathy,
    aggressionControl:sd.aggressionControl,
    selfExpression:sd.selfExpression,
    // Notlar
    notlar:        gn.notlar,
  };
  const val=MAP[fieldKey];
  return (val!==undefined&&val!==null&&val!=="")?String(val):"";
}

// ─────────────────────────────────────────────
function buildBireyselFormPDF(st, data, cls, school, selKeys, ecoMode=false, accentColor="#1D4ED8", matbu=false, fitPage=false){
  const cname=cls?`${cls.grade}/${cls.branch}`:"?";

  const blankLine='<span style="color:#bbb;letter-spacing:2px">· · · · · · · · · · · · · ·</span>';

  // Seçili alanları seksiyonlara grupla
  const secMap={};
  REHBERLIK_TUM_ALANLAR.forEach(f=>{
    if(selKeys&&!selKeys.includes(f.key))return;
    if(!secMap[f.sec])secMap[f.sec]=[];
    secMap[f.sec].push(f);
  });

  const headerStyle=ecoMode
    ?`background:#fff;border:2px solid #000;color:#000;`
    :`background:${ac};color:#fff;`;
  const secTitleStyle=ecoMode
    ?`background:#ebebeb;color:#000;border-bottom:1px solid #999;`
    :`background:${ac}22;color:${ac};border-bottom:1px solid ${ac}44;`;

  let sectionsHTML="";
  Object.keys(secMap).forEach(sec=>{
    const fields=secMap[sec];
    const rows=[];
    for(let i=0;i<fields.length;i+=2){
      const f1=fields[i], f2=fields[i+1];
      const v1=matbu?blankLine:(getRehberlikValue(data,f1.key)||blankLine);
      const v2=f2?(matbu?blankLine:(getRehberlikValue(data,f2.key)||blankLine)):"";
      rows.push(`<tr>
        <td class="lbl">${f1.label}</td><td class="val">${v1}</td>
        ${f2?`<td class="lbl">${f2.label}</td><td class="val">${v2}</td>`:`<td></td><td></td>`}
      </tr>`);
    }
    sectionsHTML+=`<div class="section">
      <div class="sec-title">${REHBERLIK_SEKSIYON_LABELS[sec]||(sec.toUpperCase())}</div>

  const signRow=`<div class="sign-area">

      <div style="font-size:${fitPage?"8px":"10px"};color:#999">...../...../..............</div>
      <div style="border-top:1px solid #333;width:${fitPage?"140px":"200px"};margin-top:${fitPage?"12px":"22px"};padding-top:4px;font-size:${fitPage?"8px":"10px"}">Veli Ad Soyad / İmza</div>
    </div>
    <div style="flex:1">
      <div style="font-size:11px;font-weight:700;margin-bottom:6px">EV ADRESİ</div>
      <div style="border:1px solid #ccc;border-radius:6px;min-height:${fitPage?'28px':'50px'};padding:${fitPage?'3px':'6px'};font-size:${fitPage?'9px':'11px'}">${matbu?"":(getRehberlikValue(data,"address")||"")}</div>

  return `${css}

// ─────────────────────────────────────────────
//  TOPLU TABLO PDF (öğrenci=satır, alan=sütun)
// ─────────────────────────────────────────────
function buildTopluTablosPDF(students, rehberlikData, cls, school, selKeys, ecoMode=false, accentColor="#1D4ED8", matbu=false){
  const cname=cls?`${cls.grade}/${cls.branch}`:"?";
  const ac=ecoMode?"#000":accentColor;
  // String/number key uyuşmazlığını önle
  const getD=(id)=>rehberlikData[id]||rehberlikData[String(id)]||rehberlikData[Number(id)]||{};

  const alanlar=REHBERLIK_TUM_ALANLAR.filter(f=>selKeys?selKeys.includes(f.key):true);

  // A4 landscape kullanılabilir alan. Sayfa: 297mm - 12mm margin = 285mm ≈ 808px @96dpi
  // Sabit sütunlar: #(14) + OkulNo(50) + AdSoyad(110) = 174px
  const PAGE_W_PX=808, FIXED_PX=174, AVAIL_PX=PAGE_W_PX-FIXED_PX;

  const colWidths=alanlar.map(f=>{
    const labelLen=f.label.length;
    let maxLen=labelLen;
    students.forEach(st=>{
      const v=matbu?"":(getRehberlikValue(getD(st.id),f.key)||"");
      if(v.length>maxLen) maxLen=v.length;
    });
    // Her karakter ~5.5px, min 55px max 120px
    return Math.min(120,Math.max(55,Math.ceil(maxLen*5.5)));
  });

  // Sütunları sayfa genişliğine göre tam gruplara böl — sütun asla yarıda bölünmesin
  // Tek sütun bile sayfayı aşıyorsa kendi grubunda olsun
  const groups=[];
  let cur=[],curW=0;
  alanlar.forEach((alan,i)=>{
    const w=colWidths[i];
    if(cur.length>0 && curW+w>AVAIL_PX){groups.push(cur);cur=[];curW=0;}
    cur.push({alan,w});curW+=w;
  });
  if(cur.length>0) groups.push(cur);

  const thBg=ecoMode?"#000":ac;
  const thColor="#fff";
  const borderColor=ecoMode?"#000":ac+"88";
  const tdBorder=ecoMode?"#999":"#e2e8f0";
  const altBgColor=ecoMode?"#f5f5f5":"#f8fafc";

  const css=`<style>
  *{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI',Arial,sans-serif;}
  body{background:#fff;padding:6px 8px;font-size:8px;color:#1e293b;}
  h1{font-size:11px;font-weight:900;color:${ac};margin-bottom:2px;}
  .meta{font-size:8px;color:#64748b;margin-bottom:8px;}
  .page-block{page-break-after:always;break-after:page;}
  .page-block:last-child{page-break-after:avoid;break-after:avoid;}
  .page-label{font-size:7px;color:#94a3b8;margin-bottom:3px;font-style:italic;}
  table{border-collapse:collapse;width:100%;table-layout:auto;}
  thead{display:table-header-group;}
  th{padding:4px 5px;font-size:8px;font-weight:700;text-align:left;white-space:normal;word-break:break-word;
     background:${thBg};color:${thColor};
     border:1px solid ${borderColor};}
  td{padding:3px 5px;font-size:8px;border:1px solid ${tdBorder};
     vertical-align:middle;word-break:break-word;white-space:normal;}
  tr:nth-child(even) td{background:${altBgColor};}
  .no-col{font-weight:700;background:${ecoMode?"#e5e5e5":ac+"18"}!important;text-align:center;white-space:nowrap;width:18px;min-width:18px;}
  .school-col{text-align:center;white-space:nowrap;width:52px;min-width:52px;}
  .name-col{font-weight:600;white-space:nowrap;min-width:90px;}
  tr{page-break-inside:avoid!important;break-inside:avoid!important;}
  td,th{page-break-inside:avoid!important;break-inside:avoid!important;}
  h1,h2{page-break-after:avoid!important;break-after:avoid!important;page-break-inside:avoid!important;break-inside:avoid!important;}
  @media print{
    body{padding:4px;}
    @page{size:A4 landscape;margin:6mm;}
    thead{display:table-header-group;}
    tr{page-break-inside:avoid!important;break-inside:avoid!important;}
    td,th{page-break-inside:avoid!important;break-inside:avoid!important;}
    h1,h2{page-break-after:avoid!important;break-after:avoid!important;}
  }
  </style>`;

  const totalGroups=groups.length;
  const blocks=groups.map((group,gi)=>{
    const groupLabel=totalGroups>1?`Sütun Grubu ${gi+1}/${totalGroups}: ${group.map(g=>g.alan.label).join(", ")}`:"";
    const totalW=FIXED_PX+group.reduce((s,g)=>s+g.w,0);
    const colgroup=`<colgroup>
      <col style="width:18px"/>
      <col style="width:52px"/>
      <col style="width:110px"/>
      ${group.map(g=>`<col style="width:${g.w}px"/>`).join("")}
    </colgroup>`;
    const thead=`<thead><tr>
      <th class="no-col" style="text-align:center;white-space:nowrap">#</th>
      <th class="school-col" style="text-align:center;white-space:nowrap">Okul No</th>
      <th class="name-col">Ad Soyad</th>
      ${group.map(g=>`<th style="word-break:break-word">${g.alan.label}</th>`).join("")}
    </tr></thead>`;
    const tbody=students.map((st,i)=>{
      const data=getD(st.id);
      const isAlt=i%2===1;
      const altBg=isAlt?`background:${altBgColor}`:"";
      const tds=group.map(g=>{
        const v=matbu?"":(getRehberlikValue(data,g.alan.key)||"");
        return `<td style="${altBg}">${v}</td>`;
      }).join("");
      return `<tr>
        <td class="no-col" style="${altBg}">${i+1}</td>
        <td class="school-col" style="${altBg}">${st.schoolNo||"—"}</td>
        <td class="name-col" style="${altBg}">${st.name}</td>
        ${tds}
      </tr>`;
    }).join("");
    return `<div class="page-block">
      ${gi===0
        ?`<h1>📋 Toplu Rehberlik${matbu?" — MATBU":""} — ${cname}</h1>
         <div class="meta">${school?.name||"Okul"} · ${new Date().getFullYear()} · ${students.length} öğrenci${totalGroups>1?` · Grup ${gi+1}/${totalGroups}`:""}</div>`
        :`<div class="meta" style="margin-top:4px">${school?.name||"Okul"} · ${cname} · Devam — Grup ${gi+1}/${totalGroups}</div>`}
      ${totalGroups>1?`<div class="page-label">${groupLabel}</div>`:""}
      <table style="width:100%">${colgroup}${thead}<tbody>${tbody}</tbody></table>
    </div>`;
  });

  return `${css}${blocks.join("\n")}`;
}

// ─────────────────────────────────────────────
//  ALAN SEÇİCİ PANEL (rapor filtresi)
// ─────────────────────────────────────────────
function RehberlikAlanSecici({fo, sfo, T, btnSm, classStudents, showStudentFilter=false}){
  const selKeys=fo.selKeys||null; // null=tümü
  const secOpen=fo._secOpen||null;
  const setSec=(s)=>sfo(o=>({...o,_secOpen:o._secOpen===s?null:s}));

  const secs=[...new Set(REHBERLIK_TUM_ALANLAR.map(f=>f.sec))];
  const togSec=(sec)=>{
    const all=REHBERLIK_TUM_ALANLAR.filter(f=>f.sec===sec).map(f=>f.key);
    const cur=selKeys||REHBERLIK_TUM_ALANLAR.map(f=>f.key);
    const secOn=all.every(k=>cur.includes(k));
    if(secOn){sfo(o=>({...o,selKeys:(selKeys||REHBERLIK_TUM_ALANLAR.map(f=>f.key)).filter(k=>!all.includes(k))}));}
    else{const newKeys=[...(selKeys||REHBERLIK_TUM_ALANLAR.map(f=>f.key).filter(k=>!all.includes(k))),...all];sfo(o=>({...o,selKeys:newKeys}));}
  };
  const togKey=(key)=>{
    const all=REHBERLIK_TUM_ALANLAR.map(f=>f.key);
    const cur=selKeys||all;
    sfo(o=>({...o,selKeys:cur.includes(key)?cur.filter(k=>k!==key):[...cur,key]}));
  };
  const isKeyOn=(key)=>{if(!selKeys)return true;return selKeys.includes(key);};
  const isSecOn=(sec)=>{
    const all=REHBERLIK_TUM_ALANLAR.filter(f=>f.sec===sec).map(f=>f.key);
    const cur=selKeys||REHBERLIK_TUM_ALANLAR.map(f=>f.key);
    return all.some(k=>cur.includes(k));
  };
  const selCount=selKeys?selKeys.length:REHBERLIK_TUM_ALANLAR.length;

  // Öğrenci filtresi

}

  // ── Rehberlik CSV/XLSX dışa aktarım ──

    if(!selClass||!classStudents.length)return;
    const fixedHeaders=["Okul No","Ad Soyad"];
    const alanHeaders=REHBERLIK_TUM_ALANLAR.map(f=>f.label);
    const headers=[...fixedHeaders,...alanHeaders];
    const rows=classStudents.map(st=>{
      const d=rehberlikData[st.id]||{};
      const row={"Okul No":st.schoolNo||"","Ad Soyad":st.name};
      REHBERLIK_TUM_ALANLAR.forEach(f=>{row[f.label]=getRehberlikValue(d,f.key)||"";});
      return row;
    });
    const fname=`rehberlik_${selClass.grade}_${selClass.branch}`;
    if(fmt==="csv"){
      const csv=[headers.join(","),...rows.map(r=>headers.map(h=>`"${(r[h]||"").toString().replace(/"/g,'""')}"`).join(","))].join("\n");
      const a=document.createElement("a");a.href="data:text/csv;charset=utf-8,\uFEFF"+encodeURIComponent(csv);a.download=fname+".csv";a.click();
    } else {downloadXLSX(fname,rows);}
  };

  // ── Rehberlik CSV/XLSX içe aktarım ──
  // Satır başına öğrenci eşleştir (okul no veya isim), sadece boş alanları doldur
  const handleRehberlikImport=rows=>{
    let matched=0,updated=0,skipped=0;
    // Etiket → alan anahtarı haritası
    const labelToKey={};
    REHBERLIK_TUM_ALANLAR.forEach(f=>{labelToKey[trLower(f.label).trim()]=f;});
    // Sektör → modül eşlemesi
    const secToModule={ogrenci:"kisiselBilgiler",genel:"evEkonomik",veli:"aileBilgileri",baba:"aileBilgileri",anne:"aileBilgileri",okul:"okuldakiDurumu",sosyal:"sosyalDuygusal",notlar:"gelisimNotlari"};
    // Özel alan → modül override
    const keyToModule={
      tcNo:"kisiselBilgiler",birthDate:"kisiselBilgiler",birthPlace:"kisiselBilgiler",address:"kisiselBilgiler",studentPhone:"kisiselBilgiler",heightWeight:"kisiselBilgiler",martyrChild:"kisiselBilgiler",fromAbroad:"kisiselBilgiler",boarding:"kisiselBilgiler",scholarship:"kisiselBilgiler",shcek:"kisiselBilgiler",
      livesWithWhom:"aileBilgileri",housingOwnership:"evEkonomik",hasOwnRoom:"evEkonomik",heatingType:"evEkonomik",worksJob:"evEkonomik",outsideFamily:"evEkonomik",monthlyIncome:"evEkonomik",
      accident:"saglikBilgileri",surgery:"saglikBilgileri",prosthesis:"saglikBilgileri",pastIllness:"saglikBilgileri",chronicDisease:"saglikBilgileri",medication:"saglikBilgileri",disability:"saglikBilgileri",
      transportMethod:"okuldakiDurumu",
      siblingsCount:"aileBilgileri",guardianRel:"aileBilgileri",guardianName:"aileBilgileri",guardianTc:"aileBilgileri",guardianSms:"aileBilgileri",
      fatherName:"aileBilgileri",fatherTc:"aileBilgileri",fatherEducation:"aileBilgileri",fatherOccupation:"aileBilgileri",fatherEmail:"aileBilgileri",fatherAlive:"aileBilgileri",fatherMarital:"aileBilgileri",fatherHomePhone:"aileBilgileri",fatherPhone:"aileBilgileri",fatherDisease:"saglikBilgileri",fatherDisability:"saglikBilgileri",
      motherName:"aileBilgileri",motherTc:"aileBilgileri",motherEducation:"aileBilgileri",motherOccupation:"aileBilgileri",motherEmail:"aileBilgileri",motherAlive:"aileBilgileri",motherMarital:"aileBilgileri",motherHomePhone:"aileBilgileri",motherPhone:"aileBilgileri",motherDisease:"saglikBilgileri",motherDisability:"saglikBilgileri",
      academicSuccess:"okuldakiDurumu",attendance:"okuldakiDurumu",behaviorNote:"okuldakiDurumu",sportActivity:"okuldakiDurumu",friendship:"okuldakiDurumu",teacherRelation:"okuldakiDurumu",
      selfConfidence:"sosyalDuygusal",socialSkills:"sosyalDuygusal",stressManagement:"sosyalDuygusal",motivation:"sosyalDuygusal",empathy:"sosyalDuygusal",aggressionControl:"sosyalDuygusal",selfExpression:"sosyalDuygusal",
      notlar:"gelisimNotlari",
    };
    // Özel alan → modül içindeki gerçek key
    const keyToSubKey={studentPhone:"phone",fatherEducation:"fatherEducation",motherEducation:"motherEducation",notlar:"notlar"};

    setRehberlikData(prev=>{
      const next={...prev};
      rows.forEach(row=>{
        // Öğrenci eşleştir
        const schoolNo=(row["Okul No"]||row["okul no"]||row["OkulNo"]||"").trim();

        if(!st&&name) st=classStudents.find(s=>trLower(s.name)===trLower(name));
        if(!st){skipped++;return;}
        matched++;
        // Bu öğrencinin mevcut verisini kopyala
        const stPrev={...(prev[st.id]||{})};
        let changed=false;
        // Her sütunu tara
        Object.entries(row).forEach(([col,val])=>{
          const valStr=(val||"").toString().trim();
          if(!valStr)return; // boş değer → atla
          const colLow=trLower(col).trim();
          if(colLow==="okul no"||colLow==="ad soyad"||colLow==="okulno"||colLow==="adsoyad"||colLow==="sinif"||colLow==="sınıf")return;
          const alanDef=labelToKey[colLow]||REHBERLIK_TUM_ALANLAR.find(f=>f.key===col||trLower(f.label).trim()===colLow);
