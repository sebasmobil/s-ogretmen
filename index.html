          const modKey=keyToModule[alanDef.key]||secToModule[alanDef.sec]||"kisiselBilgiler";
          const subKey=keyToSubKey[alanDef.key]||alanDef.key;
          const modCur=stPrev[modKey]||{};
          const existing=modCur[subKey];
          // Sadece boş ise yaz (üzerine yazma değil, tamamla)
          if(!existing||existing.toString().trim()===""){
            stPrev[modKey]={...modCur,[subKey]:valStr};
            changed=true;
          }
        });
        if(changed){next[st.id]=stPrev;updated++;}
      });
      return next;
    });
    return{matched,updated,skipped,errors:[]};
  };

  // Rapor helper: seçili öğrenciler

    if(fo.selStudentIds===null||fo.selStudentIds===undefined)return classStudents;

          <button style={{...btnSm(listView==="table"?T.accent:T.toggleBg,listView==="table"?"#fff":T.textSub),padding:"5px 9px",fontSize:13}} onClick={()=>setListView("table")}>⊞</button>
          <button style={{...btnSm(T.accent,"#fff"),padding:"5px 10px",fontSize:12}} onClick={()=>{
            openReport({
              title:`📋 Toplu Rehberlik — ${selClass.grade}/${selClass.branch}`,

              supportCols:true,
              supportFitPage:true,
              defaultFilterOpts:{selKeys:null,evrakTuru:"bos",rapTipi:"tablo",selStudentIds:null,_secOpen:null,orientation:"landscape",_rehberlikSnapshot:JSON.parse(JSON.stringify(rehberlikData))},

                  <div style={{display:"flex",gap:6}}>

                  // Boş form modunda tek form yeterli (fotokopi ile çoğaltılır)
                  if(matbu){
                    const dummySt={id:"__blank__",name:"",schoolNo:"",classId:selClass?.id};
                    return buildBireyselFormPDF(dummySt,{},selClass,school,allOpts.selKeys,eco,ac,true);
                  }
                  // Veriyle dolu form — snapshot alarak closure sorununu önle
                  const dataSnapshot=allOpts._rehberlikSnapshot||rehberlikData;
                  // String/number key uyuşmazlığını önlemek için her iki formatta ara
                  const getStData=(id)=>dataSnapshot[id]||dataSnapshot[String(id)]||dataSnapshot[Number(id)]||{};
                  // Sadece veri girilmiş öğrenciler — boş olanlar dahil edilmez
                  const pdfTargets=targets.filter(st=>Object.keys(getStData(st.id)).length>0);
                  if(!pdfTargets.length)return null;
                  // Her öğrenci <!--NEWPAGE--> ile ayrılır → her biri ayrı A4 sayfasına sığar
                  // fitOnePage=true → her form tek A4'e kompakt sığacak şekilde üretilir
                  const pages=pdfTargets.map(st=>{
                    const stData=getStData(st.id);
                    return buildBireyselFormPDF(st,stData,selClass,school,allOpts.selKeys,eco,ac,false,true);
                  });
                  return pages.join("<!--NEWPAGE-->");
                }
                return buildTopluTablosPDF(targets,rehberlikData,selClass,school,allOpts.selKeys,eco,ac,matbu);
              },
            });
          }}>📥 PDF</button>

function BackupScreen(){
  const T=useT();const{btn,btnSm}=useStyles();
  const allKeys=BACKUP_MODULES.map(m=>m.key);
  const[selKeys,setSelKeys]=useState(allKeys);
  const[backupMsg,setBackupMsg]=useState("");
  // Geri yükleme önizleme state'i
  const[restorePreview,setRestorePreview]=useState(null); // {data, summary, file}
  const[restoreMsg,setRestoreMsg]=useState("");
  const[appResetConfirm,setAppResetConfirm]=useState(false);
  const toggleKey=k=>setSelKeys(s=>s.includes(k)?s.filter(x=>x!==k):[...s,k]);
  const dataKeys=BACKUP_MODULES.filter(m=>m.group==="data").map(m=>m.key);
  const uiKeys=BACKUP_MODULES.filter(m=>m.group==="ui").map(m=>m.key);
  const doBackup=()=>{
    const data={_version:2,_date:new Date().toISOString(),_app:"S-Öğretmen "+APP_VERSION};
    selKeys.forEach(k=>{
      try{
        const v=window.localStorage?.getItem(k);
        if(v==null)return;
        // theme ve cal_days string olarak saklanır, diğerleri JSON
        if(k==="ogretmen_theme"||k==="ogretmen_cal_days"){data[k]=v;}
        else{try{data[k]=JSON.parse(v);}catch{data[k]=v;}}
      }catch(e){}
    });
    const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
    const a=document.createElement("a");
    a.href=URL.createObjectURL(blob);
    a.download=`ogretmen_yedek_${new Date().toISOString().slice(0,10)}.json`;
    a.click();
    try{localStorage.setItem("ogretmen_last_backup",JSON.stringify({date:new Date().toISOString()}));}catch(e){}
    setBackupMsg(`✅ ${selKeys.length} modül başarıyla yedeklendi. Dosya indirildi.`);
    setTimeout(()=>setBackupMsg(""),5000);
  };
  const readRestoreFile=file=>{
    const r=new FileReader();
    r.onload=e=>{
      try{
        const data=JSON.parse(e.target.result);
        if(!data._app||!data._app.startsWith("S-Öğretmen")){
          setRestoreMsg("❌ Geçersiz yedek dosyası");setTimeout(()=>setRestoreMsg(""),3000);return;
        }
        // Özet hesapla
        const keys=Object.keys(data).filter(k=>!k.startsWith("_"));
        const summary=keys.map(k=>{
          const mod=BACKUP_MODULES.find(m=>m.key===k);
          const label=mod?mod.label:k;

function EnhancedCalendarScreen({exams,homeworks,classes,lessons,calEvents,setCalEvents}){
  const T=useT();const{inp,btn,btnSm}=useStyles();

  const[year,setYear]=useState(today.getFullYear());

  const[snoozeCustomUnit,setSnoozeCustomUnit]=useState("gun");
  const monthStart=new Date(year,month,1);
  const monthEnd=new Date(year,month+1,0);
  const startWd=(monthStart.getDay()+6)%7;
  const daysInMonth=monthEnd.getDate();
  const todayStr=today.toISOString().slice(0,10);
  const pad=n=>String(n).padStart(2,"0");
  const dateStr=d=>`${year}-${pad(month+1)}-${pad(d)}`;
  const MONTH_TR2=["Ocak","Şubat","Mart","Nisan","Mayıs","Haziran","Temmuz","Ağustos","Eylül","Ekim","Kasım","Aralık"];
  const WD_TR=["Pzt","Sal","Çar","Per","Cum","Cmt","Paz"];
  const eventMap=useMemo(()=>{

    homeworks.forEach(hw=>{if(!hw.dueDate)return;if(!m[hw.dueDate])m[hw.dueDate]=[];m[hw.dueDate].push({type:"hw",label:`📋 ${hw.title||"Ödev"} · ${cname(hw.classId)}`,color:T.purple});});
    calEvents.forEach(ev=>{if(!ev.date)return;if(!m[ev.date])m[ev.date]=[];
      const pColor={yüksek:T.danger,orta:T.warn,düşük:T.success}[ev.priority||"orta"]||T.warn;
      m[ev.date].push({type:"custom",label:`🗓 ${ev.title}`,color:pColor,id:ev.id});

  const saveEvent=()=>{
    const d=evDraft.date||dateStr(selDay||today.getDate());

      setCalEvents(v=>v.map(e=>e.id===editEv?{...e,...evDraft,date:d}:e));
      setEditEv(null);
    } else {
      setCalEvents(v=>[...v,{id:uid(),...evDraft,date:d}]);

    setEvDraft({title:"",priority:"orta",note:"",date:""});

  // Erteleme uygula
  const applySnooze=(id,days)=>{
    setCalEvents(v=>v.map(e=>{
      if(e.id!==id)return e;

    }));
    setSnoozeEv(null);
  };

            <span style={{color:isToday?T.accent:isWeekend?T.danger:T.text,fontSize:12,fontWeight:isToday?800:400}}>{d}</span>
            <div style={{display:"flex",gap:2,flexWrap:"wrap",justifyContent:"center"}}>

        <button style={btnSm(T.accent,"#fff")} onClick={()=>{setEvDraft({title:"",priority:"orta",note:"",date:dateStr(selDay)});setAddEvSheet(true);}}>+ Etkinlik</button>
      </div>
      {selEvents.length===0

          <span style={{color:ev.color,fontSize:12,fontWeight:600,flex:1}}>{ev.label}</span>

          <button onClick={applySnoozeCustom} style={{...btn(T.accent),width:"auto",padding:"10px 16px",flexShrink:0}}>Uygula</button>
        </div>
        <button style={{...btn(T.toggleBg,T.textSub)}} onClick={()=>setSnoozeEv(null)}>İptal</button>
      </Sheet>;
    })()}
  </div>;
}
// ══════════════════════════════════════════
//  AKILLI HATA YAKALAYICI 🐛
// ══════════════════════════════════════════
const ERR_LOG = [];

function parseErrStack(stack=''){
  return (stack||'').split('\n').filter(l=>l.trim()).map(l=>{
    const m = l.match(/(?:at\s+)?([^(@\s][^(@]*?)?\s*[@(]([^)]+):(\d+):(\d+)\)?/);
    if(m) return {fn:(m[1]||'').trim()||'anonim',file:m[2]||'',line:m[3]||'?',col:m[4]||'?'};
    return {fn:l.trim(),file:'',line:'?',col:'?'};
  }).filter(f=>f.fn||f.file).slice(0,10);
}

function buildErrReport(e){
  const top = e.frames[0];
  return [
    '=== S-Öğretmen Hata Raporu ===',
    'Versiyon : v'+APP_VERSION,
    'Tarih    : '+e.date+' '+e.time,
    'Hata     : '+e.msg,
    'Satır    : '+(top?top.line:e.lineno)+'  Sütun: '+(top?top.col:e.colno),
    'Fonksiyon: '+(top?top.fn:'bilinmeyen'),
    'Kaynak   : '+e.source,
    '',
    '--- Stack Trace ---',
    ...e.frames.map((f,i)=>'  '+i+': '+(f.fn||'anonim')+' @ satır '+f.line+':'+f.col),
    '',
    '--- Tarayıcı ---',
    e.ua
  ].join('\n');
}

function showErrModal(entry){
  // Zaten bir modal varsa güncelle
  let modal = document.getElementById('_errModal');
  if(!modal){
    modal = document.createElement('div');
    modal.id = '_errModal';
    document.body.appendChild(modal);
  }

  const top = entry.frames[0];
  const line = top ? top.line : entry.lineno;
  const col  = top ? top.col  : entry.colno;
  const fn   = top ? top.fn   : 'bilinmeyen';
  const report = buildErrReport(entry);

  const stackRows = entry.frames.map((f,i)=>
    '<div style="display:flex;gap:10px;padding:3px 0;color:'+(i===0?'#f87171':'#6b7280')+'">'
    +'<span style="min-width:16px;text-align:right;opacity:.5;font-family:monospace;font-size:10px">'+i+'</span>'
    +'<span style="font-family:monospace;font-size:10px;color:'+(i===0?'#fbbf24':'#9ca3af')+';flex:1">'+(f.fn||'anonim')+'</span>'
    +'<span style="font-family:monospace;font-size:10px;opacity:.5">'+f.line+':'+f.col+'</span>'
    +'</div>'
  ).join('');

  modal.innerHTML =
    '<div style="position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:99999;display:flex;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px);padding:12px">'
    +'<div style="background:#111827;border:1px solid rgba(248,113,113,.35);border-radius:16px 16px 12px 12px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;font-family:-apple-system,BlinkMacSystemFont,sans-serif">'

    // Başlık
    +'<div style="padding:14px 16px;border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:10px">'
    +'<span style="font-size:18px">🐛</span>'
    +'<div style="flex:1"><div style="font-size:14px;font-weight:700;color:#f87171">Hata Yakalandı</div>'
    +'<div style="font-size:11px;color:#6b7280">S-Öğretmen v'+APP_VERSION+' · '+entry.date+' '+entry.time+'</div></div></div>'

    // Hata mesajı
    +'<div style="padding:12px 16px;border-bottom:1px solid rgba(255,255,255,.08)">'
    +'<div style="font-size:13px;font-weight:600;color:#f87171;word-break:break-all;margin-bottom:8px">'+entry.msg+'</div>'
    +'<div style="display:flex;gap:12px;flex-wrap:wrap;font-size:11px">'
    +'<span style="color:#fbbf24;font-family:monospace">📍 Satır '+line+' : '+col+'</span>'
    +'<span style="color:#9ca3af">⚙ '+fn+'</span>'
    +'</div></div>'

    // Stack trace
    +(entry.frames.length
      ? '<div style="padding:10px 16px;border-bottom:1px solid rgba(255,255,255,.08)">'
        +'<div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:#4b5563;margin-bottom:6px">Çağrı Zinciri</div>'
        +'<div style="background:#0d1117;border-radius:8px;padding:8px 10px">'+stackRows+'</div></div>'
      : '')

    // Rapor textarea
    +'<div style="padding:10px 16px;border-bottom:1px solid rgba(255,255,255,.08)">'
    +'<div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:#4b5563;margin-bottom:6px">Rapor Önizleme</div>'
    +'<textarea id="_errTxt" readonly style="width:100%;height:80px;background:#0d1117;border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:8px;font-family:monospace;font-size:10px;color:#9ca3af;resize:none;outline:none;line-height:1.6">'+report+'</textarea></div>'

    // Butonlar
    +'<div style="padding:12px 16px;display:flex;gap:8px">'
    +'<button id="_errCopyBtn" onclick="(function(){'
      +'var t=document.getElementById(\'_errTxt\').value;'
      +'if(navigator.clipboard){navigator.clipboard.writeText(t).then(function(){'
        +'var b=document.getElementById(\'_errCopyBtn\');b.textContent=\'✓ Kopyalandı!\';setTimeout(function(){b.textContent=\'Kopyala\';},2000);'
      +'});}else{prompt(\'Kopyalayın:\',t);}'
    +'})()" style="flex:1;padding:10px;background:#4B8BFF;border:none;border-radius:10px;color:#fff;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit">Kopyala</button>'
    +'<button onclick="document.getElementById(\'_errModal\').style.display=\'none\'" style="flex:1;padding:10px;background:transparent;border:1px solid rgba(255,255,255,.15);border-radius:10px;color:#d1d5db;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit">Vazgeç</button>'
    +'<button onclick="location.reload()" style="padding:10px 14px;background:transparent;border:1px solid rgba(248,113,113,.3);border-radius:10px;color:#f87171;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit">Yenile</button>'
    +'</div>'

    +'</div></div>';

  modal.style.display = 'block';
}

function registerErr(msg, source, lineno, colno, error){
  const ts = new Date();
  const entry = {
    id: Date.now(),
    time: ts.toLocaleTimeString('tr-TR'),
    date: ts.toLocaleDateString('tr-TR'),
    msg: String(msg||'Bilinmeyen hata'),
    source: source||location.href,
    lineno: lineno||'?',
    colno: colno||'?',
    stack: error&&error.stack||'',
    frames: parseErrStack(error&&error.stack||''),
    ua: navigator.userAgent
  };
  ERR_LOG.unshift(entry);
  showErrModal(entry);
  return false;
}

window.onerror = function(msg,src,line,col,err){ return registerErr(msg,src,line,col,err); };
window.addEventListener('unhandledrejection',function(e){
  registerErr(
    e.reason&&e.reason.message ? e.reason.message : String(e.reason),
    location.href,'?','?',
    e.reason instanceof Error ? e.reason : new Error(String(e.reason))
  );
});

class ErrorBoundary extends React.Component{
  constructor(p){super(p);this.state={err:null};}
  static getDerivedStateFromError(e){return{err:e};}
  componentDidCatch(e,info){
    console.error('App crash:',e,info);
    registerErr(e.message||String(e), location.href,'?','?', e);
  }
  render(){
    if(this.state.err){
      // Hata yakalayıcı modal zaten açılır — sadece boş ekran bırak
      return React.createElement('div',{style:{position:'fixed',inset:0,background:'#060A12'}});
    }
    return this.props.children;
  }
}
function App(){
  const[reportCfg,setReportCfg]=useState(null);
  return <ReportProvider reportCfg={reportCfg} setReportCfg={setReportCfg}>
    <AppInner reportCfg={reportCfg} setReportCfg={setReportCfg}/>
  </ReportProvider>;
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(ErrorBoundary,null,React.createElement(App)));
  </script>
</body>
