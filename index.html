// Not İşlemleri: Veri İçe Aktar (Not Aktarımı)
function NotImportSheet({onClose,classes,students,exams,setExams,lessons,setExamScores,examScores,perfScores,setPerfScores,projScores,setProjScores}){
  const T=useT();const{inp,btn,btnSm}=useStyles();
  const[step,setStep]=useState("pick");   // pick|lesson|map|preview|done
  const[parsed,setParsed]=useState(null);
  const[mapping,setMapping]=useState({});
  const[loading,setLoading]=useState(false);
  const[error,setError]=useState("");
  const[importResult,setImportResult]=useState(null);
  const[overwriteMode,setOverwriteMode]=useState(true);

  const[selLessonId,setSelLessonId]=useState(null);   // seçilen ders
  const[selClassId,setSelClassId]=useState(null);     // seçilen sınıf (opsiyonel)
  const sortedClasses=[...classes].sort((a,b)=>a.grade-b.grade||a.branch.localeCompare(b.branch));
  // Dinamik sayılar — kaydedilmiş ayarlardan oku
  const[examCountSettings]=usePersist("ogretmen_exam_counts",{term1:2,term2:2});
  const[perfCounts]=usePersist("ogretmen_perf_counts",{});
  const[projCounts]=usePersist("ogretmen_proj_counts",{});
  // En fazla kaç adet var — seçili ders+sınıf bazlı
  const maxPerfPerTerm=(term)=>{
    let mx=0;
    classes.forEach(c=>{
      const lk=selLessonId?`${c.id}_${term}_${selLessonId}`:null;
      const gk=`${c.id}_${term}`;
      const n=(lk&&perfCounts[lk]!=null?perfCounts[lk]:perfCounts[gk])||3;
      if(n>mx)mx=n;
    });
    return Math.max(mx,1);
  };
  const maxProjPerTerm=(term)=>{
    let mx=0;
    classes.forEach(c=>{
      const lk=selLessonId?`${c.id}_${term}_${selLessonId}`:null;
      const gk=`${c.id}_${term}`;
      const n=(lk&&projCounts[lk]!=null?projCounts[lk]:projCounts[gk])||1;
      if(n>mx)mx=n;
    });
    return Math.max(mx,1);
  };
  const ec1=examCountSettings.term1||3;
  const ec2=examCountSettings.term2||3;
  const mp1=maxPerfPerTerm("1");const mp2=maxPerfPerTerm("2");
  const mpr1=maxProjPerTerm("1");const mpr2=maxProjPerTerm("2");
  // targetFields dinamik olarak oluştur
  const targetFields=[
    {key:"schoolNo",label:"Okul Numarası",required:true},
    {key:"name",label:"Ad Soyad",required:false},
    ...Array.from({length:ec1},(_,i)=>({key:`exam${i+1}`,label:`1.D ${i+1}.Yazılı`})),
    ...Array.from({length:ec2},(_,i)=>({key:`exam${ec1+i+1}`,label:`2.D ${i+1}.Yazılı`})),
    ...Array.from({length:mp1},(_,i)=>({key:`dip1${i+1}`,label:`1.D ${i+1}.DİP`})),
    ...Array.from({length:mp2},(_,i)=>({key:`dip2${i+1}`,label:`2.D ${i+1}.DİP`})),
    ...Array.from({length:mpr1},(_,i)=>({key:`proj1${i+1}`,label:`1.D ${i+1}.Proje`})),
    ...Array.from({length:mpr2},(_,i)=>({key:`proj2${i+1}`,label:`2.D ${i+1}.Proje`})),
  ];
  const autoMap=headers=>{
    const m={};
    const norm=s=>{let r=(s||"");r=r.replace(/İ/g,"i").replace(/I/g,"i").replace(/Ğ/g,"g").replace(/Ü/g,"u").replace(/Ş/g,"s").replace(/Ö/g,"o").replace(/Ç/g,"c").replace(/ı/g,"i").replace(/ğ/g,"g").replace(/ü/g,"u").replace(/ş/g,"s").replace(/ö/g,"o").replace(/ç/g,"c");r=r.toLowerCase();r=r.replace(/[\s_\-\.\/(\)]+/g,"");return r;};
    const usedN=new Set();
    targetFields.forEach(f=>{
      const fN=norm(f.label);const fK=norm(f.key);
      let match=null;
      // Özel alan eşleştirmeleri
      if(f.key==="schoolNo"){
        match=headers.find(h=>{if(usedN.has(h))return false;const hn=norm(h);return hn==="okulno"||hn==="okulnumarasi"||hn==="schoolno"||(hn.includes("okul")&&hn.includes("no"))||hn==="no";});
      } else if(f.key==="name"){
        match=headers.find(h=>{if(usedN.has(h))return false;const hn=norm(h);return hn==="adsoyad"||hn==="adisoyadi"||hn.includes("adsoyad")||(hn.includes("ad")&&hn.includes("soy"))||hn==="name";});
      } else {
        // Yazılı/DİP/Proje: label tam eşleşme önce
        match=headers.find(h=>!usedN.has(h)&&(norm(h)===fN||norm(h)===fK));
        if(!match&&fN.length>3)match=headers.find(h=>{if(usedN.has(h))return false;const hn=norm(h);return hn.includes(fN)||fN.includes(hn)&&hn.length>3;});
      }
      if(match){m[f.key]=match;usedN.add(match);}
    });
    return m;
  };
  const readCSV=text=>{
    const lines=text.trim().split(/\r?\n/);
    if(lines.length<2)throw new Error("Boş CSV");
    const sep=lines[0].includes(";")?";":",";
    const headers=lines[0].split(sep).map(h=>h.trim().replace(/^"|"$/g,""));
    const rows=lines.slice(1).filter(l=>l.trim()).map(l=>{
      const vals=l.split(sep).map(v=>v.trim().replace(/^"|"$/g,""));
      const obj={};headers.forEach((h,i)=>{obj[h]=(vals[i]||"").trim();});return obj;
    });
    return{headers,rows};
  };
  const readXLSX=async file=>{
    if(!window.XLSX){
      await new Promise((ok,fail)=>{const s=document.createElement("script");s.src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js";s.onload=ok;s.onerror=fail;document.head.appendChild(s);});
    }
    return new Promise((res,rej)=>{
      const r=new FileReader();r.onload=e=>{
        try{const wb=window.XLSX.read(e.target.result,{type:"array"});
          const ws=wb.Sheets[wb.SheetNames[0]];
          const data=window.XLSX.utils.sheet_to_json(ws,{header:1,defval:""});
          if(data.length<2)throw new Error("Boş Excel");
          const headers=data[0].map(h=>String(h).trim());
          const rows=data.slice(1).filter(row=>row.some(v=>v!=="")).map(row=>{
            const obj={};headers.forEach((h,i)=>{obj[h]=String(row[i]||"").trim();});return obj;
          });
          res({headers,rows});
        }catch(err){rej(err);}
      };r.readAsArrayBuffer(file);
    });
  };
  const handleFile=async file=>{
    if(!file)return;
    setError("");setLoading(true);
    try{
      const ext=file.name.split(".").pop().toLowerCase();
      let result;
      if(ext==="csv"||ext==="txt"){result=readCSV(await file.text());}
      else if(ext==="xlsx"||ext==="xls"){result=await readXLSX(file);}
      else{throw new Error(`Desteklenmeyen format: .${ext}`);}
      if(!result.headers.length)throw new Error("Başlık satırı bulunamadı");
      setParsed(result);setMapping(autoMap(result.headers));setStep("lesson");
    }catch(err){setError(err.message);}finally{setLoading(false);}
  };
  const normName=s=>trLower(s||"").replace(/\s+/g," ").trim();
  const matchStudent=(schoolNo,name)=>{
    const noMatch=schoolNo?students.filter(s=>s.schoolNo&&s.schoolNo.trim()===schoolNo.trim()):[];
    if(noMatch.length===1){
      const st=noMatch[0];
      if(name&&normName(st.name)!==normName(name)){
        return{student:st,warning:`Okul no eşleşti ama ad uyuşmuyor: "${st.name}" ≠ "${name}"`};
      }
      return{student:st,warning:null};
    }
    if(name){const nameMatch=students.filter(s=>normName(s.name)===normName(name));if(nameMatch.length===1)return{student:nameMatch[0],warning:null};}
    return{student:null,warning:null};
  };
  const doImport=()=>{
    let matched=0,skipped=0,warnings=[];
    // ── ADIM 1: Hangi sınıf+dönem+sıra kombinasyonları gerekiyor? Önce tespit et ──
    // examRegistry: {clsId_term_examNo → exam objesi} — hem mevcut hem yeni oluşturulanlar
    const examRegistry={};
    // Mevcut sınavları yükle
    exams.forEach(ex=>{
      const k=`${ex.classId}_${ex.term}_${ex.examNo}_${ex.lessonId}`;
      examRegistry[k]=ex;
    });
    // Gerekli sınavları bul ve tek seferlik oluştur
    const newExams=[];
    const getOrCreateExam=(clsId,term,examNo,lessonId)=>{
      if(!lessonId)return null;
      const k=`${clsId}_${term}_${examNo}_${lessonId}`;
      if(examRegistry[k])return examRegistry[k];
      // Ders+sınıf+dönem+sıra eşleşmesini daha geniş ara (lessonId olmadan)
      const existing=exams.find(ex=>
        ex.classId===clsId&&String(ex.term)===String(term)&&
        String(ex.examNo)===String(examNo)&&String(ex.lessonId)===String(lessonId)
      );
      if(existing){examRegistry[k]=existing;return existing;}
      const newEx={id:uid(),name:"",lessonId:Number(lessonId),classId:clsId,
        date:new Date().toISOString().slice(0,10),term:String(term),examNo:String(examNo),
        questions:[{id:1,label:"1",maxScore:20},{id:2,label:"2",maxScore:20},
                   {id:3,label:"3",maxScore:20},{id:4,label:"4",maxScore:20},{id:5,label:"5",maxScore:20}]};
      examRegistry[k]=newEx;
      newExams.push(newEx);
      return newEx;
    };
    // Tüm satırları tara — hangi sınıf+dönem+sıra lazım?
    parsed.rows.forEach(row=>{
      const schoolNo=(row[mapping.schoolNo]||"").trim();
      const name=(row[mapping.name]||"").trim();
      if(!schoolNo&&!name)return;
      const{student}=matchStudent(schoolNo,name);
      if(!student)return;
      const clsId=student.classId;
      const lessonId=selLessonId&&(!selClassId||String(clsId)===String(selClassId))?selLessonId:null;
      if(!lessonId)return;
      for(let i=1;i<=ec1;i++){if(mapping[`exam${i}`])getOrCreateExam(clsId,"1",i,lessonId);}
      for(let i=1;i<=ec2;i++){if(mapping[`exam${ec1+i}`])getOrCreateExam(clsId,"2",i,lessonId);}
    });
    // Yeni sınavları tek seferlik ekle
    if(newExams.length>0){
      setExams(prev=>{
        const ids=new Set(prev.map(e=>e.id));
        return [...prev,...newExams.filter(e=>!ids.has(e.id))];
      });
    }
    // ── ADIM 2: Notları ata ──
    parsed.rows.forEach((row,ri)=>{
      const schoolNo=(row[mapping.schoolNo]||"").trim();
      const name=(row[mapping.name]||"").trim();
      if(!schoolNo&&!name){skipped++;return;}
      const{student,warning}=matchStudent(schoolNo,name);
      if(warning)warnings.push(`Satır ${ri+2}: ${warning}`);
      if(!student){skipped++;return;}
      matched++;
      const clsId=student.classId;
      const lessonId=selLessonId&&(!selClassId||String(clsId)===String(selClassId))?selLessonId:null;
      // 1.dönem yazılıları
      for(let i=1;i<=ec1;i++){
        const fk=`exam${i}`;
        if(!mapping[fk])continue;
        const val=(row[mapping[fk]]||"").trim();if(!val)continue;
        const num=Number(val);if(isNaN(num))continue;
        // Önce mevcut sınavlarda ara, sonra registry'de
        let ex=exams.find(e=>e.classId===clsId&&String(e.term)==="1"&&String(e.examNo)===String(i)&&(!lessonId||String(e.lessonId)===String(lessonId)));
        if(!ex&&lessonId)ex=examRegistry[`${clsId}_1_${i}_${lessonId}`];
        if(!ex)continue;
        const examKey=String(ex.id);
        const prevSc=examScores[examKey]||{};
        if(!overwriteMode&&prevSc[student.id]?.__soScore!=null&&prevSc[student.id].__soScore!=="")continue;
        setExamScores(s=>({...s,[examKey]:{...(s[examKey]||{}),[student.id]:{...((s[examKey]||{})[student.id]||{}),__soScore:num,__scoreOnly:num}}}));
      }
      // 2.dönem yazılıları
      for(let i=1;i<=ec2;i++){
        const fk=`exam${ec1+i}`;
        if(!mapping[fk])continue;
        const val=(row[mapping[fk]]||"").trim();if(!val)continue;
        const num=Number(val);if(isNaN(num))continue;
        let ex=exams.find(e=>e.classId===clsId&&String(e.term)==="2"&&String(e.examNo)===String(i)&&(!lessonId||String(e.lessonId)===String(lessonId)));
        if(!ex&&lessonId)ex=examRegistry[`${clsId}_2_${i}_${lessonId}`];
        if(!ex)continue;
        const examKey=String(ex.id);
        const prevSc=examScores[examKey]||{};
        if(!overwriteMode&&prevSc[student.id]?.__soScore!=null&&prevSc[student.id].__soScore!=="")continue;
        setExamScores(s=>({...s,[examKey]:{...(s[examKey]||{}),[student.id]:{...((s[examKey]||{})[student.id]||{}),__soScore:num,__scoreOnly:num}}}));
      }
      // Perf scores — ders bazlı key ile yaz
      [[mp1,"1"],[mp2,"2"]].forEach(([maxN,term])=>{
        for(let no=1;no<=maxN;no++){
          const fk=`dip${term}${no}`;
          if(!mapping[fk])continue;const val=(row[mapping[fk]]||"").trim();if(!val)continue;const num=Number(val);if(isNaN(num))continue;
          const clsId=student.classId;
          const lesKey=selLessonId?`${selLessonId}_p${no}`:`p${no}`;
          setPerfScores(ps=>{
            const prev=ps[clsId]||{};const tk=`term${term}`;const td=prev[tk]||{};const sd=td[student.id]||{};
            if(!overwriteMode&&sd[lesKey]!=null&&sd[lesKey]!=="")return ps;
            return{...ps,[clsId]:{...prev,[tk]:{...td,[student.id]:{...sd,[lesKey]:String(num)}}}};
          });
        }
      });
      // Proj scores — ders bazlı key ile yaz
      [[mpr1,"1"],[mpr2,"2"]].forEach(([maxN,term])=>{
        for(let no=1;no<=maxN;no++){
          const fk=`proj${term}${no}`;
          if(!mapping[fk])continue;const val=(row[mapping[fk]]||"").trim();if(!val)continue;const num=Number(val);if(isNaN(num))continue;
          const clsId=student.classId;
          const lesKey=selLessonId?`${selLessonId}_p${no}`:`p${no}`;
          setProjScores(ps=>{
            const prev=ps[clsId]||{};const tk=`term${term}`;const td=prev[tk]||{};const sd=td[student.id]||{};
            if(!overwriteMode&&sd[lesKey]!=null&&sd[lesKey]!=="")return ps;
            return{...ps,[clsId]:{...prev,[tk]:{...td,[student.id]:{...sd,[lesKey]:String(num)}}}};
          });
        }
      });
    });
    setImportResult({matched,skipped,warnings});setStep("done");
  };
  const STEPS=[["pick","📂 Dosya"],["lesson","📚 Ders"],["map","🔗 Eşleştir"],["done","✅ Tamam"]];
  const sel={...inp,fontSize:13,padding:"8px 10px"};
  const preview=parsed?parsed.rows.slice(0,4).map(row=>{const obj={};targetFields.forEach(f=>{if(mapping[f.key])obj[f.key]=row[mapping[f.key]]||"";});return obj;}):[];
  return <Sheet title="📥 Not İçe Aktarımı" onClose={onClose}>
    <div style={{display:"flex",gap:3,marginBottom:16}}>
      {STEPS.map(([s,l],i)=>{const active=step===s;const past=STEPS.findIndex(x=>x[0]===step)>i;return <div key={s} style={{flex:1,textAlign:"center",padding:"5px 2px",borderRadius:8,fontSize:10,fontWeight:600,background:active?T.accent:past?T.successDim:T.toggleBg,color:active?"#fff":past?T.success:T.textMuted}}>{l}</div>;})}
    </div>
    {step==="pick"&&<>
      <div style={{display:"flex",gap:8,marginBottom:14}}>
        {[{id:"csv",icon:"📄",label:"CSV",desc:".csv"},{id:"xlsx",icon:"📊",label:"Excel",desc:".xlsx"}].map(ft=>(
          <div key={ft.id} style={{flex:1,background:T.surface,border:`2px solid ${T.border}`,borderRadius:12,padding:"12px 8px",textAlign:"center",cursor:"pointer"}}
            onClick={()=>document.getElementById(`notimport-${ft.id}`).click()}>
            <div style={{fontSize:28,marginBottom:4}}>{ft.icon}</div>
            <div style={{color:T.text,fontSize:13,fontWeight:700}}>{ft.label}</div>
            <div style={{color:T.textMuted,fontSize:10,marginTop:2}}>{ft.desc}</div>
            <input id={`notimport-${ft.id}`} type="file" accept={ft.id==="csv"?".csv,.txt":".xlsx,.xls"} style={{display:"none"}} onChange={e=>handleFile(e.target.files[0])}/>
          </div>
        ))}
      </div>
      {loading&&<div style={{textAlign:"center",padding:"20px 0",color:T.textSub}}>⏳ Okunuyor...</div>}
      {error&&<div style={{background:T.dangerDim,color:T.danger,borderRadius:10,padding:"10px 14px",fontSize:12}}>{error}</div>}
      <div style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:10,padding:"10px 14px",marginTop:8}}>
        <div style={{color:T.textSub,fontSize:11,fontWeight:700,marginBottom:5}}>💡 Format</div>
        <div style={{color:T.textMuted,fontSize:11,lineHeight:1.7}}>İlk satır başlık. Öğrenci eşleşmesi: Okul No + Ad Soyad. Türkçe karakterler desteklenir.</div>
      </div>
    </>}
    {step==="lesson"&&parsed&&<>
      <div style={{color:T.textSub,fontSize:12,marginBottom:14,lineHeight:1.6}}>
        Aktarılan yazılı notları hangi derse ait? Yoksa mevcut sınavlar kullanılır.
      </div>
      <Field label="Ders">
        <select style={inp} value={selLessonId||""} onChange={e=>setSelLessonId(e.target.value||null)}>
          <option value="">— Mevcut sınavları kullan (ders seçmeden devam et) —</option>
          {(lessons||[]).map(l=><option key={l.id} value={String(l.id)}>{l.name}</option>)}
        </select>
      </Field>
      {selLessonId&&<Field label="Sınıf (boş = tüm sınıflara)">
        <select style={inp} value={selClassId||""} onChange={e=>setSelClassId(e.target.value||null)}>
          <option value="">— Tüm sınıflara uygula —</option>
          {sortedClasses.map(cl=><option key={cl.id} value={String(cl.id)}>{cl.grade}/{cl.branch}</option>)}
        </select>
      </Field>}
      {selLessonId&&<div style={{background:T.accentDim,borderRadius:10,padding:"10px 14px",marginBottom:8,fontSize:11,color:T.accent,lineHeight:1.6}}>
        Aktarım sırasında bu ders için gereken yazılı sınavlar otomatik oluşturulacak.
      </div>}
      <div style={{display:"flex",gap:8,marginTop:8}}>
        <BackBtn onClick={()=>setStep("pick")} style={{width:30,height:30}}/>
        <button style={{...btn(T.accent),flex:1}} onClick={()=>setStep("map")}>Devam →</button>
      </div>
    </>}
        {step==="map"&&parsed&&<>
      <div style={{background:T.successDim,borderRadius:8,padding:"8px 12px",marginBottom:12,color:T.success,fontSize:12,fontWeight:600}}>✅ {parsed.rows.length} satır okundu</div>
      <Field label="Mevcut Puanlar">
        <div style={{display:"flex",gap:6}}>
          <button onClick={()=>setOverwriteMode(true)} style={{...btnSm(overwriteMode?T.warn:T.toggleBg,overwriteMode?T.warnDim:"#fff"? "#fff":T.textSub),flex:1,border:`1px solid ${overwriteMode?T.warn:T.border}`,background:overwriteMode?T.warn:T.toggleBg,color:overwriteMode?"#fff":T.textSub}}>Üzerine Yaz</button>
          <button onClick={()=>setOverwriteMode(false)} style={{...btnSm(!overwriteMode?T.success:T.toggleBg,!overwriteMode?"#fff":T.textSub),flex:1,border:`1px solid ${!overwriteMode?T.success:T.border}`,background:!overwriteMode?T.success:T.toggleBg,color:!overwriteMode?"#fff":T.textSub}}>Mevcut Koru</button>
        </div>
      </Field>
      {targetFields.map(f=><Field key={f.key} label={<span>{f.label}{f.required&&<span style={{color:T.danger}}> *</span>}</span>}>
        <select style={sel} value={mapping[f.key]||""} onChange={e=>setMapping(m=>({...m,[f.key]:e.target.value||undefined}))}>
          <option value="">— Eşleştirme yok —</option>
          {parsed.headers.map(h=><option key={h} value={h}>{h}</option>)}
        </select>
        {mapping[f.key]&&<div style={{display:"flex",gap:4,marginTop:4,flexWrap:"wrap"}}>
          {parsed.rows.slice(0,3).map((row,i)=><span key={i} style={{background:T.accentDim,color:T.accent,borderRadius:4,padding:"1px 6px",fontSize:10}}>{row[mapping[f.key]]||"—"}</span>)}
        </div>}
      </Field>)}
      <div style={{display:"flex",gap:8}}>
        <BackBtn onClick={()=>setStep("pick")} style={{width:30,height:30}}/>
        <button style={{...btn(T.accent),flex:2}} onClick={()=>setStep("preview")}>Önizle →</button>
      </div>
    </>}
    {step==="preview"&&<>
      <div style={{color:T.textSub,fontSize:12,marginBottom:10}}>İlk 4 satır — toplam <b style={{color:T.text}}>{parsed.rows.length}</b> satır aktarılacak:</div>
      <div style={{overflowX:"auto",marginBottom:14,borderRadius:10,border:`1px solid ${T.border}`}}>
        <table style={{borderCollapse:"collapse",width:"100%"}}>
          <thead><tr style={{background:T.tableAlt}}>{targetFields.filter(f=>mapping[f.key]).map(f=><th key={f.key} style={{color:T.accent,fontSize:9,padding:"5px 6px",textAlign:"left",fontWeight:700,borderBottom:`1px solid ${T.border}`}}>{f.label}</th>)}</tr></thead>
          <tbody>{preview.map((row,i)=><tr key={i} style={{borderBottom:`1px solid ${T.border}`}}>{targetFields.filter(f=>mapping[f.key]).map(f=><td key={f.key} style={{color:T.text,fontSize:9,padding:"4px 6px"}}>{row[f.key]||<span style={{color:T.textMuted}}>—</span>}</td>)}</tr>)}</tbody>
        </table>
      </div>
      <div style={{display:"flex",gap:8}}>
        <BackBtn onClick={()=>setStep("map")} style={{width:30,height:30}}/>
        <button style={{...btn(T.success),flex:2}} onClick={doImport}>✓ {parsed.rows.length} Satırı Aktar</button>
      </div>
    </>}
    {step==="done"&&importResult&&<>
      <div style={{textAlign:"center",padding:"20px 0"}}>
        <div style={{fontSize:40,marginBottom:10}}>✅</div>
        <div style={{color:T.success,fontSize:16,fontWeight:800,marginBottom:6}}>Aktarım Tamamlandı</div>
        <div style={{color:T.textSub,fontSize:13}}>✅ {importResult.matched} öğrenci eşleşti · ⚠️ {importResult.skipped} atlandı</div>
      </div>
      {importResult.warnings?.length>0&&<div style={{background:T.warnDim,borderRadius:10,padding:"10px 14px",marginBottom:12}}>
        {importResult.warnings.map((w,i)=><div key={i} style={{color:T.warn,fontSize:11,marginBottom:3}}>{w}</div>)}
      </div>}
      <button style={btn(T.accent)} onClick={onClose}>Kapat</button>
    </>}
  </Sheet>;
}

// Not İşlemleri Rapor Sayfası — dinamik versiyon
function NotRaporPage({onClose,classes,students,exams,examScores,perfScores,projScores,homeworks,lessons,school,academicYear}){
  const T=useT();const{inp,btn,btnSm}=useStyles();
  const sortedClasses=[...classes].sort((a,b)=>a.grade-b.grade||a.branch.localeCompare(b.branch));
  const[selClasses,setSelClasses]=useState([]);
  const[raporTur,setRaporTur]=useState("cizelge");
  // Sınav Sonuç Listesi & Analiz için ek filtreler
  const[sonucTerm,setSonucTerm]=useState("her ikisi");
  const[sonucSelClasses,setSonucSelClasses]=useState([]);
  const[sonucSelExams,setSonucSelExams]=useState([]);
  const[analizTerm,setAnalizTerm]=useState("1");
  const[analizSelClasses,setAnalizSelClasses]=useState([]);
  const[analizSelExams,setAnalizSelExams]=useState([]);
  const[analizSections,setAnalizSections]=useState({showPuanDagilim:true,showNotDagilim:true,showKonuAnaliz:true,showDegerlendirme:true,showDetayliPuan:true});
  // Not Çizelgesi için ek filtreler
  const[cizelgeTerm,setCizelgeTerm]=useState("her ikisi");
  const[cizelgeSelClasses,setCizelgeSelClasses]=useState([]);
  const[cizelgeSelLessons,setCizelgeSelLessons]=useState([]);
  const[sonucSelLessons,setSonucSelLessons]=useState([]);
  const[analizSelLessons,setAnalizSelLessons]=useState([]);
  const sortedLessons=[...lessons].sort((a,b)=>a.name.localeCompare(b.name,"tr"));
  // Sadece notu/sınavı olan dersler — rapor filtresi için
  const lessonsWithData=useMemo(()=>{
    const ids=new Set();
    // Sınavı olan dersler
    exams.forEach(ex=>{if(ex.lessonId)ids.add(String(ex.lessonId));});
    // DİP notu girilmiş dersler — yeni format: ${lessonId}_p${no}
    Object.values(perfScores).forEach(clsData=>{
      Object.values(clsData).forEach(termData=>{
        Object.values(termData).forEach(stData=>{
          if(typeof stData!=="object")return;
          Object.keys(stData).forEach(k=>{
            const m=k.match(/^(\d+)_p\d+$/);
            if(m)ids.add(m[1]);
          });
        });
      });
    });
    // Proje notu girilmiş dersler — yeni format: ${lessonId}_p${no}
    Object.values(projScores).forEach(clsData=>{
      Object.values(clsData).forEach(termData=>{
        Object.values(termData).forEach(stData=>{
          if(typeof stData!=="object")return;
          Object.keys(stData).forEach(k=>{
            const m=k.match(/^(\d+)_p\d+$/);
            if(m)ids.add(m[1]);
          });
        });
      });
    });
    // Proje ödevi olan dersler
    homeworks.forEach(hw=>{if(hw.type==="proje"&&hw.lessonId)ids.add(String(hw.lessonId));});
    return sortedLessons.filter(l=>ids.has(String(l.id)));
  },[exams,perfScores,projScores,homeworks,sortedLessons]);
  const[pdfSettings]=usePersist("ogretmen_pdf_settings",{accentColor:"#1D4ED8",ecoMode:true});
  const[orientation,setOrientation]=useState("landscape");
  const[margin,setMargin]=useState(6);
  const[rowSpacing,setRowSpacing]=useState(2);

        const termExams=sonucSelExams.length>0?termExamsAll.filter(ex=>sonucSelExams.includes(ex.id)):termExamsAll;
        return{term,termExams};
      }).filter(td=>td.termExams.length>0);

      if(termData.length===0)return;

      html+=`</tr>`;

      // Satır 2: yazılı alt başlıkları
      html+=`<tr>`;
      termData.forEach(({term,termExams})=>{
        termExams.forEach(ex=>{
          html+=`<th>${ex.examNo}.Yaz<br/><span style="font-size:5.5pt;opacity:0.8">${lname(ex.lessonId)}</span></th>`;
        });
        html+=`<th style="background:${eco?"#fff":term===1?"#1e40af":"#065f46"}!important;color:${eco?"#000":"#fff"}!important;font-size:6pt">${term}.D Notu</th>`;
      });
      html+=`</tr>`;

      // Sütun ortalama takibi
      const colSums=termData.map(({termExams})=>({
        examSums:termExams.map(()=>({s:0,c:0})),
        termSum:{s:0,c:0}
      }));

      // Öğrenci satırları
      let rank=0;
      clsStudents.forEach((st,idx)=>{
        rank++;
        html+=`<tr>`;
        html+=`<td>${idx+1}</td>`;
        html+=`<td class="left">${st.schoolNo||"—"}</td>`;
        html+=`<td class="left">${st.name}</td>`;
        termData.forEach(({term,termExams},ti)=>{
          const termScores=[];
          termExams.forEach((ex,ei)=>{
            const sc=examScores[String(ex.id)]||{};
            const stSc=sc[st.id]||{};
            const bep=!!stSc.__bep;const kopya=!!stSc.__kopya;
            const soScore=stSc.__soScore;
            const has=bep?(stSc.__bepScore!==""&&stSc.__bepScore!=null):kopya?true:soScore!=null&&soScore!==""?true:ex.questions.some(q=>stSc[q.id]!==""&&stSc[q.id]!==undefined);
            if(!has){html+=`<td class="g-cell">—</td>`;return;}
            const tmax=ex.questions.reduce((s,q)=>s+Number(q.maxScore),0)||100;
            const tot=bep?(stSc.__bepScore!=null&&stSc.__bepScore!==""?Number(stSc.__bepScore):0):kopya?0:soScore!=null&&soScore!==""?Number(soScore):ex.questions.reduce((s,q)=>{const v=stSc[q.id];return s+(v!==""&&v!==undefined?Number(v):0);},0);
            const pct=tmax>0?Math.round(tot/tmax*100):0;
            if(!bep&&!kopya){colSums[ti].examSums[ei].s+=pct;colSums[ti].examSums[ei].c++;}
            if(!bep&&!kopya)termScores.push(pct);
            const cls3=bep?"":kopya?"gecemez":pct>=85?"pekiyi":pct>=70?"iyi":pct>=50?"":pct<50?"gecemez":"";
            html+=`<td class="${cls3}">${bep?"BEP":kopya?"Kopya":pct}</td>`;
          });
          // Dönem notu (yazılı ortalaması)
          const termAvg=termScores.length>0?Math.round(termScores.reduce((a,b)=>a+b,0)/termScores.length):null;
          if(termAvg!=null){colSums[ti].termSum.s+=termAvg;colSums[ti].termSum.c++;}
          const termCls=termAvg==null?"g-cell":termAvg>=85?"pekiyi":termAvg>=70?"iyi":termAvg<50?"gecemez":"";
          html+=`<td style="font-weight:800;background:${eco?"#fff":term===1?"#dbeafe":"#d1fae5"}!important;color:${eco?"#000":term===1?"#1e40af":"#065f46"}!important">${termAvg!=null?termAvg:"—"}</td>`;
        });
        html+=`</tr>`;
      });

      // Ortalama satırı
      if(showAvgRow){
        html+=`<tr class="avg-row"><td colspan="3" class="left">Sınıf Ortalaması</td>`;
        termData.forEach(({term,termExams},ti)=>{
          termExams.forEach((_,ei)=>{
            const {s,c}=colSums[ti].examSums[ei];
            html+=`<td>${c>0?Math.round(s/c):"—"}</td>`;
          });
          const {s,c}=colSums[ti].termSum;
          html+=`<td style="font-weight:800">${c>0?Math.round(s/c):"—"}</td>`;
        });
        html+=`</tr>`;
      }
      html+=`</table>`;
    });
    return html;
  };

  const buildAnalizPDF=()=>{
    const ac=accentColor||"#1D4ED8";
    const eco=ecoMode||false;
    // Tüm sınıflar veya seçilenler
    const targetCls=analizSelClasses.length>0
      ?sortedClasses.filter(c=>analizSelClasses.includes(c.id))
      :sortedClasses;
    // Tüm dersler veya seçilenler
    const analizLessonFilter=analizSelLessons.length>0?analizSelLessons.map(String):null;
    // Dönem filtresi — tip güvenli karşılaştırma
    const termExamsAll=exams.filter(ex=>{
      if(String(ex.term)!==String(analizTerm))return false;
      if(!targetCls.some(cl=>cl.id===ex.classId))return false;
      if(analizLessonFilter&&!analizLessonFilter.includes(String(ex.lessonId)))return false;
      return true;
    }).sort((a,b)=>{
      // Önce derse göre, sonra sınıfa göre, sonra sınav numarasına göre sırala
      const lA=String(a.lessonId),lB=String(b.lessonId);
      if(lA!==lB)return lA.localeCompare(lB);
      const cA=String(a.classId),cB=String(b.classId);
      if(cA!==cB)return cA.localeCompare(cB);
      return Number(a.examNo)-Number(b.examNo);
    });
    // Yazılı filtresi
    const filteredExams=analizSelExams.length>0
      ?termExamsAll.filter(ex=>analizSelExams.includes(ex.id))
      :termExamsAll;

    if(filteredExams.length===0)return "";

    const parts=[];
    filteredExams.forEach(ex=>{
      const sc=examScores[String(ex.id)]||{};
      const opts={
        accentColor:ac,ecoMode:eco,rowSpacing,fontScale,fitOnePage:false,
        showPuanDagilim:analizSections.showPuanDagilim!==false,
        showNotDagilim:analizSections.showNotDagilim!==false,
        showKonuAnaliz:analizSections.showKonuAnaliz!==false,
        showDegerlendirme:analizSections.showDegerlendirme!==false,
        showDetayliPuan:analizSections.showDetayliPuan!==false,
      };
      try{parts.push(buildExamAnalysisPDF(ex,sc,students,classes,lessons,school,opts));}
      catch(e){console.error("buildExamAnalysisPDF hata:",e);}
    });
    if(parts.length===0)return "";
    // Her analiz yeni sayfada başlar — <!--NEWPAGE--> marker ile
    // Her bölüm kendi <style> bloğunu zaten içeriyor (buildExamAnalysisPDF bunu üretiyor)
    return parts.join("<!--NEWPAGE-->");
  };

  const doCsvExport=(fmt="csv")=>{
    if(raporTur!=="cizelge")return;
    const targetCls=cizelgeSelClasses.length>0?sortedClasses.filter(cl=>cizelgeSelClasses.includes(cl.id)):sortedClasses;
    const showTerms=cizelgeTerm==="her ikisi"?[1,2]:cizelgeTerm==="1"?[1]:[2];
    // Puan hesaplama yardımcısı (buildCizelgePDF ile aynı)
    const calcScore=(ex,stSc)=>{
      if(stSc.__bep){const bp=stSc.__bepScore!=null&&stSc.__bepScore!==""?Number(stSc.__bepScore):null;return{val:bp!=null?`BEP(${bp})`:"BEP",num:bp};}
      if(stSc.__kopya)return{val:"Kopya",num:0};
      if(stSc.__soScore!=null&&stSc.__soScore!=="")return{val:Number(stSc.__soScore),num:Number(stSc.__soScore)};
      const tmax=ex.questions.reduce((s,q)=>s+Number(q.maxScore),0)||100;
      const tot=ex.questions.reduce((s,q)=>{const v=stSc[q.id];return s+(v!==""&&v!==undefined?Number(v):0);},0);
      const has=ex.questions.some(q=>stSc[q.id]!==""&&stSc[q.id]!==undefined);
      return has?{val:Math.round(tot/tmax*100),num:Math.round(tot/tmax*100)}:{val:"",num:null};
    };
    // buildCizelgePDF ile aynı lessonPerfMap/projMap mantığı
    const buildTermData=(cls)=>{
      const clsExams=exams.filter(ex=>ex.classId===cls.id);
      return showTerms.map(term=>{
        const termExams=clsExams.filter(ex=>String(ex.term)===String(term)).sort((a,b)=>Number(a.examNo)-Number(b.examNo));
        // Ders içi (DİP) — veri yapısı: perfScores[clsId][term${term}][stId][lessonId_p${no}] veya p${no}
        const termPerfD=(perfScores[cls.id]||{})[`term${term}`]||{};
        const lessonPerfMap={};
        Object.values(termPerfD).forEach(stData=>{
          if(typeof stData!=="object"||stData===null)return;
          Object.keys(stData).forEach(k=>{
            const m=k.match(/^(\d+)_p(\d+)$/);
            if(m){const lid=m[1],no=Number(m[2]);lessonPerfMap[lid]=Math.max(lessonPerfMap[lid]||0,no);}
            else{const m2=k.match(/^p(\d+)$/);if(m2){lessonPerfMap["__old"]=Math.max(lessonPerfMap["__old"]||0,Number(m2[1]));}}
          });
        });
        const perfEntries=Object.entries(lessonPerfMap);
        // Proje — veri yapısı: projScores[clsId][term${term}][stId][lessonId_p${no}] veya p${no}
        const termProjD=(projScores[cls.id]||{})[`term${term}`]||{};
        const lessonProjMap={};
        Object.values(termProjD).forEach(stData=>{
          if(typeof stData!=="object"||stData===null)return;
          Object.keys(stData).forEach(k=>{
            const m=k.match(/^(\d+)_p(\d+)$/);
            if(m){const lid=m[1],no=Number(m[2]);lessonProjMap[lid]=Math.max(lessonProjMap[lid]||0,no);}
            else{const m2=k.match(/^p(\d+)$/);if(m2){lessonProjMap["__old"]=Math.max(lessonProjMap["__old"]||0,Number(m2[1]));}}
          });
        });
        const projEntries=Object.entries(lessonProjMap);
        return{term,termExams,perfEntries,projEntries,termPerfD,termProjD};
      });
    };
    const allRows=[];
    targetCls.forEach(cls=>{
      const clsStudents=sortStudents(students.filter(s=>s.classId===cls.id),"schoolNo");
      if(!clsStudents.length)return;
      const termData=buildTermData(cls);
      // Başlık satırları
      const row1=[`${cls.grade}/${cls.branch} Sınıfı`,"",""];
      const row2=["Sıra","Okul No","Ad Soyad"];
      termData.forEach(td=>{
        const tLabel=`${td.term}.Dönem`;
        td.termExams.forEach(ex=>row1.push(`${tLabel} - ${ex.examNo}.Yazılı(${lname(ex.lessonId)})`));
        td.perfEntries.forEach(([lid,maxNo])=>{
          const lbl=lid==="__old"?"":` (${lname(lid)})`;
          for(let p=1;p<=maxNo;p++)row1.push(`${tLabel} - Ders İçi ${p}${lbl}`);
        });
        td.projEntries.forEach(([lid,maxNo])=>{
          const lbl=lid==="__old"?"":` (${lname(lid)})`;
          for(let p=1;p<=maxNo;p++)row1.push(`${tLabel} - Proje ${p}${lbl}`);
        });
        row1.push(`${tLabel} - Dönem Ortalaması`);
        td.termExams.forEach(ex=>row2.push(`${ex.examNo}.Yazılı`));
        td.perfEntries.forEach(([,maxNo])=>{for(let p=1;p<=maxNo;p++)row2.push(`D.İçi ${p}`);});
        td.projEntries.forEach(([,maxNo])=>{for(let p=1;p<=maxNo;p++)row2.push(`Proje ${p}`);});
        row2.push("Ortalama");
      });
      if(showTerms.length>1)row2.push("Yıl Sonu");
      allRows.push(row1);
      allRows.push(row2);
      // Öğrenci satırları
      clsStudents.forEach((st,i)=>{
        const row=[i+1,st.schoolNo||"",st.name];
        const termAvgs=[];
        termData.forEach(td=>{
          let sum=0;let cnt=0;
          // Sınavlar
          td.termExams.forEach(ex=>{
            const sc=examScores[String(ex.id)]||{};
            const stSc=sc[st.id]||{};
            const {val,num}=calcScore(ex,stSc);
            row.push(val);
            if(num!=null){sum+=num;cnt++;}
          });
          // Ders içi performans — doğru anahtar: [lessonId_]p${no}
          td.perfEntries.forEach(([lid,maxNo])=>{
            for(let p=1;p<=maxNo;p++){
              const lesKey=lid==="__old"?`p${p}`:`${lid}_p${p}`;
              const v=(perfScores[cls.id]||{})[`term${td.term}`]?.[st.id]?.[lesKey];
              const n=v!=null&&v!==""?Number(v):null;
              row.push(n!=null?n:"");
              if(n!=null){sum+=n;cnt++;}
            }
          });
          // Proje — doğru anahtar: [lessonId_]p${no}
          td.projEntries.forEach(([lid,maxNo])=>{
            for(let p=1;p<=maxNo;p++){
              const lesKey=lid==="__old"?`p${p}`:`${lid}_p${p}`;
              const v=(projScores[cls.id]||{})[`term${td.term}`]?.[st.id]?.[lesKey];
              const n=v!=null&&v!==""?Number(v):null;
              row.push(n!=null?n:"");
              if(n!=null){sum+=n;cnt++;}
            }
          });
          const avg=cnt>0?Math.round(sum/cnt*10)/10:"";
          row.push(avg);
          if(typeof avg==="number")termAvgs.push(avg);
        });
        if(showTerms.length>1){
          row.push(termAvgs.length>0?Math.round(termAvgs.reduce((a,b)=>a+b,0)/termAvgs.length*10)/10:"");
        }
        allRows.push(row);
      });
      allRows.push([]);
    });
    if(fmt==="xlsx"){
      // XLSX - SheetJS kullan (CDN'den yüklü olabilir, yoksa CSV'ye düş)
      const makeXlsx=()=>{
        try{
          if(!window.XLSX)throw new Error("XLSX not loaded");
          const ws=window.XLSX.utils.aoa_to_sheet(allRows);
          const wb=window.XLSX.utils.book_new();
          window.XLSX.utils.book_append_sheet(wb,ws,"Not Çizelgesi");
          window.XLSX.writeFile(wb,`not_cizelgesi_${new Date().toISOString().slice(0,10)}.xlsx`);
        }catch{
          alert("Excel kütüphanesi yüklenemedi, CSV olarak indiriliyor.");
          doCsvExport("csv");

      };
      if(!window.XLSX){
        const s=document.createElement("script");
        s.src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js";
        s.onload=makeXlsx;s.onerror=()=>doCsvExport("csv");
        document.head.appendChild(s);
      } else makeXlsx();
      return;
    }
    // CSV
    const csv=allRows.map(r=>r.map(v=>`"${String(v??"").replace(/"/g,'""')}"`).join(",")).join("\n");
    const bom="\uFEFF";
    const blob=new Blob([bom+csv],{type:"text/csv;charset=utf-8;"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.href=url;a.download=`not_cizelgesi_${new Date().toISOString().slice(0,10)}.csv`;a.click();
    setTimeout(()=>URL.revokeObjectURL(url),1000);
  };

              <button key={v} onClick={()=>setFontScale(v)} style={{flex:1,background:Math.abs(fontScale-v)<0.05?T.accent:T.toggleBg,color:Math.abs(fontScale-v)<0.05?"#fff":T.textSub,border:`2px solid ${Math.abs(fontScale-v)<0.05?T.accent:T.border}`,borderRadius:9,padding:"9px 4px",cursor:"pointer",fontFamily:"inherit",fontSize:12,fontWeight:Math.abs(fontScale-v)<0.05?700:400}}>{l}</button>
            ))}

      {/* TABLO STİLİ */}
      <div style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:14,padding:"14px 16px",display:"flex",flexDirection:"column",gap:12}}>
        <SectionTitle>Tablo Stili</SectionTitle>

        {/* Tablo görünümü */}

          <div style={{color:T.textSub,fontSize:11,fontWeight:700,marginBottom:6,textTransform:"uppercase",letterSpacing:"0.05em"}}>Satır Rengi</div>

            {[["zebra","🦓 Zebra"],["plain","📄 Düz"],["bordered","⊞ Çerçeveli"]].map(([v,l])=>(
              <button key={v} onClick={()=>setTableStyle(v)} style={{flex:1,background:tableStyle===v?T.accent:T.toggleBg,color:tableStyle===v?"#fff":T.textSub,border:`2px solid ${tableStyle===v?T.accent:T.border}`,borderRadius:9,padding:"8px 4px",cursor:"pointer",fontFamily:"inherit",fontSize:11,fontWeight:tableStyle===v?700:400}}>{l}</button>
            ))}

        </div>

          <div style={{color:T.textSub,fontSize:11,fontWeight:700,marginBottom:6,textTransform:"uppercase",letterSpacing:"0.05em"}}>Başlık Stili</div>

            {[["color","🎨 Renkli"],["dark","🌑 Koyu"],["minimal","◻ Minimal"]].map(([v,l])=>(
              <button key={v} onClick={()=>setHeaderStyle(v)} style={{flex:1,background:headerStyle===v?T.accent:T.toggleBg,color:headerStyle===v?"#fff":T.textSub,border:`2px solid ${headerStyle===v?T.accent:T.border}`,borderRadius:9,padding:"8px 4px",cursor:"pointer",fontFamily:"inherit",fontSize:11,fontWeight:headerStyle===v?700:400}}>{l}</button>
            ))}

        {/* Seçenekler — toggle satırları */}

          <div key={i} onClick={()=>setter(v=>!v)} style={{display:"flex",alignItems:"center",gap:10,cursor:"pointer",padding:"8px 10px",borderRadius:9,background:val?T.accentDim:T.toggleBg,border:`1px solid ${val?T.accent:T.border}`}}>
            <div style={{width:18,height:18,borderRadius:5,background:val?T.accent:T.border,display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:11,flexShrink:0,fontWeight:700}}>{val?"✓":""}</div>
            <span style={{color:val?T.accent:T.textSub,fontSize:12,fontWeight:val?600:400}}>{label}</span>
          </div>
        ))}
      </div>

      {/* RENK & STİL */}
      <div style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:14,padding:"14px 16px"}}>
        <SectionTitle>Renk & Baskı</SectionTitle>
        <div onClick={()=>setEcoMode(v=>!v)} style={{display:"flex",alignItems:"center",gap:12,cursor:"pointer",padding:"10px 12px",borderRadius:10,background:ecoMode?T.successDim:T.toggleBg,border:`2px solid ${ecoMode?T.success:T.border}`,marginBottom:ecoMode?0:12}}>
          <div style={{width:20,height:20,borderRadius:6,background:ecoMode?T.success:T.border,display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:13,flexShrink:0,fontWeight:700}}>{ecoMode?"✓":""}</div>
          <div style={{flex:1}}>
            <div style={{color:ecoMode?T.success:T.text,fontSize:13,fontWeight:700}}>🖨 Eko Mod {ecoMode?"Açık ✓":"Kapalı"}</div>
            <div style={{color:T.textSub,fontSize:11,marginTop:2}}>Siyah-beyaz, renksiz — mürekkep tasarrufu</div>
          </div>
        </div>
        {!ecoMode&&<div>
          <div style={{color:T.textSub,fontSize:11,fontWeight:700,marginBottom:8,textTransform:"uppercase",letterSpacing:"0.05em"}}>Başlık Rengi</div>
          <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
            <input type="color" value={accentColor} onChange={e=>setAccentColor(e.target.value)} style={{width:36,height:32,border:`1px solid ${T.border}`,borderRadius:7,cursor:"pointer",padding:2,background:"none"}}/>
            {["#1D4ED8","#059669","#DC2626","#7C3AED","#D97706","#0891B2","#0F172A","#374151"].map(c=>(<div key={c} onClick={()=>setAccentColor(c)} style={{width:26,height:26,borderRadius:99,background:c,cursor:"pointer",border:accentColor===c?`3px solid ${T.accent}`:"2px solid transparent",flexShrink:0,boxShadow:accentColor===c?"0 0 0 2px #fff":"none"}}/>))}
          </div>
        </div>}
      </div>
    </div>
    <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:520,background:T.navBg,borderTop:`1px solid ${T.border}`,padding:"14px 16px",paddingBottom:"calc(14px + env(safe-area-inset-bottom,0px))"}}>
      {statusMsg&&<div style={{background:status==="done"?T.successDim:status==="error"?T.dangerDim:T.accentDim,color:status==="done"?T.success:status==="error"?T.danger:T.accent,borderRadius:9,padding:"8px 14px",fontSize:13,marginBottom:10,textAlign:"center",fontWeight:600}}>{statusMsg}</div>}
      <div style={{display:"flex",flexDirection:"column",gap:6}}>
        <button style={{...btn(isLoading?T.toggleBg:T.accent),fontSize:15,fontWeight:800,padding:"16px",opacity:isLoading?0.7:1,display:"flex",alignItems:"center",justifyContent:"center",gap:8}} onClick={doGenerate} disabled={isLoading}>
          {isLoading?"⏳ PDF Oluşturuluyor...":"📥 PDF Oluştur ve İndir"}
        </button>
        {raporTur==="cizelge"&&<div style={{display:"flex",gap:6}}>
          <button style={{flex:1,background:T.successDim,border:`1px solid ${T.success}44`,borderRadius:9,padding:"8px 10px",cursor:"pointer",fontFamily:"inherit",fontSize:11,fontWeight:600,color:T.success,display:"flex",alignItems:"center",justifyContent:"center",gap:5}} onClick={()=>doCsvExport("csv")}>
            📊 CSV Olarak Dışa Aktar
          </button>
          <button style={{flex:1,background:T.accentDim,border:`1px solid ${T.accent}44`,borderRadius:9,padding:"8px 10px",cursor:"pointer",fontFamily:"inherit",fontSize:11,fontWeight:600,color:T.accent,display:"flex",alignItems:"center",justifyContent:"center",gap:5}} onClick={()=>doCsvExport("xlsx")}>

function ExamsScreen({exams,setExams,onSelect,classes,lessons,examScores,setExamScores,students,homeworks,setHomeworks,perfScores,setPerfScores,projScores,setProjScores,academicYear,school}){
  const T=useT();const{inp,btn,btnSm}=useStyles();
  const openReport=useReport();
  const[mainTab,setMainTab]=usePersist("ogretmen_exams_maintab","yazili");
  const[sheet,setSheet]=useState(null);
  const[draft,setDraft]=useState(null);
  const[confirm,setConfirm]=useState(null);
  const[examCountSettings,setExamCountSettings]=usePersist("ogretmen_exam_counts",{term1:2,term2:2});
  const[showCountSheet,setShowCountSheet]=useState(false);
  const[countSheetCtx,setCountSheetCtx]=useState(null); // {term, lessonName} - hangi ders/dönem için açıldı
  const[showImport,setShowImport]=useState(false);
  const[showRapor,setShowRapor]=useState(false);
  const[openTerms,setOpenTerms]=usePersist("ogretmen_exams_open_terms",{"1":false,"2":false});
  const toggleTerm=t=>setOpenTerms(s=>({...s,[t]:!s[t]}));
  const[openLessons,setOpenLessons]=usePersist("ogretmen_exams_open_lessons",{});
  const toggleLesson=key=>setOpenLessons(s=>({...s,[key]:!s[key]}));
  // ── Toplu Silme ──
  const[bulkDeleteSheet,setBulkDeleteSheet]=useState(null);
  const[bulkSelIds,setBulkSelIds]=useState([]);
  const openBulkDelete=(term,lid,name,exs)=>{setBulkDeleteSheet({term,lid,name});setBulkSelIds(exs.map(e=>e.id));};
  const toggleBulkId=id=>setBulkSelIds(s=>s.includes(id)?s.filter(x=>x!==id):[...s,id]);
  const confirmBulkDelete=()=>{
    if(bulkSelIds.length===0)return;
    setConfirm({msg:`Seçili ${bulkSelIds.length} sınav ve tüm notları kalıcı silinecek. Devam?`,onOk:()=>{
      setExams(e=>e.filter(x=>!bulkSelIds.includes(x.id)));
      setExamScores(s=>{const n={...s};bulkSelIds.forEach(id=>delete n[String(id)]);return n;});
      setBulkDeleteSheet(null);setBulkSelIds([]);setConfirm(null);
    }});
  };
  const blank=()=>({id:uid(),name:"",lessonId:lessons[0]?.id,classId:classes[0]?.id,sharedClassIds:[],date:new Date().toISOString().slice(0,10),term:"1",examNo:"1",
    questions:[{id:1,label:"1",maxScore:20},{id:2,label:"2",maxScore:20},{id:3,label:"3",maxScore:20},{id:4,label:"4",maxScore:20},{id:5,label:"5",maxScore:20}]});
  const tmax=d=>d?.questions.reduce((s,q)=>s+Number(q.maxScore),0)||0;
  const cname=id=>{const c=classes.find(x=>x.id===id);return c?`${c.grade}/${c.branch}`:"?";};
  const lname=id=>lessons.find(x=>String(x.id)===String(id))?.name||"?";
  const save=()=>{
    if(sheet==="add"){
      const shared=draft.sharedClassIds||[];
      if(shared.length===0){alert("En az 1 sınıf seçmelisiniz.");return;}
      const examName=draft.name.trim()||`${draft.term}. Dönem ${draft.examNo}. Yazılı`;
      const newExams=shared.map(cid=>({...draft,id:uid(),name:examName,classId:cid,sharedClassIds:undefined}));
      setExams(e=>[...e,...newExams]);
    } else {
      setExams(e=>e.map(x=>x.id===draft.id?{...draft,sharedClassIds:undefined}:x));
    }
    setSheet(null);
  };
  const addQ=()=>setDraft(d=>({...d,questions:[...d.questions,{id:uid(),label:String(d.questions.length+1),maxScore:10}]}));
  const remQ=qid=>setDraft(d=>({...d,questions:d.questions.filter(q=>q.id!==qid)}));
  const updQ=(qid,f,v)=>setDraft(d=>({...d,questions:d.questions.map(q=>q.id===qid?{...q,[f]:v}:q)}));
  return <div>
    <PH title="Not İşlemleri" sub={`${exams.length} sınav`} right={<div style={{display:"flex",gap:4}}>
      <button style={{...btnSm(T.accentDim,T.accent),padding:"5px 8px",fontSize:11}} onClick={()=>setShowRapor(true)}>📊 Rapor</button>
      <button style={{...btnSm(T.toggleBg,T.textSub),padding:"5px 8px",fontSize:11}} onClick={()=>setShowImport(true)}>📥 İçe Aktar</button>
    </div>}/>
    {/* Ana sekmeler */}
    <div style={{display:"flex",borderBottom:`2px solid ${T.border}`,background:T.navBg,position:"sticky",top:52,zIndex:10}}>
      {[["yazili","📝","Not İşlemleri"],["perfor","🎯","Ders İçi Perf."],["proje","🔬","Proje"]].map(([v,ic,lb])=>(
        <button key={v} onClick={()=>setMainTab(v)}
          style={{flex:1,background:"none",border:"none",padding:"10px 4px 8px",cursor:"pointer",fontFamily:"inherit",fontSize:11,fontWeight:mainTab===v?700:400,color:mainTab===v?T.accent:T.textMuted,borderBottom:`2px solid ${mainTab===v?T.accent:"transparent"}`,display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
          <span style={{fontSize:16}}>{ic}</span><span>{lb}</span>
        </button>
      ))}
    </div>
    {/* YAZILILAR sekmesi — dönem klasörleri */}
    {mainTab==="yazili"&&(()=>{
      const term1=exams.filter(ex=>String(ex.term)==="1").sort((a,b)=>Number(a.examNo)-Number(b.examNo));
      const term2=exams.filter(ex=>String(ex.term)==="2").sort((a,b)=>Number(a.examNo)-Number(b.examNo));
      const renderExam=ex=>(
        <Card key={ex.id} onClick={()=>onSelect(ex)} style={{cursor:"pointer",marginBottom:6}}>
          <div style={{color:T.text,fontSize:14,fontWeight:700,marginBottom:5}}>{ex.name||"İsimsiz Sınav"}</div>
          <div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:7}}>
            <Tag label={lname(ex.lessonId)} color={T.accent}/>
            <Tag label={cname(ex.classId)} color={T.purple}/>
            <Tag label={`${ex.examNo}.Yazılı`} color={T.textSub}/>

  </div>;
}
function ExamDetail({exam,scores,setScores,students,classes,lessons,onBack,school}){

  const defaultCW=lessonObj?.cw||{yazili:50,dinleme:25,konusma:25};

  const cwKey=`ogretmen_cw_${exam.id}`;
  const[cwOverride,setCwOverride]=useState(()=>{
    try{const s=window.localStorage?.getItem(cwKey);return s?JSON.parse(s):null;}catch{return null;}
  });
  const saveCwOverride=val=>{
    setCwOverride(val);
    try{window.localStorage?.setItem(cwKey,JSON.stringify(val));}catch(e){}
  };
  const cw=cwOverride||defaultCW;
  const[showCWEdit,setShowCWEdit]=useState(false);
  const[cwDraft,setCwDraft]=useState(()=>cwOverride||defaultCW);
  // Bileşik puan getters/setters
  const getComposite=(sid,key)=>scores[sid]?.[`__c_${key}`]??"";

                </div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{color:T.text,fontSize:14,fontWeight:700}}>{st.name}</div>
                  {isBEP(st.id)?<span style={{color:T.purple,fontSize:10,fontWeight:600}}>🟣 BEP</span>
                    :isKopya(st.id)?<span style={{color:T.danger,fontSize:10,fontWeight:600}}>🔴 Kopya</span>
                    :isComposite&&compTot!==null
                      ?<span style={{color:compBadge.color,fontSize:11,fontWeight:700}}>Yazılı Notu: {Math.round(compTot*100)/100} · {compBadge.label}</span>
                      :girildi
                        ?<span style={{color:badge.color,fontSize:11,fontWeight:700}}>{scoreOnlyMode?(scores[st.id]?.__soScore??0):tot}/{scoreOnlyMode?100:tmax} · {badge.label}</span>
                        :<span style={{display:"inline-flex",alignItems:"center",justifyContent:"center",background:"#dc2626",color:"#fff",fontWeight:900,fontSize:14,borderRadius:6,width:26,height:26}}>G</span>}
                </div>
                <div style={{display:"flex",gap:4}}>
                  <button onClick={()=>setBEP(st.id,!isBEP(st.id))}
                    style={{background:isBEP(st.id)?T.purpleDim:T.toggleBg,border:`1px solid ${isBEP(st.id)?T.purple+"66":T.border}`,borderRadius:7,padding:"3px 7px",cursor:"pointer",color:isBEP(st.id)?T.purple:T.textSub,fontSize:10,fontFamily:"inherit"}}>BEP</button>
                  <button onClick={()=>setKopya(st.id,!isKopya(st.id))}
                    style={{background:isKopya(st.id)?T.dangerDim:T.toggleBg,border:`1px solid ${isKopya(st.id)?T.danger+"66":T.border}`,borderRadius:7,padding:"3px 7px",cursor:"pointer",color:isKopya(st.id)?T.danger:T.textSub,fontSize:10,fontFamily:"inherit"}}>Kopya</button>
                </div>
              </div>
              {/* BİLEŞİK MOD */}
              {isComposite&&!isBEP(st.id)&&!isKopya(st.id)&&<div style={{display:"flex",gap:5}}>
                {[["yazili","✏️","#3B82F6"],["dinleme","👂","#10B981"],["konusma","🗣","#8B5CF6"]].map(([k,ico,col])=>{
                  const v=getComposite(st.id,k);
                  return <div key={k} style={{flex:1,background:T.bg,borderRadius:8,padding:"6px 5px",border:`1px solid ${v!==""?col+"55":T.border}`}}>
                    <div style={{color:col,fontSize:9,fontWeight:700,textAlign:"center",marginBottom:3}}>{ico} %{cw[k]}</div>
                    <div style={{display:"flex",alignItems:"center",gap:2,justifyContent:"center"}}>
                      <button onClick={()=>setComposite(st.id,k,Math.max(0,(v===""?0:Number(v))-1))}
                        style={{background:T.toggleBg,border:`1px solid ${T.border}`,borderRadius:5,padding:"2px 6px",cursor:"pointer",color:T.textSub,fontSize:12,fontFamily:"inherit"}}>−</button>
                      <input type="number" inputMode="numeric" pattern="[0-9]*" min={0} max={100} value={v} onChange={e=>setComposite(st.id,k,e.target.value)} onFocus={e=>e.target.select()}
                        style={{width:40,background:T.inputBg,border:`1px solid ${v!==""?col+"66":T.border}`,borderRadius:6,color:v!==""?col:T.textMuted,padding:"4px 1px",fontSize:15,fontWeight:800,textAlign:"center",outline:"none",fontFamily:"inherit"}} placeholder="—"/>
                      <button onClick={()=>setComposite(st.id,k,Math.min(100,(v===""?0:Number(v))+1))}
                        style={{background:v!==""?col+"22":T.toggleBg,border:`1px solid ${v!==""?col+"44":T.border}`,borderRadius:5,padding:"2px 6px",cursor:"pointer",color:v!==""?col:T.textSub,fontSize:12,fontFamily:"inherit"}}>+</button>
                    </div>
                  </div>;
                })}
              </div>}
              {/* SADECE SONUÇ MODU */}
              {scoreOnlyMode&&!isComposite&&!isBEP(st.id)&&!isKopya(st.id)&&<div style={{display:"flex",alignItems:"center",gap:8,background:T.bg,borderRadius:9,padding:"8px 10px"}}>
                <span style={{color:T.textSub,fontSize:11,flex:1}}>Puan (0–{tmax})</span>
                <button style={{...btnSm(T.toggleBg,T.textSub),padding:"5px 10px",fontSize:15}} onClick={()=>{const c=scores[st.id]?.__soScore||0;setSoScore(st.id,Math.max(0,Number(c)-1));}}>−</button>
                <input type="number" inputMode="numeric" pattern="[0-9]*" min={0} max={tmax} value={scores[st.id]?.__soScore??""} onChange={e=>setSoScore(st.id,e.target.value)} style={{...inp,width:60,textAlign:"center",padding:"6px 4px",fontSize:18,fontWeight:800}} placeholder="—" onFocus={e=>e.target.select()}/>
                <button style={{...btnSm(T.accentDim,T.accent),padding:"5px 10px",fontSize:15}} onClick={()=>{const c=scores[st.id]?.__soScore||0;setSoScore(st.id,Math.min(tmax,Number(c)+1));}}>+</button>
              </div>}
              {/* NORMAL MOD */}
              {!isComposite&&!scoreOnlyMode&&!isBEP(st.id)&&!isKopya(st.id)&&<div style={{display:"flex",flexDirection:"column",gap:5}}>
                {/* Tam Puan butonu */}
                <button onClick={()=>setFullScore(st.id)}
                  style={{width:"100%",background:"linear-gradient(135deg,#059669,#10B981)",border:"none",borderRadius:9,padding:"8px 12px",cursor:"pointer",color:"#fff",fontSize:13,fontWeight:800,fontFamily:"inherit",display:"flex",alignItems:"center",justifyContent:"center",gap:6,boxShadow:"0 2px 8px rgba(16,185,129,0.3)"}}>
                  <span style={{fontSize:15}}>⭐</span> Tam Puan ({tmax} puan)
                </button>
                {exam.questions.map(q=>{
                  const v=getS(st.id,q.id);
                  return <div key={q.id} style={{display:"flex",alignItems:"center",gap:8,background:T.bg,borderRadius:8,padding:"6px 10px"}}>
                    <span style={{color:T.textSub,fontSize:12,flex:1}}>{q.label}. Soru <span style={{color:T.textMuted,fontSize:10}}>/{q.maxScore}</span></span>
                    <div style={{display:"flex",alignItems:"center",gap:4}}>
                      <button style={{...btnSm(T.toggleBg,T.textSub),padding:"4px 10px",fontSize:14}} onClick={()=>setS(st.id,q.id,Math.max(0,(v===""?0:Number(v))-1),q.maxScore)}>−</button>
                      <input type="number" inputMode="numeric" pattern="[0-9]*" min={0} max={q.maxScore} value={v} onChange={e=>setS(st.id,q.id,e.target.value,q.maxScore)} style={{...inp,width:52,textAlign:"center",padding:"5px 2px",fontSize:16,fontWeight:800}} placeholder="—" onFocus={e=>e.target.select()}/>
                      <button onClick={()=>setS(st.id,q.id,Number(q.maxScore),q.maxScore)}
                        style={{background:"#05966933",border:"1px solid #05966966",borderRadius:6,padding:"4px 7px",cursor:"pointer",color:"#059669",fontSize:10,fontWeight:800,fontFamily:"inherit",lineHeight:1}}>MAX</button>
                      <button style={{...btnSm(T.accentDim,T.accent),padding:"4px 10px",fontSize:14}} onClick={()=>setS(st.id,q.id,Math.min(q.maxScore,(v===""?0:Number(v))+1),q.maxScore)}>+</button>
                    </div>
                  </div>;
                })}
              </div>}
              {isBEP(st.id)&&<div style={{display:"flex",alignItems:"center",gap:6,background:T.purpleDim,borderRadius:8,padding:"7px 10px"}}>
                <span style={{color:T.purple,fontSize:11,flex:1}}>🟣 BEP (0–100)</span>
                <button style={{...btnSm(T.toggleBg,T.textSub),padding:"3px 8px",fontSize:14}} onClick={()=>setBEPScore(st.id,Math.max(0,(scores[st.id]?.__bepScore||0)-1))}>−</button>
                <input type="number" inputMode="numeric" pattern="[0-9]*" min={0} max={100} value={scores[st.id]?.__bepScore??""} onChange={e=>setBEPScore(st.id,e.target.value)} style={{...inp,width:56,textAlign:"center",padding:"5px 2px",fontSize:16,fontWeight:800,color:T.purple}} placeholder="—" onFocus={e=>e.target.select()}/>
                <button style={{...btnSm(T.purpleDim,T.purple),padding:"3px 8px",fontSize:14}} onClick={()=>setBEPScore(st.id,Math.min(100,(scores[st.id]?.__bepScore||0)+1))}>+</button>
              </div>}
            </div>;
          })}
        </div>;
      })()}
      {/* Tam liste - arama yoksa göster */}
      {!searchQ.trim()&&<div style={{padding:"10px 16px",display:"flex",flexDirection:"column",gap:8}}>
        {cls.map(st=>{
          const open=expandSt===st.id;
          const tot=stTot(st.id,scoreOnlyMode);
          const pct=stPct(st.id);
          const badge=gradeBadge(pct,T);
          const girildi=hasEntered(st.id);
          const compTot=isComposite?calcCompositeTotal(st.id):null;
          const compBadge=compTot!==null?gradeBadge(Math.round(compTot),T):null;
          return <Card key={st.id} style={{padding:"10px 12px"}}>
            {/* ── Üst satır: isim + badge ── */}
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:isComposite||scoreOnlyMode?8:0,cursor:(!isComposite&&!scoreOnlyMode)?"pointer":"default"}}
              onClick={()=>{if(!isComposite&&!scoreOnlyMode)setExpandSt(open?null:st.id);}}>
              <div style={{width:40,height:40,borderRadius:10,background:T.accentDim,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                <span style={{color:T.accent,fontSize:11,fontWeight:800}}>#{st.no}</span>
                {st.schoolNo&&<span style={{color:T.textMuted,fontSize:9}}>{st.schoolNo}</span>}
              </div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{color:T.text,fontSize:13,fontWeight:700,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{st.name}</div>
                {isBEP(st.id)
                  ?<div style={{color:T.purple,fontSize:11,fontWeight:600}}>🟣 BEP</div>
                  :isKopya(st.id)
                    ?<div style={{color:T.danger,fontSize:11,fontWeight:600}}>🔴 Kopya</div>
                    :isComposite&&compTot!==null
                      ?<div style={{display:"flex",alignItems:"center",gap:6,marginTop:2}}><Bar pct={Math.round(compTot)} color={compBadge.color}/><span style={{color:compBadge.color,fontSize:11,fontWeight:700,flexShrink:0}}>{Math.round(compTot*100)/100} · {compBadge.label}</span></div>
                      :girildi
                        ?<div style={{display:"flex",alignItems:"center",gap:6,marginTop:2}}><Bar pct={pct} color={badge.color}/><span style={{color:badge.color,fontSize:11,fontWeight:700,flexShrink:0}}>{scoreOnlyMode?(scores[st.id]?.__soScore??0):tot}/{scoreOnlyMode?100:tmax} · {badge.label}</span></div>
                        :<div style={{display:"inline-flex",alignItems:"center",justifyContent:"center",background:"#dc2626",color:"#fff",fontWeight:900,fontSize:15,borderRadius:6,width:28,height:28,marginTop:2}}>G</div>}
              </div>
              {!isComposite&&!scoreOnlyMode&&<span style={{color:T.textMuted,fontSize:12,transform:open?"rotate(180deg)":"none",transition:"0.2s",flexShrink:0}}>▾</span>}
            </div>
            {/* ── BEP / Kopya işaretleri (daima görünür) ── */}
            {(isBEP(st.id)||isKopya(st.id))&&<div style={{display:"flex",gap:6,marginBottom:8}}>
              <button onClick={()=>setBEP(st.id,!isBEP(st.id))}
                style={{background:isBEP(st.id)?T.purpleDim:T.toggleBg,border:`1px solid ${isBEP(st.id)?T.purple+"66":T.border}`,borderRadius:8,padding:"4px 10px",cursor:"pointer",color:isBEP(st.id)?T.purple:T.textSub,fontSize:11,fontWeight:700,fontFamily:"inherit"}}>
                {isBEP(st.id)?"🟣 BEP (kaldır)":"⬜ BEP"}
              </button>
              <button onClick={()=>setKopya(st.id,!isKopya(st.id))}
                style={{background:isKopya(st.id)?T.dangerDim:T.toggleBg,border:`1px solid ${isKopya(st.id)?T.danger+"66":T.border}`,borderRadius:8,padding:"4px 10px",cursor:"pointer",color:isKopya(st.id)?T.danger:T.textSub,fontSize:11,fontWeight:700,fontFamily:"inherit"}}>
                {isKopya(st.id)?"🔴 Kopya (kaldır)":"⬜ Kopya"}
              </button>
            </div>}
            {isBEP(st.id)&&<div style={{display:"flex",alignItems:"center",gap:8,background:T.purpleDim,borderRadius:9,padding:"8px 12px"}}>
              <span style={{color:T.purple,fontSize:11,fontWeight:700,flex:1}}>🟣 BEP Sonucu (0–100)</span>
              <button style={{...btnSm(T.toggleBg,T.textSub),padding:"5px 10px",fontSize:15}} onClick={()=>{const c=scores[st.id]?.__bepScore||0;setBEPScore(st.id,Math.max(0,Number(c)-1));}}>−</button>
              <input type="number" inputMode="numeric" pattern="[0-9]*" min={0} max={100} value={scores[st.id]?.__bepScore??""} onChange={e=>setBEPScore(st.id,e.target.value)} style={{...inp,width:64,textAlign:"center",padding:"6px 2px",fontSize:18,fontWeight:800,color:T.purple}} placeholder="—" onFocus={e=>e.target.select()}/>
              <button style={{...btnSm(T.purpleDim,T.purple),padding:"5px 10px",fontSize:15}} onClick={()=>{const c=scores[st.id]?.__bepScore||0;setBEPScore(st.id,Math.min(100,Number(c)+1));}}>+</button>
            </div>}
            {isKopya(st.id)&&<div style={{background:T.dangerDim,border:`1px solid ${T.danger}44`,borderRadius:9,padding:"8px 12px"}}>
              <span style={{color:T.danger,fontSize:11,fontWeight:700}}>🔴 Kopya — 0 puan. Analizde değerlendirilmez.</span>
            </div>}
            {/* ── BİLEŞİK MOD: 3 kutu inline ── */}
            {isComposite&&!isBEP(st.id)&&!isKopya(st.id)&&<div style={{display:"flex",flexDirection:"column",gap:6}}>
              <div style={{display:"flex",gap:6}}>
                {[["yazili","✏️ Yazılı","#3B82F6"],["dinleme","👂 Dinleme","#10B981"],["konusma","🗣 Konuşma","#8B5CF6"]].map(([k,lbl,col])=>{
                  const v=getComposite(st.id,k);
                  return <div key={k} style={{flex:1,background:T.bg,borderRadius:9,padding:"8px 6px",border:`1px solid ${v!==""?col+"55":T.border}`}}>
                    <div style={{color:col,fontSize:9,fontWeight:700,textAlign:"center",marginBottom:4}}>{lbl}<span style={{color:T.textMuted}}> %{cw[k]}</span></div>
                    <div style={{display:"flex",alignItems:"center",gap:3,justifyContent:"center"}}>
                      <button style={{background:T.toggleBg,border:`1px solid ${T.border}`,borderRadius:6,padding:"3px 7px",cursor:"pointer",color:T.textSub,fontSize:13,fontFamily:"inherit",lineHeight:1}}
                        onClick={()=>setComposite(st.id,k,Math.max(0,(v===""?0:Number(v))-1))}>−</button>
                      <input type="number" inputMode="numeric" pattern="[0-9]*" min={0} max={100} value={v} onFocus={e=>e.target.select()}
                        onChange={e=>setComposite(st.id,k,e.target.value)}
                        onFocus={e=>e.target.select()}
                        style={{width:44,background:T.inputBg,border:`1px solid ${v!==""?col+"66":T.border}`,borderRadius:7,color:v!==""?col:T.textMuted,padding:"5px 2px",fontSize:16,fontWeight:800,textAlign:"center",outline:"none",fontFamily:"inherit"}}
                        placeholder="—"/>
                      <button style={{background:v!==""?col+"22":T.toggleBg,border:`1px solid ${v!==""?col+"44":T.border}`,borderRadius:6,padding:"3px 7px",cursor:"pointer",color:v!==""?col:T.textSub,fontSize:13,fontFamily:"inherit",lineHeight:1}}
                        onClick={()=>setComposite(st.id,k,Math.min(100,(v===""?0:Number(v))+1))}>+</button>
                    </div>
                  </div>;
                })}
              </div>
              {compTot!==null&&<div style={{display:"flex",justifyContent:"space-between",alignItems:"center",background:compBadge.bg,borderRadius:8,padding:"7px 12px"}}>
                <span style={{color:compBadge.color,fontSize:13,fontWeight:800}}>
                  Yazılı Notu: {Math.round(compTot*100)/100}
                  <span style={{color:T.textMuted,fontSize:10,fontWeight:400,marginLeft:6}}>(yuvarlanmamış: {compTot})</span>
                </span>
                <span style={{color:compBadge.color,fontSize:12,fontWeight:700}}>{compBadge.label} (%{Math.round(compTot)})</span>
              </div>}
              {/* BEP/Kopya işaret butonları — bileşik modda da alt köşede */}
              {!isBEP(st.id)&&!isKopya(st.id)&&<div style={{display:"flex",gap:6,justifyContent:"flex-end"}}>
                <button onClick={()=>setBEP(st.id,true)}
                  style={{background:T.toggleBg,border:`1px solid ${T.border}`,borderRadius:7,padding:"3px 8px",cursor:"pointer",color:T.textSub,fontSize:10,fontWeight:600,fontFamily:"inherit"}}>⬜ BEP</button>
                <button onClick={()=>setKopya(st.id,true)}
                  style={{background:T.toggleBg,border:`1px solid ${T.border}`,borderRadius:7,padding:"3px 8px",cursor:"pointer",color:T.textSub,fontSize:10,fontWeight:600,fontFamily:"inherit"}}>⬜ Kopya</button>
              </div>}
            </div>}
            {/* ── SADECE SONUÇ MODU: tek büyük kutu inline ── */}
            {scoreOnlyMode&&!isComposite&&!isBEP(st.id)&&!isKopya(st.id)&&<div style={{display:"flex",alignItems:"center",gap:10,background:T.bg,borderRadius:9,padding:"10px 12px"}}>
              <span style={{color:T.textSub,fontSize:12,flex:1,fontWeight:600}}>Sınav Puanı <span style={{color:T.textMuted,fontSize:10}}>(0–{tmax})</span></span>
              <div style={{display:"flex",alignItems:"center",gap:6}}>
                <button style={{...btnSm(T.toggleBg,T.textSub),padding:"6px 13px",fontSize:17}} onClick={()=>{const c=scores[st.id]?.__soScore||0;setSoScore(st.id,Math.max(0,Number(c)-1));}}>−</button>
                <input type="number" inputMode="numeric" pattern="[0-9]*" min={0} max={tmax} value={scores[st.id]?.__soScore??""} onChange={e=>setSoScore(st.id,e.target.value)} style={{...inp,width:68,textAlign:"center",padding:"7px 4px",fontSize:20,fontWeight:800}} placeholder="—" onFocus={e=>e.target.select()}/>
                <button style={{...btnSm(T.accentDim,T.accent),padding:"6px 13px",fontSize:17}} onClick={()=>{const c=scores[st.id]?.__soScore||0;setSoScore(st.id,Math.min(tmax,Number(c)+1));}}>+</button>
              </div>
              {!isBEP(st.id)&&!isKopya(st.id)&&<div style={{display:"flex",gap:4}}>
                <button onClick={()=>setBEP(st.id,true)} style={{background:T.toggleBg,border:`1px solid ${T.border}`,borderRadius:7,padding:"3px 7px",cursor:"pointer",color:T.textSub,fontSize:10,fontFamily:"inherit"}}>BEP</button>
                <button onClick={()=>setKopya(st.id,true)} style={{background:T.toggleBg,border:`1px solid ${T.border}`,borderRadius:7,padding:"3px 7px",cursor:"pointer",color:T.textSub,fontSize:10,fontFamily:"inherit"}}>Kopya</button>
              </div>}
            </div>}
            {/* ── NORMAL MOD: expandable soru listesi ── */}
            {!isComposite&&!scoreOnlyMode&&open&&<div style={{marginTop:10}}>
              <Divider/>
              <div style={{display:"flex",gap:6,marginBottom:8,flexWrap:"wrap"}}>
                <button onClick={()=>setFullScore(st.id)}
                  style={{background:T.successDim,border:`1px solid ${T.success}44`,borderRadius:8,padding:"5px 12px",cursor:"pointer",color:T.success,fontSize:12,fontWeight:700,fontFamily:"inherit"}}>✅ Tam Puan</button>
                <button onClick={()=>setBEP(st.id,!isBEP(st.id))}
                  style={{background:isBEP(st.id)?T.purpleDim:T.toggleBg,border:`1px solid ${isBEP(st.id)?T.purple+"66":T.border}`,borderRadius:8,padding:"5px 12px",cursor:"pointer",color:isBEP(st.id)?T.purple:T.textSub,fontSize:12,fontWeight:700,fontFamily:"inherit"}}>
                  {isBEP(st.id)?"🟣":"⬜"} BEP</button>
                <button onClick={()=>setKopya(st.id,!isKopya(st.id))}
                  style={{background:isKopya(st.id)?T.dangerDim:T.toggleBg,border:`1px solid ${isKopya(st.id)?T.danger+"66":T.border}`,borderRadius:8,padding:"5px 12px",cursor:"pointer",color:isKopya(st.id)?T.danger:T.textSub,fontSize:12,fontWeight:700,fontFamily:"inherit"}}>
                  {isKopya(st.id)?"🔴":"⬜"} Kopya</button>
              </div>
              {exam.questions.map(q=>{
                const v=getS(st.id,q.id);
                return <div key={q.id} style={{display:"flex",alignItems:"center",gap:10,background:T.bg,borderRadius:8,padding:"8px 12px",marginBottom:6}}>
                  <span style={{color:T.textSub,fontSize:13,flex:1}}>{q.label}. Soru <span style={{color:T.textMuted}}>/{q.maxScore}</span></span>
                  <div style={{display:"flex",alignItems:"center",gap:6}}>
                    <button style={{...btnSm(T.toggleBg,T.textSub),padding:"5px 11px",fontSize:16}} onClick={()=>{const c=v===""?0:Number(v);setS(st.id,q.id,Math.max(0,c-1),q.maxScore);}}>−</button>
                    <input type="number" inputMode="numeric" pattern="[0-9]*" min={0} max={q.maxScore} value={v} onChange={e=>setS(st.id,q.id,e.target.value,q.maxScore)} style={{...inp,width:56,textAlign:"center",padding:"6px 4px",fontSize:16,fontWeight:700}} placeholder="—" onFocus={e=>e.target.select()}/>
                    <button style={{...btnSm(T.accentDim,T.accent),padding:"5px 11px",fontSize:16}} onClick={()=>{const c=v===""?0:Number(v);setS(st.id,q.id,Math.min(q.maxScore,c+1),q.maxScore);}}>+</button>
                  </div>
                </div>;
              })}
              {girildi&&<div style={{display:"flex",justifyContent:"space-between",alignItems:"center",background:badge.bg,borderRadius:8,padding:"10px 14px",marginTop:4}}>
                <span style={{color:badge.color,fontSize:14,fontWeight:700}}>Toplam: {tot}/{tmax}</span>
                <span style={{color:badge.color,fontSize:13,fontWeight:700}}>{badge.label} (%{pct})</span>
              </div>}
            </div>}
          </Card>;
        })}
      </div>}
    </>}
    {/* KLASİK SINAV ANALİZİ */}
    {tab==="report"&&<div style={{padding:"12px 16px",display:"flex",flexDirection:"column",gap:12}}>
      {!stats?<div style={{textAlign:"center",color:T.textMuted,padding:60,fontSize:14}}>Rapor için önce puan girişini tamamlayın</div>:(
        <>
          <Card style={{padding:0,overflow:"hidden",borderColor:T.accentDim}}>

}
function toCSV(rows){
  if(!rows.length)return"";
  const headers=Object.keys(rows[0]);
  // Türkçe karakterler, virgül, tırnak veya satır sonu içeren değerleri tırnak içine al
  const escape=v=>{const s=String(v??"");return(s.includes(",")||s.includes('"')||s.includes("\n")||s.includes(";")||/[çğışöüÇĞİŞÖÜ]/.test(s))?`"${s.replace(/"/g,'""')}"`  :s;};
  return[headers.join(","),...rows.map(r=>headers.map(k=>escape(r[k])).join(","))].join("\n");
}
function _triggerDownload(blob,filename){
  // iOS Safari: a.click() çalışmaz — body'ye ekleyip tıklayıp kaldır
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url;
  a.download=filename;
  a.style.display="none";
  document.body.appendChild(a);
  a.click();
  setTimeout(()=>{
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  },300);
}
function downloadCSV(filename,rows){
  if(!rows||!rows.length)return;
  // \uFEFF BOM — Excel ve diğer programların UTF-8'i Türkçe karakterlerle doğru okumasını sağlar
  const blob=new Blob(["\uFEFF"+toCSV(rows)],{type:"text/csv;charset=utf-8;"});
  const fn=filename.endsWith(".csv")?filename:filename+".csv";
  _triggerDownload(blob,fn);
}
function downloadXLSX(filename,rows){
  if(!rows||!rows.length)return;
  const fn=filename.replace(/\.(xlsx?|csv)$/i,"")+".xlsx";
  const doWrite=()=>{
    const ws=window.XLSX.utils.json_to_sheet(rows);
    const wb=window.XLSX.utils.book_new();
    window.XLSX.utils.book_append_sheet(wb,ws,"Sayfa1");
    window.XLSX.writeFile(wb,fn);
  };
  if(window.XLSX){doWrite();return;}
  const s=document.createElement("script");
  s.src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js";
  s.onload=doWrite;
  s.onerror=()=>{
    // SheetJS yüklenemezse CSV'ye düş
    const blob=new Blob(["\uFEFF"+toCSV(rows)],{type:"text/csv;charset=utf-8;"});
    _triggerDownload(blob,filename.replace(/\.(xlsx?|csv)$/i,"")+".csv");
  };
  document.head.appendChild(s);
}

const ReportCtx=createContext(null);

// Kütüphane yükleyici
async function loadScript(src){
  // Önce window nesnesinde yüklenmiş mi kontrol et (DOM tag kontrolü yetmez)
  if(src.includes("html2canvas")&&window.html2canvas)return;
  if(src.includes("jspdf")&&window.jspdf)return;
  if(src.includes("xlsx")&&window.XLSX)return;
  // DOM'da bozuk kalıntı varsa temizle
  const existing=document.querySelector('script[src="'+src+'"]');
  if(existing)existing.parentNode.removeChild(existing);
  return new Promise((res,rej)=>{
    const s=document.createElement("script");
    s.src=src;
    s.onload=res;
    s.onerror=()=>rej(new Error("Script yüklenemedi: "+src));
    document.head.appendChild(s);
  });
}

// Tarih-saat etiketi üret: örn. 31_12_2026_08_00
function pdfTimestamp(){
  const d=new Date();
  const pad=n=>String(n).padStart(2,"0");
  return`${pad(d.getDate())}_${pad(d.getMonth()+1)}_${d.getFullYear()}_${pad(d.getHours())}_${pad(d.getMinutes())}`;
}
// Dosya adına tarih-saat ekle
function stampedFilename(base){
  const safe=(base||"rapor").replace(/[^a-zA-Z0-9_\-]/g,"_").replace(/_+/g,"_").replace(/^_|_$/g,"");
  return`${safe}_${pdfTimestamp()}`;
}
