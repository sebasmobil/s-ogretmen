// ── Responsive ekran hook ──
function useScreen(){
  const [sz, setSz] = useState(()=>({
    w: window.innerWidth,
    h: window.innerHeight,
    isPhone:  window.innerWidth < 600,
    isTablet: window.innerWidth >= 600 && window.innerWidth < 1024,
    isDesktop:window.innerWidth >= 1024,
    isLandscape: window.innerWidth > window.innerHeight,
    isTinyH: window.innerHeight < 420, // yatay telefon
  }));
  useEffect(()=>{
    const upd=()=>{
      const w=window.innerWidth, h=window.innerHeight;
      setSz({w,h,
        isPhone:w<600, isTablet:w>=600&&w<1024, isDesktop:w>=1024,
        isLandscape:w>h, isTinyH:h<420,
      });
    };
    window.addEventListener('resize',upd);
    window.addEventListener('orientationchange',()=>setTimeout(upd,120));
    return()=>{window.removeEventListener('resize',upd);};
  },[]);
  return sz;
}
const ScreenCtx = createContext({w:390,h:844,isPhone:true,isTablet:false,isDesktop:false,isLandscape:false,isTinyH:false});
const useScr = ()=>useContext(ScreenCtx);

const DARK={id:"dark",bg:"#060A12",surface:"#0F1628",card:"#141C30",border:"#253354",accent:"#4B8BFF",accentDim:"#1E3A80",success:"#12C98A",successDim:"#064E3B",warn:"#FBAA0E",warnDim:"#3D2A10",danger:"#F45656",dangerDim:"#3D1010",text:"#F0F4FF",textSub:"#9AABCC",textMuted:"#5A6E8E",purple:"#A374F7",purpleDim:"#2D1B69",navBg:"#0C1220",inputBg:"#0F1628",tableAlt:"#0b1019",shadow:"0 4px 24px rgba(0,0,0,0.6)",toggleBg:"#1E2D4A"};
const LIGHT={id:"light",bg:"#F0F4FF",surface:"#FFFFFF",card:"#FFFFFF",border:"#D1DCF5",accent:"#2563EB",accentDim:"#DBEAFE",success:"#059669",successDim:"#D1FAE5",warn:"#D97706",warnDim:"#FEF3C7",danger:"#DC2626",dangerDim:"#FEE2E2",text:"#0F172A",textSub:"#4B6080",textMuted:"#94A3B8",purple:"#7C3AED",purpleDim:"#EDE9FE",navBg:"#FFFFFF",inputBg:"#F8FAFF",tableAlt:"#F8FAFF",shadow:"0 4px 24px rgba(37,99,235,0.08)",toggleBg:"#E2EBFF"};
const ThemeCtx=createContext(DARK);
const useT=()=>useContext(ThemeCtx);
const uid=()=>Date.now()+Math.random();
function timeToMin(t){const[h,m]=t.split(":").map(Number);return h*60+m;}
function minToTime(m){return`${String(Math.floor(m/60)).padStart(2,"0")}:${String(m%60).padStart(2,"0")}`;}
function computePeriods(s){
  let cur=timeToMin(s.startTime);
  const cl=s.customLessons||{};
  const cb=s.customBreaks||{};
  return Array.from({length:s.dailyLessons},(_,i)=>{
    const n=i+1;
    const dur=cl[n]||s.lessonDuration;
    const start=minToTime(cur);
    cur+=Number(dur);
    const end=minToTime(cur);
    if(i+1<s.dailyLessons){
      const defBreak=n===s.lunchBreakAfterLesson?s.lunchBreakDuration:s.breakDuration;
      cur+=Number(cb[n]||defBreak);
    }
    return{index:i,start,end};
  });
}
function calcStats(scores){
  if(!scores.length)return null;
  const n=scores.length;
  const avg=scores.reduce((a,b)=>a+b,0)/n;
  const sorted=[...scores].sort((a,b)=>a-b);
  // Medyan (Excel MEDYAN formülüyle aynı)
  const median=n%2===0?(sorted[n/2-1]+sorted[n/2])/2:sorted[Math.floor(n/2)];
  // Ranj = Max - Min (Excel=MAX-MIN)
  const range=sorted[n-1]-sorted[0];
  // Standart Sapma — örneklem (Excel STDSAPMA = n-1 payda)
  const stdDev=n>1?Math.sqrt(scores.reduce((s,x)=>s+(x-avg)**2,0)/(n-1)):0;
  // Çarpıklık = Pearson Modu Çarpıklığı: 3*(Ort-Medyan)/StdSapma (Excel formülüyle aynı mantık)
  const skewness=stdDev>0?3*(avg-median)/stdDev:0;
  const passing=scores.filter(s=>s>=50).length;
  const failing=scores.filter(s=>s<50).length;
  const successRate=(passing/n)*100;
  // Zorluk derecesi eşikleri Excel ile aynı: <-0.5 Kolay, >0.5 Zor, arada Orta
  const difficulty=skewness<-0.5?"SINAV KOLAY":skewness>0.5?"SINAV ZOR":"ORTA GÜÇLÜKTE";
  // Puan dağılımı
  const dist={
    "0-49":  scores.filter(s=>s<50).length,
    "50-59": scores.filter(s=>s>=50&&s<60).length,
    "60-69": scores.filter(s=>s>=60&&s<70).length,
    "70-84": scores.filter(s=>s>=70&&s<85).length,
    "85-100":scores.filter(s=>s>=85).length,
  };
  return{n,avg,median,range,stdDev,skewness,passing,failing,successRate,difficulty,dist};
}
function gradeBadge(pct,T){if(pct>=85)return{label:"Pekiyi",bg:T.id==="dark"?"#064e3b88":T.successDim,color:T.success};if(pct>=70)return{label:"İyi",bg:T.id==="dark"?"#1e3a5f88":T.accentDim,color:T.accent};if(pct>=60)return{label:"Orta",bg:T.id==="dark"?"#3d2a1088":T.warnDim,color:T.warn};if(pct>=50)return{label:"Geçer",bg:T.id==="dark"?"#3d201088":T.warnDim,color:"#F97316"};return{label:"Geçemez",bg:T.id==="dark"?"#3d101088":T.dangerDim,color:T.danger};}
function topicLabel(sp,T){
  if(sp>=70)return{text:"ANLAŞILMIŞ",color:T.success,bg:T.successDim};
  if(sp>=45)return{text:"GERİ BİLDİRİM VERİLMELİ",color:T.warn,bg:T.warnDim};
  return{text:"BİREYSEL ÇALIŞMA GEREKLİ",color:T.danger,bg:T.dangerDim};
}
function trLower(s){
  return(s||"").replace(/İ/g,"i").replace(/I/g,"ı").replace(/Ğ/g,"ğ").replace(/Ü/g,"ü").replace(/Ş/g,"ş").replace(/Ö/g,"ö").replace(/Ç/g,"ç").toLowerCase();
}
function trIncludes(text,q){return trLower(text).includes(trLower(q));}
function sortStudents(arr, by="schoolNo", classes){
  return [...arr].sort((a,b)=>{
    if(by==="schoolNo"){
      const an=parseInt(a.schoolNo||"99999999")||99999999;
      const bn=parseInt(b.schoolNo||"99999999")||99999999;
      if(an!==bn)return an-bn;
      return a.no-b.no;
    }
    if(by==="no") return a.no-b.no||trLower(a.name).localeCompare(trLower(b.name),"tr");
    if(by==="name") return trLower(a.name).localeCompare(trLower(b.name),"tr");
    if(by==="class"){
      const ca=classes?classes.find(c=>c.id===a.classId):null;
      const cb=classes?classes.find(c=>c.id===b.classId):null;
      const na=ca?`${ca.grade}/${ca.branch}`:"zzz";
      const nb=cb?`${cb.grade}/${cb.branch}`:"zzz";
      const cmp=na.localeCompare(nb,"tr");
      if(cmp!==0)return cmp;
      return a.no-b.no;
    }
    return 0;
  });
}

  const ref=useRef();
  useEffect(()=>{
    const el=ref.current;if(!el)return;
    el.style.opacity="0";el.style.transform="translateY(14px)";
    const t=setTimeout(()=>{
      el.style.transition=`opacity 0.30s ease ${delay}ms, transform 0.30s cubic-bezier(.22,.68,0,1.2) ${delay}ms`;
      el.style.opacity="1";el.style.transform="translateY(0)";
    },10);
    return()=>clearTimeout(t);
  },[delay]);
  return <div ref={ref} style={style}>{children}</div>;
}

function NumPad({value,onChange,onClose,max=100,label=""}){
  const T=useT();
  const[cur,setCur]=useState(value!=null&&value!==""?String(value):"");
  const press=k=>{
    if(k==="⌫"){setCur(c=>c.slice(0,-1));return;}
    if(k==="✓"){const n=cur===""?null:Math.min(Number(cur),max);onChange(n==null?"":n);onClose();return;}
    if(k==="✗"){onClose();return;}
    if(k==="." && cur.includes("."))return;
    const next=cur+k;
    if(Number(next)>max){setCur(String(max));return;}
    setCur(next);
  };
  const keys=[["7","8","9"],["4","5","6"],["1","2","3"],["✗","0","⌫"]];

      </div>
      {/* Tuş takımı */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
        {keys.flat().map(k=>{
          const isDone=k==="✓";const isDel=k==="⌫";const isCancel=k==="✗";

function parseCSV(text){
  const lines=text.trim().split(/\r?\n/);
  if(lines.length<2)return{headers:[],rows:[]};
  const delim=(lines[0].match(/;/g)||[]).length>=(lines[0].match(/,/g)||[]).length?";":","
  const parseLine=line=>{const cols=[];let cur="";let inQ=false;for(let i=0;i<line.length;i++){const ch=line[i];if(ch==='"'){inQ=!inQ;}else if(ch===delim&&!inQ){cols.push(cur.trim());cur="";}else{cur+=ch;}}cols.push(cur.trim());return cols;};
  const headers=parseLine(lines[0]).map(h=>h.replace(/^["']|["']$/g,""));
  const rows=lines.slice(1).filter(l=>l.trim()).map(l=>{const vals=parseLine(l);const obj={};headers.forEach((h,i)=>{obj[h]=(vals[i]||"").replace(/^["']|["']$/g,"");});return obj;});
  return{headers,rows};
}

  const parseAndSet=(headers,rows)=>{
    if(!headers.length){setError("Dosya boş veya okunamadı.");return;}
    const result={headers,rows};
    setParsed(result);
    const auto={};
    const norm=s=>{let r=(s||"");r=r.replace(/İ/g,"i").replace(/I/g,"i").replace(/Ğ/g,"g").replace(/Ü/g,"u").replace(/Ş/g,"s").replace(/Ö/g,"o").replace(/Ç/g,"c").replace(/ı/g,"i").replace(/ğ/g,"g").replace(/ü/g,"u").replace(/ş/g,"s").replace(/ö/g,"o").replace(/ç/g,"c");r=r.toLowerCase();r=r.replace(/[\s_\-\.\/(\)]+/g,"");return r;};
    const ALIASES={
      name:["adsoyad","adisoyadi","isim","ogrenci","name","fullname"],
      schoolNo:["okulno","okulnumarasi","schoolno","numara","ogrno"],
      grade:["sinif","class","grade"],
      branch:["sube","branch","sinifharf"],
      student:["adsoyad","ogrenci","name","isim"],
      tarihAraligi:["tariharaligi","tarih","aralik"],
      hafta:["hafta"],
      unite:["unitethema","unitetema","unite"],
      konu:["konuicerik","konu"],
      ciktilar:["ogrenmeciktilari","ogrenme","ciktilar"],
      dersSaati:["derssaati","saati"],
    };
    const used=new Set();
    targetFields.forEach(f=>{
      const aliases=(ALIASES[f.key]||[]).slice().sort((a,b)=>b.length-a.length);
      const fn=norm(f.label);const fk=norm(f.key);
      let match=null;
      for(const a of aliases){match=headers.find(h=>!used.has(h)&&norm(h)===a);if(match)break;}
      if(!match){for(const a of aliases){if(a.length<4)continue;match=headers.find(h=>{if(used.has(h))return false;const hn=norm(h);return hn.includes(a)&&hn.length<=a.length+6;});if(match)break;}}
      if(!match)match=headers.find(h=>!used.has(h)&&(norm(h)===fn||norm(h)===fk));
      if(!match&&fn.length>5)match=headers.find(h=>{if(used.has(h))return false;const hn=norm(h);return hn.includes(fn)||fn.includes(hn)&&hn.length>4;});
      if(match){auto[f.key]=match;used.add(match);}
    });
    setMapping(auto);
    setStep("map");
    setError("");
  };

  const loadCSV=text=>{
    try{
      const result=parseCSV(text);
      parseAndSet(result.headers,result.rows);
    }catch(err){setError("CSV okunamadı: "+err.message);}
  };

  const loadXLSX=async(file)=>{
    try{
      if(!window.XLSX){
        await new Promise((ok,fail)=>{const s=document.createElement("script");s.src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js";s.onload=ok;s.onerror=fail;document.head.appendChild(s);});
      }
      const buf=await file.arrayBuffer();
      const wb=window.XLSX.read(buf,{type:"array"});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const raw=window.XLSX.utils.sheet_to_json(ws,{header:1,defval:""});
      if(!raw.length){setError("XLSX dosyası boş.");return;}
      const headers=raw[0].map(String);
      const rows=raw.slice(1).filter(r=>r.some(c=>c!=="")).map(r=>{
        const obj={};headers.forEach((h,i)=>{obj[h]=String(r[i]||"");});return obj;
      });
      parseAndSet(headers,rows);
    }catch(err){setError("XLSX okunamadı: "+err.message);}
  };

  const loadFile=file=>{
    if(!file)return;
    const ext=(file.name||"").split(".").pop().toLowerCase();
    if(ext==="xlsx"||ext==="xls"){loadXLSX(file);return;}
    const r=new FileReader();
    r.onload=e=>loadCSV(e.target.result);
    r.readAsText(file,"UTF-8");
  };
  const requiredOk=targetFields.filter(f=>f.required).every(f=>mapping[f.key]);
  const preview=useMemo(()=>{
    if(!parsed)return[];
    return parsed.rows.slice(0,5).map(row=>{
      const obj={};
      targetFields.forEach(f=>{if(mapping[f.key])obj[f.key]=row[mapping[f.key]]||"";});
      return obj;
    });
  },[parsed,mapping,targetFields]);
  const doImport=()=>{
    const rows=parsed.rows.map(row=>{
      const obj={};
      targetFields.forEach(f=>{if(mapping[f.key])obj[f.key]=row[mapping[f.key]]||"";});
      return obj;
    });
    const result=onImport(rows,parsed.headers); // headers'ı da geç
    setImportResult(result||{count:rows.length});
    setStep("done");
  };
  const sel={...inp,fontSize:13,padding:"8px 10px"};
  const steps=[["upload","📂 Dosya"],["map","🔗 Eşleştir"],["preview","👁 Önizle"],["done","✅ Tamam"]];
  return <Sheet title={title} onClose={onClose}>
    {/* Steps */}
    <div style={{display:"flex",gap:3,marginBottom:16}}>
      {steps.map(([s,l],i)=>{
        const active=step===s;
        const past=steps.findIndex(x=>x[0]===step)>i;
        return <div key={s} style={{flex:1,textAlign:"center",padding:"5px 2px",borderRadius:8,fontSize:10,fontWeight:600,background:active?T.accent:past?T.successDim:T.toggleBg,color:active?"#fff":past?T.success:T.textMuted}}>{l}</div>;
      })}
    </div>
    {/* ── STEP 1: UPLOAD ── */}
    {step==="upload"&&<>
      <div
        onDragOver={e=>{e.preventDefault();setDrag(true);}}
        onDragLeave={()=>setDrag(false)}
        onDrop={e=>{e.preventDefault();setDrag(false);loadFile(e.dataTransfer.files[0]);}}
        onClick={()=>document.getElementById("csv-input").click()}
        style={{border:`2px dashed ${drag?T.accent:T.border}`,borderRadius:14,padding:"36px 20px",textAlign:"center",background:drag?T.accentDim:T.bg,marginBottom:14,cursor:"pointer",transition:"all 0.2s"}}
      >
        <div style={{fontSize:38,marginBottom:8}}>📂</div>
        <div style={{color:T.text,fontSize:14,fontWeight:700,marginBottom:4}}>CSV veya Excel dosyasını sürükle / tıkla</div>
        <div style={{color:T.textMuted,fontSize:12}}>CSV (.csv), Excel (.xlsx, .xls) desteklenir</div>
        <input id="csv-input" type="file" accept=".csv,.txt,.xlsx,.xls" style={{display:"none"}} onChange={e=>loadFile(e.target.files[0])}/>
      </div>
      {sampleCSV&&<div style={{background:T.bg,borderRadius:10,padding:"10px 14px",marginBottom:14,border:`1px solid ${T.border}`}}>
        <div style={{color:T.textSub,fontSize:11,marginBottom:6,fontWeight:600}}>📋 Örnek CSV formatı:</div>
        <pre style={{color:T.accent,fontSize:11,margin:0,overflowX:"auto",lineHeight:1.6}}>{sampleCSV}</pre>
      </div>}
      {error&&<div style={{color:T.danger,fontSize:13,padding:"8px 12px",background:T.dangerDim,borderRadius:8,marginBottom:10}}>{error}</div>}
      <button style={btn(T.toggleBg,T.textSub)} onClick={onClose}>İptal</button>
    </>}
    {/* ── STEP 2: COLUMN MAPPING ── */}
    {step==="map"&&parsed&&<>
      <div style={{background:T.successDim,borderRadius:8,padding:"8px 12px",marginBottom:14,display:"flex",gap:8,alignItems:"center"}}>
        <span style={{fontSize:16}}>✅</span>
        <span style={{color:T.success,fontSize:13,fontWeight:600}}>{parsed.rows.length} satır okundu — sütunları eşleştirin</span>
      </div>
      {targetFields.map(f=><Field key={f.key} label={<span>{f.label}{f.required&&<span style={{color:T.danger}}> *</span>}{f.hint&&<span style={{color:T.textMuted,fontWeight:400}}> — {f.hint}</span>}</span>}>
        <select style={sel} value={mapping[f.key]||""} onChange={e=>setMapping(m=>({...m,[f.key]:e.target.value||undefined}))}>
          <option value="">— Eşleştirme yok —</option>
          {parsed.headers.map(h=><option key={h} value={h}>{h}</option>)}
        </select>
        {mapping[f.key]&&<div style={{display:"flex",gap:6,marginTop:4,flexWrap:"wrap"}}>
          {parsed.rows.slice(0,3).map((row,i)=><span key={i} style={{background:T.accentDim,color:T.accent,borderRadius:4,padding:"1px 6px",fontSize:10}}>{row[mapping[f.key]]||"—"}</span>)}
          <span style={{color:T.textMuted,fontSize:10}}>örnek değerler</span>
        </div>}
      </Field>)}
      {!requiredOk&&<div style={{color:T.warn,fontSize:12,padding:"8px 12px",background:T.warnDim,borderRadius:8,marginBottom:10}}>
        ⚠ Yıldızlı (*) zorunlu alanları eşleştirin
      </div>}
      <div style={{display:"flex",gap:10}}>
        <BackBtn onClick={()=>setStep("upload")} style={{width:30,height:30}}/>
        <button style={{...btn(requiredOk?T.accent:T.toggleBg,requiredOk?"#fff":T.textMuted),flex:1}} disabled={!requiredOk} onClick={()=>setStep("preview")}>Önizle →</button>
      </div>
    </>}
    {/* ── STEP 3: PREVIEW ── */}
    {step==="preview"&&<>
      <div style={{color:T.textSub,fontSize:12,marginBottom:10}}>
        İlk 5 satır — toplam <b style={{color:T.text}}>{parsed.rows.length}</b> satır aktarılacak:
      </div>
      <div style={{overflowX:"auto",marginBottom:14,borderRadius:10,border:`1px solid ${T.border}`}}>
        <table style={{borderCollapse:"collapse",width:"100%",minWidth:300}}>
          <thead>
            <tr style={{background:T.tableAlt}}>
              {targetFields.filter(f=>mapping[f.key]).map(f=><th key={f.key} style={{color:T.accent,fontSize:10,padding:"8px 10px",textAlign:"left",fontWeight:700,whiteSpace:"nowrap",borderBottom:`1px solid ${T.border}`}}>{f.label}</th>)}
            </tr>
          </thead>
          <tbody>
            {preview.map((row,i)=><tr key={i} style={{borderBottom:`1px solid ${T.border}`}}>
              {targetFields.filter(f=>mapping[f.key]).map(f=><td key={f.key} style={{color:T.text,fontSize:11,padding:"7px 10px"}}>{row[f.key]||<span style={{color:T.textMuted}}>—</span>}</td>)}
            </tr>)}
          </tbody>
        </table>
      </div>
      <div style={{display:"flex",gap:10}}>
        <BackBtn onClick={()=>setStep("map")} style={{width:30,height:30}}/>
        <button style={{...btn(T.success),flex:2}} onClick={doImport}>✓ {parsed.rows.length} Satırı Aktar</button>
      </div>
    </>}
    {/* ── STEP 4: DONE ── */}
    {step==="done"&&importResult&&<>
      <div style={{textAlign:"center",padding:"16px 0 20px"}}>
        <div style={{fontSize:48,marginBottom:12}}>🎉</div>
        <div style={{color:T.success,fontSize:18,fontWeight:800,marginBottom:6}}>Aktarım Tamamlandı</div>
        {importResult.added!==undefined&&<div style={{color:T.textSub,fontSize:13,marginBottom:4}}>✅ {importResult.added} yeni öğrenci eklendi</div>}
        {importResult.memberAdded!==undefined&&importResult.memberAdded>0&&<div style={{color:T.accent,fontSize:13,marginBottom:4}}>👥 {importResult.memberAdded} öğrenci kulübe eklendi</div>}
        {importResult.skipped>0&&<div style={{color:T.warn,fontSize:13,marginBottom:4}}>⚠ {importResult.skipped} satır atlandı</div>}
        {importResult.classesAdded>0&&<div style={{color:T.purple,fontSize:13,marginBottom:4}}>🏫 {importResult.classesAdded} yeni sınıf oluşturuldu</div>}
      </div>
      {importResult.warnings?.length>0&&<div style={{background:T.warnDim,border:`1px solid ${T.warn}44`,borderRadius:10,padding:"10px 14px",marginBottom:10}}>
        <div style={{color:T.warn,fontSize:11,fontWeight:800,marginBottom:6,textTransform:"uppercase",letterSpacing:"0.06em"}}>⚠ Okul No Uyarıları ({importResult.warnings.length})</div>
        <div style={{color:T.warn,fontSize:11,fontWeight:400,marginBottom:8,lineHeight:1.5}}>Aşağıdaki kayıtlarda okul numarası zaten mevcut fakat isim farklı. Bu öğrenciler <b>atlandı</b> — manuel olarak kontrol edin.</div>
        {importResult.warnings.slice(0,6).map((w,i)=><div key={i} style={{color:T.warn,fontSize:11,padding:"2px 0",borderTop:i>0?`1px solid ${T.warn}22`:"none"}}>· {w}</div>)}
        {importResult.warnings.length>6&&<div style={{color:T.textMuted,fontSize:11,marginTop:4}}>... ve {importResult.warnings.length-6} uyarı daha</div>}
      </div>}
      {importResult.errors?.length>0&&<div style={{color:T.danger,fontSize:12,marginBottom:10,textAlign:"left",background:T.dangerDim,borderRadius:8,padding:"8px 12px",border:`1px solid ${T.danger}44`}}>
        <div style={{fontWeight:700,marginBottom:4,fontSize:11,textTransform:"uppercase",letterSpacing:"0.06em"}}>❌ Hatalar ({importResult.errors.length})</div>
        {importResult.errors.slice(0,5).map((e,i)=><div key={i}>· {e}</div>)}
        {importResult.errors.length>5&&<div>... ve {importResult.errors.length-5} hata daha</div>}
      </div>}
      <button style={btn(T.accent)} onClick={onClose}>Kapat</button>
    </>}
  </Sheet>;
}

    setName(l.name||"");

    if(!name.trim())return;

      newLessons.push({id:uid(),name:n});added++;

      const dupByName=[...students.filter(s=>s.classId===cls.id),...newStudents.filter(s=>s.classId===cls.id)].find(s=>trLower(s.name)===trLower(name));

function QuickCellSheet({day,period,current,classes,lessons,onSave,onClear,onClose,dayLabel}){
  const T=useT();const{btn}=useStyles();
  const CDK=["#1E3A80","#064E3B","#3D1B69","#4D2A0E","#1E4040","#3D1010"];
  const CLK=["#DBEAFE","#D1FAE5","#EDE9FE","#FEF3C7","#CCFBF1","#FEE2E2"];
  const CTK=["#1D4ED8","#047857","#6D28D9","#B45309","#0F766E","#B91C1C"];
  const cc=id=>T.id==="dark"?CDK[(id-1)%6]:CLK[(id-1)%6];
  const ct=id=>T.id==="dark"?"#93C5FD":CTK[(id-1)%6];
  const[selClass,setSelClass]=useState(current?.classId!=null?String(current.classId):null);
  const[selLesson,setSelLesson]=useState(current?.lessonId!=null?String(current.lessonId):null);
  const sortedClasses=[...classes].sort((a,b)=>a.grade-b.grade||a.branch.localeCompare(b.branch));
  const pickClass=id=>{const sid=String(id);if(sid===selClass){setSelClass(null);setSelLesson(null);}else{setSelClass(sid);setSelLesson(current?.classId!=null&&String(current.classId)===sid?String(current.lessonId):null);}};
  const pickLesson=id=>{
    if(!selClass)return;
    const cid=Number(selClass);
    const lid=id===selLesson?null:id;
    setSelLesson(lid);
    if(lid){onSave(Number(cid),Number(lid));} // ders seçilince anında kaydet
  };
  const ready=selClass&&selLesson;
  return <Sheet title={`${DAYS[day]} – ${period+1}. Ders`} onClose={onClose}>
    {/* Adım göstergesi */}
    <div style={{display:"flex",gap:4,marginBottom:16}}>
      {[["1","Sınıf Seç",!!selClass],["2","Ders Seç",!!selLesson]].map(([n,l,done])=>(
        <div key={n} style={{flex:1,display:"flex",alignItems:"center",gap:6,background:done?T.successDim:selClass||n==="1"?T.accentDim:T.toggleBg,borderRadius:10,padding:"8px 10px"}}>
          <div style={{width:20,height:20,borderRadius:99,background:done?T.success:selClass||n==="1"?T.accent:T.border,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
            <span style={{color:"#fff",fontSize:10,fontWeight:800}}>{done?"✓":n}</span>
          </div>
          <span style={{color:done?T.success:T.text,fontSize:12,fontWeight:600}}>{l}</span>
        </div>
      ))}
    </div>
    {/* Sınıf listesi */}
    <Lbl>Sınıf</Lbl>
    <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:16}}>
      {sortedClasses.map(c=>{
        const sel=selClass===String(c.id);
        return <button key={c.id} onClick={()=>pickClass(c.id)} style={{
          background:sel?cc(c.id):T.surface,
          color:sel?ct(c.id):T.textSub,
          border:`2px solid ${sel?ct(c.id):T.border}`,
          borderRadius:10,padding:"10px 16px",cursor:"pointer",
          fontSize:14,fontWeight:700,fontFamily:"inherit",
          transition:"all 0.15s",
          boxShadow:sel?`0 0 0 3px ${ct(c.id)}33`:"none"
        }}>{c.grade}/{c.branch}</button>;
      })}
    </div>
    {/* Ders listesi — sınıf seçilince aktif */}
    <Lbl>Ders {!selClass&&<span style={{color:T.textMuted,fontWeight:400,textTransform:"none"}}>(önce sınıf seçin)</span>}</Lbl>
    <div style={{display:"flex",flexDirection:"column",gap:7,marginBottom:18,opacity:selClass?1:0.4,pointerEvents:selClass?"auto":"none"}}>
      {lessons.map(l=>{
        const sel=selLesson===l.id;
        return <button key={l.id} onClick={()=>pickLesson(l.id)} style={{
          display:"flex",alignItems:"center",justifyContent:"space-between",
          background:sel?T.accentDim:T.surface,
          border:`2px solid ${sel?T.accent:T.border}`,
          borderRadius:12,padding:"12px 14px",cursor:"pointer",
          fontFamily:"inherit",transition:"all 0.15s",
          boxShadow:sel?`0 0 0 3px ${T.accent}22`:"none"
        }}>
          <span style={{color:sel?T.accent:T.text,fontSize:14,fontWeight:sel?700:500}}>{l.name}</span>
          {sel&&<span style={{fontSize:18}}>✓</span>}
        </button>;
      })}
    </div>
    {/* Alt butonlar */}
    <div style={{display:"flex",gap:8}}>
      {current&&<button style={{...btn(T.dangerDim,T.danger),flex:1}} onClick={onClear}>🗑 Temizle</button>}
      <button style={{...btn(T.toggleBg,T.textSub),flex:current?1:2}} onClick={onClose}>İptal</button>
    </div>
  </Sheet>;
}

];
const INIT_WKND_SS={startTime:"09:00",lessonDuration:40,breakDuration:10,lunchBreakAfterLesson:3,lunchBreakDuration:20,dailyLessons:6};
function ScheduleScreen({classes,lessons,schedule,setSchedule,scheduleSettings,setScheduleSettings,wkndScheduleGlobal,setWkndScheduleGlobal,wkndSSGlobal,setWkndSSGlobal}){
  const T=useT();const{btn,btnSm,inp}=useStyles();
  const openReport=useReport();
  const[activeDay,setActiveDay]=useState(()=>{const d=new Date().getDay();return d===0?6:d-1;});
  const[editCell,setEditCell]=useState(null);
  const[showSett,setShowSett]=useState(false); // false | "weekday" | "weekend"
  const[sd,setSd]=useState(scheduleSettings);
  const[view,setView]=usePersist("ogretmen_schedule_view","day"); // "day" | "week" | "weekend"
  const[filterClass,setFilterClass]=usePersist("ogretmen_schedule_filterclass","all");
  // Hafta sonu: AppInner'dan gelen global state kullan, yoksa lokal usePersist
  const[wkndScheduleLocal,setWkndScheduleLocal]=usePersist("ogretmen_weekend_schedule",{});
  const[wkndSSLocal,setWkndSSLocal]=usePersist("ogretmen_weekend_sched_settings",INIT_WKND_SS);
  const wkndSchedule=wkndScheduleGlobal!==undefined?wkndScheduleGlobal:wkndScheduleLocal;
  const setWkndSchedule=wkndScheduleGlobal!==undefined?setWkndScheduleGlobal:setWkndScheduleLocal;
  const wkndSS=wkndSSGlobal!==undefined?wkndSSGlobal:wkndSSLocal;
  const setWkndSS=wkndSSGlobal!==undefined?setWkndSSGlobal:setWkndSSLocal;
  const[wsd,setWsd]=useState(wkndSS);
  useEffect(()=>{setSd(s=>JSON.stringify(s)===JSON.stringify(scheduleSettings)?s:scheduleSettings);},[scheduleSettings]);
  useEffect(()=>{setWsd(s=>JSON.stringify(s)===JSON.stringify(wkndSS)?s:wkndSS);},[wkndSS]);
  const periods=useMemo(()=>computePeriods(scheduleSettings),[scheduleSettings]);
  const wkndPeriods=useMemo(()=>computePeriods(wkndSS),[wkndSS]);
  const activePeriods=activeDay>=5?wkndPeriods:periods;
  const cname=id=>{const c=classes.find(x=>x.id===id);return c?`${c.grade}/${c.branch}`:"?";};
  const lname=id=>lessons.find(x=>String(x.id)===String(id))?.name||"?";
  const CDK=["#1E3A80","#064E3B","#3D1B69","#4D2A0E","#1E4040","#3D1010"];
  const CLK=["#DBEAFE","#D1FAE5","#EDE9FE","#FEF3C7","#CCFBF1","#FEE2E2"];
  const CTK=["#1D4ED8","#047857","#6D28D9","#B45309","#0F766E","#B91C1C"];
  const cc=id=>T.id==="dark"?CDK[(id-1)%6]:CLK[(id-1)%6];
  const ct=id=>T.id==="dark"?"#93C5FD":CTK[(id-1)%6];
  const getCell=(dayIdx,pIdx)=>dayIdx>=5?wkndSchedule[dayIdx]?.[pIdx]:schedule[dayIdx]?.[pIdx];
  const setCell=(dayIdx,pIdx,val)=>{
    if(dayIdx>=5) setWkndSchedule(s=>({...s,[dayIdx]:{...(s[dayIdx]||{}),[pIdx]:val}}));
    else setSchedule(s=>({...s,[dayIdx]:{...(s[dayIdx]||{}),[pIdx]:val}}));
  };
  const delCell=(dayIdx,pIdx)=>{
    if(dayIdx>=5) setWkndSchedule(s=>{const n={...s,[dayIdx]:{...(s[dayIdx]||{})}};delete n[dayIdx][pIdx];return n;});
    else setSchedule(s=>{const n={...s,[dayIdx]:{...(s[dayIdx]||{})}};delete n[dayIdx][pIdx];return n;});
  };
  const conflicts=useMemo(()=>{
    const hits=new Set();
    [0,1,2,3,4].forEach(d=>{
      const seen={};
      periods.forEach(p=>{
        const cell=schedule[d]?.[p.index];if(!cell)return;
        const key=`${cell.classId}-${d}-${p.index}`;
        const dupKey=`${cell.classId}-${d}-${cell.lessonId}`;
        if(seen[dupKey])hits.add(key);else seen[dupKey]=true;
      });
    });
    return hits;
  },[schedule,periods]);
  const weekdaySlots=5*periods.length;
  const filledWeekday=[0,1,2,3,4].reduce((acc,d)=>acc+periods.filter(p=>schedule[d]?.[p.index]).length,0);
  const filledWeekend=[5,6].reduce((acc,d)=>acc+wkndPeriods.filter(p=>wkndSchedule[d]?.[p.index]).length,0);
  const fillPct=weekdaySlots>0?Math.round((filledWeekday/weekdaySlots)*100):0;
  const saveCell=(classId,lessonId)=>{if(!editCell)return;setCell(editCell.d,editCell.p,{classId:Number(classId),lessonId:Number(lessonId)});setEditCell(null);};
  const clearCell=()=>{if(!editCell)return;delCell(editCell.d,editCell.p);setEditCell(null);};
  const cellVisible=(cell)=>filterClass==="all"||!cell||String(cell.classId)===filterClass;
  const visibleDays=view==="weekend"?ALL_DAYS.filter(d=>d.weekend):ALL_DAYS.filter(d=>!d.weekend);
  const dayTabColor=(dayObj,active)=>active?T.accent:dayObj.weekend?T.warn:T.textSub;
  const wkndSettSummary=`${wkndSS.startTime} · ${wkndSS.lessonDuration}dk ders · ${wkndSS.dailyLessons} saat`;
  const SETT_FIELDS=[
    ["startTime","Başlangıç Saati","time"],
    ["lessonDuration","Ders Süresi (dk)","number"],
    ["breakDuration","Teneffüs (dk)","number"],
    ["lunchBreakAfterLesson","Öğlen Arası: kaçıncı dersten sonra","number"],
    ["lunchBreakDuration","Öğlen Arası (dk)","number"],
    ["dailyLessons","Günlük Ders Sayısı","number"],
  ];
  return <div>
    <PH sub={<span>
      {view==="weekend"
        ? <span style={{color:T.warn,fontWeight:700}}>📆 Hafta Sonu — {filledWeekend} ders · {wkndPeriods.length} saat/gün</span>
        : <span>{filledWeekday}/{weekdaySlots} ders girildi · <span style={{color:T.warn,fontSize:10,cursor:"pointer"}} onClick={()=>{setView("weekend");setActiveDay(5);}}>+ Hafta Sonu ›</span></span>}
    </span>}
      right={<div style={{display:"flex",gap:4,alignItems:"center"}}>
        <div style={{display:"flex",background:T.toggleBg,borderRadius:8,padding:2,border:`1px solid ${T.border}`}}>
          {[["day","📋","Gün"],["week","🗓","Hafta"],["weekend","📆","H.Sonu"]].map(([v,ic,lb])=>(
            <button key={v} onClick={()=>{setView(v);if(v==="weekend"&&activeDay<5)setActiveDay(5);if(v!=="weekend"&&activeDay>=5)setActiveDay(0);}}
              style={{background:view===v?(v==="weekend"?T.warn:T.accent):"none",color:view===v?"#fff":v==="weekend"?T.warn:T.textSub,border:"none",borderRadius:6,padding:"4px 6px",cursor:"pointer",fontSize:10,fontWeight:700,fontFamily:"inherit",whiteSpace:"nowrap"}}>{ic} {lb}</button>
          ))}
        </div>
        <button style={{...btnSm(T.accent,"#fff"),padding:"5px 10px",fontSize:12}} onClick={()=>openReport({
          title:"Ders Programı",
          filename:"ders_programi",
          supportCols:false,
          defaultOrientation:"landscape",
          defaultFilterOpts:{showWeekdays:true,showWeekend:true,layout:"horizontal",showDensity:true},
          renderFilters:({filterOpts:fo,setFilterOpts:sfo,T,btnSm})=>{
            const Toggle=({k,label,icon})=>{
              const on=fo[k]!==false;
              return <div onClick={()=>sfo(o=>({...o,[k]:!on}))}
                style={{display:"flex",alignItems:"center",justifyContent:"space-between",cursor:"pointer",padding:"10px 14px",borderRadius:10,background:T.card,border:`1px solid ${on?T.accent:T.border}`,marginBottom:6}}>
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  <span style={{fontSize:15}}>{icon}</span>
                  <span style={{color:T.text,fontSize:13,fontWeight:600}}>{label}</span>
                </div>
                <div style={{width:40,height:22,borderRadius:11,background:on?T.accent:T.toggleBg,border:`1px solid ${on?T.accent:T.border}`,position:"relative",transition:"background 0.2s",flexShrink:0}}>
                  <div style={{position:"absolute",top:2,left:on?20:2,width:16,height:16,borderRadius:8,background:on?"#fff":T.textMuted,transition:"left 0.2s",boxShadow:"0 1px 3px rgba(0,0,0,0.3)"}}/>
                </div>
              </div>;
            };
            return <div style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:14,padding:"14px 16px"}}>
              <div style={{color:T.accent,fontSize:12,fontWeight:800,marginBottom:12,textTransform:"uppercase",letterSpacing:"0.08em"}}>| Program Seçenekleri</div>
              <div style={{marginBottom:12}}>
                <div style={{color:T.textSub,fontSize:11,fontWeight:700,marginBottom:8,textTransform:"uppercase"}}>Tablo Yönü</div>
                <div style={{display:"flex",gap:6}}>
                  {[["horizontal","↔ Yatay (Günler sütunda)"],["vertical","↕ Dikey (Günler satırda)"]].map(([v,l])=>(
                    <button key={v} onClick={()=>sfo(o=>({...o,layout:v}))}
                      style={{flex:1,background:fo.layout===v?T.accent:T.toggleBg,color:fo.layout===v?"#fff":T.textSub,border:`2px solid ${fo.layout===v?T.accent:T.border}`,borderRadius:9,padding:"9px 6px",cursor:"pointer",fontFamily:"inherit",fontSize:11,fontWeight:fo.layout===v?700:400}}>
                      {l}
                    </button>
                  ))}
                </div>
              </div>
              <div style={{color:T.textSub,fontSize:11,fontWeight:700,marginBottom:8,textTransform:"uppercase"}}>Günler</div>
              <Toggle k="showWeekdays" label="Hafta İçi (Pzt–Cum)" icon="📅"/>
              <Toggle k="showWeekend" label="Hafta Sonu (Cmt–Paz)" icon="🏖"/>
              <div style={{color:T.textSub,fontSize:11,fontWeight:700,marginBottom:8,marginTop:10,textTransform:"uppercase"}}>Ekstralar</div>
              <Toggle k="showDensity" label="Günlük Ders Yoğunluğu Tablosu" icon="📊"/>
            </div>;
          },
          buildHTML:(allOpts)=>buildSchedulePDF(schedule,scheduleSettings,classes,lessons,allOpts,wkndSchedule,wkndSS),
        })}>📥 PDF</button>
        {/* Ayarlar: hafta içindeyse hafta içi ⚙, hafta sonundaysa hafta sonu ⚙ */}
        <button style={{...btnSm(view==="weekend"?T.warnDim:T.toggleBg,view==="weekend"?T.warn:T.textSub),padding:"5px 7px",fontSize:12,border:`1px solid ${view==="weekend"?T.warn+"44":T.border}`}}
          onClick={()=>{if(view==="weekend"){setWsd({...wkndSS});setShowSett("weekend");}else{setSd({...scheduleSettings});setShowSett("weekday");}}}>⚙</button>
      </div>}
    />
    {/* Doluluk çubuğu */}
    {view!=="weekend"&&<div style={{padding:"5px 14px 0",display:"flex",alignItems:"center",gap:8}}>
      <Bar pct={fillPct} color={fillPct===100?T.success:T.accent}/>
      <span style={{color:T.textSub,fontSize:11,flexShrink:0,fontWeight:600}}>{fillPct}%</span>
    </div>}
    {/* Hafta sonu bilgi bandı */}
    {view==="weekend"&&<div style={{background:T.warnDim,borderLeft:`4px solid ${T.warn}`,padding:"7px 14px",margin:"6px 12px 0",borderRadius:8,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
      <div>
        <div style={{color:T.warn,fontSize:12,fontWeight:700}}>📆 Hafta Sonu Programı</div>
        <div style={{color:T.textMuted,fontSize:10,marginTop:1}}>{wkndSettSummary}</div>
      </div>
      <button style={{background:T.warn,color:"#fff",border:"none",borderRadius:8,padding:"5px 10px",cursor:"pointer",fontSize:11,fontWeight:700,fontFamily:"inherit"}}
        onClick={()=>{setWsd({...wkndSS});setShowSett("weekend");}}>⚙ Ayarlar</button>
    </div>}
    {/* Sınıf filtresi */}
    <div style={{display:"flex",gap:5,padding:"7px 12px",overflowX:"auto"}}>
      {[["all","Tümü"],...[...classes].sort((a,b)=>a.grade-b.grade||a.branch.localeCompare(b.branch)).map(c=>[String(c.id),`${c.grade}/${c.branch}`])].map(([v,l])=>(
        <button key={v} onClick={()=>setFilterClass(v)} style={{...btnSm(filterClass===v?T.accent:T.surface,filterClass===v?"#fff":T.textSub),border:`1px solid ${filterClass===v?T.accent:T.border}`,flexShrink:0,fontSize:11}}>{l}</button>
      ))}
    </div>
    {/* ── GÜNLÜK GÖRÜNÜM ── */}
    {(view==="day"||view==="weekend")&&<>
      <div style={{display:"flex",borderBottom:`1px solid ${T.border}`,background:T.bg}}>
        {visibleDays.map(dayObj=>{
          const pList=dayObj.weekend?wkndPeriods:periods;
          const filled=pList.filter(p=>getCell(dayObj.i,p.index)).length;
          const isActive=activeDay===dayObj.i;
          return <button key={dayObj.i} onClick={()=>setActiveDay(dayObj.i)}
            style={{flex:1,background:"none",border:"none",padding:"8px 0 6px",cursor:"pointer",
              color:dayTabColor(dayObj,isActive),
              borderBottom:`2px solid ${isActive?(dayObj.weekend?T.warn:T.accent):"transparent"}`,
              fontSize:11,fontWeight:isActive?700:400,fontFamily:"inherit",display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
            <span>{dayObj.short}</span>
            <span style={{fontSize:9,color:filled>0?(dayObj.weekend?T.warn:T.success):isActive?T.accent:T.textMuted}}>{filled}/{pList.length}</span>
          </button>;
        })}
      </div>
      <div style={{padding:"10px 14px",display:"flex",flexDirection:"column",gap:7}}>
        {activePeriods.map(p=>{
          const cell=getCell(activeDay,p.index);
          const visible=cellVisible(cell);
          const isConflict=cell&&activeDay<5&&conflicts.has(`${cell.classId}-${activeDay}-${p.index}`);
          const borderColor=isConflict?T.danger:cell?(activeDay>=5?T.warn+"66":ct(cell.classId)+"55"):T.border;
          return <div key={p.index} style={{display:"flex",gap:10,alignItems:"stretch",opacity:visible?1:0.3,transition:"opacity 0.15s"}}
            onClick={()=>setEditCell({d:activeDay,p:p.index})}>
            <div style={{width:66,flexShrink:0,textAlign:"right",paddingTop:10}}>
              <div style={{color:activeDay>=5?T.warn:T.accent,fontSize:11,fontWeight:700}}>{p.index+1}. Ders</div>
              <div style={{color:T.textMuted,fontSize:10}}>{p.start}–{p.end}</div>
            </div>
            <div style={{flex:1,background:cell?cc(cell.classId):T.surface,border:`2px solid ${borderColor}`,borderRadius:12,padding:"10px 14px",cursor:"pointer",minHeight:50,transition:"all 0.15s",position:"relative"}}>
              {isConflict&&<span style={{position:"absolute",top:6,right:8,fontSize:12}}>⚠️</span>}
              {cell
                ?<><div style={{color:activeDay>=5?T.warn:ct(cell.classId),fontSize:13,fontWeight:700}}>{cname(cell.classId)}</div><div style={{color:T.textSub,fontSize:12,marginTop:2}}>{lname(cell.lessonId)}</div></>
                :<div style={{color:T.textMuted,fontSize:12,textAlign:"center",lineHeight:"30px"}}>+ Ekle</div>}
            </div>
          </div>;
        })}
      </div>
    </>}
    {/* ── HAFTALIK ÖZET (7 gün) ── */}
    {view==="week"&&<div style={{padding:"10px 6px",overflowX:"auto"}}>
      <div style={{minWidth:400}}>
        {/* En uzun periyot listesini kullan (hafta içi) — hafta sonu saat farkı not olarak gösterilir */}
        <div style={{display:"grid",gridTemplateColumns:`44px repeat(7,1fr)`,gap:2,marginBottom:4}}>
          <div/>
          {ALL_DAYS.map(d=><div key={d.i} style={{textAlign:"center",color:d.weekend?T.warn:T.textSub,fontSize:9,fontWeight:700,padding:"3px 0"}}>
            {d.short}
            {d.weekend&&<div style={{fontSize:7,color:T.warn,opacity:0.7}}>{wkndPeriods.length}s</div>}
          </div>)}
        </div>
        {/* Hafta içi satırları */}
        {periods.map(p=>(
          <div key={p.index} style={{display:"grid",gridTemplateColumns:`44px repeat(7,1fr)`,gap:2,marginBottom:2}}>
            <div style={{display:"flex",flexDirection:"column",justifyContent:"center",textAlign:"right",paddingRight:4}}>
              <span style={{color:T.accent,fontSize:9,fontWeight:700}}>{p.index+1}.</span>
              <span style={{color:T.textMuted,fontSize:7}}>{p.start}</span>
            </div>
            {ALL_DAYS.map(dayObj=>{
              const pList=dayObj.weekend?wkndPeriods:periods;
              const wkndP=pList[p.index]; // hafta sonu için aynı index'teki periyot (farklı saat)
              const cell=wkndP?getCell(dayObj.i,p.index):null;
              const visible=cellVisible(cell);
              const isConflict=cell&&dayObj.i<5&&conflicts.has(`${cell.classId}-${dayObj.i}-${p.index}`);
              const noSlot=dayObj.weekend&&!wkndP; // hafta sonu bu slot yok
              return <div key={dayObj.i}
                onClick={()=>{if(noSlot)return;setActiveDay(dayObj.i);setEditCell({d:dayObj.i,p:p.index});}}
                style={{background:noSlot?T.bg:cell&&visible?cc(cell.classId):dayObj.weekend?T.warnDim+"33":T.surface,
                  border:`1px solid ${noSlot?"transparent":isConflict?T.danger:cell&&visible?(dayObj.weekend?T.warn+"55":ct(cell.classId)+"44"):(dayObj.weekend?T.warn+"22":T.border)}`,
                  borderRadius:6,padding:"4px 3px",cursor:noSlot?"default":"pointer",minHeight:36,opacity:noSlot?0.2:1,visibility:visible?"visible":"hidden",transition:"all 0.12s"}}>
                {!noSlot&&cell&&visible&&<>
                  <div style={{color:dayObj.weekend?T.warn:ct(cell.classId),fontSize:8,fontWeight:700,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{cname(cell.classId)}</div>
                  <div style={{color:T.textSub,fontSize:7,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",marginTop:1}}>{lname(cell.lessonId)}</div>
                </>}
                {!noSlot&&!cell&&<div style={{height:"100%",display:"flex",alignItems:"center",justifyContent:"center"}}>
                  <span style={{color:dayObj.weekend?T.warn+"44":T.border,fontSize:11}}>+</span>
                </div>}
                {/* Hafta sonu bu slotta saat farklıysa göster */}
                {!noSlot&&dayObj.weekend&&wkndP&&!cell&&<div style={{fontSize:7,color:T.warn+"88",textAlign:"center",marginTop:2}}>{wkndP.start}</div>}
              </div>;
            })}
          </div>
        ))}
        {/* Hafta sonu'nda hafta içinden fazla ders varsa ekstra satırlar */}
        {wkndPeriods.slice(periods.length).map(p=>(
          <div key={`we-extra-${p.index}`} style={{display:"grid",gridTemplateColumns:`44px repeat(7,1fr)`,gap:2,marginBottom:2}}>
            <div style={{display:"flex",flexDirection:"column",justifyContent:"center",textAlign:"right",paddingRight:4}}>
              <span style={{color:T.warn,fontSize:9,fontWeight:700}}>{p.index+1}.</span>
              <span style={{color:T.warn,fontSize:7,opacity:0.7}}>{p.start}</span>
            </div>
            {ALL_DAYS.map(dayObj=>{
              if(!dayObj.weekend) return <div key={dayObj.i} style={{background:T.bg,borderRadius:6,minHeight:36,border:"1px solid transparent",opacity:0.15}}/>;
              const cell=getCell(dayObj.i,p.index);
              const visible=cellVisible(cell);
              return <div key={dayObj.i}
                onClick={()=>{setActiveDay(dayObj.i);setEditCell({d:dayObj.i,p:p.index});}}
                style={{background:cell&&visible?cc(cell.classId):T.warnDim+"33",border:`1px solid ${cell&&visible?T.warn+"55":T.warn+"22"}`,borderRadius:6,padding:"4px 3px",cursor:"pointer",minHeight:36,visibility:visible?"visible":"hidden"}}>
                {cell&&visible&&<>
                  <div style={{color:T.warn,fontSize:8,fontWeight:700,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{cname(cell.classId)}</div>
                  <div style={{color:T.textSub,fontSize:7,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",marginTop:1}}>{lname(cell.lessonId)}</div>
                </>}
                {!cell&&<div style={{height:"100%",display:"flex",alignItems:"center",justifyContent:"center"}}>
                  <span style={{color:T.warn+"44",fontSize:11}}>+</span>
                </div>}
              </div>;
            })}
          </div>
        ))}
        <div style={{display:"flex",gap:8,padding:"6px 2px",fontSize:10,color:T.textMuted,flexWrap:"wrap"}}>
          <span style={{background:T.warnDim,padding:"2px 8px",borderRadius:4,color:T.warn,fontWeight:700}}>Cmt/Paz</span>
          <span>Hafta sonu · {wkndPeriods.length} ders/gün · {wkndSS.startTime} başlangıç</span>
        </div>
      </div>
    </div>}
    {editCell&&<QuickCellSheet
      day={editCell.d} period={editCell.p}
      current={getCell(editCell.d,editCell.p)}
      classes={classes} lessons={lessons}
      onSave={saveCell} onClear={clearCell}
      onClose={()=>setEditCell(null)}
      dayLabel={ALL_DAYS[editCell.d]?.full}
    />}
    {/* ── HAFTA İÇİ AYARLARI ── */}
    {showSett==="weekday"&&<Sheet title="⚙ Hafta İçi Ders Saati Ayarları" onClose={()=>setShowSett(false)}>
      <div style={{background:T.accentDim,borderRadius:8,padding:"7px 12px",marginBottom:12,display:"flex",gap:6,alignItems:"center"}}>
        <span style={{fontSize:16}}>📋</span>
        <span style={{color:T.accent,fontSize:12,fontWeight:600}}>Pazartesi – Cuma geçerli</span>
      </div>
      {SETT_FIELDS.map(([k,l,t])=>(
        <Field key={k} label={l}><input style={inp} type={t} value={sd[k]} min={1}
          onChange={e=>setSd(d=>({...d,[k]:t==="number"?Number(e.target.value):e.target.value}))}/></Field>
      ))}
      <div style={{background:T.toggleBg,borderRadius:10,padding:"10px 12px",marginBottom:8}}>
        <div style={{color:T.textSub,fontSize:11,fontWeight:700,marginBottom:8}}>🕐 Özel Ders/Teneffüs Süreleri</div>
        <div style={{color:T.textMuted,fontSize:10,marginBottom:8}}>Boş bırakılan alanlar varsayılan süreyi kullanır.</div>
        <div style={{display:"grid",gridTemplateColumns:"auto 1fr 1fr",gap:5,alignItems:"center"}}>
          <div style={{color:T.textMuted,fontSize:10,fontWeight:700}}>Ders</div>
          <div style={{color:T.textMuted,fontSize:10,fontWeight:700,textAlign:"center"}}>Süre (dk)</div>
          <div style={{color:T.textMuted,fontSize:10,fontWeight:700,textAlign:"center"}}>Sonraki Teneffüs (dk)</div>
          {Array.from({length:sd.dailyLessons||8},(_,i)=>{
            const n=i+1;
            return [
              <div key={`l${n}`} style={{color:T.text,fontSize:11,fontWeight:600}}>{n}. ders</div>,
              <input key={`ld${n}`} style={{...inp,textAlign:"center",padding:"4px 6px",fontSize:11}} type="number" inputMode="numeric" pattern="[0-9]*" min={1}
                placeholder={String(sd.lessonDuration||40)}
